<style>
:root{
  --bg:#f5f6f9;--line:rgba(17,24,39,.07);

  --c-work:#f97316;      --c-work-soft:#fff7ed;
  --c-personal:#7c3aed;  --c-personal-soft:#f1eaff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#e9ecf3;font-family:var(--font);overflow:hidden;overscroll-behavior:none}
/* v3.25: 아이폰에서 하단 탭이 항상 화면 맨 아래에 붙도록 fixed 기반으로 변경 */
.shell{position:fixed;top:0;bottom:0;left:0;right:0;width:100%;max-width:430px;height:auto;margin:0 auto;background:var(--bg);overflow:hidden}
.pane{position:absolute;inset:0;display:none;background:var(--bg)}
.pane.on{display:block}
.pane iframe{width:100%;height:100%;border:0;display:block;background:var(--bg)}
.pane-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  font-size:12px;font-weight:800;color:#8a95a8;background:var(--bg);z-index:2;pointer-events:none;transition:opacity .25s}
.pane-loading.off{opacity:0}
.pane-loading i{width:26px;height:26px;border-radius:50%;border:3px solid rgba(17,24,39,.08);border-top-color:#3d7eff;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cos-nav{position:absolute;left:0;right:0;bottom:0;z-index:50;display:grid;grid-template-columns:repeat(4,1fr);gap:2px;
  padding:8px 8px calc(11px + env(safe-area-inset-bottom));
  background:rgba(245,246,249,.92);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
  border-top:1px solid var(--line)}
.cos-tab{display:flex;flex-direction:column;align-items:center;gap:3px;border:0;background:transparent;cursor:pointer;
  border-radius:14px;padding:7px 3px 6px;font-family:var(--font);font-size:10px;font-weight:850;letter-spacing:-.1px;color:#98a2b3}
.cos-tab svg{width:21px;height:21px}
.cos-tab.on[data-tab="brief"]{color:var(--c-brief);background:var(--c-brief-soft)}
.cos-tab.on[data-tab="calendar"]{color:var(--c-calendar);background:var(--c-calendar-soft)}
.cos-tab.on[data-tab="work"]{color:var(--c-work);background:var(--c-work-soft)}
.cos-tab.on[data-tab="personal"]{color:var(--c-personal);background:var(--c-personal-soft)}
@media(min-width:520px){
  body{padding:16px 0}
  .shell{top:16px;bottom:16px;height:auto;border-radius:34px;box-shadow:0 18px 60px rgba(0,0,0,.12)}
  .cos-nav{border-radius:0 0 34px 34px}
}

/* v3.31: iPhone safe-area bottom nav correction */
.cos-nav{
  position:fixed !important;
  left:50% !important;
  right:auto !important;
  bottom:0 !important;
  transform:translateX(-50%) !important;
  width:100% !important;
  max-width:430px !important;
  padding:5px 8px max(8px, calc(env(safe-area-inset-bottom) - 18px)) !important;
  min-height:0 !important;
}
.cos-tab{
  padding:6px 3px 5px !important;
  gap:2px !important;
  border-radius:13px !important;
}
.cos-tab svg{
  width:20px !important;
  height:20px !important;
}
.cos-tab span{
  line-height:1.05 !important;
}

</style>

0}\n.mini{border-radius:14px;background:#fff;border:1px solid var(--line);padding:9px 4px;text-align:center}\n.mini b{display:block;font-size:15px;font-weight:950}\n.mini span{display:block;margin-top:4px;font-size:9.5px;color:#8a95a8;font-weight:900;white-space:nowrap}\n.detail-list{margin-top:10px;border-radius:16px;background:#fff;border:1px solid var(--line);overflow:hidden}\n.detail-item{padding:11px 12px;border-top:1px solid var(--line)}\n.detail-item:first-child{border-top:0}\n.detail-item b{display:block;font-size:12.5px;font-weight:950}\n.detail-item span{display:block;margin-top:4px;font-size:11px;color:#687386;line-height:1.5;font-weight:750}\n.notice{padding:13px 15px;border-radius:20px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;gap:10px;align-items:flex-start}\n.notice-dot{width:9px;height:9px;border-radius:50%;background:var(--red);margin-top:5px;box-shadow:0 0 0 4px rgba(239,68,68,.12);flex:0 0 auto}\n.notice b{display:block;font-size:13px;font-weight:950}\n.notice p{margin:5px 0 0;font-size:11.5px;line-height:1.5;color:#687386;font-weight:750}\n@media(max-width:380px){\n  .app{padding-left:14px;padding-right:14px}\n  .hero h1{font-size:20px}\n  .week-strip{gap:6px}\n  .day{height:54px;border-radius:15px}\n  .mini-grid{gap:6px}\n}\n\n.report-archive{display:none;margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}\n.report-archive.open{display:block}\n.report-archive .row{background:#fff}\n\n.archive-row{width:100%;border:0;background:#fff;cursor:pointer;text-align:left;display:grid;grid-template-columns:36px minmax(0,1fr) auto;gap:11px;align-items:center;padding:13px 15px;border-top:1px solid var(--line);min-height:64px}\n.archive-row:first-child{border-top:0}\n.archive-row .tag{pointer-events:none}\n.archive-detail{display:none;grid-column:1 / -1;margin-top:10px;padding:13px;border-radius:17px;background:#f8fafc;border:1px solid var(--line)}\n.archive-row.open .archive-detail{display:block}\n.archive-detail b{display:block;font-size:13px;font-weight:950;color:#111827;letter-spacing:-.25px}\n.archive-detail p{margin:7px 0 0;font-size:11.5px;line-height:1.58;color:#596375;font-weight:750}\n\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\u003cmain class=\"app\"\u003e\n  \u003cheader class=\"top\"\u003e\n    \u003cdiv class=\"top-row\"\u003e\n      \u003cdiv\u003e\n        \u003cdiv class=\"title\"\u003e최동은 대표님, \u003cem\u003e대표 브리핑\u003c/em\u003e\u003c/div\u003e\n        \u003cdiv class=\"caption\"\u003e오늘 할 일과 리포트 입구만 가볍게 봅니다.\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"top-right\"\u003e\n        \u003cdiv class=\"live\"\u003e\u003ci\u003e\u003c/i\u003e\u003cspan\u003e11:42\u003c/span\u003e\u003c/div\u003e\n        \u003cdiv class=\"date-pill\"\u003e6.22 월\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/header\u003e\n\n  \u003csection class=\"week-strip\"\u003e\n    \u003cdiv class=\"day on\"\u003e\u003cb\u003e월\u003c/b\u003e\u003cstrong\u003e22\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e화\u003c/b\u003e\u003cstrong\u003e23\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e수\u003c/b\u003e\u003cstrong\u003e24\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e목\u003c/b\u003e\u003cstrong\u003e25\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e금\u003c/b\u003e\u003cstrong\u003e26\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e토\u003c/b\u003e\u003cstrong\u003e27\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n    \u003cdiv class=\"day\"\u003e\u003cb\u003e일\u003c/b\u003e\u003cstrong\u003e28\u003c/strong\u003e\u003cspan\u003e\u003c/span\u003e\u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003csection class=\"hero\"\u003e\n    \u003cdiv class=\"hero-head\"\u003e\u003cspan id=\"bfSyncDot\" style=\"display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:850;color:#7b8798\"\u003e\u003ci style=\"width:5px;height:5px;border-radius:50%;background:#10b981;display:inline-block\"\u003e\u003c/i\u003e\u003cem id=\"bfSyncTxt\" style=\"font-style:normal\"\u003e연동\u003c/em\u003e\u003c/span\u003e\n      \u003cdiv class=\"kicker\"\u003eToday Brief\u003c/div\u003e\n      \u003cbutton class=\"ai\"\u003eAI\u003c/button\u003e\n    \u003c/div\u003e\n    \u003ch1\u003e\u003cspan id=\"bfBriefTitle\"\u003e오늘은 새 일을 늘리기보다, 밀린 업무와 개인 기록을 정리하는 날입니다.\u003c/span\u003e\u003c/h1\u003e\n    \u003cp\u003e\u003cspan id=\"bfBriefLead\"\u003e브리핑탭은 매일 보는 홈이므로 오늘 판단만 가볍게 보여주고, 주간·월간 리포트는 아래에서 필요할 때만 펼쳐봅니다.\u003c/span\u003e\u003c/p\u003e\n    \u003cdiv class=\"hero-grid\"\u003e\n      \u003cdiv class=\"hero-metric\"\u003e\u003cb id=\"bfEvents\"\u003e4\u003c/b\u003e\u003cspan\u003e일정\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"hero-metric\"\u003e\u003cb id=\"bfWork\"\u003e6\u003c/b\u003e\u003cspan\u003e업무\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"hero-metric\"\u003e\u003cb id=\"bfPersonal\"\u003e3/6\u003c/b\u003e\u003cspan\u003e개인기록\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"hero-metric\"\u003e\u003cb id=\"bfRisk\"\u003e1\u003c/b\u003e\u003cspan\u003e주의\u003c/span\u003e\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003cdiv class=\"section-header\"\u003e\n    \u003cdiv class=\"section-label\"\u003eTODAY SNAPSHOT\u003c/div\u003e\n    \u003cbutton class=\"section-action\"\u003e전체보기\u003c/button\u003e\n  \u003c/div\u003e\n  \u003csection class=\"card\"\u003e\n    \u003cdiv class=\"row\"\u003e\n      \u003cdiv class=\"icon blue\"\u003e일\u003c/div\u003e\n      \u003cdiv class=\"main\"\u003e\u003cb id=\"bfCalLine\"\u003e오후 일정 전 준비 시간을 확보하세요.\u003c/b\u003e\u003cspan id=\"bfCalSub\"\u003e미팅 2건 · 외부 일정 1건 · 이동 여유 필요\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"tag\"\u003eCalendar\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"row\"\u003e\n      \u003cdiv class=\"icon orange\"\u003e업\u003c/div\u003e\n      \u003cdiv class=\"main\"\u003e\u003cb id=\"bfWorkLine\"\u003e오늘은 지연 업무 1개를 먼저 줄이는 게 좋습니다.\u003c/b\u003e\u003cspan id=\"bfWorkSub\"\u003eTo-Do 6개 · 지연 1개 · 오늘 마감 2개\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"tag orange\"\u003eWork\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"row\"\u003e\n      \u003cdiv class=\"icon purple\"\u003e개\u003c/div\u003e\n      \u003cdiv class=\"main\"\u003e\u003cb id=\"bfPerLine\"\u003e수면·식단·기분만 기록해도 오늘 기록은 충분합니다.\u003c/b\u003e\u003cspan id=\"bfPerSub\"\u003eToday Record 3/6 · Journal 미작성\u003c/span\u003e\u003c/div\u003e\n      \u003cdiv class=\"tag purple\"\u003ePersonal\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003cdiv class=\"section-header\"\u003e\n    \u003cdiv class=\"section-label\"\u003eTODAY PRIORITY\u003c/div\u003e\n    \u003cbutton class=\"section-action\"\u003e수정\u003c/button\u003e\n  \u003c/div\u003e\n  \u003csection class=\"card\"\u003e\n    \u003cdiv class=\"priority-card\"\u003e\n      \u003cdiv class=\"rank\"\u003e1\u003c/div\u003e\n      \u003cdiv\u003e\u003cb\u003e지연된 To-Do 1개 처리\u003c/b\u003e\u003cp\u003e오늘 업무가 많아 보일수록 오래 밀린 항목부터 하나만 제거합니다.\u003c/p\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"priority-card\"\u003e\n      \u003cdiv class=\"rank\"\u003e2\u003c/div\u003e\n      \u003cdiv\u003e\u003cb\u003e미팅 전 자료 확인\u003c/b\u003e\u003cp\u003e일정 사이 간격이 짧아서 미리 확인하지 않으면 오후가 밀릴 수 있습니다.\u003c/p\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"priority-card\"\u003e\n      \u003cdiv class=\"rank\"\u003e3\u003c/div\u003e\n      \u003cdiv\u003e\u003cb\u003e수면 기록 30초 입력\u003c/b\u003e\u003cp\u003e오늘부터 수면은 30분 단위로만 기록해도 충분합니다.\u003c/p\u003e\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003cdiv class=\"section-header\"\u003e\n    \u003cdiv class=\"section-label\"\u003eTODAY RISK\u003c/div\u003e\n    \u003cbutton class=\"section-action\"\u003e확인\u003c/button\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"notice\"\u003e\n    \u003cdiv class=\"notice-dot\"\u003e\u003c/div\u003e\n    \u003cdiv\u003e\n      \u003cb\u003e일정은 많은데 개인 기록이 부족합니다.\u003c/b\u003e\n      \u003cp\u003e브리핑 정확도는 개인 기록에 영향을 받습니다. 오늘은 일기보다 수면·식단·기분 3개만 우선 기록하세요.\u003c/p\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"section-header\"\u003e\n    \u003cdiv class=\"section-label\"\u003eREPORT\u003c/div\u003e\n    \u003cbutton class=\"section-action\" id=\"reportArchiveBtn\"\u003e보관함\u003c/button\u003e\n  \u003c/div\u003e\n  \u003csection class=\"card\" id=\"reportBox\"\u003e\u003cdiv id=\"bfReportList\"\u003e\u003c/div\u003e\u003c/section\u003e\n\n  \u003csection class=\"report-archive\" id=\"reportArchive\"\u003e\u003cdiv id=\"bfArchiveList\"\u003e\u003c/div\u003e\u003c/section\u003e\n\u003c/main\u003e\n\n\u003cscript\u003e\n(function(){\n  'use strict';\n  function closeAllReports(){\n    document.querySelectorAll('.report-card').forEach(function(c){\n      c.classList.remove('open');\n      var b=c.querySelector('.report-open');\n      if(b)b.textContent='자세히';\n    });\n  }\n  function closeArchiveRows(except){\n    document.querySelectorAll('.archive-row').forEach(function(r){\n      if(r!==except){r.classList.remove('open');var t=r.querySelector('.tag');if(t)t.textContent='열기';}\n    });\n  }\n  document.addEventListener('click',function(e){\n    var openBtn=e.target.closest('.report-open');\n    if(openBtn){\n      var card=openBtn.closest('.report-card');\n      if(!card)return;\n      var wasOpen=card.classList.contains('open');\n      closeAllReports();\n      if(!wasOpen){card.classList.add('open');openBtn.textContent='접기';}\n      return;\n    }\n    var archiveBtn=e.target.closest('#reportArchiveBtn');\n    if(archiveBtn){\n      var box=document.getElementById('reportArchive');\n      if(!box)return;\n      box.classList.toggle('open');\n      archiveBtn.textContent=box.classList.contains('open')?'닫기':'보관함';\n      if(box.classList.contains('open'))setTimeout(function(){box.scrollIntoView({behavior:'smooth',block:'nearest'});},60);\n      return;\n    }\n    var ar=e.target.closest('.archive-row');\n    if(ar){\n      var was=ar.classList.contains('open');\n      closeArchiveRows(ar);\n      ar.classList.toggle('open',!was);\n      var tag=ar.querySelector('.tag'); if(tag)tag.textContent=ar.classList.contains('open')?'접기':'열기';\n      return;\n    }\n  });\n\n  document.addEventListener('keydown',function(e){\n    if((e.key==='Enter'||e.key===' ') \u0026\u0026 e.target \u0026\u0026 e.target.classList \u0026\u0026 e.target.classList.contains('archive-row')){\n      e.preventDefault(); e.target.click();\n    }\n  });\n})();\n\u003c/script\u003e\n\n\u003cscript id=\"bf-live-wire-v1\"\u003e\n(function(){\n  \"use strict\";\n  /* 브리핑 탭 실연동 v1: 다른 탭이 셸 공유저장소(__COS_BRIEF_STORE__)와 top.localStorage에\n     써둔 cos_calendar_cache_v1 / cos_work_cache_v1 / cos_personal_cache_v1 을 읽어 홈 지표를 갱신.\n     Gemini 브리프는 calendar/work 탭이 등록한 window.top.COS_AI 를 통해 호출(있을 때만). */\n  function topWin(){ try{ if(window.top) return window.top; }catch(e){} try{ if(window.parent) return window.parent; }catch(e){} return window; }\n  function store(){ var w=topWin(); try{ if(!w.__COS_BRIEF_STORE__) w.__COS_BRIEF_STORE__={}; return w.__COS_BRIEF_STORE__; }catch(e){ return null; } }\n  function lsGet(k){\n    var st=store();\n    try{ if(st \u0026\u0026 Object.prototype.hasOwnProperty.call(st,k)) return st[k]; }catch(e){}\n    var w=topWin();\n    try{ if(w \u0026\u0026 w.localStorage){ var raw=w.localStorage.getItem(k); if(raw) return JSON.parse(raw); } }catch(e){}\n    try{ var r2=localStorage.getItem(k); if(r2) return JSON.parse(r2); }catch(e){}\n    return null;\n  }\n  function txt(id,v){ var el=document.getElementById(id); if(el \u0026\u0026 v!=null \u0026\u0026 v!=='') el.textContent=v; }\n  function todayKey(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n\n  function calcCalendar(){\n    var c=lsGet('cos_calendar_cache_v1'); if(!c) return null;\n    var k=todayKey(); var evs=(c.events\u0026\u0026c.events[k])||[]; var dls=(c.deadlines\u0026\u0026c.deadlines[k])||[];\n    var meetings=evs.filter(function(e){return e.isMeeting||e.type==='미팅'}).length;\n    var rev=evs.filter(function(e){return e.isRevenue||e.type==='수익'}).length;\n    var openDl=dls.filter(function(x){return !(x.done||x.completed)}).length;\n    return {count:evs.length, meetings:meetings, rev:rev, openDl:openDl,\n      sub:'미팅 '+meetings+'건 · 수익 '+rev+'건 · 마감 '+openDl+'건'};\n  }\n  function calcWork(){\n    var c=lsGet('cos_work_cache_v1'); if(!c) return null;\n    var logs=Array.isArray(c.logs)?c.logs:[];\n    var done=logs.filter(function(x){return x.done}).length;\n    var pending=logs.length-done;\n    return {total:logs.length, done:done, pending:pending,\n      sub:'To-Do '+logs.length+'개 · 완료 '+done+'개 · 대기 '+pending+'개'};\n  }\n  function calcPersonal(){\n    var c=lsGet('cos_personal_cache_v1'); if(!c) return null;\n    return {avg:c.avg, todayDone:c.todayDone, count:c.count, score:c.score,\n      text:(c.todayDone!=null\u0026\u0026c.count!=null)?(c.todayDone+'/'+c.count):'-',\n      sub:'Today Record '+((c.todayDone!=null\u0026\u0026c.count!=null)?(c.todayDone+'/'+c.count):'-')+' · 기록률 '+((c.avg!=null)?c.avg+'%':'-')};\n  }\n\n  function refresh(){\n    var any=false;\n    var cal=calcCalendar();\n    if(cal){ any=true; txt('bfEvents',cal.count); txt('bfCalSub',cal.sub); }\n    var wk=calcWork();\n    if(wk){ any=true; txt('bfWork',wk.total); txt('bfWorkSub',wk.sub); }\n    var per=calcPersonal();\n    if(per){ any=true; txt('bfPersonal',per.text); txt('bfPerSub',per.sub); }\n    // 주의 카운트: 마감 미완 + 지연 업무 + 개인 미기록\n    var risk=0;\n    if(cal) risk+=cal.openDl;\n    if(wk) risk+=wk.pending\u003e0?0:0;\n    if(per \u0026\u0026 per.todayDone!=null \u0026\u0026 per.count!=null \u0026\u0026 per.todayDone\u003cper.count) risk+=1;\n    if(cal||wk||per) txt('bfRisk', risk);\n\n    var dot=document.getElementById('bfSyncDot'), st=document.getElementById('bfSyncTxt');\n    if(st){\n      if(any){ st.textContent='실시간 연동'; if(dot){var i=dot.querySelector('i'); if(i)i.style.background='#10b981';} }\n      else { st.textContent='연동 대기'; if(dot){var i2=dot.querySelector('i'); if(i2)i2.style.background='#f59e0b';} }\n    }\n    return any;\n  }\n\n  // Gemini 종합 브리프 (calendar/work 탭이 top.COS_AI 를 등록했을 때만)\n  function aiBrief(){\n    var w=topWin(); var fn=null;\n    try{ fn=w.COS_AI; }catch(e){}\n    if(typeof fn!=='function'){ try{ fn=window.COS_AI; }catch(e){} }\n    if(typeof fn!=='function') return;\n    var cal=calcCalendar(), wk=calcWork(), per=calcPersonal();\n    var facts={tab:'brief',kind:'insight',type:'daily',feedback:'',\n      facts:{scope:'daily',calendar:cal,work:wk,personal:per,date:todayKey(),\n        note:'브리핑(홈) 종합 브리프. 캘린더·업무·개인 세 탭 데이터를 한 문장 제목과 2~3문장 본문으로 요약. 추측 금지, 위 데이터만 근거.'}};\n    try{\n      Promise.resolve(fn(facts)).then(function(r){\n        if(r\u0026\u0026r.headline){ var t=document.getElementById('bfBriefTitle'); if(t)t.textContent=r.headline; }\n        if(r\u0026\u0026r.lead){ var l=document.getElementById('bfBriefLead'); if(l)l.textContent=r.lead; }\n      }).catch(function(){});\n    }catch(e){}\n  }\n\n  function boot(){ refresh(); aiBrief(); }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);\n  else boot();\n  setTimeout(refresh,1200); setTimeout(refresh,3500); setTimeout(boot,6000);\n  setInterval(refresh,8000);\n})();\n\u003c/script\u003e\n\n\n\u003cscript id=\"bf-report-wire-v1\"\u003e\n(function(){\n  \"use strict\";\n  function topWin(){ try{ if(window.top) return window.top; }catch(e){} try{ if(window.parent) return window.parent; }catch(e){} return window; }\n  function store(){ var w=topWin(); try{ if(!w.__COS_BRIEF_STORE__) w.__COS_BRIEF_STORE__={}; return w.__COS_BRIEF_STORE__; }catch(e){ return null; } }\n  function lsGet(k){\n    var st=store();\n    try{ if(st \u0026\u0026 Object.prototype.hasOwnProperty.call(st,k)) return st[k]; }catch(e){}\n    var w=topWin();\n    try{ if(w\u0026\u0026w.localStorage){ var raw=w.localStorage.getItem(k); if(raw) return JSON.parse(raw); } }catch(e){}\n    try{ var r2=localStorage.getItem(k); if(r2) return JSON.parse(r2); }catch(e){}\n    return null;\n  }\n  function esc(s){ return String(s==null?'':s).replace(/[\u0026\u003c\u003e\"']/g,function(c){return{'\u0026':'\u0026amp;','\u003c':'\u0026lt;','\u003e':'\u0026gt;','\"':'\u0026quot;',\"'\":'\u0026#39;'}[c]}); }\n\n  // 개인 탭 리포트는 자기 STORE_KEY 안(personal_ui_integrated_v1.reports)에 저장됨\n  function personalReports(){\n    // 1순위: 공유저장소 미러(cos_reports_personal_v1), 2순위: 개인 iframe localStorage 직접\n    var shared=lsGet('cos_reports_personal_v1');\n    if(Array.isArray(shared)\u0026\u0026shared.length) return shared;\n    var c=lsGet('personal_ui_integrated_v1');\n    var arr=(c\u0026\u0026Array.isArray(c.reports))?c.reports:[];\n    return arr.map(function(r){ return {\n      id:r.id||('personal-'+r.type), domain:'personal', type:r.type,\n      title:r.title||((r.type==='monthly'?'개인 월간':'개인 주간')+' 리포트'),\n      period:r.period||'', summary:r.summary||'',\n      headline:r.headline||'', lead:r.lead||'', bullets:r.bullets||[], actions:r.actions||[],\n      createdAt:r.createdAt||''\n    }; });\n  }\n  function allReports(){\n    var out=[];\n    ['cos_reports_calendar_v1','cos_reports_work_v1'].forEach(function(k){\n      var a=lsGet(k); if(Array.isArray(a)) out=out.concat(a);\n    });\n    out=out.concat(personalReports());\n    // 최신순\n    out.sort(function(a,b){ return String(b.createdAt||'').localeCompare(String(a.createdAt||'')); });\n    return out;\n  }\n  var DOMAIN_KO={calendar:'캘린더',work:'업무',personal:'개인'};\n  var DOMAIN_ICON={calendar:'cal',work:'wk',personal:'pn'};\n\n  function reportCardHtml(r, idx){\n    var typeKo = r.type==='monthly'?'월':'주';\n    var dom = DOMAIN_KO[r.domain]||'';\n    var bullets=(r.bullets||[]).slice(0,4).map(function(x){return '\u003cdiv class=\"detail-item\"\u003e\u003cspan\u003e'+esc(x)+'\u003c/span\u003e\u003c/div\u003e';}).join('');\n    var actions=(r.actions||[]).slice(0,3).map(function(x,i){return '\u003cdiv class=\"detail-item\"\u003e\u003cb\u003e'+(i+1)+'\u003c/b\u003e\u003cspan\u003e'+esc(x)+'\u003c/span\u003e\u003c/div\u003e';}).join('');\n    return '\u003cdiv class=\"report-card\" data-bf-report=\"'+idx+'\"\u003e'+\n      '\u003cdiv class=\"report-top\"\u003e'+\n        '\u003cdiv class=\"icon green\"\u003e'+typeKo+'\u003c/div\u003e'+\n        '\u003cdiv class=\"report-title\"\u003e\u003cb\u003e'+esc(dom)+' '+(r.type==='monthly'?'Monthly':'Weekly')+' Report\u003c/b\u003e\u003cspan\u003e'+esc(r.period||'')+(r.summary?' · '+esc(r.summary):'')+'\u003c/span\u003e\u003c/div\u003e'+\n        '\u003cbutton class=\"report-open\" type=\"button\"\u003e자세히\u003c/button\u003e'+\n      '\u003c/div\u003e'+\n      '\u003cdiv class=\"report-detail\"\u003e'+\n        (r.headline?'\u003ch3\u003e'+esc(r.headline)+'\u003c/h3\u003e':'')+\n        (r.lead?'\u003cp\u003e'+esc(r.lead)+'\u003c/p\u003e':'')+\n        (bullets?'\u003cdiv class=\"detail-list\"\u003e\u003cdiv class=\"detail-item\" style=\"opacity:.7;font-weight:950\"\u003e\u003cb\u003e핵심 정리\u003c/b\u003e\u003c/div\u003e'+bullets+'\u003c/div\u003e':'')+\n        (actions?'\u003cdiv class=\"detail-list\" style=\"margin-top:8px\"\u003e\u003cdiv class=\"detail-item\" style=\"opacity:.7;font-weight:950\"\u003e\u003cb\u003e다음 액션\u003c/b\u003e\u003c/div\u003e'+actions+'\u003c/div\u003e':'')+\n      '\u003c/div\u003e'+\n    '\u003c/div\u003e';\n  }\n\n  function render(){\n    var reports=allReports();\n    var box=document.getElementById('bfReportList');\n    var arc=document.getElementById('bfArchiveList');\n    if(box){\n      if(!reports.length){\n        box.innerHTML='\u003cdiv style=\"padding:18px 15px;color:#8b97aa;font-size:12px;font-weight:800;line-height:1.5\"\u003e아직 생성된 리포트가 없습니다.\u003cbr\u003e캘린더·업무·개인 탭에서 주간/월간 리포트를 생성하면 여기에 모입니다.\u003c/div\u003e';\n      }else{\n        // 최신 주간 1 + 최신 월간 1 우선 노출\n        var weekly=reports.filter(function(r){return r.type!=='monthly'});\n        var monthly=reports.filter(function(r){return r.type==='monthly'});\n        var top=[];\n        if(weekly[0])top.push(weekly[0]);\n        if(monthly[0])top.push(monthly[0]);\n        if(!top.length)top=reports.slice(0,2);\n        box.innerHTML=top.map(function(r,i){return reportCardHtml(r,i);}).join('');\n      }\n    }\n    if(arc){\n      if(!reports.length){\n        arc.innerHTML='\u003cdiv style=\"padding:16px 15px;color:#8b97aa;font-size:11.5px;font-weight:750;line-height:1.5\"\u003e보관함이 비어 있습니다.\u003c/div\u003e';\n      }else{\n        arc.innerHTML=reports.map(function(r,i){\n          var typeKo=r.type==='monthly'?'월':'주'; var dom=DOMAIN_KO[r.domain]||'';\n          return '\u003cdiv class=\"archive-row\" tabindex=\"0\" data-bf-arc=\"'+i+'\"\u003e'+\n            '\u003cdiv class=\"icon green\"\u003e'+typeKo+'\u003c/div\u003e'+\n            '\u003cdiv class=\"report-title\"\u003e\u003cb\u003e'+esc(dom)+' '+(r.type==='monthly'?'Monthly':'Weekly')+'\u003c/b\u003e\u003cspan\u003e'+esc(r.period||'')+(r.summary?' · '+esc(r.summary):'')+'\u003c/span\u003e\u003c/div\u003e'+\n            '\u003cdiv class=\"tag\"\u003e열기\u003c/div\u003e'+\n            '\u003cdiv class=\"report-detail\" style=\"grid-column:1/-1\"\u003e'+\n              (r.headline?'\u003ch3\u003e'+esc(r.headline)+'\u003c/h3\u003e':'')+\n              (r.lead?'\u003cp\u003e'+esc(r.lead)+'\u003c/p\u003e':'')+\n            '\u003c/div\u003e'+\n          '\u003c/div\u003e';\n        }).join('');\n      }\n    }\n    bindToggles();\n  }\n\n  function bindToggles(){\n    // report-card open/close\n    document.querySelectorAll('#bfReportList .report-card .report-open').forEach(function(btn){\n      if(btn.__b)return; btn.__b=1;\n      btn.addEventListener('click',function(){\n        var card=btn.closest('.report-card'); if(!card)return;\n        var was=card.classList.contains('open');\n        document.querySelectorAll('#bfReportList .report-card').forEach(function(c){c.classList.remove('open');var b=c.querySelector('.report-open');if(b)b.textContent='자세히';});\n        if(!was){card.classList.add('open');btn.textContent='접기';}\n      });\n    });\n    // archive-row open/close\n    document.querySelectorAll('#bfArchiveList .archive-row').forEach(function(row){\n      if(row.__b)return; row.__b=1;\n      row.addEventListener('click',function(){\n        var was=row.classList.contains('open');\n        document.querySelectorAll('#bfArchiveList .archive-row').forEach(function(r){if(r!==row){r.classList.remove('open');var t=r.querySelector('.tag');if(t)t.textContent='열기';}});\n        row.classList.toggle('open',!was);\n        var tag=row.querySelector('.tag'); if(tag)tag.textContent=row.classList.contains('open')?'접기':'열기';\n      });\n    });\n  }\n\n  function boot(){ render(); }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);\n  else boot();\n  setTimeout(render,1500); setTimeout(render,4000);\n  setInterval(render,10000);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"bf-report-unify-v1\"\u003e\n.report-card .report-top{grid-template-columns:36px minmax(0,1fr) auto !important;gap:11px !important;align-items:center !important}\n.report-card .icon,.archive-row .icon{width:36px !important;height:36px !important;border-radius:12px !important;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:950}\n.report-card{padding:14px 15px !important;border-top:1px solid var(--line)}\n#bfArchiveList .archive-row{padding:13px 15px !important}\n#bfReportList .report-title b,#bfArchiveList .report-title b{font-size:13px;font-weight:950;letter-spacing:-.2px}\n#bfReportList .report-title span,#bfArchiveList .report-title span{display:block;margin-top:3px;font-size:10.5px;font-weight:700;color:#8a95a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n\u003c/style\u003e\n\n\u003cstyle id=\"cos-report-unify-v1\"\u003e\n/* v14 리포트 섹션 규격 통일: 캘린더·업무·개인·브리핑 동일 카드/행/아이콘 */\n.report-row,.cos-report-row,.archive-row .report-top,.report-card .report-top{\n  align-items:center !important;\n}\n/* 개인 탭 report-row를 cos-report-row 규격으로 */\n.report-row{\n  grid-template-columns:36px minmax(0,1fr) auto !important;\n  gap:11px !important;\n  min-height:64px !important;\n  padding:14px 15px !important;\n}\n.report-icon{\n  width:36px !important;height:36px !important;border-radius:12px !important;\n  font-size:11px !important;font-weight:950 !important;\n}\n/* 화살표 색/크기 통일 */\n.chev,.cos-report-arrow{\n  font-size:16px !important;font-weight:900 !important;color:#c4cad5 !important;\n}\n/* AI 버튼 규격 통일 (개인 section-ai ↔ cos-ai-btn) */\n.section-ai,.cos-ai-btn{\n  height:28px !important;min-width:42px !important;padding:0 12px !important;\n  border-radius:999px !important;font-size:11px !important;font-weight:950 !important;\n  display:inline-flex !important;align-items:center !important;justify-content:center !important;\n  gap:5px !important;line-height:1 !important;white-space:nowrap !important;\n}\n\u003c/style\u003e\n\n\n\u003cstyle id=\"cos-final-unify-aibtn-sync-v1\"\u003e\n/* v18 최종 통일: 리포트 AI 버튼 + 구글 연동 상태줄을 전 탭 동일 형식으로 */\n/* AI 버튼: 점 + 탭 포인트색, 동일 규격 */\n.cos-ai-btn,#cosReportAiBtn,#personalReportAiBtn,.section-ai{\n  display:inline-flex !important;align-items:center !important;justify-content:center !important;\n  gap:5px !important;height:28px !important;min-width:42px !important;padding:0 12px !important;\n  border-radius:999px !important;background:rgba(124,58,237,.12) !important;border:1px solid rgba(124,58,237,.20) !important;\n  color:#7c3aed !important;box-shadow:none !important;font-size:11px !important;font-weight:950 !important;\n  line-height:1 !important;letter-spacing:-.1px !important;white-space:nowrap !important;flex:0 0 auto !important;cursor:pointer !important;\n}\n.cos-ai-btn::before,#cosReportAiBtn::before,#personalReportAiBtn::before,.section-ai::before{\n  content:\"\" !important;width:5px !important;height:5px !important;border-radius:50% !important;\n  background:currentColor !important;opacity:.9 !important;flex:0 0 auto !important;display:inline-block !important;\n}\n.cos-ai-btn:active,#cosReportAiBtn:active,#personalReportAiBtn:active,.section-ai:active{\n  transform:translateY(1px) !important;filter:brightness(.98) !important;\n}\n/* 구글 연동 상태줄: 전 탭 동일 — 회색 톤, 같은 형식 */\n.sync-status,#syncStatus,.sync-full-status,.sync-mini,.cos-sync-line{\n  margin-top:6px !important;font-size:10.5px !important;line-height:1.3 !important;\n  color:#8a95a8 !important;font-weight:800 !important;letter-spacing:-.1px !important;\n  white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;\n}\n.sync-status.fail,#syncStatus.fail,.sync-full-status.fail,.sync-mini.fail,.cos-sync-line.fail{\n  color:#8a95a8 !important;\n}\n\u003c/style\u003e\n\n\u003cstyle id=\"bf-archive-fix-v1\"\u003e\n#bfArchiveList .archive-row{display:grid !important;grid-template-columns:36px minmax(0,1fr) auto !important;gap:11px !important;align-items:center !important;row-gap:0 !important}\n#bfArchiveList .archive-row .icon{width:36px !important;height:36px !important;border-radius:12px !important;display:flex !important;align-items:center !important;justify-content:center !important;font-size:11px !important;font-weight:950 !important}\n#bfArchiveList .archive-row .report-title{min-width:0 !important}\n#bfArchiveList .archive-row .report-title b{display:block !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;font-size:13px !important;font-weight:950 !important}\n#bfArchiveList .archive-row .report-title span{display:block !important;margin-top:3px !important;white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;font-size:10.5px !important;font-weight:700 !important;color:#8a95a8 !important}\n#bfArchiveList .archive-row .tag{align-self:center !important;white-space:nowrap !important}\n#bfArchiveList .archive-row .report-detail{display:none !important}\n#bfArchiveList .archive-row.open .report-detail{display:block !important;margin-top:10px !important}\n\u003c/style\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n","calendar":"\u003c!DOCTYPE html\u003e\n\u003chtml lang=\"ko\"\u003e\n\u003chead\u003e\n\u003cmeta charset=\"UTF-8\"/\u003e\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\"/\u003e\n\u003ctitle\u003e캘린더 탭 v55 마감체크 최종 정렬\u003c/title\u003e\n\u003cstyle\u003e\n:root {\n  --bg:#f5f6f9; --bg2:#eef0f5; --bg3:#e8eaf0; --surface:#ffffff; --surface2:#f2f4f8;\n  --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.11);\n  --text-0:#111827; --text-1:#4b5568; --text-2:#8492a6; --text-3:#b0bac8;\n  --blue:#3d7eff; --blue-dim:rgba(61,126,255,.09);\n  --green:#00b87a; --green-dim:rgba(0,184,122,.1);\n  --orange:#ff6a3d; --orange-dim:rgba(255,106,61,.1);\n  --purple:#8b5cf6; --purple-dim:rgba(139,92,246,.1);\n  --red:#ff4d5a; --red-dim:rgba(255,77,90,.1);\n  --yellow:#f4b740; --yellow-dim:rgba(244,183,64,.14);\n  --text-xs:10px; --text-sm:11px; --text-base:13px; --text-md:15px; --text-lg:17px; --text-xl:20px; --text-2xl:24px;\n  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-2xl:28px; --r-pill:999px;\n  --shadow-sm:0 2px 10px rgba(0,0,0,.08); --shadow-md:0 8px 28px rgba(0,0,0,.1);\n  --font:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo',system-ui,sans-serif;\n}\n*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,b DAR_API_URL='https://script.google.com/macros/s/AKfycbxaQ7NEnl49rH9MvMlrhkyO4jmNJ33qFwWKS-o6l8jeGm_kTTb-0d2P4g0gMCHGU3LA/exec'; // Google Calendar API 연결 완료\n// 캘린더 메인 스크립트와 COS 애드온이 같은 날짜별 브리프 키를 쓰도록 부모/애드온에 노출\ntry{ window.COS_CALENDAR_BRIEF_KEY=KEY; window.COS_CALENDAR_BRIEF_STORE_KEY='cos_brief_by_date_'+KEY; }catch(e){}\nfunction cosBriefDateStoreKey(){ return 'cos_brief_by_date_'+KEY; }\nlet cur=0;\nconst dayNames=['월','화','수','목','금','토','일'];\nfunction today(){const d=new Date();d.setHours(0,0,0,0);return d}\nfunction mondayOf(date){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nlet weekOffset=0;\nlet weekStart=mondayOf(today());\ncur=Math.min(6,Math.max(0,Math.round((today()-weekStart)/86400000)));\nfunction refreshWeekStart(){\n  weekStart=mondayOf(today());\n  weekStart.setDate(weekStart.getDate()+weekOffset*7);\n}\nfunction dateFor(i){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d}\nfunction dateKey(i=cur){const d=dateFor(i);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}\nfunction defaultData(){\n  const events={}, deadlines={};\n  events[dateKey(0)]=[\n    {time:'09:30',title:'크립톤 주간 체크',type:'미팅',loc:'온라인'},\n    {time:'11:00',title:'부산 라이콘 펀드 자료 검토',type:'업무',loc:'제안서, 통계 확인'},\n    {time:'14:00',title:'PWR 예약 연동 미팅',type:'미팅',loc:'인천, Sirvoy/OTA 이슈'},\n    {time:'16:30',title:'외부 컨설팅 미팅',type:'수익',loc:'온라인, 30만원'},\n    {time:'19:00',title:'저녁 약속',type:'개인',loc:'서울'}\n  ];\n  deadlines[dateKey(0)]=[\n    {title:'PWR 예약 연동 확인사항 업무 탭으로 넘기기',type:'업무',done:false},\n    {title:'외부 컨설팅 수익 기록 확인',type:'수익',done:false}\n  ];\n  events[dateKey(1)]=[\n    {time:'10:00',title:'WORKSWORK MVP 범위 회의',type:'미팅',loc:'온라인'},\n    {time:'15:00',title:'심사평 정리 마감',type:'마감',loc:'서류 심사'}\n  ];\n  deadlines[dateKey(1)]=[\n    {title:'WORKSWORK 인터뷰 질문 작성',type:'업무',done:false}\n  ];\n  events[dateKey(2)]=[\n    {time:'13:00',title:'펀드 제안서 제출 전 확인',type:'마감',loc:'KRP'},\n    {time:'17:00',title:'PWR 홈페이지 문구 점검',type:'업무',loc:'직접 예약 버튼'}\n  ];\n  deadlines[dateKey(2)]=[\n    {title:'펀드 제출본 최종 확인',type:'마감',done:false}\n  ];\n  events[dateKey(4)]=[\n    {time:'09:00',title:'부산 출장 출장',type:'출장',loc:'서울역'},\n    {time:'14:00',title:'외부 자문 미팅',type:'수익',loc:'50만원, 입금예정'}\n  ];\n  deadlines[dateKey(4)]=[\n    {title:'출장 후속 메모 작성',type:'업무',done:false},\n    {title:'자문료 수익 기록',type:'수익',done:false}\n  ];\n  return {events,deadlines}\n}\nlet data=JSON.parse(localStorage.getItem(KEY)||'null')||defaultData();\n\nfunction setSyncStatus(text){\n  const msg = String(text || '');\n  const el=$('#syncStatus');\n  const isLoading = /불러오는 중|처리 중|저장 중|연동 중/.test(msg);\n  const isFail = /실패|오류|없음|확인 필요|연동 전/.test(msg);\n  const isSuccess = /완료|성공/.test(msg) \u0026\u0026 !isFail;\n  if(el){\n    el.className = 'sync-status ' + (isLoading ? 'loading' : isFail ? 'fail' : '');\n    el.style.display = (isLoading || isFail) ? 'block' : 'none';\n    el.textContent = (isLoading || isFail) ? msg : '';\n    if(isSuccess){\n      el.textContent = '';\n      el.style.display = 'none';\n    }\n  }\n  const live=$('#googleLive');\n  if(live){\n    live.classList.remove('loading','fail');\n    if(isLoading) live.classList.add('loading');\n    if(isFail) live.classList.add('fail');\n    const tm=$('#googleSyncTime');\n    if(tm){\n      if(isLoading) tm.textContent='연동 중';\n      else tm.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});\n    }\n  }\n}\nfunction jsonp(url){\n  return new Promise((resolve,reject)=\u003e{\n    const cb='cal_cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n    const s=document.createElement('script');\n    window[cb]=(data)=\u003e{resolve(data);cleanup();};\n    function cleanup(){delete window[cb]; if(s.parentNode)s.parentNode.removeChild(s);}\n    s.onerror=()=\u003e{cleanup();reject(new Error('calendar sync failed'));};\n    s.src=url+(url.includes('?')?'\u0026':'?')+'callback='+cb;\n    document.body.appendChild(s);\n    setTimeout(()=\u003e{if(window[cb]){cleanup();reject(new Error('calendar sync timeout'));}},15000);\n  });\n}\nfunction calendarSourceLabel(name){\n  const n = String(name || '');\n  if(n.includes('업무일정')) return '업무일정';\n  if(n.includes('개인일정')) return '개인일정';\n  return n || '캘린더';\n}\n\nfunction cleanTitle(title){\n  return String(title || '')\n    .replace(/\\[[^\\]]+\\]/g, '')\n    .replace(/\\(\\s*[0-9]+(?:\\.[0-9]+)?\\s*\\)/g, '')\n    .replace(/\\(\\s*\\?\\s*\\)/g, '')\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\nfunction moneyText(e){\n  if(!e || !(e.isRevenue || e.type==='수익')) return '';\n  if(e.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='') return '금액미정';\n  return `${Number(e.amount).toLocaleString('ko-KR')}만원`;\n}\nfunction statRevenueText(list){\n  const rev=list.filter(e=\u003ee.isRevenue || e.type==='수익');\n  if(!rev.length) return '0';\n  const amount=rev.reduce((s,e)=\u003es+(Number(e.amount)||0),0);\n  const unknown=rev.filter(e=\u003ee.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='').length;\n  if(amount \u0026\u0026 unknown) return `${rev.length}·${amount}+?`;\n  if(amount) return `${rev.length}·${amount}`;\n  if(unknown) return `${rev.length}·?`;\n  return `${rev.length}`;\n}\n\nfunction isMemoEvent(e){\n  if(!e) return false;\n  const t=String(e.type||'');\n  const raw=String(e.rawTitle||e.title||'');\n  return t==='메모' || !!e.isMemo || /\\[\\s*메모\\s*\\]/.test(raw);\n}\nfunction isPersonalEvent(e){\n  if(!e) return false;\n  return !isMemoEvent(e) \u0026\u0026 (isPersonalEvent(e));\n}\n\nfunction revenueSummaryText(list){\n  const rev=list.filter(e=\u003ee.isRevenue || e.type==='수익');\n  const amount=rev.reduce((s,e)=\u003es+(Number(e.amount)||0),0);\n  const unknown=rev.filter(e=\u003ee.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='').length;\n  if(!rev.length) return '0건';\n  return `${rev.length}건 · ${amount.toLocaleString('ko-KR')}만원${unknown?' + ?':''}`;\n}\n\nfunction timeRangeHtml(e){\n  const start = e.time || '종일';\n  const end = e.endTime || '';\n  if(start === '종일' || !start) return `\u003cdiv class=\"time-main\"\u003e종일\u003c/div\u003e`;\n  return `\u003cdiv class=\"time-main\"\u003e${esc(start)}\u003c/div\u003e${end ? `\u003cdiv class=\"time-sub\"\u003e${esc(end)}\u003c/div\u003e` : ''}`;\n}\n\nfunction normalizeCalendarResponse(res){\n  const eventsByDate = {};\n  const deadlinesByDate = {};\n\n  (res.events || []).forEach(e =\u003e {\n    const k = e.date;\n    if(!eventsByDate[k]) eventsByDate[k] = [];\n    eventsByDate[k].push({\n      time: e.startTime || '종일',\n      endTime: e.endTime || '',\n      title: e.cleanTitle || cleanTitle(e.title || ''),\n      rawTitle: e.title || '',\n      type: e.type || '업무',\n      project: e.project || '',\n      amount: e.amount,\n      amountUnknown: !!e.amountUnknown,\n      isMeeting: !!e.isMeeting || e.type === '미팅',\n      isRevenue: !!e.isRevenue || e.type === '수익',\n      isTrip: !!e.isTrip || e.type === '출장',\n      isDeadline: !!e.isDeadline || e.type === '마감',\n      loc: e.location || e.description || e.calendarName || '',\n      source: e.calendarName || '',\n      sourceLabel: calendarSourceLabel(e.calendarName || '')\n    });\n  });\n\n  const taskItemsRaw = [\n    ...(Array.isArray(res.checkItems) ? res.checkItems : []),\n    ...(Array.isArray(res.tasks) ? res.tasks : [])\n  ];\n\n  const seenTaskIds = new Set();\n  taskItemsRaw.forEach(item =\u003e {\n    if(!item) return;\n    if(item.id === 'tasks-api-error' || item.title === 'Google Tasks API 연결 필요') return;\n    const taskId = item.id || `${item.title}-${item.dueDate||item.date}`;\n    if(seenTaskIds.has(taskId)) return;\n    seenTaskIds.add(taskId);\n\n    const k = item.dueDate || item.date;\n    if(!k) return;\n    if(!deadlinesByDate[k]) deadlinesByDate[k] = [];\n    deadlinesByDate[k].push({\n      id: item.id || '',\n      title: item.cleanTitle || cleanTitle(item.title || ''),\n      rawTitle: item.title || '',\n      date: k,\n      dueDate: k,\n      type: item.type || (item.overdue ? '지연' : '마감'),\n      project: item.project || '',\n      listName: item.listName || item.project || '',\n      taskListId: item.taskListId || item.tasklistId || item.listId || '',\n      overdue: !!item.overdue,\n      dueToday: !!item.dueToday,\n      dueThisWeek: !!item.dueThisWeek,\n      completed: !!item.completed || item.status === 'completed',\n      done: !!item.completed || item.status === 'completed'\n    });\n  });\n\n  console.log('tasks raw', (res.checkItems||[]).length, (res.tasks||[]).length, 'deadlines', deadlinesByDate); return { events: eventsByDate, deadlines: deadlinesByDate };\n}\n\nasync function loadGoogleCalendar(){\n  if(!CALENDAR_API_URL){\n    setSyncStatus('Google Calendar 연동 전 · 예시 데이터 표시 중');\n    return;\n  }\n  try{\n    setSyncStatus('Google 연동 중...');\n    const res=await jsonp(`${CALENDAR_API_URL}?action=getCalendarWeek\u0026date=${dateKey(cur)}\u0026t=${Date.now()}`);\n    if(!res || !res.ok) throw new Error(res \u0026\u0026 res.error ? res.error : 'unknown error');\n\n    data = normalizeCalendarResponse(res);\n    save();\n\n    setSyncStatus('Google 연동 완료 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}));\n    renderAll();\n    try{\n      if(typeof renderInsight==='function' \u0026\u0026 document.getElementById('calBriefTitle')){\n        var __ck=dateKey(cur);\n        var __cm=(typeof cosLSget==='function')?cosLSget(cosBriefDateStoreKey(),{}):{};\n        if(!__cm[__ck]){ renderInsight(''); }\n        else { console.log('[BRIEF] loadGoogleCalendar → 캐시 있음, 재생성 생략 날짜=',__ck); }\n      }\n    }catch(e){}\n  }catch(e){\n    setSyncStatus('Google 연동 확인 필요 · 다시 시도');\n    console.error(e);\n  }\n}\n\nfunction save(){localStorage.setItem(KEY,JSON.stringify(data))}\nfunction events(i=cur){const k=dateKey(i);if(!data.events[k])data.events[k]=[];return data.events[k]}\nfunction deadlines(i=cur){const k=dateKey(i);if(!data.deadlines[k])data.deadlines[k]=[];return data.deadlines[k]}\nfunction allDeadlines(){\n  return Object.values(data.deadlines||{}).flat()\n    .sort((a,b)=\u003e{\n      const da=String(a.dueDate||a.date||'');\n      const db=String(b.dueDate||b.date||'');\n      if(da!==db) return da.localeCompare(db);\n      return Number(!!a.completed || !!a.done) - Number(!!b.completed || !!b.done);\n    });\n}\nfunction renderTabs(){\n  const tabs=$('#calDateTabs');\n  if(!tabs) return;\n\n  tabs.innerHTML='';\n  for(let i=0;i\u003c7;i++){\n    const d=dateFor(i);\n    const k=dateKey(i);\n    const evs=data.events[k]||[];\n    const dls=(data.deadlines[k]||[]).filter(x=\u003e!(x.done||x.completed));\n\n    const hasMeeting=evs.some(e=\u003ee.isMeeting || e.type==='미팅');\n    const hasRevenue=evs.some(e=\u003ee.isRevenue || e.type==='수익');\n    const hasDeadline=evs.some(e=\u003ee.isDeadline || e.type==='마감') || dls.length\u003e0;\n    const hasMemo=evs.some(isMemoEvent);\n    const hasPersonal=evs.some(isPersonalEvent);\n    const hasAny=evs.length\u003e0 || dls.length\u003e0;\n\n    const dots=[];\n    if(hasMeeting) dots.push('var(--green)');\n    if(hasRevenue) dots.push('var(--purple)');\n    if(hasDeadline) dots.push('var(--red)');\n    if(!dots.length \u0026\u0026 hasMemo) dots.push('#ec4899');\n    if(!dots.length \u0026\u0026 hasPersonal) dots.push('var(--text-2)');\n    if(!dots.length \u0026\u0026 hasAny) dots.push('var(--blue)');\n\n    const el=document.createElement('button');\n    el.className='date-tab'+(i===cur?' on':'');\n    el.innerHTML=`\n      \u003cdiv class=\"dow\"\u003e${dayNames[i]}\u003c/div\u003e\n      \u003cdiv class=\"dnum\"\u003e${d.getDate()}\u003c/div\u003e\n      \u003cdiv class=\"dots\"\u003e${dots.slice(0,3).map(c=\u003e`\u003cspan class=\"dot\" style=\"background:${c}\"\u003e\u003c/span\u003e`).join('')}\u003c/div\u003e\n    `;\n    el.onclick=()=\u003e{console.log('[BRIEF] 날짜탭 클릭 → cur',cur,'→',i,'날짜=',dateKey(i));cur=i;renderAll();};\n    tabs.appendChild(el);\n  }\n}\nfunction renderSummary(){\n  const evs=events();\n  const selectedProgress=taskProgressForDate(cur);\n\n  const meetings=evs.filter(e=\u003ee.isMeeting || e.type==='미팅').length;\n  const revenueEvents=evs.filter(e=\u003ee.isRevenue || e.type==='수익');\n  const revenues=revenueEvents.length;\n  const personal=evs.filter(isPersonalEvent).length;\n  const memo=evs.filter(isMemoEvent).length;\n\n  // 수익 표기: 수익 일정 개수 · 확정 금액 합계(만원)\n  const knownRevenue=revenueEvents.reduce((sum,e)=\u003esum+(Number(e.amount)||0),0);\n  const unknownRevenue=revenueEvents.filter(e=\u003ee.amountUnknown || e.amount===null || e.amount===undefined).length;\n  const revenueText = `${revenues}·${knownRevenue}`;\n\n  function toMinutes(t){\n    const m=String(t||'').match(/^(\\d{1,2}):(\\d{2})$/);\n    if(!m) return null;\n    return Number(m[1])*60 + Number(m[2]);\n  }\n  const totalMinutes=evs.reduce((sum,e)=\u003e{\n    const s=toMinutes(e.time || e.startTime);\n    const en=toMinutes(e.endTime);\n    if(s===null || en===null || en\u003c=s) return sum;\n    return sum + (en-s);\n  },0);\n  const totalTimeText = totalMinutes\n    ? (totalMinutes%60===0 ? `총 ${Math.round(totalMinutes/60)}h` : `총 ${(totalMinutes/60).toFixed(1)}h`)\n    : '시간 없음';\n\n  $('#statEvents').textContent=evs.length ? evs.length : '-';\n  $('#statMeetings').textContent=meetings ? meetings : '-';\n  $('#statImportant').textContent=revenues ? revenueText : '-';\n  const revenueMeta=$('#statRevenueMeta');\n  if(revenueMeta) revenueMeta.textContent='수익';\n  $('#statDeadline').textContent=selectedProgress.text;\n  const personalEl=$('#statPersonal');\n  if(personalEl) personalEl.textContent=personal ? personal : '-';\n\n  const total=Math.max(1,evs.length);\n  const meetingPct=Math.round(meetings/total*100);\n  const revenuePct=Math.round(revenues/total*100);\n  const personalPct=M tion renderEvents(){\n  const ev=events().sort((a,b)=\u003e{const am=a.type==='메모'?0:1, bm=b.type==='메모'?0:1;if(am!==bm)return am-bm;return String(a.time).localeCompare(String(b.time));});\n  $('#eventList').innerHTML=ev.length?ev.map((e,i)=\u003e{\n    const amount=moneyText(e);\n    const amountText=amount ? `\u003cspan class=\"event-amount-inline ${amount==='금액미정'?'unknown':''}\"\u003e${esc(amount)}\u003c/span\u003e` : '';\n    const typePills=eventPills(e);\n    const projectHtml = projectPill(e.project);\n    return `\u003cdiv class=\"event-row\"\u003e\u003cdiv class=\"event-time\"\u003e${timeRangeHtml(e)}\u003c/div\u003e\u003cdiv class=\"event-card\" style=\"--accent:${C[e.type]||C.개인}\"\u003e\u003cdiv class=\"event-top\"\u003e\u003cdiv class=\"event-name\"\u003e${esc(cleanTitle(e.title))}\u003c/div\u003e\u003cdiv class=\"pill-row\"\u003e${amountText}${projectHtml}${typePills}\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e`;\n  }).join(''):'\u003cdiv class=\"empty\"\u003e선택한 날짜에 일정이 없습니다.\u003c/div\u003e';\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  const cls = p === 'CDE' ? 'pill-grey' : p === 'KRP' ? 'pill-blue' : p === 'WSW' ? 'pill-green' : p === 'PWR' ? 'pill-green' : 'pill-grey';\n  return `\u003cspan class=\"pill ${cls} task-project-pill\"\u003e${esc(p)}\u003c/span\u003e`;\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  const cls = p === 'CDE' ? 'task-cde' : p === 'KRP' ? 'task-krp' : p === 'WSW' ? 'task-wsw' : p === 'PWR' ? 'task-pwr' : 'task-cde';\n  return `\u003cspan class=\"task-tag ${cls}\"\u003e${esc(p)}\u003c/span\u003e`;\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  // 오늘 일정의 태그 체계와 동일하게 매핑: 개인=CDE, 업무=KRP, 미팅=WSW, 수익=PWR\n  const cls = p === 'CDE' ? 'pill-grey' : p === 'KRP' ? 'pill-blue' : p === 'WSW' ? 'pill-green' : p === 'PWR' ? 'pill-purple' : 'pill-grey';\n  return `\u003cspan class=\"pill ${cls} task-tag\"\u003e${esc(p)}\u003c/span\u003e`;\n}\n\nasync function updateGoogleTaskStatus(task, done){\n  const taskId = task \u0026\u0026 (task.id || task.taskId || task.googleTaskId);\n  const taskListId = task \u0026\u0026 (task.taskListId || task.tasklistId || task.listId);\n  if(!taskId){\n    const msg='Google Task id 없음';\n    console.warn(msg, task);\n    setSyncStatus(msg);\n    return {ok:false, error:msg, task:task};\n  }\n  try{\n    setSyncStatus('Google Tasks 완료 처리 중...');\n    const url = `${CALENDAR_API_URL}?action=updateTask\u0026taskId=${encodeURIComponent(taskId)}\u0026taskListId=${encodeURIComponent(taskListId || '')}\u0026completed=${done ? '1' : '0'}\u0026t=${Date.now()}`;\n    const res = await jsonp(url);\n    console.log('updateTask response', res);\n    if(!res || !res.ok){\n      const msg = 'Google Tasks 완료 반영 실패 · ' + (res \u0026\u0026 res.error ? res.error : '응답 오류');\n      setSyncStatus(msg);\n      return res || {ok:false, error:'empty response'};\n    }\n    const detail = res.afterStatus ? ` (${res.beforeStatus||'-'}→${res.afterStatus})` : '';\n    setSyncStatus('Google Tasks 완료 반영 성공' + detail + ' · 새로고침 중...');\n    return res;\n  }catch(err){\n    const msg='Google Tasks 동기화 실패 · ' + String(err \u0026\u0026 err.message ? err.message : err);\n    console.warn(msg, err);\n    setSyncStatus(msg);\n    return {ok:false, error:msg};\n  }\n}\n\n\nfunction taskProgressForDate(i){\n  const k=dateKey(i);\n  const rows=(data.deadlines \u0026\u0026 data.deadlines[k] ? data.deadlines[k] : []);\n  const total=rows.length;\n  const done=rows.filter(r=\u003er.done || r.completed).length;\n  return {done,total,text:total ? `${done}/${total}` : '-'};\n}\n\nfunction taskProgressForWeek(){\n  const rows=Object.values(data.deadlines||{}).flat();\n  const total=rows.length;\n  const done=rows.filter(r=\u003er.done || r.completed).length;\n  return {done,total,text:total ? `${done}/${total}` : '-'};\n}\n\nfunction selectedDateDeadlines(){\n  const k=dateKey(cur);\n  return (data.deadlines \u0026 te()}`;\n}\nfunction weeklyInsight(meetings, move, rev, deadline, amount, unknown){\n  const parts=[];\n  if(deadline) parts.push(`마감 ${deadline}건 우선 확인`);\n  if(move) parts.push(`출장 ${move}건 동선 점검`);\n  if(rev) parts.push(`수익 ${rev}건${amount?`·${amount}만원`:''}${unknown?' + 미정':''}`);\n  if(meetings) parts.push(`미팅 ${meetings}건`);\n  if(!parts.length) return '이번 주는 특이 일정이 적어 여유 일정 확보가 가능합니다.';\n  return parts.slice(0,3).join(' · ');\n}\n\nfunction renderWeekly(){\n  const weekEvents=[];\n  for(let i=0;i\u003c7;i++){\n    const k=dateKey(i);\n    (data.events[k]||[]).forEach(e=\u003eweekEvents.push({...e,date:k}));\n  }\n\n  const meetings=weekEvents.filter(e=\u003ee.isMeeting || e.type==='미팅').length;\n  const trips=weekEvents.filter(e=\u003ee.isTrip || e.type==='출장').length;\n  const revenueEvents=weekEvents.filter(e=\u003ee.isRevenue || e.type==='수익');\n  const revenueCount=revenueEvents.length;\n  const knownRevenue=revenueEvents.reduce((sum,e)=\u003esum+(Number(e.amount)||0),0);\n  const weekProgress=taskProgressForWeek();\n\n  const start=dateFor(0);\n  const end=dateFor(6);\n  const month=start.getMonth()+1;\n  const weekOfMonth=Math.ceil(start.getDate()/7);\n  const dateRange=`${start.getMonth()+1}.${start.getDate()}–${end.getMonth()+1}.${end.getDate()}`;\n\n  const title=$('#weekAnalysisTitle');\n  if(title) title.textContent=`${month}월 ${weekOfMonth}주차 주간 분석 (${dateRange})`;\n\n  const sub=$('#weekAnalysisSub');\n  if(sub) sub.textContent=`이번 주 일정 ${weekEvents.length}건, 미팅 ${meetings}건, 수익 ${revenueCount}건/${knownRevenue}만원, 마감 ${weekProgress.text}을 확인합니다.`;\n\n  const wm=$('#weekMeetings'); if(wm) wm.textContent=meetings ? meetings : '-';\n  const wmove=$('#weekMove'); if(wmove) wmove.textContent=trips ? trips : '-';\n  const wr=$('#weekRevenue'); if(wr) wr.textContent=revenueCount ? `${revenueCount}·${knownRevenue}` : '-';\n  const wd=$('#weekDeadline'); if(wd) wd.textContent=weekProgress.text;\n\n  const dayLabels=['월','화','수','목','금','토','일'];\n  const .getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})();\n  let htmlDays='';\n  for(let i=0;i\u003c42;i++){\n    const d=new Date(start);\n    d.setDate(start.getDate()+i);\n    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n    const cls=[\n      'date-day',\n      d.getMonth()!==m?'muted':'',\n      key===todayKey?'today':'',\n      key===selectedKey?'selected':''\n    ].filter(Boolean).join(' ');\n    htmlDays+=`\u003cbutton class=\"${cls}\" data-date=\"${key}\"\u003e${d.getDate()}\u003c/button\u003e`;\n  }\n  grid.innerHTML=htmlDays;\n  grid.querySelectorAll('[data-date]').forEach(btn=\u003e{\n    btn.onclick=()=\u003e{setWeekByDate(btn.dataset.date);closeDateModal();};\n  });\n}\n\nfunction bind(){\n  const topDateBtn=$('#topDatePickerBtn'); if(topDateBtn) topDateBtn.onclick=openDateModal;\n  const dateCloseBtn=$('#dateCloseBtn'); if(dateCloseBtn) dateCloseBtn.onclick=closeDateModal;\n  const dateTodayBtn=$('#dateTodayBtn'); if(dateTodayBtn) dateTodayBtn.onclick=()=\u003e{setWeekByDate(new Date().toISOString().slice(0,10));closeDateModal();};\n  const datePrevMonth=$('#datePrevMonth'); if(datePrevMonth) datePrevMonth.onclick=()=\u003e{dateView.setMonth(dateView.getMonth()-1);renderDateModal();};\n  const dateNextMonth=$('#dateNextMonth'); if(dateNextMonth) dateNextMonth.onclick=()=\u003e{dateView.setMonth(dateView.getMonth()+1);renderDateModal();};\n  const backdrop=$('#dateModalBackdrop'); if(backdrop) backdrop.onclick=e=\u003e{if(e.target===backdrop) closeDateModal();};\n  const syncBtn=$('#syncCalendarBtn'); if(syncBtn) syncBtn.onclick=loadGoogleCalendar; const googleLive=$('#googleLive'); if(googleLive) googleLive.onclick=loadGoogleCalendar;\n  const eventAddBtn=$('#toggleEventAdd'); if(eventAddBtn) eventAddBtn.onclick=()=\u003e$('#eventAddPanel').classList.toggle('open');\n  const deadlineAddBtn=$('#toggleDeadlineAdd'); if(deadlineAddBtn) deadlineAddBtn.onclick=()=\u003e$('#deadlineAddPanel').classList.toggle('open');\n  $('#newEventLoc').addEventListener('keydown',e=\u003e{if(e.key==='Enter')addEvent()});\n  $('#addDeadlineBtn').onclick=addDeadline;\n  document.getElementById('newEventTitle').addEventListener('keydown',e=\u003e{if(e.key==='Enter')addEvent()});\n}\nfunction addEvent(){const title=$('#newEventTitle').value.trim();if(!title)return;events().push({time:$('#newEventTime').value.trim()||'종일',title,type:$('#newEventType').value,loc:$('#newEventLoc').value.trim()});['newEventTime','newEventTitle','newEventLoc'].forEach(id=\u003e$('#'+id).value='');save();renderAll()}\nfunction addDeadline(){const title=$('#newDeadlineTitle').value.trim();if(!title)return;deadlines().push({title,type:$('#newDeadlineType').value,done:false});$('#newDeadlineTitle').value='';save();renderAll()}\nfunction formatShort(d){\n  return `${d.getMonth()+1}.${d.getDate()}`;\n}\nfunction renderWeekRange(){\n  const selected=dateFor(cur);\n  const btn=$('#topDatePickerBtn');\n  if(btn) btn.textContent=`${selected.getMonth()+1}.${selected.getDate()} ${dayNames[cur]}`;\n}\n\nfunction setWeekByDate(value){\n  if(!value) return;\n  const selected=new Date(value+'T00:00:00');\n  const base=mondayOf(today());\n  const selectedMonday=mondayOf(selected);\n  weekOffset=Math.round((selectedMonday-base)/604800000);\n  refreshWeekStart();\n  cur=Math.min(6,Math.max(0,Math.round((selected-weekStart)/86400000)));\n  console.log('[BRIEF] setWeekByDate → 선택값=',value,'→ cur=',cur,'weekOffset=',weekOffset,'dateKey=',dateKey(cur));\n  data={events:{},deadlines:{}};\n  save();\n  renderAll();\n  loadGoogleCalendar();\n}\n\n\nfunction enhanceDeadlineCheckboxes(){\n  document.querySelectorAll('#deadlineList .check-row').forEach(row=\u003e{\n    if(!row.querySelector('.task-check')){\n      const box=document.createElement('div');\n      box.className='task-check';\n      box.setAttribute('aria-hidden','true');\n      row.insertBefore(box,row.firstChild);\n    }\n  });\n}\n\n// 브리프 저장소: srcdoc iframe은 localStorage가 새로고침/탭전환 시 날아가므로\n// 부모 창(window.top)의 공유 메모리 객체에 저장한다. localStorage는 백업용으로만 사용.\nfunction cosStoreWindow(){\n  // srcdoc iframe에서는 부모 셸을 단일 저장소로 사용한다. 접근이 막히면 top, 최후에는 null.\n  try{\n    if(window.parent) return window.parent;\n  }catch(e){ console.warn('[BRIEF] window.parent 접근 실패:',e.message); }\n  try{\n    if(window.top) return window.top;\n  }catch(e2){ console.warn('[BRIEF] window.top 접근 실패:',e2.message); }\n  return null;\n}\nfunction cosTopStore(){\n  var root=cosStoreWindow();\n  if(root){\n    try{\n      if(!root.__COS_BRIEF_STORE__) root.__COS_BRIEF_STORE__={};\n      return root.__COS_BRIEF_STORE__;\n    }catch(e){ console.warn('[BRIEF] 부모 공유 저장소 접근 실패:',e.message); }\n  }\n  return null;\n}\nfunction cosLSget(k,fb){\n  var store=cosTopStore();\n  if(store \u0026\u0026 Object.prototype.hasOwnProperty.call(store,k)){\n    console.log('[BRIEF] cosLSget → 부모 공유저장소에서 읽음 key=',k,'날짜목록=',Object.keys(store[k]||{}));\n    return store[k];\n  }\n  var root=cosStoreWindow();\n  try{\n    if(root \u0026\u0026 root.localStorage){\n      var pv=JSON.parse(root.localStorage.getItem(k));\n      if(pv!=null){\n        if(store) store[k]=pv;\n        console.log('[BRIEF] cosLSget → 부모 localStorage에서 읽음 key=',k,'날짜목록=',Object.keys(pv||{}));\n        return pv;\n      }\n    }\n  }catch(e){}\n  try{\n    var v=JSON.parse(localStorage.getItem(k));\n    if(v!=null){\n      if(store) store[k]=v;\n      console.log('[BRIEF] cosLSget → iframe localStorage에서 읽음 key=',k,'날짜목록=',Object.keys(v||{}));\n      return v;\n    }\n  }catch(e){}\n  console.log('[BRIEF] cosLSget → 없음, 기본값 반환 key=',k,'store=',store?'있음':'null');\n  return fb;\n}\nfunction cosLSset(k,v){\n  var store=cosTopStore();\n  if(store) store[k]=v;\n  var root=cosStoreWindow();\n  try{\n    if(root \u0026\u0026 root.localStorage) root.localStorage.setItem(k,JSON.stringify(v));\n  }catch(e){}\n  try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e2){}\n  console.log('[BRIEF] cosLSset → 저장 key=',k,'부모공유=',store?'사용':'미사용','날짜목록=',Object.keys(v||{}));\n}\n\nfunction renderAll(){\n  window.__cosLastBriefCur=cur;\n  renderWeekRange();\n  const d=dateFor(cur); if($('#calTopDate')) $('#calTopDate').textContent=(d.getMonth()+1)+'.'+d.getDate()+' '+dayNames[cur];\n  const todayIndex=Math.round((today()-weekStart)/86400000);\n  $('#eventsLabel').textContent=(weekOffset===0 \u0026\u0026 cur===todayIndex?'오늘':dayNames[cur]+'요일')+' 일정';\n\n  var __briefDate=dateKey(cur);\n  var __briefMap={};\n  var __briefSaved=null;\n  try{\n    __briefMap=cosLSget(cosBriefDateStoreKey(),{});\n    __briefSaved=__briefMap[__briefDate]||null;\n    window.__cosAiBriefActive=!!__briefSaved;\n    console.log('[BRIEF] renderAll → 현재날짜=',__briefDate,'cur=',cur,'| 저장본 있음?',!!__briefSaved,'| 저장소 날짜=',Object.keys(__briefMap||{}));\n  }catch(e){\n    window.__cosAiBriefActive=false;\n    console.warn('[BRIEF] renderAll 캐시 선조회 오류',e);\n  }\n\n  renderTabs();renderSummary();renderEvents();renderDeadlines();enhanceDeadlineCheckboxes();renderWeekly();\n\n  try{\n    var __ht=document.getElementById('calBriefTitle');\n    var __hl=document.getElementById('calBriefLead');\n    if(__briefSaved){\n      window.__cosAiBriefActive=true;\n      if(__ht)__ht.textContent=__briefSaved.h;\n      if(__hl)__hl.textContent=__briefSaved.l;\n      console.log('[BRIEF] renderAll → 캐시 표시 날짜=',__briefDate,'headline=',JSON.stringify(__briefSaved.h));\n    }else{\n      window.__cosAiBriefActive=false;\n      console.log('[BRIEF] renderAll → 캐시 없음, 새로 생성 시도 날짜=',__briefDate);\n      if(typeof renderInsight==='function' \u0026\u0026 __ht){ renderInsight(''); }\n    }\n  }catch(e){ console.warn('[BRIEF] renderAll 오류',e); }\n}\nbind();renderAll();loadGoogleCalendar();\n\nfunction updateHeaderClock(){\n  const now=new Date();\n  const hh=String(now.getHours()).padStart(2,'0');\n  const mm=String(now.getMinutes()).padStart(2,'0');\n  const days=['일','월','화','수','목','금','토'];\n  const t=document.getElementById('nowTime');\n  const d=document.getElementById('todayPill');\n  if(t) t.textContent=`${hh}:${mm}`;\n  if(d) d.textContent=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n}\nupdateHeaderClock();\nsetInterval(updateHeaderClock,30000);\n\n\n(function(){\n  function bindV35Ai(){\n    document.querySelectorAll('.ai-judge-btn,.report-ai-btn,.hero-ai-btn').forEach(btn=\u003e{\n      if(btn.__v35AiBind) return;\n      btn.__v35AiBind=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n        else if(typeof toast==='function') toast('AI 피드백은 통합 후 연결 예정입니다.');\n      });\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindV35Ai);\n  else bindV35Ai();\n})();\n\n\n(function(){\n  function bindV36Ai(){\n    document.querySelectorAll('.ai-judge-btn,.report-ai-btn,.hero-ai-btn').forEach(btn=\u003e{\n      if(btn.__v36AiBind) return;\n      btn.__v36AiBind=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n        else if(typeof toast==='function') toast('AI 피드백은 통합 후 연결 예정입니다.');\n      });\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindV36Ai);\n  else bindV36Ai();\n})();\n\n\u003c/script\u003e\n\n\u003cstyle id=\"cos-addon-style\"\u003e\n.cos-hero-ai{position:absolute;top:16px;right:16px;display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.88);font-size:10px;font-weight:950;cursor:pointer;z-index:3}\n.cos-hero-ai:before{content:\"\";width:5px;height:5px;border-radius:50%;background:#fff;opacity:. order-radius:50%;background:var(--cos-accent);opacity:.7}\n.cos-detail-actions div{font-size:12px;line-height:1.7;font-weight:750;color:#4b5563}\n.cos-feedback-note{margin-top:10px;font-size:10.5px;font-weight:750;color:var(--cos-accent);background:var(--cos-soft);border-radius:10px;padding:8px 10px;line-height:1.5}\n.cos-divider{margin:16px 0 4px;border-top:1px dashed rgba(17,24,39,.13)}\n#cosToast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);background:rgba(17,24,39,.92);color:#fff;font-size:11.5px;font-weight:850;border-radius:999px;padding:9px 15px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;max-width:86%;overflow:hidden;text-overflow:ellipsis}\n#cosToast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n\u003c/style\u003e\n\n\u003cscript\u003ewindow.COS_TAB_KEY=\"calendar\";\u003c/script\u003e\n\n\u003cscript id=\"cos-addon\"\u003e\n/* ============================================================\n   COS 애드온 v3.2: 탭 브리프(해석형) + 주간/월간 리포트\n   Gemini 연동 시: window.COS_AI = async ({tab,kind,type,feedback,facts})\n     =\u003e {headline,lead,bullets:[],actions:[]} 등록 시 모든 생성이 AI 호출로 대체.\n   ============================================================ */\n(function(){\n\"use strict\";\nvar KEY=window.COS_TAB_KEY;\nvar CFG={\n  calendar:{label:'캘린더',brief:'Calendar Brief',accent:'#3d7eff',soft:'rgba(61,126,255,.10)',border:'rgba(61,126,255,.22)'},\n  work:{label:'업무',brief:'Work Brief',accent:'#f97316',soft:'rgba(249,115,22,.10)',border:'rgba(249,115,22,.22)'},\n  personal:{label:'개인',brief:'Daily Brief',accent:'#7c3aed',soft:'rgba(124,58,237,.10)',border:'rgba(124,58,237,.22)'}\n}[KEY];\nif(!CFG) return;\nvar REPORT_KEY='cos_reports_'+KEY+'_v1';\nvar FB_KEY='cos_ai_feedback_'+KEY+'_v1';\n// 탭 식별자(KEY='calendar')와 실제 캘린더 데이터 키(calendar_tab_google_live_v50)가 달라서\n// 저장/읽기 키가 어긋나던 문제를 방지하기 위한 날짜별 브리프 전용 키.\nvar BRIEF_DATE_KEY=(KEY==='calendar' \u0026\u0026 window.COS_CALENDAR_BRIEF_KEY)?window.COS_CALENDAR_BRIEF_KEY:KEY;\nfunction briefStoreKey(){return 'cos_brief_by_date_'+BRIEF_DATE_KEY;}\ndocument.documentElement.style.setProperty('--cos-accent',CFG.accent);\ndocument.documentElement.style.setProperty('--cos-soft',CFG.soft);\ndocument.documentElement.style.setProperty('--cos-border',CFG.border);\n\n/* ---------- 유틸 ---------- */\nfunction esc(s){return String(s==null?'':s).replace(/[\u0026\u003c\u003e\"']/g,function(c){return{'\u0026':'\u0026amp;','\u003c':'\u0026lt;','\u003e':'\u0026gt;','\"':'\u0026quot;',\"'\":'\u0026#39;'}[c]})}\nfunction pad(n){return (n\u003c10?'0':'')+n}\nfunction cosTopStore(){\n  var wins=[];\n  try{wins.push(window.parent)}catch(e){}\n  try{wins.push(window.top)}catch(e){}\n  wins.push(window);\n  for(var i=0;i\u003cwins.length;i++){\n    try{\n      var w=wins[i];\n      if(!w)continue;\n      if(!w.__COS_BRIEF_STORE__)w.__COS_BRIEF_STORE__={};\n      return w.__COS_BRIEF_STORE__;\n    }catch(e){}\n  }\n  return null;\n}\nfunction lsGet(k,fb){\n  var store=cosTopStore();\n  try{ if(store \u0026\u0026 Object.prototype.hasOwnProperty.call(store,k)) return store[k]; }catch(e){}\n  var wins=[]; try{wins.push(window.parent)}catch(e){} try{wins.push(window.top)}catch(e){} wins.push(window);\n  for(var i=0;i\u003cwins.length;i++){\n    try{\n      var raw=wins[i]\u0026\u0026wins[i].localStorage\u0026\u0026wins[i].localStorage.getItem(k);\n      if(raw){ var val=JSON.parse(raw); if(store)store[k]=val; return val; }\n    }catch(e){}\n  }\n  return fb;\n}\nfunction lsSet(k,v){\n  var store=cosTopStore();\n  try{ if(store)store[k]=v; }catch(e){}\n  var raw; try{raw=JSON.stringify(v)}catch(e){raw=null}\n  if(raw!=null){\n    var wins=[]; try{wins.push(window.parent)}catch(e){} try{wins.push(window.top)}catch(e){} wins.push(window);\n    for(var i=0;i\u003cwins.length;i++){\n      try{ if(wins[i]\u0026\u0026wins[i].localStorage) wins[i].localStorage.setItem(k,raw); }catch(e){}\n    }\n  }\n}\nfunction toast(msg){var t=document.getElementById('cosToast');if(!t){t=document.createElement('div');t.id='cosToast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},1700)}\nfunction mondayOf(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nfunction dkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}\nfunction weekKeys(){var m=mondayOf(new Date()),a=[];for(var i=0;i\u003c7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(dkey(d))}return a}\nfunction monthKeys(){var n=new Date(),y=n.getFullYear(),mo=n.getMonth(),last=new Date(y,mo+1,0).getDate(),a=[];for(var i=1;i\u003c=last;i++)a.push(y+'-'+pad(mo+1)+'-'+pad(i));return a}\nfunction selectedDateKey(){\n  try{ if(typeof window.COS_SELECTED_DATE_KEY==='function'){ var k=window.COS_SELECTED_DATE_KEY(); if(k)return String(k).slice(0,10); } }catch(e){}\n  try{ if(KEY==='calendar' \u0026\u0026 typeof dateKey==='function' \u0026\u0026 typeof cur!=='undefined') return dateKey(cur); }catch(e){}\n  try{ if(KEY==='personal' \u0026\u0026 typeof dateKeyForCur==='function') return dateKeyForCur(); }catch(e){}\n  try{ if(typeof currentDateISO!=='undefined' \u0026\u0026 currentDateISO) return String(currentDateISO).slice(0,10); }catch(e){}\n  try{ var saved=lsGet('brief_selected_date_v323',''); if(KEY==='brief'\u0026\u0026saved)return String(saved).slice(0,10); }catch(e){}\n  return dkey(new Date());\n}\ntry{ window.cosAddonSelectedDateKeyV329=selectedDateKey; }catch(e){}\nfunction weekMeta(){var m=mondayOf(new Date()),e=new Date(m);e.setDate(m.getDate()+6);var wk=Math.ceil(m.getDate()/7);\n  return {id:KEY+'-w-'+m.getFullYear()+'-'+pad(m.getMonth()+1)+'-'+wk,\n    title:(m.getMonth()+1)+'월 '+wk+'주차 '+CFG.label+' 주간 리포트',\n    period:m.getFullYear()+'.'+pad(m.getMonth()+1)+'.'+pad(m.getDate())+'–'+pad(e.getMonth()+1)+'.'+pad(e.getDate())}}\nfunction monthMeta(){var n=new Date();\n  return {id:KEY+'-m-'+n.getFullYear()+'-'+pad(n.getMonth()+1),\n    title:n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+CFG.label+' 월간 리포트',\n    period:n.getFullYear()+'.'+pad(n.getMonth()+1)}}\nvar DOW=['월','화','수','목','금','토','일'];\nfunction jo(w,bat,no){w=String(w||'');var c=w.charCodeAt(w.length-1);if(isNaN(c)||c\u003c0xAC00||c\u003e0xD7A3)return no;return ((c-0xAC00)%28)?bat:no}\nfunction dayName(k){var d=new Date(k+'T00:00:00');return DOW[(d.getDay()+6)%7]}\nfunction daysSince(s){var d=new Date(String(s)+'T00:00:00');if(isNaN(d))return null;return Math.max(0,Math.round((new Date().setHours(0,0,0,0)-d)/86400000))}\n\n/* ---------- 사실 수집(facts) ---------- */\nfunction getFacts(scope){\n  try{\n    if(KEY==='calendar')return calFacts(scope);\n    if(KEY==='work')return workFacts(scope);\n    if(KEY==='personal')return personalFacts(scope);\n  }catch(e){}\n  return {};\n}\nfunction calFacts(scope){\n  var d=(typeof data!=='undefined'\u0026\u0026data)||{};\n  var keys=scope==='monthly'?monthKeys():weekKeys();\n  var ev=d.events||{},dl=d.deadlines||{};\n  var list=[];keys.forEach(function(k){(ev[k]||[]).forEach(function(e){list.push(Object.assign({_d:k},e))})});\n  var byDay={};list.forEach(function(e){byDay[e._d]=(byDay[e._d]||0)+1});\n  var sortedDays=Object.keys(byDay).sort(function(a,b){return byDay[b]-byDay[a]});\n  var busiestKey=sortedDays[0]||null;\n  var morning=list.filter(function(e){return e.time\u0026\u0026e.time!=='종일'\u0026\u0026e.time\u003c'12:00'}).length;\n  var afternoon=list.filter(function(e){return e.time\u0026\u0026e.time!=='종일'\u0026\u0026e.time\u003e='12:00'}).length;\n  var rev=list.filter(function(e){return e.isRevenue||e.type==='수익'});\n  var revAmt=rev.reduce(function(s,e){return s+(Number(e.amount)||0)},0);\n  var dls=[];keys.forEach(function(k){(dl[k]||[]).forEach(function(x){dls.push(Object.assign({_d:k},x))})});\n  var dlOpen=dls.filter(function(x){return !(x.done||x.completed)});\n  var collide=busiestKey?dlOpen.some(function(x){return x._d===busiestKey}):false;\n  // 일정이 가장 적은 평일\n  var lightKey=null,lightCnt=1e9;\n  keys.slice(0,5).forEach(function(k){var c=byDay[k]||0;if(c\u003clightCnt){lightCnt=c;lightKey=k}});\n  return {scope:scope,total:list.length,meetings:list.filter(function(e){return e.type==='미팅'}).length,\n    busiestKey:busiestKey,busiestCnt:busiestKey?byDay[busiestKey]:0,busiestDay:busiestKey?dayName(busiestKey):'',\n    lightDay:lightKey?dayName(lightKey):'',lightCnt:lightKey?(byDay[lightKey]||0):0,\n    morning:morning,afternoon:afternoon,revCount:rev.length,revAmt:revAmt,\n    dlOpen:dlOpen.length,dlOpenTitles:dlOpen.slice(0,2).map(function(x){return x.title||''}),dlTotal:dls.length,collide:collide};\n}\nfunction inScopeDate(k,keys){return keys.indexOf(String(k||'').slice(0,10))\u003e=0}\nfunction workItemDate(x){return String((x\u0026\u0026(x.date||x.created||x.due||x.googleTaskDue||x.schedule))||'').slice(0,10)}\nfunction workFacts(scope){\n  var d=(typeof data!=='undefined'\u0026\u0026data)||{};\n  var keys=scope==='monthly'?monthKeys():(scope==='daily'?[selectedDateKey()]:weekKeys());\n  var allLogs=d.logs||[];\n  var logs=allLogs.filter(function(x){var k=workItemDate(x);return k?inScopeDate(k,keys):(scope==='daily'||keys.indexOf(selectedDateKey())\u003e=0)});\n  var laterAll=d.laterChecks||[];\n  var later=laterAll.filter(function(x){var k=workItemDate(x);return k?inScopeDate(k,keys):true});\n  var projects=d.projects||[],rec=d.recurring||[];\n  var sideJobs=(d.sideJobs||d.alba||[]).filter(function(x){var k=workItemDate(x);return k?inScopeDate(k,keys):true});\n  var done=logs.filter(function(x){return x.done}).length;\n  var pending=logs.filter(function(x){return !x.done}).sort(function(a,b){return (b.minutes||0)-(a.minutes||0)});\n  var minutes=logs.reduce(function(s,x){return s+(Number(x.minutes)||0)},0);\n  var cats={};logs.forEach(function(x){cats[x.cat||'기타']=(cats[x.cat||'기타']||0)+1});\n  var topCat=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]})[0]||'';\n  var laterOpen=later.filter(function(x){return !x.done});\n  var oldest=laterOpen.slice().sort(function(a,b){return String(a.created||'').localeCompare(String(b.created||''))})[0]||null;\n  var oldestDays=oldest?daysSince(oldest.created):null;\n  var proj=projects.map(function(p){var open=(p.items||[]).filter(function(it){return it.state!=='완료'});var dated=(p.items||[]).filter(function(it){return inScopeDate(workItemDate(it),keys)});return {name:p.name,open:open.length,dated:dated.length,next:(open[0]||{}).title||''}})\n    .sort(function(a,b){return (b.dated-a.dated)||(b.open-a.open)});\n  var items=0,itemsDone=0;projects.forEach(function(p){(p.items||[]).forEach(function(it){var k=workItemDate(it);if(!k||inScopeDate(k,keys)){items++;if(it.state==='완료')itemsDone++}})});\n  var comp=0,compDone=0;rec.forEach(function(r){(r.companies||[]).forEach(function(c){var k=workItemDate(c);if(!k||inScopeDate(k,keys)){comp++;if(c.meetingDone\u0026\u0026c.logDone)compDone++}})});\n  return {scope:scope,selectedDate:selectedDateKey(),rangeKeys:keys,logTotal:logs.length,logDone:done,rate:logs.length?Math.round(done/logs.length*100):0,minutes:minutes,\n    topCat:topCat,topCatCnt:cats[topCat]||0,heaviest:pending[0]||null,\n    laterOpen:laterOpen.length,oldestTitle:oldest?oldest.title:'',oldestDays:oldestDays,\n    topProj:proj[0]||null,items:items,itemsDone:itemsDone,recTotal:comp,recDone:compDone,sideJobCount:sideJobs.length};\n}\nfunction personalFacts(scope){\n  var st={};try{if(typeof window.COS_PERSONAL_GET_STATE==='function')st=window.COS_PERSONAL_GET_STATE()||{};}catch(e){}\n  var hs=Array.isArray(st.habits)?st.habits:((typeof habits!=='undefined'\u0026\u0026Array.isArray(habits))?habits:[]);\n  var todayIdx=Number.isFinite(st.selectedDayIndex)?st.selectedDayIndex:((new Date().getDay()+6)%7);\n  var rates=hs.map(function(h){var checks=h.checks||[];var c=checks.filter(Boolean).length;\n    var miss=0;for(var i=todayIdx;i\u003e=0;i--){if(checks[i])break;miss++}\n    return {name:h.name,rate:c,today:!!checks[todayIdx],missRun:miss,type:h.type||''}});\n  var denom=hs.length*Math.max(1,(scope==='daily'?1:(todayIdx+1)));\n  var sum=rates.reduce(function(s,r){return s+(scope==='daily'?(r.today?1:0):r.rate)},0);\n  var avg=hs.length?Math.round(sum/denom*100):0;\n  var sorted=rates.slice().sort(function(a,b){return b.rate-a.rate});\n  return {scope:scope,selectedDate:st.selectedDate||selectedDateKey(),count:hs.length,avg:Math.min(100,avg),best:sorted[0]||null,worst:sorted[sorted.length-1]||null,\n    todayDone:rates.filter(function(r){return r.today}).length,todayIdx:todayIdx,score:st.score||''};\n}\n\n/* ---------- 해석형 생성 ---------- */\nfunction fbMods(fb){fb=fb||'';return {detail:/구체|자세|디테일|수치/.test(fb),brief:/간결|짧게|짧은|핵심만/.test(fb),raw:fb}}\nfunction calNarrative(f){\n  var headline,lead;\n  if(!f.total){\n    headline=(f.scope==='monthly'?'이번 달':'이번 주')+' 캘린더가 비어 있습니다. 일정을 채우기 전에 우선순위부터 정할 타이밍입니다.';\n    lead='기록된 일정이 없을 때가 오히려 설계하기 가장 좋은 구간입니다. 수익 일정과 마감을 먼저 고정한 뒤, 미팅을 그 사이에 배치하는 순서를 권합니다.';\n  }else{\n    if(f.revCount\u003e=2){\n      headline='이번 '+(f.scope==='monthly'?'달':'주')+' 운영의 축은 수익 일정 '+f.revCount+'건입니다. 나머지 일정은 그 앞뒤로 정렬하는 것이 맞습니다.';\n    }else if(f.busiestDay){\n      headline='승부처는 '+f.busiestDay+'요일입니다. 전체 '+f.total+'건 중 '+f.busiestCnt+'건이 이 하루에 몰려 있습니다.';\n    }else{\n      headline='일정 밀도가 고르게 분산되어 있어, 집중 블록을 직접 설계할 수 있는 주간입니다.';\n    }\n    var parts=[];\n    if(f.collide\u0026\u0026f.busiestDay)parts.push('미완료 마감이 일정이 가장 몰린 '+f.busiestDay+'요일에 함께 걸려 있어, '+(f.lightDay?'상대적으로 비어 있는 '+f.lightDay+'요일로 앞당기는':'전날까지 끝내두는')+' 편이 안전합니다');\n    else if(f.dlOpen)parts.push('미완료 마감 '+f.dlOpen+'건'+(f.dlOpenTitles[0]?'(“'+f.dlOpenTitles[0]+'” 등)':'')+'은 '+(f.lightDay?'일정이 가장 적은 '+f.lightDay+'요일에 처리하는 것이 현실적입니다':'완충 시간이 있는 날에 배치가 필요합니다'));\n    if(f.afternoon\u003ef.morning\u0026\u0026f.afternoon\u003e=2)parts.push('일정이 오후에 치우쳐 있으니 오전은 회의가 아니라 준비와 집중 업무로 비워두는 운영이 적합합니다');\n    else if(f.morning\u003ef.afternoo
