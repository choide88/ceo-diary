mportant;box-shadow:0 1px 7px rgba(15,23,42,.05) !important;\n}\n.section-action,.report-all-btn{display:inline-flex !important;align-items:center !important;justify-content:center !important;height:24px !important;padding:0 2px !important;font-size:12px !important;font-weight:900 !important;line-height:1 !important;}\n.hero-head,.brief-head,.calendar-hero-head,.work-hero-head,.daily-hero-head{display:flex !important;align-items:center !important;justify-content:space-between !important;gap:14px !important;margin-bottom:18px !important;}\n.hero .kicker,.brief-kicker,.hero-kicker{line-height:24px !important;}\n.hero-title,.brief-title-main,.calendar-brief-title,.work-brief-title,.daily-brief-title{margin-top:14px !important;line-height:1.28 !important;}\n.hero-head + .hero-title,.brief-head + .hero-title,.hero-head + .brief-title-main{margin-top:18px !important;}\n.card,.report-card{border-radius:21px !important;}\n.report-row,.archive-row{padding:14px 15px !important;min-height:64px !important;gap:12px !important;}\n.report-main b,.archive-main b{line-height:1.32 !important;}\n.report-main span,.archive-main span{margin-top:5px !important;line-height:1.42 !important;}\n.brief-row{padding-top:14px !important;padding-bottom:14px !important;min-height:62px !important;}\n.brief-sub{margin-top:5px !important;line-height:1.45 !important;}\n\n:root{--accent:#3d7eff;}\n.report-section-header .ai-judge-btn,.report-section-header .report-ai-btn,.section-header .ai-judge-btn.small{color:#3d7eff !important;}\n\n\u003c/style>\n\n\u003clink rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css\">\n\u003cstyle id=\"cos-shell-patch\">\n:root{--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif !important}\nhtml,body{font-family:var(--font)}\n.bottom-nav{display:none !important}\n.app{padding-bottom:104px !important}\n@media(min-width:520px){\n  .app{margin:0 auto !important;border-radius:0 !important;box-shadow:none !important;min-height:100dvh !important}\n}\n\u003c/style>\n\n\u003cstyle id=\"cos-calendar-fix\">\n/* COS v3.3: 포인트 블루 */\n.title em{color:var(--blue) !important}\n.section-action{color:var(--blue) !important}\n.week-range:after{color:var(--blue) !important}\n.date-tab.on{background:var(--blue) !important;border-color:var(--blue) !important}\n.date-day.today{background:var(--blue-dim) !important;color:var(--blue) !important}\n.date-day.selected{background:var(--blue) !important;color:#fff !important}\n.date-modal-foot button:not(.danger){color:var(--blue) !important}\n.cal-hero{background:linear-gradient(145deg,#12306e,#2563eb) !important;border:1px solid rgba(61,126,255,.32) !important;box-shadow:0 8px 32px rgba(61,126,255,.22) !important}\n#deadlineList .check-row.done .task-check{background:var(--blue) !important;border-color:var(--blue) !important}\n/* 연동 표시: 브리핑 양식(테두리 없는 점+시간) — v92 파란 배경 버그 제거 */\n.sync-dot{background:transparent !important;border:0 !important;border-radius:0 !important;padding:0 !important;box-shadow:none !important;\n  color:#7b8798 !important;font-size:10px !important;font-weight:850 !important;display:inline-flex !important;align-items:center !important;gap:4px !important}\n.sync-dot i{width:5px !important;height:5px !important;border-radius:50% !important;background:var(--green) !important;box-shadow:none !important;flex:0 0 5px !important}\n.sync-dot.loading i{background:var(--orange) !important}\n.sync-dot.fail i{background:var(--red) !important}\n#syncStatus{display:none !important}\n/* 회사 태그 통일: PWR=오렌지 */\n.check-row .task-pwr,.check-row .project-pwr{background:var(--orange-dim) !important;color:var(--orange) !important;border:1px solid transparent !important}\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cmain class=\"app\">\n  \u003cdiv class=\"top daily-style-top\">\n    \u003cdiv class=\"top-row\">\n      \u003cdiv>\n        \u003cdiv class=\"title\">최동은 대표님, \u003cem>캘린더\u003c/em>\u003c/div>\n        \u003cdiv class=\"caption\">일정은 채우는 것이 아니라, 우선순위를 결정하는 일입니다.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"top-status\">\u003cbutton class=\"sync-dot\" id=\"googleLive\" title=\"새로고침\">\u003ci>\u003c/i>\u003cspan id=\"googleSyncTime\">--:--\u003c/span>\u003c/button>\u003cbutton class=\"top-date-btn\" id=\"topDatePickerBtn\">오늘\u003c/button>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"sync-status\" id=\"syncStatus\" style=\"display:none\">\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"week-tabs\" id=\"calDateTabs\">\u003c/div>\n\n  \u003cdiv class=\"cal-hero\">\n    \u003cdiv class=\"kicker\">Calendar Brief\u003c/div>\n    \u003cdiv class=\"hero-title\" id=\"calBriefTitle\">수익 일정 관리가 핵심입니다.\u003c/div>\n    \u003cdiv class=\"hero-lead\" id=\"calBriefLead\">오후 일정 전 준비 시간이 필요합니다. 오전에는 미팅 전 확인 업무와 마감 항목을 먼저 정리하세요.\u003c/div>\n    \u003cdiv class=\"status-box\">\n      \u003cdiv class=\"status-head\">\u003cspan class=\"status-label\">일정 상태\u003c/span>\u003cspan class=\"chip\" id=\"calStatusBadge\">기록 기반\u003c/span>\u003c/div>\n      \u003cdiv class=\"stack-bar\" id=\"calStackBar\">\u003c/div>\n      \u003cdiv style=\"margin-top:7px;font-size:10px;color:rgba(255,255,255,.55);font-weight:600\" id=\"calDensityCopy\">\u003c/div>\n      \u003cdiv class=\"stat-grid-5\" style=\"margin-top:12px\">\n        \u003cdiv class=\"stat-box-hero\">\u003cb id=\"statEvents\">0\u003c/b>\u003cspan>일정\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat-box-hero\">\u003cb id=\"statMeetings\">0\u003c/b>\u003cspan>미팅\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat-box-hero\">\u003cb id=\"statImportant\">0\u003c/b>\u003cspan id=\"statRevenueMeta\">수익\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat-box-hero\">\u003cb id=\"statDeadline\">0\u003c/b>\u003cspan>마감\u003c/span>\u003c/div>\n        \u003cdiv class=\"stat-box-hero\">\u003cb id=\"statPersonal\">0\u003c/b>\u003cspan>개인\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"section-header\">\n    \u003cdiv class=\"section-label\" id=\"eventsLabel\">오늘 일정\u003c/div>\n    \n  \u003c/div>\n  \u003cdiv class=\"add-panel\" id=\"eventAddPanel\">\n    \u003cdiv style=\"display:grid;grid-template-columns:62px 1fr 74px;gap:8px\">\n      \u003cinput class=\"form-input\" id=\"newEventTime\" placeholder=\"시간\">\n      \u003cinput class=\"form-input\" id=\"newEventTitle\" placeholder=\"일정명\">\n      \u003cselect class=\"form-input\" id=\"newEventType\">\u003coption>미팅\u003c/option>\u003coption>업무\u003c/option>\u003coption>출장\u003c/option>\u003coption>마감\u003c/option>\u003coption>수익\u003c/option>\u003coption>개인\u003c/option>\u003c/select>\n    \u003c/div>\n    \u003cinput class=\"form-input\" id=\"newEventLoc\" placeholder=\"장소, 메모\" style=\"margin-top:8px\">\n  \u003c/div>\n  \u003cdiv class=\"event-list\" id=\"eventList\">\u003c/div>\n\n  \u003cdiv class=\"section-header\">\n    \u003cdiv class=\"section-label\">마감 / 체크\u003c/div>\n    \n  \u003c/div>\n  \u003cdiv class=\"add-panel\" id=\"deadlineAddPanel\">\n    \u003cdiv style=\"display:grid;grid-template-columns:1fr 76px 44px;gap:8px\">\n      \u003cinput class=\"form-input\" id=\"newDeadlineTitle\" placeholder=\"마감, 체크 항목\">\n      \u003cselect class=\"form-input\" id=\"newDeadlineType\">\u003coption>업무\u003c/option>\u003coption>마감\u003c/option>\u003coption>수익\u003c/option>\u003coption>개인\u003c/option>\u003c/select>\n      \u003cbutton class=\"btn-dark\" id=\"addDeadlineBtn\" style=\"padding:0\">+\u003c/button>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"check-list\" id=\"deadlineList\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">주간 체크\u003c/div>\n  \u003cdiv class=\"week-note\">\n    \u003cdiv class=\"flex-between\">\n      \u003cdiv>\u003cdiv class=\"card-title\" id=\"weekAnalysisTitle\">주간 분석\u003c/div>\u003cdiv class=\"card-sub week-analysis-sub\" id=\"weekAnalysisSub\">선택한 주의 일정 밀도와 우선순위를 요약합니다.\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"wk-stats-grid\">\n      \u003cdiv class=\"wk-stat-box\">\u003cb id=\"weekMeetings\">0\u003c/b>\u003cspan>미팅\u003c/span>\u003c/div>\n      \u003cdiv class=\"wk-stat-box\">\u003cb id=\"weekMove\">0\u003c/b>\u003cspan>출장\u003c/span>\u003c/div>\n      \u003cdiv class=\"wk-stat-box\">\u003cb id=\"weekRevenue\">0\u003c/b>\u003cspan>수익\u003c/span>\u003c/div>\n      \u003cdiv class=\"wk-stat-box\">\u003cb id=\"weekDeadline\">0\u003c/b>\u003cspan>마감\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"wk-rows\" id=\"weeklyRows\">\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"date-modal-backdrop\" id=\"dateModalBackdrop\">\n    \u003cdiv class=\"date-modal\" id=\"dateModal\">\n      \u003cdiv class=\"date-modal-head\">\n        \u003cbutton class=\"date-arrow\" id=\"datePrevMonth\">‹\u003c/button>\n        \u003cdiv class=\"date-modal-title\" id=\"dateModalTitle\">2026. 6\u003c/div>\n        \u003cbutton class=\"date-arrow\" id=\"dateNextMonth\">›\u003c/button>\n      \u003c/div>\n      \u003cdiv class=\"date-week-head\">\n        \u003cspan>일\u003c/span>\u003cspan>월\u003c/span>\u003cspan>화\u003c/span>\u003cspan>수\u003c/span>\u003cspan>목\u003c/span>\u003cspan>금\u003c/span>\u003cspan>토\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"date-grid\" id=\"dateGrid\">\u003c/div>\n      \u003cdiv class=\"date-modal-foot\">\n        \u003cbutton id=\"dateTodayBtn\">오늘\u003c/button>\n        \u003cbutton id=\"dateCloseBtn\">닫기\u003c/button>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/main>\n\n\u003cscript>\nconst $=s=>document.querySelector(s);\nconst esc=s=>String(s??'').replaceAll('&','&amp;').replaceAll('\"','&quot;').replaceAll('\u003c','&lt;').replaceAll('>','&gt;');\nconst C={미팅:'#00b87a',업무:'#3d7eff',출장:'#f4b740',마감:'#ff4d5a',수익:'#8b5cf6',개인:'#8492a6'};\nconst PILLC={미팅:'pill-green',업무:'pill-blue',출장:'pill-yellow',마감:'pill-red',수익:'pill-purple',개인:'pill-grey'};\nconst KEY='calendar_tab_google_live_v50';\nconst CALENDAR_API_URL='https://script.google.com/macros/s/AKfycbwB10pBRLUQplICh4lgNuv2rqBMRpW_q_-eDp7FX5x4oeN6JAmjl1kg-DQEiBJCa_BISw/exec'; // Google Calendar API 연결 완료\nlet cur=0;\nconst dayNames=['월','화','수','목','금','토','일'];\nfunction today(){const d=new Date();d.setHours(0,0,0,0);return d}\nfunction mondayOf(date){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nlet weekOffset=0;\nlet weekStart=mondayOf(today());\ncur=Math.min(6,Math.max(0,Math.round((today()-weekStart)/86400000)));\nfunction refreshWeekStart(){\n  weekStart=mondayOf(today());\n  weekStart.setDate(weekStart.getDate()+weekOffset*7);\n}\nfunction dateFor(i){const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d}\nfunction dateKey(i=cur){const d=dateFor(i);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}\nfunction defaultData(){\n  const events={}, deadlines={};\n  events[dateKey(0)]=[\n    {time:'09:30',title:'KRP 주간 체크',type:'미팅',loc:'온라인'},\n    {time:'11:00',title:'부산 라이콘 펀드 자료 검토',type:'업무',loc:'제안서, 통계 확인'},\n    {time:'14:00',title:'PWR 예약 연동 미팅',type:'미팅',loc:'인천, Sirvoy/OTA 이슈'},\n    {time:'16:30',title:'외부 컨설팅 미팅',type:'수익',loc:'온라인, 30만원'},\n    {time:'19:00',title:'저녁 약속',type:'개인',loc:'서울'}\n  ];\n  deadlines[dateKey(0)]=[\n    {title:'PWR 예약 연동 확인사항 업무 탭으로 넘기기',type:'업무',done:false},\n    {title:'외부 컨설팅 수익 기록 확인',type:'수익',done:false}\n  ];\n  events[dateKey(1)]=[\n    {time:'10:00',title:'WORKSWORK MVP 범위 회의',type:'미팅',loc:'온라인'},\n    {time:'15:00',title:'심사평 정리 마감',type:'마감',loc:'서류 심사'}\n  ];\n  deadlines[dateKey(1)]=[\n    {title:'WORKSWORK 인터뷰 질문 작성',type:'업무',done:false}\n  ];\n  events[dateKey(2)]=[\n    {time:'13:00',title:'펀드 제안서 제출 전 확인',type:'마감',loc:'KRP'},\n    {time:'17:00',title:'PWR 홈페이지 문구 점검',type:'업무',loc:'직접 예약 버튼'}\n  ];\n  deadlines[dateKey(2)]=[\n    {title:'펀드 제출본 최종 확인',type:'마감',done:false}\n  ];\n  events[dateKey(4)]=[\n    {time:'09:00',title:'부산 출장 출장',type:'출장',loc:'서울역'},\n    {time:'14:00',title:'외부 자문 미팅',type:'수익',loc:'50만원, 입금예정'}\n  ];\n  deadlines[dateKey(4)]=[\n    {title:'출장 후속 메모 작성',type:'업무',done:false},\n    {title:'자문료 수익 기록',type:'수익',done:false}\n  ];\n  return {events,deadlines}\n}\nlet data=JSON.parse(localStorage.getItem(KEY)||'null')||defaultData();\n\nfunction setSyncStatus(text){\n  const msg = String(text || '');\n  const el=$('#syncStatus');\n  if(el){\n    el.style.display = msg ? 'block' : 'none';\n    el.textContent = msg;\n  }\n  const live=$('#googleLive');\n  if(live){\n    live.classList.remove('loading','fail');\n    if(msg.includes('불러오는 중') || msg.includes('처리 중')) live.classList.add('loading');\n    if(msg.includes('실패') || msg.includes('오류') || msg.includes('없음')) live.classList.add('fail');\n    const tm=$('#googleSyncTime');\n    if(tm){\n      if(msg.includes('불러오는 중') || msg.includes('처리 중')) tm.textContent='연동 중';\n      else tm.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});\n    }\n  }\n}\nfunction jsonp(url){\n  return new Promise((resolve,reject)=>{\n    const cb='cal_cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n    const s=document.createElement('script');\n    window[cb]=(data)=>{resolve(data);cleanup();};\n    function cleanup(){delete window[cb]; if(s.parentNode)s.parentNode.removeChild(s);}\n    s.onerror=()=>{cleanup();reject(new Error('calendar sync failed'));};\n    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;\n    document.body.appendChild(s);\n    setTimeout(()=>{if(window[cb]){cleanup();reject(new Error('calendar sync timeout'));}},15000);\n  });\n}\nfunction calendarSourceLabel(name){\n  const n = String(name || '');\n  if(n.includes('업무일정')) return '업무일정';\n  if(n.includes('개인일정')) return '개인일정';\n  return n || '캘린더';\n}\n\nfunction cleanTitle(title){\n  return String(title || '')\n    .replace(/\\[[^\\]]+\\]/g, '')\n    .replace(/\\(\\s*[0-9]+(?:\\.[0-9]+)?\\s*\\)/g, '')\n    .replace(/\\(\\s*\\?\\s*\\)/g, '')\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\nfunction moneyText(e){\n  if(!e || !(e.isRevenue || e.type==='수익')) return '';\n  if(e.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='') return '금액미정';\n  return `${Number(e.amount).toLocaleString('ko-KR')}만원`;\n}\nfunction statRevenueText(list){\n  const rev=list.filter(e=>e.isRevenue || e.type==='수익');\n  if(!rev.length) return '0';\n  const amount=rev.reduce((s,e)=>s+(Number(e.amount)||0),0);\n  const unknown=rev.filter(e=>e.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='').length;\n  if(amount && unknown) return `${rev.length}·${amount}+?`;\n  if(amount) return `${rev.length}·${amount}`;\n  if(unknown) return `${rev.length}·?`;\n  return `${rev.length}`;\n}\nfunction revenueSummaryText(list){\n  const rev=list.filter(e=>e.isRevenue || e.type==='수익');\n  const amount=rev.reduce((s,e)=>s+(Number(e.amount)||0),0);\n  const unknown=rev.filter(e=>e.amountUnknown || e.amount===null || e.amount===undefined || e.amount==='').length;\n  if(!rev.length) return '0건';\n  return `${rev.length}건 · ${amount.toLocaleString('ko-KR')}만원${unknown?' + ?':''}`;\n}\n\nfunction timeRangeHtml(e){\n  const start = e.time || '종일';\n  const end = e.endTime || '';\n  if(start === '종일' || !start) return `\u003cdiv class=\"time-main\">종일\u003c/div>`;\n  return `\u003cdiv class=\"time-main\">${esc(start)}\u003c/div>${end ? `\u003cdiv class=\"time-sub\">${esc(end)}\u003c/div>` : ''}`;\n}\n\nfunction normalizeCalendarResponse(res){\n  const eventsByDate = {};\n  const deadlinesByDate = {};\n\n  (res.events || []).forEach(e => {\n    const k = e.date;\n    if(!eventsByDate[k]) eventsByDate[k] = [];\n    eventsByDate[k].push({\n      time: e.startTime || '종일',\n      endTime: e.endTime || '',\n      title: e.cleanTitle || cleanTitle(e.title || ''),\n      rawTitle: e.title || '',\n      type: e.type || '업무',\n      project: e.project || '',\n      amount: e.amount,\n      amountUnknown: !!e.amountUnknown,\n      isMeeting: !!e.isMeeting || e.type === '미팅',\n      isRevenue: !!e.isRevenue || e.type === '수익',\n      isTrip: !!e.isTrip || e.type === '출장',\n      isDeadline: !!e.isDeadline || e.type === '마감',\n      loc: e.location || e.description || e.calendarName || '',\n      source: e.calendarName || '',\n      sourceLabel: calendarSourceLabel(e.calendarName || '')\n    });\n  });\n\n  const taskItemsRaw = [\n    ...(Array.isArray(res.checkItems) ? res.checkItems : []),\n    ...(Array.isArray(res.tasks) ? res.tasks : [])\n  ];\n\n  const seenTaskIds = new Set();\n  taskItemsRaw.forEach(item => {\n    if(!item) return;\n    if(item.id === 'tasks-api-error' || item.title === 'Google Tasks API 연결 필요') return;\n    const taskId = item.id || `${item.title}-${item.dueDate||item.date}`;\n    if(seenTaskIds.has(taskId)) return;\n    seenTaskIds.add(taskId);\n\n    const k = item.dueDate || item.date;\n    if(!k) return;\n    if(!deadlinesByDate[k]) deadlinesByDate[k] = [];\n    deadlinesByDate[k].push({\n      id: item.id || '',\n      title: item.cleanTitle || cleanTitle(item.title || ''),\n      rawTitle: item.title || '',\n      date: k,\n      dueDate: k,\n      type: item.type || (item.overdue ? '지연' : '마감'),\n      project: item.project || '',\n      listName: item.listName || item.project || '',\n      taskListId: item.taskListId || item.tasklistId || item.listId || '',\n      overdue: !!item.overdue,\n      dueToday: !!item.dueToday,\n      dueThisWeek: !!item.dueThisWeek,\n      completed: !!item.completed || item.status === 'completed',\n      done: !!item.completed || item.status === 'completed'\n    });\n  });\n\n  console.log('tasks raw', (res.checkItems||[]).length, (res.tasks||[]).length, 'deadlines', deadlinesByDate); return { events: eventsByDate, deadlines: deadlinesByDate };\n}\n\nasync function loadGoogleCalendar(){\n  if(!CALENDAR_API_URL){\n    setSyncStatus('Google Calendar 연동 전 · 예시 데이터 표시 중');\n    return;\n  }\n  try{\n    setSyncStatus('Google Calendar 실시간 불러오는 중...');\n    const res=await jsonp(`${CALENDAR_API_URL}?action=getCalendarWeek&date=${dateKey(cur)}&t=${Date.now()}`);\n    if(!res || !res.ok) throw new Error(res && res.error ? res.error : 'unknown error');\n\n    data = normalizeCalendarResponse(res);\n    save();\n\n    setSyncStatus('Google Calendar 실시간 연동 완료 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));\n    renderAll();\n  }catch(e){\n    setSyncStatus('');\n    console.error(e);\n  }\n}\n\nfunction save(){localStorage.setItem(KEY,JSON.stringify(data))}\nfunction events(i=cur){const k=dateKey(i);if(!data.events[k])data.events[k]=[];return data.events[k]}\nfunction deadlines(i=cur){const k=dateKey(i);if(!data.deadlines[k])data.deadlines[k]=[];return data.deadlines[k]}\nfunction allDeadlines(){\n  return Object.values(data.deadlines||{}).flat()\n    .sort((a,b)=>{\n      const da=String(a.dueDate||a.date||'');\n      const db=String(b.dueDate||b.date||'');\n      if(da!==db) return da.localeCompare(db);\n      return Number(!!a.completed || !!a.done) - Number(!!b.completed || !!b.done);\n    });\n}\nfunction renderTabs(){\n  const tabs=$('#calDateTabs');\n  if(!tabs) return;\n\n  tabs.innerHTML='';\n  for(let i=0;i\u003c7;i++){\n    const d=dateFor(i);\n    const k=dateKey(i);\n    const evs=data.events[k]||[];\n    const dls=(data.deadlines[k]||[]).filter(x=>!(x.done||x.completed));\n\n    const hasMeeting=evs.some(e=>e.isMeeting || e.type==='미팅');\n    const hasRevenue=evs.some(e=>e.isRevenue || e.type==='수익');\n    const hasDeadline=evs.some(e=>e.isDeadline || e.type==='마감') || dls.length>0;\n    const hasPersonal=evs.some(e=>e.type==='개인' || e.project==='CDE');\n    const hasAny=evs.length>0 || dls.length>0;\n\n    const dots=[];\n    if(hasMeeting) dots.push('var(--green)');\n    if(hasRevenue) dots.push('var(--purple)');\n    if(hasDeadline) dots.push('var(--red)');\n    if(!dots.length && hasPersonal) dots.push('var(--text-2)');\n    if(!dots.length && hasAny) dots.push('var(--blue)');\n\n    const el=document.createElement('button');\n    el.className='date-tab'+(i===cur?' on':'');\n    el.innerHTML=`\n      \u003cdiv class=\"dow\">${dayNames[i]}\u003c/div>\n      \u003cdiv class=\"dnum\">${d.getDate()}\u003c/div>\n      \u003cdiv class=\"dots\">${dots.slice(0,3).map(c=>`\u003cspan class=\"dot\" style=\"background:${c}\">\u003c/span>`).join('')}\u003c/div>\n    `;\n    el.onclick=()=>{cur=i;renderAll();};\n    tabs.appendChild(el);\n  }\n}\nfunction renderSummary(){\n  const evs=events();\n  const selectedProgress=taskProgressForDate(cur);\n\n  const meetings=evs.filter(e=>e.isMeeting || e.type==='미팅').length;\n  const revenueEvents=evs.filter(e=>e.isRevenue || e.type==='수익');\n  const revenues=revenueEvents.length;\n  const personal=evs.filter(e=>e.type==='개인' || e.project==='CDE').length;\n\n  // 수익 표기: 수익 일정 개수 · 확정 금액 합계(만원)\n  const knownRevenue=revenueEvents.reduce((sum,e)=>sum+(Number(e.amount)||0),0);\n  const unknownRevenue=revenueEvents.filter(e=>e.amountUnknown || e.amount===null || e.amount===undefined).length;\n  const revenueText = `${revenues}·${knownRevenue}`;\n\n  function toMinutes(t){\n    const m=String(t||'').match(/^(\\d{1,2}):(\\d{2})$/);\n    if(!m) return null;\n    return Number(m[1])*60 + Number(m[2]);\n  }\n  const totalMinutes=evs.reduce((sum,e)=>{\n    const s=toMinutes(e.time || e.startTime);\n    const en=toMinutes(e.endTime);\n    if(s===null || en===null || en\u003c=s) return sum;\n    return sum + (en-s);\n  },0);\n  const totalTimeText = totalMinutes\n    ? (totalMinutes%60===0 ? `총 ${Math.round(totalMinutes/60)}h` : `총 ${(totalMinutes/60).toFixed(1)}h`)\n    : '시간 없음';\n\n  $('#statEvents').textContent=evs.length ? evs.length : '-';\n  $('#statMeetings').textContent=meetings ? meetings : '-';\n  $('#statImportant').textContent=revenues ? revenueText : '-';\n  const revenueMeta=$('#statRevenueMeta');\n  if(revenueMeta) revenueMeta.textContent='수익';\n  $('#statDeadline').textContent=selectedProgress.text;\n  const personalEl=$('#statPersonal');\n  if(personalEl) personalEl.textContent=personal ? personal : '-';\n\n  const total=Math.max(1,evs.length);\n  const meetingPct=Math.round(meetings/total*100);\n  const revenuePct=Math.round(revenues/total*100);\n  const personalPct=Math.round(personal/total*100);\n  const stack=$('#calStackBar');\n  if(stack){\n    stack.innerHTML=`\u003cspan style=\"width:${Math.max(10,meetingPct)}%;background:var(--green)\">\u003c/span>\u003cspan style=\"width:${Math.max(10,revenuePct)}%;background:var(--purple)\">\u003c/span>\u003cspan style=\"width:${Math.max(10,personalPct)}%;background:rgba(255,255,255,.42)\">\u003c/span>`;\n  }\n\n  $('#calDensityCopy').textContent=unknownRevenue\n    ? `미팅 ${meetings} · 수익 ${revenues}건/${knownRevenue}만원 · 미정 ${unknownRevenue}건 · 마감 ${selectedProgress.text} · 개인 ${personal}`\n    : `미팅 ${meetings} · 수익 ${revenues}건/${knownRevenue}만원 · 마감 ${selectedProgress.text} · 개인 ${personal}`;\n\n  const title=$('#calBriefTitle');\n  const lead=$('#calBriefLead');\n  const badge=$('#calStatusBadge');\n  if(title) title.textContent=evs.length ? '일정이 있는 날입니다' : '여유가 있는 날입니다';\n  if(lead) lead.textContent=evs.length ? '선택한 날짜의 일정과 마감, 수익, 개인 일정을 함께 확인하세요.' : '선택한 날짜에는 등록된 일정이 많지 않습니다.';\n  if(badge) badge.textContent=totalTimeText;\n}\nfunction projectPill(project){\n  if(!project || project==='CDE' || project==='KRP') return '';\n  return `\u003cspan class=\"project-pill\">${esc(project)}\u003c/span>`;\n}\nfunction eventPills(e){\n  const pills=[];\n  if(e.isTrip && e.type!=='출장') pills.push('출장');\n  if(e.isRevenue && e.type!=='수익') pills.push('수익');\n  if(e.isDeadline && e.type!=='마감') pills.push('마감');\n  if(e.isMeeting && e.type!=='미팅') pills.push('미팅');\n  pills.push(e.type || '업무');\n  return [...new Set(pills)].map(t=>`\u003cspan class=\"pill ${PILLC[t]||'pill-grey'}\">${esc(t)}\u003c/span>`).join('');\n}\nfunction renderEvents(){\n  const ev=events().sort((a,b)=>String(a.time).localeCompare(String(b.time)));\n  $('#eventList').innerHTML=ev.length?ev.map((e,i)=>{\n    const amount=moneyText(e);\n    const amountText=amount ? `\u003cspan class=\"event-amount-inline ${amount==='금액미정'?'unknown':''}\">${esc(amount)}\u003c/span>` : '';\n    const typePills=eventPills(e);\n    const projectHtml = projectPill(e.project);\n    return `\u003cdiv class=\"event-row\">\u003cdiv class=\"event-time\">${timeRangeHtml(e)}\u003c/div>\u003cdiv class=\"event-card\" style=\"--accent:${C[e.type]||C.개인}\">\u003cdiv class=\"event-top\">\u003cdiv class=\"event-name\">${esc(cleanTitle(e.title))}\u003c/div>\u003cdiv class=\"pill-row\">${amountText}${projectHtml}${typePills}\u003c/div>\u003c/div>\u003c/div>\u003c/div>`;\n  }).join(''):'\u003cdiv class=\"empty\">선택한 날짜에 일정이 없습니다.\u003c/div>';\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  const cls = p === 'CDE' ? 'pill-grey' : p === 'KRP' ? 'pill-blue' : p === 'WSW' ? 'pill-green' : p === 'PWR' ? 'pill-green' : 'pill-grey';\n  return `\u003cspan class=\"pill ${cls} task-project-pill\">${esc(p)}\u003c/span>`;\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  const cls = p === 'CDE' ? 'task-cde' : p === 'KRP' ? 'task-krp' : p === 'WSW' ? 'task-wsw' : p === 'PWR' ? 'task-pwr' : 'task-cde';\n  return `\u003cspan class=\"task-tag ${cls}\">${esc(p)}\u003c/span>`;\n}\nfunction taskProjectPill(project){\n  const p = project || 'KRP';\n  // 오늘 일정의 태그 체계와 동일하게 매핑: 개인=CDE, 업무=KRP, 미팅=WSW, 수익=PWR\n  const cls = p === 'CDE' ? 'pill-grey' : p === 'KRP' ? 'pill-blue' : p === 'WSW' ? 'pill-green' : p === 'PWR' ? 'pill-purple' : 'pill-grey';\n  return `\u003cspan class=\"pill ${cls} task-tag\">${esc(p)}\u003c/span>`;\n}\n\nasync function updateGoogleTaskStatus(task, done){\n  const taskId = task && (task.id || task.taskId || task.googleTaskId);\n  const taskListId = task && (task.taskListId || task.tasklistId || task.listId);\n  if(!taskId){\n    const msg='Google Task id 없음';\n    console.warn(msg, task);\n    setSyncStatus(msg);\n    return {ok:false, error:msg, task:task};\n  }\n  try{\n    setSyncStatus('Google Tasks 완료 처리 중...');\n    const url = `${CALENDAR_API_URL}?action=updateTask&taskId=${encodeURIComponent(taskId)}&taskListId=${encodeURIComponent(taskListId || '')}&completed=${done ? '1' : '0'}&t=${Date.now()}`;\n    const res = await jsonp(url);\n    console.log('updateTask response', res);\n    if(!res || !res.ok){\n      const msg = 'Google Tasks 완료 반영 실패 · ' + (res && res.error ? res.error : '응답 오류');\n      setSyncStatus(msg);\n      return res || {ok:false, error:'empty response'};\n    }\n    const detail = res.afterStatus ? ` (${res.beforeStatus||'-'}→${res.afterStatus})` : '';\n    setSyncStatus('Google Tasks 완료 반영 성공' + detail + ' · 새로고침 중...');\n    return res;\n  }catch(err){\n    const msg='Google Tasks 동기화 실패 · ' + String(err && err.message ? err.message : err);\n    console.warn(msg, err);\n    setSyncStatus(msg);\n    return {ok:false, error:msg};\n  }\n}\n\n\nfunction taskProgressForDate(i){\n  const k=dateKey(i);\n  const rows=(data.deadlines && data.deadlines[k] ? data.deadlines[k] : []);\n  const total=rows.length;\n  const done=rows.filter(r=>r.done || r.completed).length;\n  return {done,total,text:total ? `${done}/${total}` : '-'};\n}\n\nfunction taskProgressForWeek(){\n  const rows=Object.values(data.deadlines||{}).flat();\n  const total=rows.length;\n  const done=rows.filter(r=>r.done || r.completed).length;\n  return {done,total,text:total ? `${done}/${total}` : '-'};\n}\n\nfunction selectedDateDeadlines(){\n  const k=dateKey(cur);\n  return (data.deadlines && data.deadlines[k] ? data.deadlines[k] : [])\n    .sort((a,b)=>Number(!!a.completed || !!a.done) - Number(!!b.completed || !!b.done));\n}\n\nfunction renderDeadlines(){\n  const rows=selectedDateDeadlines();\n  const selectedLabel=`${dateFor(cur).getMonth()+1}.${dateFor(cur).getDate()} ${dayNames[cur]}`;\n  $('#deadlineList').innerHTML=rows.length?rows.map((r,i)=>{\n    return `\u003cdiv class=\"check-row ${r.done || r.completed ? 'done' : ''}\" data-deadline=\"${i}\">\n      \u003cdiv class=\"task-check\" aria-hidden=\"true\">\u003c/div>\n      \u003cdiv class=\"check-main\">\u003cb>${esc(cleanTitle(r.title))}\u003c/b>\u003c/div>\n      \u003cdiv class=\"pill-row\">${taskProjectPill(r.project)}\u003c/div>\n    \u003c/div>`;\n  }).join(''):`\u003cdiv class=\"empty\" style=\"margin:16px 0\">${selectedLabel} 마감/체크 항목이 없습니다.\u003c/div>`;\n\n  document.querySelectorAll('#deadlineList .check-row').forEach(row=>{\n    row.onclick=async()=>{\n      const idx=Number(row.dataset.deadline);\n      const item=rows[idx];\n      if(!item || row.dataset.syncing === '1') return;\n\n      const nextDone=!(item.done || item.completed);\n      row.dataset.syncing='1';\n      row.style.opacity='.65';\n      row.classList.toggle('done', nextDone);\n\n      const res = await updateGoogleTaskStatus(item, nextDone);\n\n      if(res && res.ok){\n        item.done=nextDone;\n        item.completed=nextDone;\n        row.classList.toggle('done', nextDone);\n        row.style.opacity='1';\n        save();\n        setSyncStatus(nextDone ? 'Google Tasks 완료 반영 성공 · 완료 상태로 유지합니다' : 'Google Tasks 미완료로 되돌렸습니다');\n      }else{\n        row.classList.toggle('done', !nextDone);\n        row.style.opacity='1';\n      }\n      row.dataset.syncing='0';\n    };\n  });\n}\n\n\nfunction weekRangeText(){\n  const s=dateFor(0), e=dateFor(6);\n  return `${s.getMonth()+1}.${s.getDate()} - ${e.getMonth()+1}.${e.getDate()}`;\n}\nfunction weeklyInsight(meetings, move, rev, deadline, amount, unknown){\n  const parts=[];\n  if(deadline) parts.push(`마감 ${deadline}건 우선 확인`);\n  if(move) parts.push(`출장 ${move}건 동선 점검`);\n  if(rev) parts.push(`수익 ${rev}건${amount?`·${amount}만원`:''}${unknown?' + 미정':''}`);\n  if(meetings) parts.push(`미팅 ${meetings}건`);\n  if(!parts.length) return '이번 주는 특이 일정이 적어 여유 일정 확보가 가능합니다.';\n  return parts.slice(0,3).join(' · ');\n}\n\nfunction renderWeekly(){\n  const weekEvents=[];\n  for(let i=0;i\u003c7;i++){\n    const k=dateKey(i);\n    (data.events[k]||[]).forEach(e=>weekEvents.push({...e,date:k}));\n  }\n\n  const meetings=weekEvents.filter(e=>e.isMeeting || e.type==='미팅').length;\n  const trips=weekEvents.filter(e=>e.isTrip || e.type==='출장').length;\n  const revenueEvents=weekEvents.filter(e=>e.isRevenue || e.type==='수익');\n  const revenueCount=revenueEvents.length;\n  const knownRevenue=revenueEvents.reduce((sum,e)=>sum+(Number(e.amount)||0),0);\n  const weekProgress=taskProgressForWeek();\n\n  const start=dateFor(0);\n  const end=dateFor(6);\n  const month=start.getMonth()+1;\n  const weekOfMonth=Math.ceil(start.getDate()/7);\n  const dateRange=`${start.getMonth()+1}.${start.getDate()}–${end.getMonth()+1}.${end.getDate()}`;\n\n  const title=$('#weekAnalysisTitle');\n  if(title) title.textContent=`${month}월 ${weekOfMonth}주차 주간 분석 (${dateRange})`;\n\n  const sub=$('#weekAnalysisSub');\n  if(sub) sub.textContent=`이번 주 일정 ${weekEvents.length}건, 미팅 ${meetings}건, 수익 ${revenueCount}건/${knownRevenue}만원, 마감 ${weekProgress.text}을 확인합니다.`;\n\n  const wm=$('#weekMeetings'); if(wm) wm.textContent=meetings ? meetings : '-';\n  const wmove=$('#weekMove'); if(wmove) wmove.textContent=trips ? trips : '-';\n  const wr=$('#weekRevenue'); if(wr) wr.textContent=revenueCount ? `${revenueCount}·${knownRevenue}` : '-';\n  const wd=$('#weekDeadline'); if(wd) wd.textContent=weekProgress.text;\n\n  const dayLabels=['월','화','수','목','금','토','일'];\n  const rows=[];\n  for(let i=0;i\u003c7;i++){\n    const k=dateKey(i);\n    const dayEvents=(data.events[k]||[]);\n    const taskProgress=taskProgressForDate(i);\n\n    const m=dayEvents.filter(e=>e.isMeeting || e.type==='미팅').length;\n    const r=dayEvents.filter(e=>e.isRevenue || e.type==='수익').length;\n    const t=dayEvents.filter(e=>e.isTrip || e.type==='출장').length;\n    const p=dayEvents.filter(e=>e.type==='개인' || e.project==='CDE').length;\n\n    const parts=[];\n    if(t) parts.push(`출장 ${t}`);\n    if(m) parts.push(`미팅 ${m}`);\n    if(r) parts.push(`수익 ${r}`);\n    if(taskProgress.total) parts.push(`마감 ${taskProgress.text}`);\n    if(p) parts.push(`개인 ${p}`);\n\n    rows.push({\n      label:dayLabels[i],\n      text:parts.length ? parts.join(' · ') : '특이사항 없음'\n    });\n  }\n\n  const weeklyRows=$('#weeklyRows');\n  if(weeklyRows){\n    weeklyRows.innerHTML=rows.map(r=>`\n      \u003cdiv class=\"wk-item\">\n        \u003cb>${esc(r.label)}\u003c/b>\n        \u003cspan>${esc(r.text)}\u003c/span>\n      \u003c/div>\n    `).join('');\n  }\n}\n\nlet dateView=new Date();\nfunction openDateModal(){\n  const selected=dateFor(cur);\n  dateView=new Date(selected.getFullYear(), selected.getMonth(), 1);\n  renderDateModal();\n  const bd=$('#dateModalBackdrop');\n  if(bd) bd.classList.add('open');\n}\nfunction closeDateModal(){\n  const bd=$('#dateModalBackdrop');\n  if(bd) bd.classList.remove('open');\n}\nfunction renderDateModal(){\n  const grid=$('#dateGrid');\n  const title=$('#dateModalTitle');\n  if(!grid || !title) return;\n  const y=dateView.getFullYear();\n  const m=dateView.getMonth();\n  title.textContent=`${y}. ${m+1}`;\n  const first=new Date(y,m,1);\n  const start=new Date(first);\n  start.setDate(first.getDate()-first.getDay());\n  const selectedKey=dateKey(cur);\n  const todayKey=(()=>{const d=today();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})();\n  let htmlDays='';\n  for(let i=0;i\u003c42;i++){\n    const d=new Date(start);\n    d.setDate(start.getDate()+i);\n    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n    const cls=[\n      'date-day',\n      d.getMonth()!==m?'muted':'',\n      key===todayKey?'today':'',\n      key===selectedKey?'selected':''\n    ].filter(Boolean).join(' ');\n    htmlDays+=`\u003cbutton class=\"${cls}\" data-date=\"${key}\">${d.getDate()}\u003c/button>`;\n  }\n  grid.innerHTML=htmlDays;\n  grid.querySelectorAll('[data-date]').forEach(btn=>{\n    btn.onclick=()=>{setWeekByDate(btn.dataset.date);closeDateModal();};\n  });\n}\n\nfunction bind(){\n  const topDateBtn=$('#topDatePickerBtn'); if(topDateBtn) topDateBtn.onclick=openDateModal;\n  const dateCloseBtn=$('#dateCloseBtn'); if(dateCloseBtn) dateCloseBtn.onclick=closeDateModal;\n  const dateTodayBtn=$('#dateTodayBtn'); if(dateTodayBtn) dateTodayBtn.onclick=()=>{setWeekByDate(new Date().toISOString().slice(0,10));closeDateModal();};\n  const datePrevMonth=$('#datePrevMonth'); if(datePrevMonth) datePrevMonth.onclick=()=>{dateView.setMonth(dateView.getMonth()-1);renderDateModal();};\n  const dateNextMonth=$('#dateNextMonth'); if(dateNextMonth) dateNextMonth.onclick=()=>{dateView.setMonth(dateView.getMonth()+1);renderDateModal();};\n  const backdrop=$('#dateModalBackdrop'); if(backdrop) backdrop.onclick=e=>{if(e.target===backdrop) closeDateModal();};\n  const syncBtn=$('#syncCalendarBtn'); if(syncBtn) syncBtn.onclick=loadGoogleCalendar; const googleLive=$('#googleLive'); if(googleLive) googleLive.onclick=loadGoogleCalendar;\n  const eventAddBtn=$('#toggleEventAdd'); if(eventAddBtn) eventAddBtn.onclick=()=>$('#eventAddPanel').classList.toggle('open');\n  const deadlineAddBtn=$('#toggleDeadlineAdd'); if(deadlineAddBtn) deadlineAddBtn.onclick=()=>$('#deadlineAddPanel').classList.toggle('open');\n  $('#newEventLoc').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent()});\n  $('#addDeadlineBtn').onclick=addDeadline;\n  document.getElementById('newEventTitle').addEventListener('keydown',e=>{if(e.key==='Enter')addEvent()});\n}\nfunction addEvent(){const title=$('#newEventTitle').value.trim();if(!title)return;events().push({time:$('#newEventTime').value.trim()||'종일',title,type:$('#newEventType').value,loc:$('#newEventLoc').value.trim()});['newEventTime','newEventTitle','newEventLoc'].forEach(id=>$('#'+id).value='');save();renderAll()}\nfunction addDeadline(){const title=$('#newDeadlineTitle').value.trim();if(!title)return;deadlines().push({title,type:$('#newDeadlineType').value,done:false});$('#newDeadlineTitle').value='';save();renderAll()}\nfunction formatShort(d){\n  return `${d.getMonth()+1}.${d.getDate()}`;\n}\nfunction renderWeekRange(){\n  const selected=dateFor(cur);\n  const btn=$('#topDatePickerBtn');\n  if(btn) btn.textContent=`${selected.getMonth()+1}.${selected.getDate()} ${dayNames[cur]}`;\n}\n\nfunction setWeekByDate(value){\n  if(!value) return;\n  const selected=new Date(value+'T00:00:00');\n  const base=mondayOf(today());\n  const selectedMonday=mondayOf(selected);\n  weekOffset=Math.round((selectedMonday-base)/604800000);\n  refreshWeekStart();\n  cur=Math.min(6,Math.max(0,Math.round((selected-weekStart)/86400000)));\n  data={events:{},deadlines:{}};\n  save();\n  renderAll();\n  loadGoogleCalendar();\n}\n\n\nfunction enhanceDeadlineCheckboxes(){\n  document.querySelectorAll('#deadlineList .check-row').forEach(row=>{\n    if(!row.querySelector('.task-check')){\n      const box=document.createElement('div');\n      box.className='task-check';\n      box.setAttribute('aria-hidden','true');\n      row.insertBefore(box,row.firstChild);\n    }\n  });\n}\n\nfunction renderAll(){\n  renderWeekRange();\n  const d=dateFor(cur); if($('#calTopDate')) $('#calTopDate').textContent=(d.getMonth()+1)+'.'+d.getDate()+' '+dayNames[cur];\n  const todayIndex=Math.round((today()-weekStart)/86400000);\n  $('#eventsLabel').textContent=(weekOffset===0 && cur===todayIndex?'오늘':dayNames[cur]+'요일')+' 일정';\n  renderTabs();renderSummary();renderEvents();renderDeadlines();enhanceDeadlineCheckboxes();renderWeekly();\n}\nbind();renderAll();loadGoogleCalendar();\n\nfunction updateHeaderClock(){\n  const now=new Date();\n  const hh=String(now.getHours()).padStart(2,'0');\n  const mm=String(now.getMinutes()).padStart(2,'0');\n  const days=['일','월','화','수','목','금','토'];\n  const t=document.getElementById('nowTime');\n  const d=document.getElementById('todayPill');\n  if(t) t.textContent=`${hh}:${mm}`;\n  if(d) d.textContent=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n}\nupdateHeaderClock();\nsetInterval(updateHeaderClock,30000);\n\n\n(function(){\n  function bindV35Ai(){\n    document.querySelectorAll('.ai-judge-btn,.report-ai-btn,.hero-ai-btn').forEach(btn=>{\n      if(btn.__v35AiBind) return;\n      btn.__v35AiBind=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n        else if(typeof toast==='function') toast('AI 피드백은 통합 후 연결 예정입니다.');\n      });\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindV35Ai);\n  else bindV35Ai();\n})();\n\n\n(function(){\n  function bindV36Ai(){\n    document.querySelectorAll('.ai-judge-btn,.report-ai-btn,.hero-ai-btn').forEach(btn=>{\n      if(btn.__v36AiBind) return;\n      btn.__v36AiBind=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n        else if(typeof toast==='function') toast('AI 피드백은 통합 후 연결 예정입니다.');\n      });\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindV36Ai);\n  else bindV36Ai();\n})();\n\n\u003c/script>\n\n\u003cstyle id=\"cos-addon-style\">\n.cos-hero-ai{position:absolute;top:16px;right:16px;display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.88);font-size:10px;font-weight:950;cursor:pointer;z-index:3}\n.cos-hero-ai:before{content:\"\";width:5px;height:5px;border-radius:50%;background:#fff;opacity:.85}\n.cos-hero-flash{animation:cosHeroFlash .9s ease}\n@keyframes cosHeroFlash{0%{box-shadow:0 0 0 4px rgba(255,255,255,.30)}100%{box-shadow:none}}\n.cos-sync-line{margin-top:8px;font-size:10.5px;font-weight:800;color:#8a95a8;letter-spacing:-.1px}\n.cos-section-header{display:flex;justify-content:space-between;align-items:center;margin:22px 4px 7px}\n.cos-section-label{font-size:10px;font-weight:950;color:#8b97aa;letter-spacing:1.4px;text-transform:uppercase}\n.cos-report-card{background:#fff;border:1px solid rgba(17,24,39,.07);border-radius:20px;box-shadow:0 2px 10px rgba(15,23,42,.05);overflow:hidden;margin-bottom:6px}\n.cos-report-gen{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:13px 15px;border-bottom:1px solid rgba(17,24,39,.07)}\n.cos-report-gen button{border:0;border-radius:13px;padding:10px 12px;font-size:12px;font-weight:950;cursor:pointer;background:var(--cos-accent);color:#fff}\n.cos-report-gen button.ghost{background:#f2f4f8;color:#596375;border:1px solid rgba(17,24,39,.11)}\n.cos-report-list{display:flex;flex-direction:column}\n.cos-report-empty{padding:16px 15px;font-size:11.5px;font-weight:650;color:#8a95a8;line-height:1.55}\n.cos-report-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:10px;align-items:center;padding:12px 15px;border:0;border-bottom:1px solid rgba(17,24,39,.07);background:transparent;text-align:left;cursor:pointer;width:100%}\n.cos-report-row:last-child{border-bottom:0}\n.cos-report-badge{width:34px;height:34px;border-radius:11px;background:var(--cos-soft);color:var(--cos-accent);font-size:11px;font-weight:950;display:flex;align-items:center;justify-content:center}\n.cos-report-main{min-width:0}\n.cos-report-main b{display:block;font-size:13px;font-weight:950;letter-spacing:-.2px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.cos-report-main span{display:block;margin-top:3px;font-size:10.5px;font-weight:700;color:#8a95a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.cos-report-arrow{font-size:14px;font-weight:900;color:#c2cad6}\n.cos-backdrop{position:fixed;inset:0;z-index:80;display:none;align-items:flex-end;justify-content:center;background:rgba(15,23,42,.28);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}\n.cos-backdrop.open{display:flex}\n.cos-backdrop.cos-center{align-items:center;padding:24px}\n.cos-sheet{width:100%;max-width:430px;max-height:84dvh;overflow-y:auto;background:#fff;border-radius:24px 24px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom))}\n.cos-backdrop.cos-center .cos-sheet{max-width:320px;border-radius:22px;padding:15px;max-height:72dvh}\n.cos-sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}\n.cos-sheet-head b{display:block;font-size:15px;font-weight:950;letter-spacing:-.3px;color:#111827}\n.cos-backdrop.cos-center .cos-sheet-head b{font-size:13.5px}\n.cos-sheet-head span{display:block;margin-top:3px;font-size:11px;font-weight:650;color:#8a95a8}\n.cos-backdrop.cos-center .cos-sheet-head span{font-size:10.5px}\n.cos-sheet-close{border:0;background:#f2f4f8;width:28px;height:28px;border-radius:50%;font-size:15px;font-weight:900;color:#596375;cursor:pointer;flex-shrink:0}\n.cos-backdrop.cos-center .cos-sheet-close{width:24px;height:24px;font-size:13px}\n.cos-context{margin-top:12px;background:#f7f8fb;border:1px solid rgba(17,24,39,.07);border-radius:14px;padding:11px 12px;font-size:11.5px;line-height:1.6;font-weight:650;color:#596375}\n.cos-backdrop.cos-center .cos-context{margin-top:10px;padding:9px 10px;font-size:10.5px;max-height:64px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}\n.cos-quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}\n.cos-quick button{border:1px solid rgba(17,24,39,.11);background:#f7f8fb;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:850;color:#596375;cursor:pointer}\n.cos-backdrop.cos-center .cos-quick{margin-top:9px}\n.cos-backdrop.cos-center .cos-quick button{padding:6px 9px;font-size:10.5px}\n.cos-textarea{width:100%;box-sizing:border-box;margin-top:10px;border:1px solid rgba(17,24,39,.11);background:#f7f8fb;border-radius:14px;padding:11px;font-size:12px;font-weight:700;color:#111827;line-height:1.55;min-height:72px;resize:none;outline:none;font-family:inherit}\n.cos-backdrop.cos-center .cos-textarea{margin-top:9px;min-height:58px;padding:9px;font-size:11.5px}\n.cos-primary{margin-top:10px;width:100%;border:0;background:var(--cos-accent);color:#fff;border-radius:14px;padding:12px;font-size:12.5px;font-weight:950;cursor:pointer}\n.cos-backdrop.cos-center .cos-primary{margin-top:9px;padding:10px;font-size:12px;border-radius:12px}\n.cos-danger{margin-top:8px;width:100%;border:1px solid rgba(239,68,68,.22);background:rgba(239,68,68,.06);color:#ef4444;border-radius:14px;padding:11px;font-size:12px;font-weight:900;cursor:pointer}\n.cos-note{margin-top:11px;font-size:10px;font-weight:700;color:#9aa4b4;line-height:1.55}\n.cos-backdrop.cos-center .cos-note{margin-top:8px;font-size:9.5px}\n.cos-detail-kicker{margin-top:14px;font-size:10px;font-weight:950;letter-spacing:1.6px;text-transform:uppercase;color:var(--cos-accent)}\n.cos-detail-headline{margin-top:8px;font-size:17px;font-weight:950;letter-spacing:-.4px;line-height:1.4;color:#111827}\n.cos-detail-lead{margin-top:8px;font-size:12.5px;line-height:1.7;font-weight:650;color:#596375}\n.cos-detail-block{margin-top:14px}\n.cos-detail-block>b{display:block;font-size:10px;font-weight:950;letter-spacing:1.2px;text-transform:uppercase;color:#8b97aa;margin-bottom:7px}\n.cos-detail-block ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}\n.cos-detail-block ul li{position:relative;padding-left:13px;font-size:12px;line-height:1.6;font-weight:650;color:#4b5563}\n.cos-detail-block ul li:before{content:\"\";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--cos-accent);opacity:.7}\n.cos-detail-actions div{font-size:12px;line-height:1.7;font-weight:750;color:#4b5563}\n.cos-feedback-note{margin-top:10px;font-size:10.5px;font-weight:750;color:var(--cos-accent);background:var(--cos-soft);border-radius:10px;padding:8px 10px;line-height:1.5}\n.cos-divider{margin:16px 0 4px;border-top:1px dashed rgba(17,24,39,.13)}\n#cosToast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);background:rgba(17,24,39,.92);color:#fff;font-size:11.5px;font-weight:850;border-radius:999px;padding:9px 15px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;max-width:86%;overflow:hidden;text-overflow:ellipsis}\n#cosToast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n\u003c/style>\n\n\u003cscript>window.COS_TAB_KEY=\"calendar\";\u003c/script>\n\n\u003cscript id=\"cos-addon\">\n/* ============================================================\n   COS 애드온 v3.2: 탭 브리프(해석형) + 주간/월간 리포트\n   Gemini 연동 시: window.COS_AI = async ({tab,kind,type,feedback,facts})\n     => {headline,lead,bullets:[],actions:[]} 등록 시 모든 생성이 AI 호출로 대체.\n   ============================================================ */\n(function(){\n\"use strict\";\nvar KEY=window.COS_TAB_KEY;\nvar CFG={\n  calendar:{label:'캘린더',brief:'Calendar Brief',accent:'#3d7eff',soft:'rgba(61,126,255,.10)',border:'rgba(61,126,255,.22)'},\n  work:{label:'업무',brief:'Work Brief',accent:'#f97316',soft:'rgba(249,115,22,.10)',border:'rgba(249,115,22,.22)'},\n  personal:{label:'개인',brief:'Daily Brief',accent:'#7c3aed',soft:'rgba(124,58,237,.10)',border:'rgba(124,58,237,.22)'}\n}[KEY];\nif(!CFG) return;\nvar REPORT_KEY='cos_reports_'+KEY+'_v1';\nvar FB_KEY='cos_ai_feedback_'+KEY+'_v1';\ndocument.documentElement.style.setProperty('--cos-accent',CFG.accent);\ndocument.documentElement.style.setProperty('--cos-soft',CFG.soft);\ndocument.documentElement.style.setProperty('--cos-border',CFG.border);\n\n/* ---------- 유틸 ---------- */\nfunction esc(s){return String(s==null?'':s).replace(/[&\u003c>\"']/g,function(c){return{'&':'&amp;','\u003c':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]})}\nfunction pad(n){return (n\u003c10?'0':'')+n}\nfunction lsGet(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}\nfunction lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}\nfunction toast(msg){var t=document.getElementById('cosToast');if(!t){t=document.createElement('div');t.id='cosToast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},1700)}\nfunction mondayOf(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nfunction dkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}\nfunction weekKeys(){var m=mondayOf(new Date()),a=[];for(var i=0;i\u003c7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(dkey(d))}return a}\nfunction monthKeys(){var n=new Date(),y=n.getFullYear(),mo=n.getMonth(),last=new Date(y,mo+1,0).getDate(),a=[];for(var i=1;i\u003c=last;i++)a.push(y+'-'+pad(mo+1)+'-'+pad(i));return a}\nfunction weekMeta(){var m=mondayOf(new Date()),e=new Date(m);e.setDate(m.getDate()+6);var wk=Math.ceil(m.getDate()/7);\n  return {id:KEY+'-w-'+m.getFullYear()+'-'+pad(m.getMonth()+1)+'-'+wk,\n    title:(m.getMonth()+1)+'월 '+wk+'주차 '+CFG.label+' 주간 리포트',\n    period:m.getFullYear()+'.'+pad(m.getMonth()+1)+'.'+pad(m.getDate())+'–'+pad(e.getMonth()+1)+'.'+pad(e.getDate())}}\nfunction monthMeta(){var n=new Date();\n  return {id:KEY+'-m-'+n.getFullYear()+'-'+pad(n.getMonth()+1),\n    title:n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+CFG.label+' 월간 리포트',\n    period:n.getFullYear()+'.'+pad(n.getMonth()+1)}}\nvar DOW=['월','화','수','목','금','토','일'];\nfunction jo(w,bat,no){w=String(w||'');var c=w.charCodeAt(w.length-1);if(isNaN(c)||c\u003c0xAC00||c>0xD7A3)return no;return ((c-0xAC00)%28)?bat:no}\nfunction dayName(k){var d=new Date(k+'T00:00:00');return DOW[(d.getDay()+6)%7]}\nfunction daysSince(s){var d=new Date(String(s)+'T00:00:00');if(isNaN(d))return null;return Math.max(0,Math.round((new Date().setHours(0,0,0,0)-d)/86400000))}\n\n/* ---------- 사실 수집(facts) ---------- */\nfunction getFacts(scope){\n  try{\n    if(KEY==='calendar')return calFacts(scope);\n    if(KEY==='work')return workFacts();\n    if(KEY==='personal')return personalFacts();\n  }catch(e){}\n  return {};\n}\nfunction calFacts(scope){\n  var d=(typeof data!=='undefined'&&data)||{};\n  var keys=scope==='monthly'?monthKeys():weekKeys();\n  var ev=d.events||{},dl=d.deadlines||{};\n  var list=[];keys.forEach(function(k){(ev[k]||[]).forEach(function(e){list.push(Object.assign({_d:k},e))})});\n  var byDay={};list.forEach(function(e){byDay[e._d]=(byDay[e._d]||0)+1});\n  var sortedDays=Object.keys(byDay).sort(function(a,b){return byDay[b]-byDay[a]});\n  var busiestKey=sortedDays[0]||null;\n  var morning=list.filter(function(e){return e.time&&e.time!=='종일'&&e.time\u003c'12:00'}).length;\n  var afternoon=list.filter(function(e){return e.time&&e.time!=='종일'&&e.time>='12:00'}).length;\n  var rev=list.filter(function(e){return e.isRevenue||e.type==='수익'});\n  var revAmt=rev.reduce(function(s,e){return s+(Number(e.amount)||0)},0);\n  var dls=[];keys.forEach(function(k){(dl[k]||[]).forEach(function(x){dls.push(Object.assign({_d:k},x))})});\n  var dlOpen=dls.filter(function(x){return !(x.done||x.completed)});\n  var collide=busiestKey?dlOpen.some(function(x){return x._d===busiestKey}):false;\n  // 일정이 가장 적은 평일\n  var lightKey=null,lightCnt=1e9;\n  keys.slice(0,5).forEach(function(k){var c=byDay[k]||0;if(c\u003clightCnt){lightCnt=c;lightKey=k}});\n  return {scope:scope,total:list.length,meetings:list.filter(function(e){return e.type==='미팅'}).length,\n    busiestKey:busiestKey,busiestCnt:busiestKey?byDay[busiestKey]:0,busiestDay:busiestKey?dayName(busiestKey):'',\n    lightDay:lightKey?dayName(lightKey):'',lightCnt:lightKey?(byDay[lightKey]||0):0,\n    morning:morning,afternoon:afternoon,revCount:rev.length,revAmt:revAmt,\n    dlOpen:dlOpen.length,dlOpenTitles:dlOpen.slice(0,2).map(function(x){return x.title||''}),dlTotal:dls.length,collide:collide};\n}\nfunction workFacts(){\n  var d=(typeof data!=='undefined'&&data)||{};\n  var logs=d.logs||[],later=d.laterChecks||[],projects=d.projects||[],rec=d.recurring||[];\n  var done=logs.filter(function(x){return x.done}).length;\n  var pending=logs.filter(function(x){return !x.done}).sort(function(a,b){return (b.minutes||0)-(a.minutes||0)});\n  var minutes=logs.reduce(function(s,x){return s+(Number(x.minutes)||0)},0);\n  var cats={};logs.forEach(function(x){cats[x.cat||'기타']=(cats[x.cat||'기타']||0)+1});\n  var topCat=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]})[0]||'';\n  var laterOpen=later.filter(function(x){return !x.done});\n  var oldest=laterOpen.slice().sort(function(a,b){return String(a.created||'').localeCompare(String(b.created||''))})[0]||null;\n  var oldestDays=oldest?daysSince(oldest.created):null;\n  var proj=projects.map(function(p){var open=(p.items||[]).filter(function(it){return it.state!=='완료'});return {name:p.name,open:open.length,next:(open[0]||{}).title||''}})\n    .sort(function(a,b){return b.open-a.open});\n  var items=0,itemsDone=0;projects.forEach(function(p){(p.items||[]).forEach(function(it){items++;if(it.state==='완료')itemsDone++})});\n  var comp=0,compDone=0;rec.forEach(function(r){(r.companies||[]).forEach(function(c){comp++;if(c.meetingDone&&c.logDone)compDone++})});\n  return {logTotal:logs.length,logDone:done,rate:logs.length?Math.round(done/logs.length*100):0,minutes:minutes,\n    topCat:topCat,topCatCnt:cats[topCat]||0,heaviest:pending[0]||null,\n    laterOpen:laterOpen.length,oldestTitle:oldest?oldest.title:'',oldestDays:oldestDays,\n    topProj:proj[0]||null,items:items,itemsDone:itemsDone,recTotal:comp,recDone:compDone};\n}\nfunction personalFacts(){\n  var hs=(typeof habits!=='undefined'&&Array.isArray(habits))?habits:[];\n  var todayIdx=(new Date().getDay()+6)%7;\n  var rates=hs.map(function(h){var c=(h.checks||[]).filter(Boolean).length;\n    var miss=0;for(var i=todayIdx;i>=0;i--){if((h.checks||[])[i])break;miss++}\n    return {name:h.name,rate:c,today:!!(h.checks||[])[todayIdx],missRun:miss}});\n  var sum=rates.reduce(function(s,r){return s+r.rate},0);\n  var avg=hs.length?Math.round(sum/(hs.length*(todayIdx+1))*100):0;\n  var sorted=rates.slice().sort(function(a,b){return b.rate-a.rate});\n  return {count:hs.length,avg:Math.min(100,avg),best:sorted[0]||null,worst:sorted[sorted.length-1]||null,\n    todayDone:rates.filter(function(r){return r.today}).length,todayIdx:todayIdx};\n}\n\n/* ---------- 해석형 생성 ---------- */\nfunction fbMods(fb){fb=fb||'';return {detail:/구체|자세|디테일|수치/.test(fb),brief:/간결|짧게|짧은|핵심만/.test(fb),raw:fb}}\nfunction calNarrative(f){\n  var headline,lead;\n  if(!f.total){\n    headline=(f.scope==='monthly'?'이번 달':'이번 주')+' 캘린더가 비어 있습니다. 일정을 채우기 전에 우선순위부터 정할 타이밍입니다.';\n    lead='기록된 일정이 없을 때가 오히려 설계하기 가장 좋은 구간입니다. 수익 일정과 마감을 먼저 고정한 뒤, 미팅을 그 사이에 배치하는 순서를 권합니다.';\n  }else{\n    if(f.revCount>=2){\n      headline='이번 '+(f.scope==='monthly'?'달':'주')+' 운영의 축은 수익 일정 '+f.revCount+'건입니다. 나머지 일정은 그 앞뒤로 정렬하는 것이 맞습니다.';\n    }else if(f.busiestDay){\n      headline='승부처는 '+f.busiestDay+'요일입니다. 전체 '+f.total+'건 중 '+f.busiestCnt+'건이 이 하루에 몰려 있습니다.';\n    }else{\n      headline='일정 밀도가 고르게 분산되어 있어, 집중 블록을 직접 설계할 수 있는 주간입니다.';\n    }\n    var parts=[];\n    if(f.collide&&f.busiestDay)parts.push('미완료 마감이 일정이 가장 몰린 '+f.busiestDay+'요일에 함께 걸려 있어, '+(f.lightDay?'상대적으로 비어 있는 '+f.lightDay+'요일로 앞당기는':'전날까지 끝내두는')+' 편이 안전합니다');\n    else if(f.dlOpen)parts.push('미완료 마감 '+f.dlOpen+'건'+(f.dlOpenTitles[0]?'(“'+f.dlOpenTitles[0]+'” 등)':'')+'은 '+(f.lightDay?'일정이 가장 적은 '+f.lightDay+'요일에 처리하는 것이 현실적입니다':'완충 시간이 있는 날에 배치가 필요합니다'));\n    if(f.afternoon>f.morning&&f.afternoon>=2)parts.push('일정이 오후에 치우쳐 있으니 오전은 회의가 아니라 준비와 집중 업무로 비워두는 운영이 적합합니다');\n    else if(f.morning>f.afternoon&&f.morning>=2)parts.push('오전 일정이 많아 깊은 작업은 오후 블록으로 옮기는 편이 효율적입니다');\n    if(f.revAmt)parts.push('수익 일정 합계는 '+f.revAmt.toLocaleString('ko-KR')+'만원으로, 응대 전 자료 확인 시간을 미리 확보해두는 것이 좋습니다');\n    if(!parts.length)parts.push('마감과 수익 일정 모두 정리된 상태라, 다음 '+(f.scope==='monthly'?'달':'주')+' 선점 일정을 잡기 좋은 여건입니다');\n    lead=parts.slice(0,3).join('. ')+'.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.busiestDay?f.busiestDay+'요일('+f.busiestCnt+'건)에 밀도가 집중되어 전후 완충 시간이 필요합니다.':'일정 밀도가 분산되어 있어 집중 블록 설계가 자유롭습니다.',\n      f.revCount?'수익 일정 '+f.revCount+'건'+(f.revAmt?'('+f.revAmt.toLocaleString('ko-KR')+'만원)':'')+'이 이번 기간의 우선 축입니다.':'수익 일정이 없어 내부 업무와 준비에 쓰기 좋은 기간입니다.',\n      f.dlOpen?'마감 '+f.dlTotal+'건 중 '+f.dlOpen+'건이 미완료 상태로, 날짜 재배치 판단이 필요합니다.':'마감 항목은 모두 정리된 상태입니다.'\n    ],\n    actions:[\n      f.dlOpen?('미완료 마감 '+(f.dlOpenTitles[0]?'“'+f.dlOpenTitles[0]+'” ':'')+(f.lightDay?f.lightDay+'요일로 이동':'날짜 확정')):'다음 기간 핵심 일정 선점',\n      f.revCount?'수익 일정 전 자료 확인 블록 확보':'오전 집중 블록 고정',\n      f.busiestDay?f.busiestDay+'요일 전날 저녁, 다음 날 동선 점검':'주간 일정 태그 누락 점검'\n    ]};\n}\nfunction workNarrative(f){\n  var headline,lead;\n  if(!f.logTotal){\n    headline='오늘 업무 기록이 비어 있습니다. 가장 무거운 일 하나만 먼저 적는 것으로 시작하세요.';\n    lead='기록이 없으면 판단도 없습니다. 다 적으려 하지 말고, 오늘을 결정하는 업무 1건과 예상 소요 시간만 먼저 등록해두면 흐름이 잡힙니다.';\n  }else if(f.heaviest){\n    headline='지금 가장 무거운 미완료 업무는 “'+f.heaviest.title+'”입니다. 이것이 닫혀야 오늘이 닫힙니다.';\n    var parts=[f.topCat+' 업무 비중이 가장 높지만 완료율은 '+f.rate+'%로, 벌려둔 일이 닫히는 속도보다 빠르게 늘어나는 패턴입니다'];\n    if(f.oldestTitle&&f.oldestDays!=null&&f.oldestDays>=2)parts.push('Later Check의 “'+f.oldestTitle+'”'+jo(f.oldestTitle,'은','는')+' '+f.oldestDays+'일째 보류 중입니다. 날짜를 주거나 버리는 결정이 필요합니다');\n    else if(f.laterOpen)parts.push('Later Check '+f.laterOpen+'건은 마감이 없어 계속 밀리는 구조입니다');\n    if(f.topProj&&f.topProj.open)parts.push('프로젝트 “'+f.topProj.name+'”'+jo(f.topProj.name,'은','는')+' “'+f.topProj.next+'”부터 일정에 박아두면 다시 움직입니다');\n    lead=parts.slice(0,3).join('. ')+'.';\n  }else{\n    headline='기록된 업무가 모두 닫혔습니다. 지금이 보류함을 비울 가장 좋은 타이밍입니다.';\n    lead='완료된 날일수록 새 일을 벌리기보다 Later Check '+f.laterOpen+'건과 프로젝트 대기 항목을 정리하는 편이 다음 날의 부담을 줄입니다.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.logTotal?('완료율 '+f.rate+'%('+f.logDone+'/'+f.logTotal+'건, 총 '+f.minutes+'분) — '+(f.rate>=70?'마무리 흐름이 좋은 편입니다.':'시작 대비 마무리가 밀리고 있습니다.')):'업무 기록이 없어 판단 근거가 부족합니다.',\n      f.oldestTitle?'“'+f.oldestTitle+'”'+jo(f.oldestTitle,'이','가')+' 보류 '+(f.oldestDays!=null?f.oldestDays+'일째':'중')+'로 가장 오래 묵었습니다.':(f.laterOpen?'Later Check '+f.laterOpen+'건이 마감 없이 누적 중입니다.':'보류함이 비어 있습니다.'),\n      f.topProj?'프로젝트 “'+f.topProj.name+'”에 대기 '+f.topProj.open+'건 — 다음 항목은 “'+f.topProj.next+'”입니다.':'프로젝트 대기 항목이 없습니다.'\n    ],\n    actions:[\n      f.heaviest?'“'+f.heaviest.title+'” 오전 첫 블록 배치':'보류함(Later Check) 정리',\n      f.oldestTitle?'“'+f.oldestTitle+'” 날짜 부여 또는 폐기 결정':'마감 없는 항목에 날짜 부여',\n      f.topProj&&f.topProj.next?'“'+f.topProj.next+'” 이번 주 일정 확정':'정기 미팅 '+f.recDone+'/'+f.recTotal+' 잔여 기업 일정 잡기'\n    ]};\n}\nfunction personalNarrative(f){\n  var headline,lead;\n  if(!f.count){\n    headline='루틴 목록이 비어 있습니다. 지키고 싶은 것 하나만 먼저 등록하세요.';\n    lead='루틴은 개수가 아니라 연결이 만듭니다. 이미 매일 하는 행동 직후에 붙일 수 있는 작은 항목 하나부터 시작하는 편이 오래갑니다.';\n  }else if(f.worst&&f.worst.missRun>=3){\n    headline='“'+f.worst.name+'” 루틴이 '+f.worst.missRun+'일째 끊겨 있습니다. 의지보다 배치의 문제일 가능성이 큽니다.';\n    lead='“'+(f.best?f.best.name:'')+'”'+jo(f.best&&f.best.name,'은','는')+' 주 '+(f.best?f.best.rate:0)+'회로 가장 견고한 앵커 루틴입니다. 무너진 루틴은 따로 세우지 말고 이 앵커 직후에 붙여서 트리거로 쓰는 방식을 권합니다. 오늘은 '+f.todayDone+'/'+f.count+'개가 체크된 상태입니다.';\n  }else if(f.avg>=70){\n    headline='루틴이 안정 궤도입니다. “'+(f.best?f.best.name:'')+'”'+jo(f.best&&f.best.name,'이','가')+' 하루의 축 역할을 하고 있습니다.';\n    lead='기록률 '+f.avg+'%는 유지 자체보다 질을 올릴 단계라는 신호입니다. 가장 약한 “'+(f.worst?f.worst.name:'')+'”만 기준을 절반으로 낮춰 연속 기록을 만드는 데 집중하면 전체가 단단해집니다.';\n  }else{\n    headline='이번 주 기록률은 '+f.avg+'%입니다. 전부 잡기보다 한 가지 루틴의 연속성을 먼저 회복할 구간입니다.';\n    lead='“'+(f.best?f.best.name:'')+'”('+(f.best?f.best.rate:0)+'회)는 잘 버티고 있고, “'+(f.worst?f.worst.name:'')+'”('+(f.worst?f.worst.rate:0)+'회)가 전체 평균을 끌어내리고 있습니다. 기록률이 낮은 날은 고강도 판단을 줄이고 정리형 업무 중심으로 하루를 운영하는 편이 컨디션 회복에 유리합니다.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.best?'“'+f.best.name+'”'+jo(f.best.name,'이','가')+' 주 '+f.best.rate+'회로 가장 안정적인 앵커 루틴입니다.':'아직 기준이 될 루틴이 없습니다.',\n      f.worst&&f.best&&f.worst.name!==f.best.name?'“'+f.worst.name+'”'+jo(f.worst.name,'은','는')+' '+(f.worst.missRun>=2?f.worst.missRun+'일째 끊김 — 앵커 루틴 직후로 재배치가 필요합니다.':'주 '+f.worst.rate+'회로 가장 약한 고리입니다.'):'루틴 간 편차가 크지 않습니다.',\n      '오늘 기준 '+f.todayDone+'/'+f.count+'개 체크 · 주간 기록률 '+f.avg+'%입니다.'\n    ],\n    actions:[\n      f.worst?'“'+f.worst.name+'”를 '+(f.best?'“'+f.best.name+'” 직후':'고정 시간')+'에 재배치':'핵심 루틴 1개 등록',\n      '취침·기상 시간 고정으로 기록 누락 방지',\n      '기록률 낮은 날은 업무 강도 사전 하향'\n    ]};\n}\n\nfunction cosActualFactsV324(scope,kind,fb){\n  var base={};\n  try{base=getFacts(scope)}catch(e){base={error:String(e)}}\n  var actual={};\n  function short(s,n){return String(s||'').replace(/\\s+/g,' ').trim().slice(0,n||80)}\n  function safeArr(a){return Array.isArray(a)?a:[]}\n  function compactEvent(e){\n    return {\n      date:e._d||e.date||'',\n      time:short(e.time||'',20),\n      title:short(e.title||e.summary||'',60),\n      type:short(e.type||'',16),\n      amount:Number(e.amount||0)||0,\n      revenue:!!(e.isRevenue||e.type==='수익')\n    };\n  }\n  function compactTask(x){\n    return {\n      date:x._d||x.date||x.created||'',\n      title:short(x.title||'',60),\n      done:!!(x.done||x.completed)\n    };\n  }\n  function compactLog(l){\n    return {\n      date:l.date||l.created||'',\n      title:short(l.title||'',60),\n      start:l.start||'',\n      end:l.end||'',\n      minutes:Number(l.minutes||0)||0,\n      cat:l.cat||'KRP',\n      done:!!l.done\n    };\n  }\n  function compactLater(x){\n    return {\n      created:x.created||'',\n      title:short(x.title||'',60),\n      done:!!x.done\n    };\n  }\n  function compactProject(p){\n    var items=safeArr(p.items).slice(0,5).map(function(it){\n      return {title:short(it.title||'',50),state:short(it.state||'',12)}\n    });\n    return {name:short(p.name||'',40),desc:short(p.desc||'',60),items:items};\n  }\n\n  try{\n    if(KEY==='calendar'){\n      var d=(typeof data!=='undefined'&&data)||{};\n      var keys=scope==='monthly'?monthKeys():weekKeys();\n      var ev=d.events||{}, dl=d.deadlines||{};\n      var events=[], deadlines=[];\n      keys.forEach(function(k){\n        safeArr(ev[k]).forEach(function(e){events.push(compactEvent(Object.assign({_d:k},e)))});\n        safeArr(dl[k]).forEach(function(x){deadlines.push(compactTask(Object.assign({_d:k},x)))});\n      });\n      var selectedKey='';\n      try{selectedKey=dateFor(cur)}catch(e){}\n      actual={\n        selectedDate:selectedKey,\n        scope:scope,\n        weekKeys:keys,\n        events:events.slice(0,18),\n        deadlines:deadlines.slice(0,18),\n        loadedAt:new Date().toISOString()\n      };\n    }\n\n    if(KEY==='work'){\n      var wd=(typeof data!=='undefined'&&data)||{};\n      var selected=(typeof currentDateISO!=='undefined'?currentDateISO:'');\n      var selectedLogs=(typeof workLogsForSelectedDateV322==='function'?workLogsForSelectedDateV322():safeArr(wd.logs)).map(compactLog);\n      actual={\n        selectedDate:selected,\n        scope:scope,\n        selectedLogs:selectedLogs.slice(0,14),\n        allLogs:safeArr(wd.logs).slice(-24).map(compactLog),\n        laterChecks:safeArr(wd.laterChecks).filter(function(x){return !x.done}).slice(0,14).map(compactLater),\n        projects:safeArr(wd.projects).slice(0,8).map(compactProject),\n        monthlyAlba:safeArr(wd.monthlyAlba).slice(0,10).map(function(a){\n          return {title:short(a.title||a.name||'',50),amount:Number(a.amount||0)||0,done:!!a.done}\n        }),\n        loadedAt:new Date().toISOString()\n      };\n    }\n\n    if(KEY==='personal'){\n      var todayIndex=(new Date().getDay()+6)%7;\n      var scoreEl=document.getElementById('scoreTotal');\n      var moodEl=document.querySelector('.mood-chip.on,.mood-chip.active,.selected.mood-chip');\n      actual={\n        selectedDayIndex:todayIndex,\n        scope:scope,\n        score:scoreEl?short(scoreEl.textContent,20):'',\n        habits:(typeof habits!=='undefined'?safeArr(habits):[]).slice(0,12).map(function(h){\n          return {name:short(h.name||'',40),today:!!safeArr(h.checks)[todayIndex],weeklyDone:safeArr(h.checks).filter(Boolean).length}\n        }),\n        inputs:Array.prototype.slice.call(document.querySelectorAll('input,textarea,select')).slice(0,20).map(function(el){\n          return {id:el.id||'',name:el.name||'',value:short(el.value||el.textContent||'',60)}\n        }).filter(function(x){return x.value}),\n        mood:moodEl?short(moodEl.textContent,30):'',\n        loadedAt:new Date().toISOString()\n      };\n    }\n  }catch(e){\n    actual.error=String(e);\n  }\n\n  return {\n    tab:KEY,\n    kind:kind||'insight',\n    scope:scope||'weekly',\n    base:base,\n    actual:actual,\n    ui:{\n      headline:heroT?short(heroT.textContent,80):'',\n      lead:heroL?short(heroL.textContent,160):''\n    },\n    feedback:fb||'',\n    recentFeedback:lsGet(FB_KEY,[]).slice(0,8)\n  };\n}\n\nfunction genLocal(kind,type,fb){\n  var f=getFacts(type),m=fbMods(fb),out;\n  out=KEY==='calendar'?calNarrative(f):KEY==='work'?workNarrative(f):personalNarrative(f);\n  if(m.brief){out.lead=out.lead.split('. ')[0]+'.';out.bullets=out.bullets.slice(0,2)}\n  if(fb)out.feedbackNote='피드백 반영: '+fb;\n  return out;\n}\nfunction aiGenerate(kind,type,fb){\n  if(typeof window.COS_AI==='function'){\n    return Promise.resolve(window.COS_AI({tab:KEY,kind:kind,type:type,feedback:fb||'',facts:(typeof cosActualFactsV324==='function'?cosActualFactsV324(type,kind,fb):getFacts(type))}))\n      .then(function(r){return r&&r.headline?r:genLocal(kind,type,fb)})\n      .catch(function(){return genLocal(kind,type,fb)});\n  }\n  return Promise.resolve(genLocal(kind,type,fb));\n}\n\n/* ---------- 히어로 브리프 통합 (별도 카드 없음, 히어로 제목/내용 직접 사용) ---------- */\nvar heroEl=null,heroT=null,heroL=null,curHeadline='',curLead='';\nfunction setupHeroBrief(){\n  heroEl=document.querySelector(KEY==='calendar'?'.cal-hero':'.hero');\n  if(!heroEl)return;\n  try{if(getComputedStyle(heroEl).position==='static')heroEl.style.position='relative'}catch(e){heroEl.style.position='relative'}\n  var btn=document.createElement('button');\n  btn.type='button';btn.className='cos-hero-ai';btn.textContent='AI';\n  btn.addEventListener('click',function(){openFeedback('insight')});\n  heroEl.appendChild(btn);\n  if(KEY==='calendar'){heroT=document.getElementById('calBriefTitle');heroL=document.getElementById('calBriefLead')}\n  else{heroT=heroEl.querySelector('.hero-title');heroL=heroEl.querySelector('.hero-lead');if(!heroL){heroL=document.createElement('div');heroL.className='hero-lead';heroL.id=KEY==='personal'?'dailyBriefLead':'heroLead';heroT&&heroT.insertAdjacentElement('afterend',heroL)}}\n  // 탭 자체 JS가 히어로 문구를 덮어써도 AI 브리프 유지\n  [heroT,heroL].forEach(function(el){\n    if(!el||typeof MutationObserver==='undefined')return;\n    new MutationObserver(function(){\n      if(curHeadline&&heroT&&heroT.textContent!==curHeadline)heroT.textContent=curHeadline;\n      if(curLead&&heroL&&heroL.textContent!==curLead)heroL.textContent=curLead;\n    }).observe(el,{childList:true,characterData:true,subtree:true});\n  });\n}\n\nfunction cosNormalizeBriefV314(r){\n  r=r||{};\n  var fallback={\n    calendar:{headline:'수익 일정 관리가 핵심입니다.',lead:'오후 일정 전 준비 시간이 필요합니다. 오전에는 미팅 전 확인 업무와 마감 항목을 먼저 정리하세요.'},\n    work:{headline:'부산 라이콘 제안서가 최우선입니다.',lead:'KRP 업무 비중이 높고 완료율은 중간 수준입니다. 새 업무를 늘리기보다 제안서 정리와 Later Check 처리에 집중하세요.'},\n    personal:{headline:'회복 중심으로 운영하는 날입니다.',lead:'수면과 활동 기록이 부족해 회복 신호가 보입니다. 오늘은 정리형 업무와 가벼운 활동을 우선하세요.'},\n    brief:{headline:'KRP 정리와 오후 일정이 핵심입니다.',lead:'오전에는 KRP 문서 정리를 먼저 처리하고, 오후 일정 전 자료 확인 시간을 확보하세요. Later Check는 오래 남은 항목만 정리하면 됩니다.'}\n  }[KEY]||{headline:'수익 일정 관리가 핵심입니다.',lead:'오후 일정 전 준비 시간이 필요합니다. 오전에는 미팅 전 확인 업무와 마감 항목을 먼저 정리하세요.'};\n\n  function clean(s){return String(s||'').replace(/…|\\.\\.\\./g,'').replace(/\\s+/g,' ').trim();}\n  function finish(s){s=clean(s);return /[.!?。요다]$/.test(s)?s:s+'입니다.';}\n  function shortHeadline(s){\n    s=clean(s);\n    if(!s || s.length>24) return fallback.headline;\n    return finish(s);\n  }\n  function shortLead(s){\n    s=clean(s);\n    if(!s || s.length>118) return fallback.lead;\n    return finish(s);\n  }\n\n  r.headline=shortHeadline(r.headline);\n  r.lead=shortLead(r.lead);\n  return r;\n}\n\nfunction renderInsight(fb){\n  aiGenerate('insight','weekly',fb).then(function(r){\n    r=cosNormalizeBriefV314(r);\n    curHeadline=r.headline;curLead=r.lead;\n    if(heroT)heroT.textContent=curHeadline;\n    if(heroL)heroL.textContent=curLead;\n    if(fb&&heroEl){heroEl.classList.remove('cos-hero-flash');void heroEl.offsetWidth;heroEl.classList.add('cos-hero-flash')}\n  });\n}\nwindow.cosRefreshTabBriefV321=function(feedback){\n  renderInsight(feedback||'');\n};\n\n/* ---------- 헤더 연동 상태줄: 브리핑 양식 ---------- */\nfunction setupSyncLine(){\n  if(KEY==='personal')return; // 개인 탭은 자체 상태줄 보유\n  var topRow=document.querySelector('.top-row');\n  if(!topRow)return;\n  var line=document.createElement('div');\n  line.className='cos-sync-line';\n  topRow.insertAdjacentElement('afterend',line);\n  var label=KEY==='calendar'?'Google Calendar':'Google Sheets';\n  function upd(){\n    var live=document.getElementById('googleLive');\n    var t=document.getElementById('googleSyncTime');\n    var time=t?String(t.textContent||'').trim():'';\n    var txt;\n    if(live&&live.classList.contains('loading'))txt=label+' 실시간 연동 중\\u2026';\n    else if(live&&live.classList.contains('fail'))txt=label+' 연동 실패 \\u00b7 상단 점을 눌러 다시 시도';\n    else if(time&&time!=='--:--'&&time!=='연동 중')txt=label+' 실시간 연동 완료 \\u00b7 '+time;\n    else txt=label+' 연동 대기 중';\n    if(line.textContent!==txt)line.textContent
