F_KEY:(KEY==='work' \u0026\u0026 window.COS_WORK_BRIEF_KEY)?window.COS_WORK_BRIEF_KEY:KEY;\nfunction briefStoreKey(){return 'cos_brief_by_date_'+BRIEF_DATE_KEY;}\ndocument.documentElement.style.setProperty('--cos-accent',CFG.accent);\ndocument.documentElement.style.setProperty('--cos-soft',CFG.soft);\ndocument.documentElement.style.setProperty('--cos-border',CFG.border);\n\n/* ---------- 유틸 ---------- */\nfunction esc(s){return String(s==null?'':s).replace(/[\u0026\u003c\u003e\"']/g,function(c){return{'\u0026':'\u0026amp;','\u003c':'\u0026lt;','\u003e':'\u0026gt;','\"':'\u0026quot;',\"'\":'\u0026#39;'}[c]})}\nfunction pad(n){return (n\u003c10?'0':'')+n}\nfunction cosTopStore(){\n  var wins=[];\n  try{wins.push(window.parent)}catch(e){}\n  try{wins.push(window.top)}catch(e){}\n  wins.push(window);\n  for(var i=0;i\u003cwins.length;i++){\n    try{\n      var w=wins[i];\n      if(!w)continue;\n      if(!w.__COS_BRIEF_STORE__)w.__COS_BRIEF_STORE__={};\n      return w.__COS_BRIEF_STORE__;\n    }catch(e){}\n  }\n  return null;\n}\nfunction lsGet(k,fb){\n  var store=cosTopStore();\n  try{ if(store \u0026\u0026 Object.prototype.hasOwnProperty.call(store,k)) return store[k]; }catch(e){}\n  var wins=[]; try{wins.push(window.parent)}catch(e){} try{wins.push(window.top)}catch(e){} wins.push(window);\n  for(var i=0;i\u003cwins.length;i++){\n    try{\n      var raw=wins[i]\u0026\u0026wins[i].localStorage\u0026\u0026wins[i].localStorage.getItem(k);\n      if(raw){ var val=JSON.parse(raw); if(store)store[k]=val; return val; }\n    }catch(e){}\n  }\n  return fb;\n}\nfunction lsSet(k,v){\n  var store=cosTopStore();\n  try{ if(store)store[k]=v; }catch(e){}\n  var raw; try{raw=JSON.stringify(v)}catch(e){raw=null}\n  if(raw!=null){\n    var wins=[]; try{wins.push(window.parent)}catch(e){} try{wins.push(window.top)}catch(e){} wins.push(window);\n    for(var i=0;i\u003cwins.length;i++){\n      try{ if(wins[i]\u0026\u0026wins[i].localStorage) wins[i].localStorage.setItem(k,raw); }catch(e){}\n    }\n  }\n}\nfunction toast(msg){var t=document.getElementById('cosToast');if(!t){t=document.createElement('div');t.id='cosToast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},1700)}\nfunction mondayOf(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nfunction dkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}\nfunction weekKeys(){var m=mondayOf(new Date()),a=[];for(var i=0;i\u003c7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(dkey(d))}return a}\nfunction monthKeys(){var n=new Date(),y=n.getFullYear(),mo=n.getMonth(),last=new Date(y,mo+1,0).getDate(),a=[];for(var i=1;i\u003c=last;i++)a.push(y+'-'+pad(mo+1)+'-'+pad(i));return a}\nfunction selectedDateKey(){\n  try{ if(typeof window.COS_SELECTED_DATE_KEY==='function'){ var k=window.COS_SELECTED_DATE_KEY(); if(k)return String(k).slice(0,10); } }catch(e){}\n  try{ if(KEY==='calendar' \u0026\u0026 typeof dateKey==='function' \u0026\u0026 typeof cur!=='undefined') return dateKey(cur); }catch(e){}\n  try{ if(KEY==='personal' \u0026\u0026 typeof dateKeyForCur==='function') return dateKeyForCur(); }catch(e){}\n  try{ if(typeof currentDateISO!=='undefined' \u0026\u0026 currentDateISO) return String(currentDateISO).slice(0,10); }catch(e){}\n  try{ var saved=lsGet('brief_selected_date_v323',''); if(KEY==='brief'\u0026\u0026saved)return String(saved).slice(0,10); }catch(e){}\n  return dkey(new Date());\n}\ntry{ window.cosAddonSelectedDateKeyV329=selectedDateKey; }catch(e){}\nfunction weekMeta(){var m=mondayOf(new Date()),e=new Date(m);e.setDate(m.getDate()+6);var wk=Math.ceil(m.getDate()/7);\n  return {id:KEY+'-w-'+m.getFullYear()+'-'+pad(m.getMonth()+1)+'-'+wk,\n    title:(m.getMonth()+1)+'월 '+wk+'주차 '+CFG.label+' 주간 리포트',\n    period:m.getFullYear()+'.'+pad(m.getMonth()+1)+'.'+pad(m.getDate())+'–'+pad(e.getMonth()+1)+'.'+pad(e.getDate())}}\nfunction monthMeta(){var n=new Date();\n  return {id:KEY+'-m-'+n.getFullYear()+'-'+pad(n.getMonth()+1),\n    title:n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+CFG.label+' 월간 리포트',\n    period:n.getFullYear()+'.'+pad(n.getMonth()+1)}}\nvar DOW=['월','화','수','목','금','토','일'];\nfunction jo(w,bat,no){w=String(w||'');var c=w.charCodeAt(w.length-1);if(isNaN(c)||c\u003c0xAC00||c\u003e0xD7A3)return no;return ((c-0xAC00)%28)?bat:no}\nfunction dayName(k){var d=new Date(k+'T00:00:00');return DOW[(d.getDay()+6)%7]}\nfunction daysSince(s){var d=new Date(String(s)+'T00:00:00');if(isNaN(d))return null;return Math.max(0,Math.round((new Date().setHours(0,0,0,0)-d)/86400000))}\n\n/* ---------- 사실 수집(facts) ---------- */\nfunction getFacts(scope){\n  try{\n    if(KEY==='calendar')return calFacts(scope);\n    if(KEY==='work')return workFacts(scope);\n    if(KEY==='personal')return personalFacts(scope);\n  }catch(e){}\n  return {};\n}\nfunction calFacts(scope){\n  var d=(typeof data!=='undefined'\u0026\u0026data)||{};\n  var keys=scope==='monthly'?monthKeys():weekKeys();\n  var ev=d.events||{},dl=d.deadlines||{};\n  var list=[];keys.forEach(function(k){(ev[k]||[]).forEach(function(e){list.push(Object.assign({_d:k},e))})});\n  var byDay={};list.forEach(function(e){byDay[e._d]=(byDay[e._d]||0)+1});\n  var sortedDays=Object.keys(byDay).sort(function(a,b){return byDay[b]-byDay[a]});\n  var busiestKey=sortedDays[0]||null;\n  var morning=list.filter(function(e){return e.time\u0026\u0026e.time!=='종일'\u0026\u0026e.time\u003c'12:00'}).length;\n  var afternoon=list.filter(function(e){return e.time\u0026\u0026e.time!=='종일'\u0026\u0026e.time\u003e='12:00'}).length;\n  var rev=list.filter(function(e){return e.isRevenue||e.type==='수익'});\n  var revAmt=rev.reduce(function(s,e){return s+(Number(e.amount)||0)},0);\n  var dls=[];keys.forEach(function(k){(dl[k]||[]).forEach(function(x){dls.push(Object.assign({_d:k},x))})});\n  var dlOpen=dls.filter(function(x){return !(x.done||x.completed)});\n  var collide=busiestKey?dlOpen.some(function(x){return x._d===busiestKey}):false;\n  // 일정이 가장 적은 평일\n  var lightKey=null,lightCnt=1e9;\n  keys.slice(0,5).forEach(function(k){var c=byDay[k]||0;if(c\u003clightCnt){lightCnt=c;lightKey=k}});\n  return {scope:scope,total:list.length,meetings:list.filter(function(e){return e.type==='미팅'}).length,\n    busiestKey:busiestKey,busiestCnt:busiestKey?byDay[busiestKey]:0,busiestDay:busiestKey?dayName(busiestKey):'',\n    lightDay:lightKey?dayName(lightKey):'',lightCnt:lightKey?(byDay[lightKey]||0):0,\n    morning:morning,afternoon:afternoon,revCount:rev.length,revAmt:revAmt,\n    dlOpen:dlOpen.length,dlOpenTitles:dlOpen.slice(0,2).map(function(x){return x.title||''}),dlTotal:dls.length,collide:collide};\n}\nfunction inScopeDate(k,keys){return keys.indexOf(String(k||'').slice(0,10))\u003e=0}\nfunction workItemDate(x){return String((x\u0026\u0026(x.date||x.created||x.due||x.googleTaskDue||x.schedule))||'').slice(0,10)}\nfunction workFacts(scope){\n  var d=(typeof data!=='undefined'\u0026\u0026data)||{};\n  var selected=selectedDateKey();\n  var keys=scope==='monthly'?monthKeys():(scope==='daily'?[selected]:weekKeys());\n  function ck(v){\n    var s=String(v||'').trim();\n    var m=s.match(/^(\\d{4}-\\d{2}-\\d{2})/);\n    if(m)return m[1];\n    var dt=new Date(s);\n    if(!isNaN(dt.getTime()))return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');\n    return '';\n  }\n  function inScope(k){return !k || inScopeDate(k,keys)}\n  function dueOf(x){return ck(x\u0026\u0026(x.due||x.googleTaskDue||x.date||x.deadline));}\n  function itemDate(x){return ck((x\u0026\u0026(x.date||x.created||x.due||x.googleTaskDue||x.schedule))||'')}\n  function isDone(x){return !!(x\u0026\u0026(x.done||x.completed||x.status==='completed'||x.state==='완료'))}\n  var allLogs=d.logs||[];\n  var logs=allLogs.filter(function(x){var k=itemDate(x);return k?inScopeDate(k,keys):(scope==='daily'||keys.indexOf(selected)\u003e=0)});\n  var done=logs.filter(isDone).length;\n  var pending=logs.filter(function(x){return !isDone(x)}).sort(function(a,b){return (b.minutes||0)-(a.minutes||0)});\n  var minutes=logs.reduce(function(s,x){return s+(Number(x.minutes)||0)},0);\n  var cats={};logs.forEach(function(x){cats[x.cat||'기타']=(cats[x.cat||'기타']||0)+1});\n  var topCat=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]})[0]||'';\n\n  var taskSource=[];\n  try{ if(typeof googleTasksLoaded!=='undefined' \u0026\u0026 googleTasksLoaded \u0026\u0026 Array.isArray(googleTaskCache)) taskSource=googleTaskCache; }catch(e){}\n  if(!taskSource.length) taskSource=d.laterChecks||[];\n  var tasks=taskSource.filter(function(x){var due=dueOf(x);var created=itemDate(x);return due?inScopeDate(due,keys):(created?inScopeDate(created,keys):true)});\n  var openTasks=tasks.filter(function(x){return !isDone(x)});\n  var taskToday=openTasks.filter(function(x){return dueOf(x)===selected});\n  var taskOverdue=openTasks.filter(function(x){var due=dueOf(x);return due \u0026\u0026 due\u003cselected});\n  var taskFuture=openTasks.filter(function(x){var due=dueOf(x);return due \u0026\u0026 due\u003eselected});\n  var taskNoDue=openTasks.filter(function(x){return !dueOf(x)});\n  var oldest=taskNoDue.concat(taskOverdue).slice().sort(function(a,b){return String(itemDate(a)||dueOf(a)||'').localeCompare(String(itemDate(b)||dueOf(b)||''))})[0]||null;\n  var oldestDays=oldest?daysSince(itemDate(oldest)||dueOf(oldest)):null;\n\n  var projects=d.projects||[], rec=d.recurring||[];\n  var proj=projects.map(function(p){\n    var items=p.items||[];\n    var open=items.filter(function(it){return String(it.state||'')!=='완료'});\n    var dated=items.filter(function(it){var k=itemDate(it);return !k||inScopeDate(k,keys)});\n    return {name:p.name,open:open.length,dated:dated.length,next:(open[0]||{}).title||''};\n  }).sort(function(a,b){return (b.dated-a.dated)||(b.open-a.open)});\n  var items=0,itemsDone=0;projects.forEach(function(p){(p.items||[]).forEach(function(it){var k=itemDate(it);if(!k||inScopeDate(k,keys)){items++;if(String(it.state||'')==='완료')itemsDone++;}})});\n  var comp=0,compDone=0,compUnscheduled=0,compLogMiss=0;\n  rec.forEach(function(r){(r.companies||[]).forEach(function(c){var k=itemDate(c);if(!k||inScopeDate(k,keys)){comp++;if(c.meetingDone\u0026\u0026c.logDone)compDone++;if(!c.scheduled)compUnscheduled++;if(c.meetingDone\u0026\u0026!c.logDone)compLogMiss++;}})});\n  var sideJobs=(d.sideJobs||d.alba||[]).filter(function(x){var k=itemDate(x);return k?inScopeDate(k,keys):true});\n  var sideOpen=sideJobs.filter(function(x){return !isDone(x)});\n  var sideAmt=sideJobs.reduce(function(s,x){var m=String(x.amount||'').match(/\\d+/);return s+(m?Number(m[0]):0)},0);\n  return {scope:scope,selectedDate:selected,rangeKeys:keys,\n    logTotal:logs.length,logDone:done,logOpen:logs.length-done,rate:logs.length?Math.round(done/logs.length*100):0,minutes:minutes,\n    topCat:topCat,topCatCnt:cats[topCat]||0,heaviest:pending[0]||null,\n    taskTotal:tasks.length,taskOpen:openTasks.length,taskDone:tasks.length-openTasks.length,taskToday:taskToday.length,taskOverdue:taskOverdue.length,taskFuture:taskFuture.length,taskNoDue:taskNoDue.length,\n    laterOpen:openTasks.length,oldestTitle:oldest?oldest.title:'',oldestDays:oldestDays,\n    topProj:proj[0]||null,items:items,itemsDone:itemsDone,projectOpen:Math.max(0,items-itemsDone),\n    recTotal:comp,recDone:compDone,recUnscheduled:compUnscheduled,recLogMiss:compLogMiss,\n    sideJobCount:sideJobs.length,sideJobOpen:sideOpen.length,sideJobAmount:sideAmt};\n}\nfunction personalFacts(scope){\n  var st={};try{if(typeof window.COS_PERSONAL_GET_STATE==='function')st=window.COS_PERSONAL_GET_STATE()||{};}catch(e){}\n  var hs=Array.isArray(st.habits)?st.habits:((typeof habits!=='undefined'\u0026\u0026Array.isArray(habits))?habits:[]);\n  var todayIdx=Number.isFinite(st.selectedDayIndex)?st.selectedDayIndex:((new Date().getDay()+6)%7);\n  var rates=hs.map(function(h){var checks=h.checks||[];var c=checks.filter(Boolean).length;\n    var miss=0;for(var i=todayIdx;i\u003e=0;i--){if(checks[i])break;miss++}\n    return {name:h.name,rate:c,today:!!checks[todayIdx],missRun:miss,type:h.type||''}});\n  var denom=hs.length*Math.max(1,(scope==='daily'?1:(todayIdx+1)));\n  var sum=rates.reduce(function(s,r){return s+(scope==='daily'?(r.today?1:0):r.rate)},0);\n  var avg=hs.length?Math.round(sum/denom*100):0;\n  var sorted=rates.slice().sort(function(a,b){return b.rate-a.rate});\n  return {scope:scope,selectedDate:st.selectedDate||selectedDateKey(),count:hs.length,avg:Math.min(100,avg),best:sorted[0]||null,worst:sorted[sorted.length-1]||null,\n    todayDone:rates.filter(function(r){return r.today}).length,todayIdx:todayIdx,score:st.score||''};\n}\n\n/* ---------- 해석형 생성 ---------- */\nfunction fbMods(fb){fb=fb||'';return {detail:/구체|자세|디테일|수치/.test(fb),brief:/간결|짧게|짧은|핵심만/.test(fb),raw:fb}}\nfunction calNarrative(f){\n  var headline,lead;\n  if(!f.total){\n    headline=(f.scope==='monthly'?'이번 달':'이번 주')+' 캘린더가 비어 있습니다. 일정을 채우기 전에 우선순위부터 정할 타이밍입니다.';\n    lead='기록된 일정이 없을 때가 오히려 설계하기 가장 좋은 구간입니다. 수익 일정과 마감을 먼저 고정한 뒤, 미팅을 그 사이에 배치하는 순서를 권합니다.';\n  }else{\n    if(f.revCount\u003e=2){\n      headline='이번 '+(f.scope==='monthly'?'달':'주')+' 운영의 축은 수익 일정 '+f.revCount+'건입니다. 나머지 일정은 그 앞뒤로 정렬하는 것이 맞습니다.';\n    }else if(f.busiestDay){\n      headline='승부처는 '+f.busiestDay+'요일입니다. 전체 '+f.total+'건 중 '+f.busiestCnt+'건이 이 하루에 몰려 있습니다.';\n    }else{\n      headline='일정 밀도가 고르게 분산되어 있어, 집중 블록을 직접 설계할 수 있는 주간입니다.';\n    }\n    var parts=[];\n    if(f.collide\u0026\u0026f.busiestDay)parts.push('미완료 마감이 일정이 가장 몰린 '+f.busiestDay+'요일에 함께 걸려 있어, '+(f.lightDay?'상대적으로 비어 있는 '+f.lightDay+'요일로 앞당기는':'전날까지 끝내두는')+' 편이 안전합니다');\n    else if(f.dlOpen)parts.push('미완료 마감 '+f.dlOpen+'건'+(f.dlOpenTitles[0]?'(“'+f.dlOpenTitles[0]+'” 등)':'')+'은 '+(f.lightDay?'일정이 가장 적은 '+f.lightDay+'요일에 처리하는 것이 현실적입니다':'완충 시간이 있는 날에 배치가 필요합니다'));\n    if(f.afternoon\u003ef ==='monthly'?'MONTHLY':'WEEKLY')+' REPORT');\n  document.getElementById('cosDetailHeadline').textContent=r.headline;\n  document.getElementById('cosDetailLead').textContent=r.lead;\n  document.getElementById('cosDetailFbNote').innerHTML=r.feedbackNote?'\u003cdiv class=\"cos-feedback-note\"\u003e'+esc(r.feedbackNote)+'\u003c/div\u003e':'';\n  document.getElementById('cosDetailBullets').innerHTML=(r.bullets||[]).map(function(x){return '\u003cli\u003e'+esc(x)+'\u003c/li\u003e'}).join('');\n  document.getElementById('cosDetailActions').innerHTML=(r.actions||[]).map(function(x,i){return '\u003cdiv\u003e'+(i+1)+'. '+esc(x)+'\u003c/div\u003e'}).join('');\n  document.getElementById('cosDetailInput').value='';\n  document.getElementById('cosDetailBackdrop').classList.add('open');\n}\nfunction openFeedback(target){\n  currentFbTarget=target;\n  var sub,ctx;\n  if(target==='insight'){\n    sub=CFG.brief+' 판단에 대한 피드백입니다.';\n    ctx=curHeadline||'';\n  }else{\n    sub=CFG.label+' 리포트 생성 기준 피드백입니다.';\n    var last=lsGet(FB_KEY,[])[0];\n    ctx='현재 기준: '+CFG.label+' 탭 데이터 해석 요약'+(last?' · 최근 피드백: '+last.feedback:'');\n  }\n  document.getElementById('cosFbSub').textContent=sub;\n  document.getElementById('cosFbContext').textContent=ctx;\n  document.getElementById('cosFbInput').value='';\n  document.getElementById('cosFeedbackBackdrop').classList.add('open');\n}\nfunction saveFeedback(target,fb,original){\n  var arr=lsGet(FB_KEY,[]);\n  arr.unshift({target:target,feedback:fb,original:String(original||'').slice(0,300),createdAt:new Date().toISOString()});\n  lsSet(FB_KEY,arr.slice(0,30));\n}\n\n/* ---------- 초기화 ---------- */\nfunction wrapRenderAllForBriefCache(){\n  try{\n    var fn=(typeof renderAll==='function')?renderAll:window.renderAll;\n    if(typeof fn==='function' \u0026\u0026 !fn.__cosBriefCacheWrappedV329){\n      var old=fn;\n      var wrapped=function(){\n        var res=old.apply(this,arguments);\n        setTimeout(replayCachedBrief,0);\n        return res;\n      };\ psed,.cos-brief-expanded,.cos-brief-has-more\").forEach(el=\u003e{\n      el.classList.remove(\"cos-brief-collapsed\",\"cos-brief-expanded\",\"cos-brief-has-more\");\n    });\n\n    const titleSelectors=[\"#heroTitle\",\"#calBriefTitle\",\"#workBriefTitle\",\"#dailyBriefTitle\",\".hero-title\"];\n    const bodySelectors=[\"#heroAiText\",\"#calBriefLead\",\"#workBriefLead\",\"#dailyBriefLead\",\".hero-ai-text\",\".hero-lead\"];\n\n    const titleEl=titleSelectors.map(s=\u003edocument.querySelector(s)).find(Boolean);\n    const bodyEl=bodySelectors.map(s=\u003edocument.querySelector(s)).find(Boolean);\n\n    if(titleEl){\n      const src=titleEl.dataset.fullText || titleEl.textContent;\n      titleEl.textContent=completeSentence(src,34);\n    }\n    if(bodyEl){\n      const src=bodyEl.dataset.fullText || bodyEl.textContent;\n      bodyEl.textContent=completeSentence(src,130);\n    }\n  }\n\n  if(document.readyState===\"loading\") document.addEventListener(\"DOMContentLoaded\",enforceFixedSummary);\n  else enforceFixedSummary();\n  setTimeout(enforceFixedSummary,500);\n  setTimeout(enforceFixedSummary,1500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v314-brief-title-body-fix\"\u003e\n/* v3.14: 브리프 제목 2줄 이내, 본문 4줄 이내를 실제 문장 길이로 해결 */\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.32 !important;\n  max-height:none !important;\n}\n\n.hero-lead,\n#heroLead,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-ai-text,\n#heroAiText{\n  display:block !important;\n  min-height:auto !important;\n  margin-top:10px !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.62 !important;\n  max-height:none !important;\n}\n\n/* 개인 탭 본문이 없어서 생기던 빈 줄 방지 */\n#dailyBriefLead:emp /^\\d{4}-\\d{2}-\\d{2}$/.test(d) ? d : '';\n  }\n  function logDate(log){\n    return cleanDate(log \u0026\u0026 (log.date || log.created)) || LEGACY_LOG_DATE;\n  }\n  function selectedDate(){\n    try{\n      return cleanDate(currentDateISO) || LEGACY_LOG_DATE;\n    }catch(e){\n      return LEGACY_LOG_DATE;\n    }\n  }\n  function selectedLabel(){\n    try{\n      const d = parseISODate(selectedDate());\n      const todayISO = dateKey(new Date());\n      if(selectedDate() === todayISO) return '오늘';\n      return (d.getMonth()+1) + '.' + d.getDate();\n    }catch(e){\n      return '선택일';\n    }\n  }\n  function normalizeLogDates(){\n    try{\n      if(typeof data==='undefined' || !data || !Array.isArray(data.logs)) return;\n      let changed = false;\n      data.logs.forEach(function(log){\n        if(!cleanDate(log.date || log.created)){\n          log.date = LEGACY_LOG_DATE;\n          changed = true;\n        }else if(!log.date \u0026\u0026 log.created){\n          log.date = log.created;\n          changed = true;\n        }\n      });\n      if(changed \u0026\u0026 typeof saveLocalOnly === 'function') saveLocalOnly();\n    }catch(e){\n      console.warn(e);\n    }\n  }\n  function logsForSelectedDate(){\n    try{\n      normalizeLogDates();\n      const iso = selectedDate();\n      return ((typeof data!=='undefined' \u0026\u0026 data \u0026\u0026 Array.isArray(data.logs)) ? data.logs : []).filter(function(log){\n        return logDate(log) === iso;\n      });\n    }catch(e){\n      return [];\n    }\n  }\n\n  window.workLogsForSelectedDateV322 = logsForSelectedDate;\n\n  const oldSetCurrentDate = typeof setCurrentDate === 'function' ? setCurrentDate : null;\n  window.setCurrentDate = setCurrentDate = function(iso){\n    if(oldSetCurrentDate) oldSetCurrentDate(iso);\n    else currentDateISO = iso;\n    normalizeLogDates();\n    setTimeout(function(){\n      if(typeof window.cosRefreshTabBriefV321 === 'function'){\n        try{ window.cosRefreshTabBriefV321(''); } \n    if(byId('statLogMiss')) byId('statLogMiss').textContent = remain + '건';\n    if(byId('statMoney')) byId('statMoney').textContent = later + '건';\n  };\n\n  window.renderLogs = renderLogs = function(){\n    const arr = logsForSelectedDate();\n    const logCount = byId('logCount');\n    const logList = byId('logList');\n    const logCard = byId('logCard');\n    const logEditBtn = byId('logEditBtn');\n    const headTitle = logCard ? logCard.querySelector('.head-title') : null;\n    const label = selectedLabel();\n\n    if(headTitle) headTitle.textContent = label + ' 업무 일지';\n    if(logCount) logCount.textContent = arr.length + '건';\n    if(!logList) return;\n\n    logList.innerHTML = arr.map(function(l){\n      const real = data.logs.indexOf(l);\n      const cat = ['KRP','WSW','PWR','CDE'].includes(l.cat) ? l.cat : 'KRP';\n\n      if(logEdit){\n        return '\u003cdiv class=\"log-row\" draggable=\"true\" ondragstart=\"dragLog(event,'+real+')\" ondragend=\"event.currentTarget.classList.remove(\u0026quot;dragging\u0026quot;)\" ondragover=\"event.preventDefault()\" ondrop=\"dropLog(event,'+real+')\"\u003e'+\n          '\u003cbutton class=\"check '+(l.done?'on':'')+'\" onclick=\"data.logs['+real+'].done=!data.logs['+real+'].done;save();renderAll()\"\u003e✓\u003c/button\u003e'+\n          '\u003cdiv class=\"log-main\"\u003e'+\n            '\u003cinput class=\"log-title-input\" value=\"'+esc(l.title)+'\" onchange=\"data.logs['+real+'].title=this.value;save()\"\u003e'+\n            '\u003cdiv class=\"log-edit-sub\"\u003e'+\n              '\u003cinput value=\"'+esc(l.start||'')+'\" placeholder=\"시작\" onchange=\"updateLogTime('+real+',\u0026quot;start\u0026quot;,this.value)\"\u003e'+\n              '\u003cinput value=\"'+esc(l.end||'')+'\" placeholder=\"종료\" onchange=\"updateLogTime('+real+',\u0026quot;end\u0026quot;,this.value)\"\u003e'+\n              '\u003cinput type=\"number\" value=\"'+(Number(l.minutes)||calcMinutes(l.start,l.end)||0)+'\" placeholder=\"분 자동\" read ogs[i]) return;\n    data.logs[i][key] = val;\n    if(!cleanDate(data.logs[i].date || data.logs[i].created)) data.logs[i].date = selectedDate();\n    const mins = calcMinutes(data.logs[i].start, data.logs[i].end);\n    if(mins) data.logs[i].minutes = mins;\n    save();\n    renderAll();\n  };\n\n  function bindDateSpecificAddLog(){\n    const btn = byId('addLogBtn');\n    if(!btn || btn.__v322DateAddBound) return;\n    btn.__v322DateAddBound = true;\n    btn.onclick = function(){\n      const titleEl = byId('newLogTitle');\n      const title = titleEl ? titleEl.value.trim() : '';\n      if(!title) return;\n      const start = byId('newLogStart') ? byId('newLogStart').value.trim() : '';\n      const end = byId('newLogEnd') ? byId('newLogEnd').value.trim() : '';\n      const minutes = calcMinutes(start,end) || Number((byId('newLogMin') || {}).value || 0);\n      const cat = byId('newLogCat') ? byId('newLogCat').value : 'KRP';\n      if(typeof data==='undefined' || !data) return; if(!Array.isArray(data.logs)) data.logs = [];\n      data.logs.push({\n        title:title,\n        start:start,\n        end:end,\n        minutes:minutes,\n        cat:cat,\n        done:false,\n        date:selectedDate()\n      });\n      ['newLogTitle','newLogMin','newLogStart','newLogEnd'].forEach(function(id){\n        const el = byId(id);\n        if(el) el.value = '';\n      });\n      save();\n      renderAll();\n    };\n  }\n\n  function removeLegacyArchive(){\n    const archives = Array.prototype.slice.call(document.querySelectorAll('section.card.archive,.card.archive'));\n    archives.forEach(function(card){\n      const prev = card.previousElementSibling;\n      if(prev \u0026\u0026 prev.classList.contains('section-header')) prev.remove();\n      card.remove();\n    });\n  }\n\n  function boot(){\n    normalizeLogDates();\n    bindDateSpecificAddLog();\n    removeLegacyArchive();\n    if(typeof renderAll === 'function') renderAll();\n  }\n\n  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);\n  else boot();\n\n  setTimeout(boot, 500);\n  setTimeout(boot, 1800);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v323-unified-top-controls\"\u003e\n:root{--cos-top-accent:#f97316;--cos-top-accent-soft:rgba(249,115,22,.14);}\n\n/* v3.23: 상단 새로고침, 날짜 모달 4개 탭 공통 */\n.top .google-live,\n.top button.sync-dot,\n.top #syncStatus.google-live,\n.top #googleLive{\n  cursor:pointer !important;\n  user-select:none !important;\n  transition:transform .12s ease, opacity .12s ease, background .12s ease !important;\n}\n.top .google-live:active,\n.top button.sync-dot:active,\n.top #syncStatus.google-live:active,\n.top #googleLive:active{\n  transform:scale(.96) !important;\n}\n.top .google-live.cos-loading i,\n.top button.sync-dot.cos-loading i,\n.top #syncStatus.cos-loading i,\n.top #googleLive.cos-loading i{\n  animation:cosTopPulse .85s ease-in-out infinite alternate !important;\n}\n@keyframes cosTopPulse{\n  from{opacity:.45; transform:scale(.85);}\n  to{opacity:1; transform:scale(1.2);}\n}\n\n.cos-top-date-backdrop{\n  position:fixed !important;\n  inset:0 !important;\n  z-index:120 !important;\n  display:none !important;\n  align-items:center !important;\n  justify-content:center !important;\n  padding:24px !important;\n  background:rgba(15,23,42,.28) !important;\n  backdrop-filter:blur(12px) !important;\n  -webkit-backdrop-filter:blur(12px) !important;\n}\n.cos-top-date-backdrop.open{\n  display:flex !important;\n}\n.cos-top-date-modal{\n  width:100% !important;\n  max-width:320px !important;\n  background:#fff !important;\n  border-radius:24px !important;\n  padding:15px !important;\n  box-shadow:0 22px 60px rgba(15,23,42,.24) !important;\n}\n.cos-top-date-head{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:10px !important;\n  margin-bottom:10px !important;\n}\n.cos-top-date-title{\n  font-size:15px !important;\n  font-weight:950 !important;\n  color:#111827 !important;\n  letter-spacing:-.45px !important;\n}\n.cos-top-date-arrow{\n  width:30px !important;\n  height:30px !important;\n  border-radius:50% !important;\n  border:0 !important;\n  background:#f3f5f9 !important;\n  color:#596375 !important;\n  font-size:19px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n}\n.cos-top-date-week{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:4px !important;\n  margin-bottom:5px !important;\n}\n.cos-top-date-week span{\n  text-align:center !important;\n  color:#9aa4b4 !important;\n  font-size:10px !important;\n  font-weight:900 !important;\n}\n.cos-top-date-grid{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:5px !important;\n}\n.cos-top-date-day{\n  height:34px !important;\n  border:0 !important;\n  border-radius:12px !important;\n  background:#f7f8fb !important;\n  color:#445064 !important;\n  font-size:12px !important;\n  font-weight:900 !important;\n  line-height:1 !important;\n}\n.cos-top-date-day.muted{\n  color:#c0c6d0 !important;\n  background:#fafbfc !important;\n}\n.cos-top-date-day.today{\n  color:var(--cos-top-accent) !important;\n  background:var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-day.selected{\n  color:#fff !important;\n  background:var(--cos-top-accent) !important;\n  box-shadow:0 8px 18px var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-foot{\n  display:flex !important;\n  gap:8px !important;\n  margin-top:12px !important;\n}\n.cos-top-date-foot button{\n  flex:1 !important;\n  height:36px !important;\n  border-radius:12px !important;\n  border:0 !important;\n  font-size:12px !important;\n  font-weight:950 !important;\n}\n.cos-top-date-today{\n  background:var(--cos-top-accent-soft) !important;\n  color:var(--cos-top-accent) !important;\n}\n.cos-top-date-close{\n  background:#f2f4f8 !important;\n  color:#687386 !important;\n}\n\u003c/style\u003e\n\n\n\u003cdiv class=\"cos-top-date-backdrop\" id=\"cosTopDateBackdrop\" aria-hidden=\"true\"\u003e\n  \u003cdiv class=\"cos-top-date-modal\" role=\"dialog\" aria-modal=\"true\"\u003e\n    \u003cdiv class=\"cos-top-date-head\"\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDatePrev\"\u003e‹\u003c/button\u003e\n      \u003cdiv class=\"cos-top-date-title\" id=\"cosTopDateTitle\"\u003e2026. 6\u003c/div\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDateNext\"\u003e›\u003c/button\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-week\"\u003e\n      \u003cspan\u003e일\u003c/span\u003e\u003cspan\u003e월\u003c/span\u003e\u003cspan\u003e화\u003c/span\u003e\u003cspan\u003e수\u003c/span\u003e\u003cspan\u003e목\u003c/span\u003e\u003cspan\u003e금\u003c/span\u003e\u003cspan\u003e토\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-grid\" id=\"cosTopDateGrid\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-foot\"\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-today\" id=\"cosTopDateToday\"\u003e오늘\u003c/button\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-close\" id=\"cosTopDateClose\"\u003e닫기\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\n\u003cscript id=\"cos-v323-unified-top-controls-js\"\u003e\n(function(){\n  const TAB = \"work\";\n  const DAY_NAMES = ['일','월','화','수','목','금','토'];\n  let viewDate = new Date();\n\n  function pad(n){ return String(n).padStart(2,'0'); }\n  function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }\n  function fromISO(iso){ return new Date(String(iso).slice(0,10)+'T00:00:00'); }\n  function labelDate(d){ return (d.getMonth()+1)+'.'+d.getDate()+' '+DAY_NAMES[d.getDay()]; }\n  function qs(s){ return document.querySelector(s); }\n  function qsa(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }\n\n  function getTopDateButton(){\n    return qs('.top .top-date-btn') || qs('#topDatePickerBtn') || qs('#dailyDateBtn');\n  }\n\n  function getSyncButton(){\n    return qs('.top button.google-live') || qs('.top button.sync-dot') || qs('.top #googleLive') || qs('.top #syncStatus');\n  }\n\n  function getStatusLine(){\n    return qs('.top .sync-status') || qs('#syncFullStatus') || qs('.cos-sync-line') || qs('.status-line');\n  }\n\n  function getTimeSpan(){\n    return qs('#googleSyncTime') || qs('#syncTime') || qs('.top .google-live span') || qs('.top button.sync-dot span');\n  }\n\n  function currentSelectedDate(){\n    try{\n      if(typeof window.COS_SELECTED_DATE_KEY==='function'){\n        const iso=window.COS_SELECTED_DATE_KEY();\n        if(iso) return fromISO(iso);\n      }\n      if(TAB==='calendar' \u0026\u0026 typeof dateFor==='function' \u0026\u0026 typeof cur!=='undefined') return dateFor(cur);\n      if(TAB==='work' \u0026\u0026 typeof currentDateISO!=='undefined') return fromISO(currentDateISO);\n      if(TAB==='personal' \u0026\u0026 typeof dateForDay==='function' \u0026\u0026 typeof cur!=='undefined') return dateForDay(cur);\n      const stored = localStorage.getItem('brief_selected_date_v323');\n      if(TAB==='brief' \u0026\u0026 stored) return fromISO(stored);\n    }catch(e){}\n    const btn=getTopDateButton();\n    if(btn){\n      const m=String(btn.textContent||'').match(/(\\d{1,2})\\.(\\d{1,2})/);\n      if(m){\n        const now=new Date();\n        return new Date(now.getFullYear(), Number(m[1])-1, Number(m[2]));\n      }\n    }\n    return new Date();\n  }\n\n  function setTopDateText(d){\n    const btn=getTopDateButton();\n    if(btn) btn.textContent=labelDate(d);\n  }\n\n  function setTopSyncState(state, message){\n    const live=getSyncButton();\n    const time=getTimeSpan();\n    const line=getStatusLine();\n    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});\n    if(live){\n      live.classList.remove('cos-loading','loading','fail','synced','idle');\n      if(state==='loading') live.classList.add('cos-loading','loading');\n      else if(state==='fail') live.classList.add('fail');\n      else live.classList.add('synced');\n    }\n    if(time) time.textContent = state==='loading' ? '연동 중' : now;\n    if(line){\n      line.style.display='block';\n      if(state==='loading') line.textContent = message || 'Google / Gemini 실시간 연동 중...';\n      else if(state==='fail') line.textContent = message || 'Google / Gemini 연동 오류 · 다시 시도하세요.';\n      else line.textContent = message || 'Google / Gemini 실시간 연동 완료 · ' + now;\n    }\n  }\n\n  async function maybeCall(name){\n    try{\n      const fn = window[name];\n      if(typeof fn === 'function') return await Promise.resolve(fn());\n    }catch(e){\n      console.warn(name, e);\n      throw e;\n    }\n    return null;\n  }\n\n  async function refreshTop(){\n    setTopSyncState('loading');\n    try{\n      if(TAB==='brief'){\n        await maybeCall('refreshGeminiBrief');\n      }else if(TAB==='calendar'){\n        await maybeCall('loadGoogleCalendar');\n        await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='work'){\n        if(typeof loadWorkDataFromSheets==='function') await maybeCall('loadWorkDataFromSheets');\n        if(typeof loadGoogleTasks==='function') await maybeCall('loadGoogleTasks');\n        if(typeof cosRefreshTabBriefV321==='function'){ try{ await maybeCall('cosRefreshTabBriefV321'); }catch(briefErr){ console.warn('brief refresh failed (non-fatal)', briefErr); } }\n      }else if(TAB==='personal'){\n        if(typeof saveThenReloadGoogle==='function') await maybeCall('saveThenReloadGoogle');\n        else if(typeof checkGoogleHealth==='function') await maybeCall('checkGoogleHealth');\n        if(typeof loadChecklistFromGoogle==='function') await maybeCall('loadChecklistFromGoogle');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }\n      setTopSyncState('synced');\n    }catch(e){\n      console.warn(e);\n      setTopSyncState('fail');\n    }\n  }\n\n  function openTopDate(){\n    const d=currentSelectedDate();\n    viewDate=new Date(d.getFullYear(), d.getMonth(), 1);\n    renderTopDate();\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.add('open');\n      bd.setAttribute('aria-hidden','false');\n    }\n  }\n\n  function closeTopDate(){\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.remove('open');\n      bd.setAttribute('aria-hidden','true');\n    }\n  }\n\n  function renderTopDate(){\n    const title=qs('#cosTopDateTitle');\n    const grid=qs('#cosTopDateGrid');\n    if(!title || !grid) return;\n    const y=viewDate.getFullYear();\n    const m=viewDate.getMonth();\n    title.textContent=y+'. '+(m+1);\n\n    const first=new Date(y,m,1);\n    const start=new Date(first);\n    start.setDate(first.getDate()-first.getDay());\n\n    const selectedISO=toISO(currentSelectedDate());\n    const todayISO=toISO(new Date());\n    let html='';\n    for(let i=0;i\u003c42;i++){\n      const d=new Date(start);\n      d.setDate(start.getDate()+i);\n      const iso=toISO(d);\n      const cls=['cos-top-date-day'];\n      if(d.getMonth()!==m) cls.push('muted');\n      if(iso===todayISO) cls.push('today');\n      if(iso===selectedISO) cls.push('selected');\n      html+='\u003cbutton type=\"button\" class=\"'+cls.join(' ')+'\" data-cos-date=\"'+iso+'\"\u003e'+d.getDate()+'\u003c/button\u003e';\n    }\n    grid.innerHTML=html;\n    qsa('[data-cos-date]').forEach(function(btn){\n      btn.onclick=function(){ applyTopDate(btn.dataset.cosDate); };\n    });\n  }\n\n  function applyTopDate(iso){\n    const d=fromISO(iso);\n    setTopDateText(d);\n\n    try{\n      if(typeof window.COS_SELECT_DATE==='function' \u0026\u0026 TAB!=='brief'){\n        window.COS_SELECT_DATE(iso);\n      }else if(TAB==='calendar' \u0026\u0026 typeof setWeekByDate==='function'){\n        setWeekByDate(iso);\n      }else if(TAB==='work'){\n        if(typeof setCurrentDate==='function') setCurrentDate(iso);\n        else window.currentDateISO = iso;\n        if(typeof renderAll==='function') renderAll();\n        else if(typeof window.renderAll==='function') window.renderAll();\n      }else if(TAB==='personal'){\n        if(typeof selectDailyDate==='function') selectDailyDate(d);\n        else if(typeof window.selectDailyDate==='function') window.selectDailyDate(d);\n        else if(typeof renderAll==='function') renderAll();\n        else if(typeof window.renderAll==='function') window.renderAll();\n      }else{\n        localStorage.setItem('brief_selected_date_v323', iso);\n        if(typeof refreshGeminiBrief==='function') refreshGeminiBrief();\n      }\n    }catch(e){\n      console.warn(e);\n    }\n\n    closeTopDate();\n    setTimeout(function(){\n      if(TAB!=='brief') refreshTop();\n    }, 350);\n  }\n\n  function bindTopControls(){\n    const syncBtn=getSyncButton();\n    if(syncBtn \u0026\u0026 !syncBtn.__cosV323Bound){\n      syncBtn.__cosV323Bound=true;\n      syncBtn.onclick=null;\n      syncBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        refreshTop();\n      }, true);\n    }\n\n    const dateBtn=getTopDateButton();\n    if(dateBtn \u0026\u0026 !dateBtn.__cosV323Bound){\n      dateBtn.__cosV323Bound=true;\n      dateBtn.onclick=null;\n      dateBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        openTopDate();\n      }, true);\n    }\n\n    const prev=qs('#cosTopDatePrev');\n    const next=qs('#cosTopDateNext');\n    const today=qs('#cosTopDateToday');\n    const close=qs('#cosTopDateClose');\n    const bd=qs('#cosTopDateBackdrop');\n\n    if(prev \u0026\u0026 !prev.__cosV323Bound){\n      prev.__cosV323Bound=true;\n      prev.onclick=function(){ viewDate.setMonth(viewDate.getMonth()-1); renderTopDate(); };\n    }\n    if(next \u0026\u0026 !next.__cosV323Bound){\n      next.__cosV323Bound=true;\n      next.onclick=function(){ viewDate.setMonth(viewDate.getMonth()+1); renderTopDate(); };\n    }\n    if(today \u0026\u0026 !today.__cosV323Bound){\n      today.__cosV323Bound=true;\n      today.onclick=function(){ applyTopDate(toISO(new Date())); };\n    }\n    if(close \u0026\u0026 !close.__cosV323Bound){\n      close.__cosV323Bound=true;\n      close.onclick=closeTopDate;\n    }\n    if(bd \u0026\u0026 !bd.__cosV323Bound){\n      bd.__cosV323Bound=true;\n      bd.addEventListener('click', function(e){\n        if(e.target===bd) closeTopDate();\n      });\n    }\n\n    setTopDateText(currentSelectedDate());\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindTopControls);\n  else bindTopControls();\n\n  setTimeout(bindTopControls, 500);\n  setTimeout(bindTopControls, 1600);\n  setTimeout(bindTopControls, 3200);\n\n  window.cosOpenUnifiedTopDateV323=openTopDate;\n  window.cosRefreshUnifiedTopV323=refreshTop;\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v324-gemini-actual-test-style\"\u003e\n.cos-actual-test-card{\n  margin-top:12px;\n  padding:13px;\n  border-radius:18px;\n  background:#fff;\n  border:1px solid rgba(17,24,39,.06);\n  box-shadow:0 7px 22px rgba(15,23,42,.05);\n}\n.cos-actual-test-head{\n  display:flex;\n  align-items:flex-start;\n  justify-content:space-between;\n  gap:10px;\n}\n.cos-actual-test-title{\n  font-size:12px;\n  line-height:1.3;\n  font-weight:950;\n  letter-spacing:-.25px;\n  color:#111827;\n}\n.cos-actual-test-sub{\n  margin-top:4px;\n  font-size:10.5px;\n  line-height:1.45;\n  font-weight:750;\n  color:#8a95a8;\n}\n.cos-actual-test-pill{\n  flex:0 0 auto;\n  height:23px;\n  padding:0 8px;\n  border-radius:999px;\n  display:inline-flex;\n  align-items:center;\n  justify-content:center;\n  font-size:9.5px;\n  font-weight:950;\n  color:var(--cos-accent,#3d7eff);\n  background:var(--cos-soft,rgba(61,126,255,.12));\n}\n.cos-actual-test-actions{\n  margin-top:10px;\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:8px;\n}\n.cos-actual-test-actions button{\n  min-height:36px;\n  border:0;\n  border-radius:12px;\n  background:#f7f8fb;\n  color:#596375;\n  font-size:11px;\n  line-height:1.25;\n  font-weight:950;\n}\n.cos-actual-test-actions button.primary{\n  background:var(--cos-accent,#3d7eff);\n  color:#fff;\n}\n.cos-actual-test-foot{\n  margin-top:9px;\n  padding-top:9px;\n  border-top:1px solid rgba(17,24,39,.06);\n  font-size:10px;\n  line-height:1.45;\n  font-weight:750;\n  color:#9aa4b4;\n}\n\u003c/style\u003e\n\n\n\n\u003cstyle id=\"cos-work-todo-due-v1\"\u003e\n/* COS patch: 해야 할 일을 오늘 기준으로 그룹화 */\n.todo-scope-note{\n  padding:12px 18px 11px;\n  background:#fbfcfe;\n  border-bottom:1px solid var(--line);\n  color:#111827;\n  font-size:12px;\n  font-weight:950;\n  line-height:1.25;\n  letter-spacing:-.2px;\n}\n.todo-scope-note span{\n  display:block;\n  margin-top:4px;\n  color:#8a95a8;\n  font-size:10px;\n  font-weight:800;\n  line-height:1.35;\n}\n.todo-group-label{\n  display:flex;\n  align-items:center;\n  justify-content:space-between;\n  gap:10px;\n  padding:10px 18px 7px;\n  background:#fbfcfe;\n  border-top:1px solid var(--line);\n  color:#8a95a8;\n  font-size:10px;\n  font-weight:950;\n  letter-spacing:.9px;\n  text-transform:uppercase;\n}\n.todo-group-label:first-child,\n.todo-scope-note + .todo-group-label{border-top:0!important}\n.todo-group-label b{font-size:10px;font-weight:950;color:#8a95a8;white-space:nowrap}\n.todo-group-label span{font-size:10px;font-weight:950;color:#596375;white-space:nowrap}\n.todo-group-label.today b{color:var(--orange)}\n.todo-group-label.overdue b{color:var(--red)}\n.todo-group-label.future b{color:#3d7eff}\n.todo-group-label.nodue b{color:#596375}\n.later-check-list \u003e .todo-group-label + .later-check-row{border-top:0!important}\n.later-check-row.todo-overdue .later-check-sub{color:var(--red)!important}\n.later-check-row.todo-today .later-check-sub{color:var(--orange)!important}\n.later-check-row.todo-future .later-check-sub{color:#3d7eff!important}\n.later-mini-date{\n  width:118px;\n  max-width:100%;\n  height:22px;\n  padding:0;\n  border:0;\n  background:transparent;\n  color:#8a95a8;\n  font-size:10.5px;\n  font-weight:850;\n  outline:none;\n}\n.todo-editor-buttons{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}\n.todo-editor-buttons .btn{width:100%!important;margin-top:0!important}\n.todo-editor-buttons .btn.light{\n  background:#fff!important;\n  color:#687386!important;\n  border:1px solid var(--line2)!important;\n}\n@media(max-width:370px){\n  .todo-editor-buttons{grid-template-columns:1fr}\n}\n\u003c/style\u003e\n\u003cscript id=\"cos-work-todo-due-patch\"\u003e\n(function(){\n  function el(id){return document.getElementById(id)}\n  function htmlEsc(s){\n    return String(s==null?'':s).replaceAll('\u0026','\u0026amp;').replaceAll('\"','\u0026quot;').replaceAll('\u003c','\u0026lt;').replaceAll('\u003e','\u0026gt;');\n  }\n  function cleanISO(v){\n    if(!v) return '';\n    var s=String(v).trim();\n    if(!s) return '';\n    var m=s.match(/^(\\d{4}-\\d{2}-\\d{2})/);\n    if(m) return m[1];\n    var d=new Date(s);\n    if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n    return '';\n  }\n  function selDate(){\n    try{return cleanISO(currentDateISO)||new Date().toISOString().slice(0,10)}catch(e){return new Date().toISOString().slice(0,10)}\n  }\n  function md(iso){\n    iso=cleanISO(iso);\n    if(!iso) return '';\n    var p=iso.split('-');\n    return Number(p[1])+'.'+Number(p[2]);\n  }\n  function diffDays(a,b){\n    a=cleanISO(a); b=cleanISO(b);\n    if(!a||!b) return 0;\n    var da=new Date(a+'T00:00:00');\n    var db=new Date(b+'T00:00:00');\n    return Math.round((da-db)/86400000);\n  }\n  function taskDueDate(x){\n    return cleanISO(x \u0026\u0026 (x.due || x.googleTaskDue || x.date || x.deadline));\n  }\n  function taskCreatedDate(x){\n    return cleanISO(x \u0026\u0026 (x.created || x.updated));\n  }\n  function taskStatus(x){\n    var due=taskDueDate(x), selected=selDate();\n    if(!due) return 'nodue';\n    if(due\u003cselected) return 'overdue';\n    if(due===selected) return 'today';\n    return 'future';\n  }\n  function taskDueLabel(x){\n    var due=taskDueDate(x), selected=selDate();\n    if(!due) return '마감일 없음';\n    if(due===selected) return '오늘 마감 · '+md(due);\n    if(due\u003cselected){\n      var n=Math.max(1,diffDays(selected,due));\n      return '마감 지남 D+'+n+' · '+md(due);\n    }\n    var d=Math.max(1,diffDays(due,selected));\n    return '마감 D-'+d+' · '+md(due);\n  }\n  function taskSort(a,b){\n    var sa=taskStatus(a), sb=taskStatus(b);\n    var order={today:0,overdue:1,future:2,nodue:3};\n    if(order[sa]!==order[sb]) return order[sa]-order[sb];\n    var da=taskDueDate(a)||'9999-99-99', db=taskDueDate(b)||'9999-99-99';\n    if(da!==db) return da.localeCompare(db);\n    return String(a.title||'').localeCompare(String(b.title||''),'ko');\n  }\n  function bucketTasks(items){\n    var open=(items||[]).filter(function(x){return !x.done}).sort(taskSort);\n    var buckets={today:[],overdue:[],future:[],nodue:[]};\n    open.forEach(function(x){buckets[taskStatus(x)].push(x)});\n    return buckets;\n  }\n  function listItems(){\n    try{ if(typeof googleTasksLoaded!=='undefined' \u0026\u0026 googleTasksLoaded) return googleTaskCache || []; }catch(e){}\n    try{ return (data \u0026\u0026 data.laterChecks) || []; }catch(e){ return []; }\n  }\n  function catOf(x){\n    try{return x.cat || guessTaskCat(x.title||'') || 'KRP'}catch(e){return x.cat||'KRP'}\n  }\n  function titleOf(x){\n    try{return cleanTaskTitle(x.title||'')}catch(e){return x.title||''}\n  }\n\n  try{\n    normalizeGoogleTask=function(t){\n      var due=cleanISO(t \u0026\u0026 t.due);\n      return {\n        id:t.id,\n        title:t.title || '',\n        cat:t.cat || (typeof guessTaskCat==='function'?guessTaskCat(t.title||''):'KRP'),\n        created:cleanISO(t.created || t.updated) || selDate(),\n        updated:t.updated || '',\n        due:due,\n        googleTaskDue:due,\n        dueLabel:due?taskDueLabel({due:due}):'마감일 없음',\n        done:t.status==='completed' || !!t.done,\n        source:'google'\n      };\n    };\n  }catch(e){}\n\n  try{\n    addLater=function(){\n      var title=el('newLaterTitle')\u0026\u0026el('newLaterTitle').value.trim();\n      var cat=(el('newLaterCat')\u0026\u0026el('newLaterCat').value)||'KRP';\n      var due=cleanISO(el('newLaterDue')\u0026\u0026el('newLaterDue').value) || selDate();\n      if(!title) return;\n      if(!data.laterChecks) data.laterChecks=[];\n      data.laterChecks.push({title:title,cat:cat,created:selDate(),due:due,done:false});\n      save(); renderLater(); renderHero();\n    };\n  }catch(e){}\n\n  window.addGoogleLaterNoDue=async function(){\n    var title=el('newLaterTitle')\u0026\u0026el('newLaterTitle').value.trim();\n    var cat=(el('newLaterCat')\u0026\u0026el('newLaterCat').value)||'KRP';\n    if(!title) return;\n    if(!WORK_API_URL){\n      if(!data.laterChecks) data.laterChecks=[];\n      data.laterChecks.push({title:title,cat:cat,created:selDate(),due:'',done:false});\n      save(); renderLater(); renderHero();\n      return;\n    }\n    try{\n      setWorkSyncStatus('loading','Google Tasks에 마감 없는 작업 저장 중...');\n      await workApi('addTask',{title:buildTaskTitle(title,cat),cat:cat,due:''});\n      if(el('newLaterTitle')) el('newLaterTitle').value='';\n      await loadGoogleTasks();\n    }catch(err){\n      console.error(err);\n      setWorkSyncStatus('fail','마감 없는 작업 저장 실패');\n    }\n  };\n\n  try{\n    addGoogleLater=async function(){\n      var title=el('newLaterTitle')\u0026\u0026el('newLaterTitle').value.trim();\n      var cat=(el('newLaterCat')\u0026\u0026el('newLaterCat').value)||'KRP';\n      var due=cleanISO(el('newLaterDue')\u0026\u0026el('newLaterDue').value) || selDate();\n      if(!title) return;\n      if(!WORK_API_URL){ addLater(); return; }\n      try{\n        setWorkSyncStatus('loading','Google Tasks에 선택 날짜 마감으로 저장 중...');\n        await workApi('addTask',{title:buildTaskTitle(title,cat),cat:cat,due:due});\n        if(el('newLaterTitle')) el('newLaterTitle').value='';\n        await loadGoogleTasks();\n      }catch(err){\n        console.error(err);\n        setWorkSyncStatus('fail','addTask 실패');\n      }\n    };\n  }catch(e){}\n\n  try{\n    renderLater=function(){\n      var items=listItems();\n      var doneItems=items.filter(function(x){return x.done});\n      var buckets=bucketTasks(items);\n      var selected=selDate();\n      var tagCls=function(cat){return String(cat||'KRP').toLowerCase()};\n      var groupMeta={\n        today:['today','오늘 마감', selected.replace(/^\\d{4}-/,'').replace('-','.')],\n        overdue:['overdue','지연된 마감','먼저 처리'],\n        future:['future','마감일 있음','예정'],\n        nodue:['nodue','마감일 없음','날짜 지정 필요']\n      };\n      function row(x,isDone){\n        var real=items.indexOf(x);\n        var status=taskStatus(x);\n        var checked=x.done?'on':'';\n        var doneCls=isDone?' done':'';\n        var title=htmlEsc(titleOf(x));\n        var due=taskDueDate(x);\n        var date=htmlEsc(taskDueLabel(x));\n        var cat=htmlEsc(catOf(x));\n        var catClass=tagCls(cat);\n        var id=htmlEsc(x.id||real);\n        var isGoogle=x.source==='google';\n        var toggleAction=isGoogle?`toggleGoogleLater('${id}',${!x.done})`:`data.laterChecks[${real}].done=!data.laterChecks[${real}].done;save();renderLater();renderHero()`;\n        var deleteAction=isGoogle?`deleteGoogleLater('${id}')`:`data.laterChecks.splice(${real},1);save();renderLater();renderHero()`;\n        var dueEditor=isGoogle\n          ? `${date} · Google Tasks`\n          : `\u003cinput class=\"later-mini-date\" type=\"date\" value=\"${htmlEsc(due)}\" onchange=\"data.laterChecks[${real}].due=this.value;save();renderLater();renderHero()\"\u003e`;\n        if(laterEdit){\n          return `\u003cdiv class=\"later-check-row todo-${status}${doneCls}\"\u003e\n            \u003cbutton class=\"later-check-box ${checked}\" onclick=\"${toggleAction}\"\u003e✓\u003c/button\u003e\n            \u003cdiv class=\"later-check-main\"\u003e\n              \u003cinput class=\"later-input\" value=\"${title}\" ${isGoogle?'readonly title=\"Google Tasks 항목 제목 수정은 아직 미지원\"':`onchange=\"data.laterChecks[${real}].title=this.value;save();renderLater()\"`}\u003e\n              \u003cdiv class=\"later-check-sub\"\u003e${dueEditor}\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cspan class=\"later-check-tag ${catClass}\"\u003e${cat}\u003c/span\u003e\n            \u003cbutton class=\"later-del\" onclick=\"${deleteAction}\"\u003e×\u003c/button\u003e\n          \u003c/div\u003e`;\n        }\n        return `\u003cdiv class=\"later-check-row todo-${status}${doneCls}\"\u003e\n          \u003cbutton class=\"later-check-box ${checked}\" onclick=\"${toggleAction}\"\u003e✓\u003c/button\u003e\n          \u003cdiv class=\"later-check-main\"\u003e\n            \u003cdiv class=\"later-check-title\"\u003e${title}\u003c/div\u003e\n            \u003cdiv class=\"later-check-sub\"\u003e${date}${isGoogle?' · Google Tasks':''}\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cspan class=\"later-check-tag ${catClass}\"\u003e${cat}\u003c/span\u003e\n        \u003c/div\u003e`;\n      }\n      function group(name,arr){\n        if(!arr.length) return '';\n        var m=groupMeta[name];\n        return `\u003cdiv class=\"todo-group-label ${m[0]}\"\u003e\u003cb\u003e${m[1]}\u003c/b\u003e\u003cspan\u003e${m[2]} · ${arr.length}건\u003c/span\u003e\u003c/div\u003e`+arr.map(function(x){return row(x,false)}).join('');\n      }\n      var openHtml = group('today',buckets.today)+group('overdue',buckets.overdue)+group('future',buckets.future)+group('nodue',buckets.nodue);\n      if(!openHtml) openHtml='\u003cdiv class=\"later-empty\"\u003e오늘 확인할 To-Do가 없습니다.\u003c/div\u003e';\n      var doneHtml=doneItems.length?`\u003cdiv class=\"complete-fold ${laterCompletedOpen?'open':''}\"\u003e\n        \u003cbutton class=\"complete-fold-toggle\" onclick=\"laterCompletedOpen=!laterCompletedOpen;renderLater()\"\u003e\n          \u003cspan\u003e이 날 완료한 To-Do\u003c/span\u003e\u003cb\u003e${doneItems.length}건\u003c/b\u003e\n        \u003c/button\u003e\n        \u003cdiv class=\"complete-fold-body\"\u003e${doneItems.sort(taskSort).map(function(x){return row(x,true)}).join('')}\u003c/div\u003e\n      \u003c/div\u003e`:'';\n      var wrap=el('laterWrap');\n      if(!wrap) return;\n      wrap.innerHTML=`\u003csection class=\"later-card ${laterEdit?'edit-mode':''}\"\u003e\n        \u003cdiv class=\"later-check-list\"\u003e\n          ${openHtml}${doneHtml}\n        \u003c/div\u003e\n        \u003cdiv class=\"later-editor\"\u003e\n          \u003cdiv class=\"edit-grid\"\u003e\n            \u003cinput class=\"input\" id=\"newLaterTitle\" placeholder=\"To-Do 내용\"\u003e\n            \u003cselect class=\"select\" id=\"newLaterCat\"\u003e\u003coption\u003eKRP\u003c/option\u003e\u003coption\u003eWSW\u003c/option\u003e\u003coption\u003ePWR\u003c/option\u003e\u003coption\u003eCDE\u003c/option\u003e\u003c/select\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"edit-grid-2\" style=\"margin-top:8px\"\u003e\n            \u003cinput class=\"input\" id=\"newLaterDue\" type=\"date\" value=\"${htmlEsc(selected)}\"\u003e\n            \u003cbutton class=\"btn orange\" style=\"width:100%;margin-top:0\" onclick=\"addGoogleLater()\"\u003e오늘 마감으로 추가\u003c/button\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"todo-editor-buttons\"\u003e\n            \u003cbutton class=\"btn light\" onclick=\"addGoogleLaterNoDue()\"\u003e마감 없이 추가\u003c/button\u003e\n            \u003cbutton class=\"btn light\" onclick=\"if(document.getElementById('newLaterDue'))document.getElementById('newLaterDue').value='${htmlEsc(selected)}'\"\u003e오늘로 맞춤\u003c/button\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"google-sync-note\"\u003e업무 기록은 Google Sheets, To-Do List는 Google Tasks와 연동됩니다. 완료한 To-Do는 아래 접힘 영역에 숨겨집니다.\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/section\u003e`;\n    };\n  }catch(e){console.warn('[TODO-DUE] renderLater override failed',e)}\n\n  try{\n    var _oldRenderHero=renderHero;\n    renderHero=function(){\n      try{_oldRenderHero\u0026\u0026_oldRenderHero()}catch(e){}\n      var items=listItems().filter(function(x){return !x.done});\n      var b=bucketTasks(items);\n      var stat=el('statMoney');\n      if(stat) stat.textContent=String(items.length)+'건';\n      var label=stat\u0026\u0026stat.nextElementSibling;\n      if(label) label.textContent='To-Do';\n      var lead=el('heroLead');\n      if(lead){\n        var parts=[];\n        if(b.today.length) parts.push('선택 날짜 할 일 '+b.today.length+'건');\n        if(b.overdue.length) parts.push('지연 '+b.overdue.length+'건');\n        if(b.nodue.length) parts.push('마감 없음 '+b.nodue.length+'건');\n        if(parts.length) lead.textContent='To-Do는 '+parts.join(' · ')+'입니다. 캘린더 마감/체크와 달리 업무탭에서는 전체 작업함을 날짜 기준으로 정리합니다.';\n      }\n    };\n  }catch(e){}\n\n  window.COS_WORK_TASK_SUMMARY=function(){\n    var items=listItems();\n    var b=bucketTasks(items);\n    return {\n      selectedDate:selDate(),\n      total:items.length,\n      open:items.filter(function(x){return !x.done}).length,\n      today:b.today.length,\n      overdue:b.overdue.length,\n      future:b.future.length,\n      noDue:b.nodue.length,\n      todayTitles:b.today.slice(0,5).map(function(x){return titleOf(x)}),\n      overdueTitles:b.overdue.slice(0,5).map(function(x){return titleOf(x)}),\n      noDueTitles:b.nodue.slice(0,5).map(function(x){return titleOf(x)})\n    };\n  };\n\n  setTimeout(function(){try{renderLater();renderHero()}catch(e){console.warn('[TODO-DUE] rerender failed',e)}},0);\n})();\n\u003c/script\u003e\n\n\n\n\u003cstyle id=\"cos-work-todo-summary-card-v1\"\u003e\n/* COS patch: To-Do List를 Monthly Alba와 같은 카드 헤더 구조로 통일 */\n.later-card.todo-card-unified{\n  background:#fff !important;\n  border:1px solid var(--line) !important;\n  border-radius:20px !important;\n  box-shadow:var(--shadow) !important;\n  overflow:hidden !important;\n  margin-bottom:10px !important;\n}\n.later-card.todo-card-unified .todo-summary{\n  padding:15px 15px 13px !important;\n  background:#fff !important;\n  border-bottom:1px solid var(--line) !important;\n}\n.later-card.todo-card-unified .todo-summary-line{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:10px !important;\n}\n.later-card.todo-card-unified .todo-summary-line b{\n  min-width:0 !important;\n  color:var(--text) !important;\n  font-size:14px !important;\n  line-height:1.25 !important;\n  font-weight:950 !important;\n  letter-spacing:-.35px !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.later-card.todo-card-unified .todo-summary-line span{\n  flex:0 1 auto !important;\n  min-width:0 !important;\n  color:#7b8798 !important;\n  font-size:10.5px !important;\n  line-height:1.25 !important;\n  font-weight:900 !important;\n  text-align:right !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.later-card.todo-card-unified .later-check-list{\n  border:0 !important;\n  border-radius:0 !important;\n  box-shadow:none !important;\n  padding:0 15px !important;\n  margin:0 !important;\n  background:#fff !important;\n}\n.later-card.todo-card-unified .todo-group-label{\n  margin-left:-15px !important;\n  margin-right:-15px !important;\n  padding-left:15px !important;\n  padding-right:15px !important;\n}\n.later-card.todo-card-unified .complete-fold{\n  margin-left:-15px !important;\n  margin-right:-15px !important;\n}\n.later-card.todo-card-unified .complete-fold-toggle{\n  padding-left:15px !important;\n  padding-right:15px !important;\n}\n.later-card.todo-card-unified .complete-fold-body{\n  padding-left:15px !important;\n  padding-right:15px !important;\n}\n.later-card.todo-card-unified .later-editor{\n  margin:10px 15px 15px !important;\n}\n\u003c/style\u003e\n\u003cscript id=\"cos-work-todo-summary-card-v1\"\u003e\n(function(){\n  function el(id){return document.getElementById(id)}\n  function cleanISO(v){\n    if(!v) return '';\n    var s=String(v).trim();\n    var m=s.match(/^(\\d{4}-\\d{2}-\\d{2})/);\n    if(m) return m[1];\n    var d=new Date(s);\n    if(!isNaN(d.getTime())) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n    return '';\n  }\n  function selectedDate(){\n    try{ if(typeof currentDateISO!=='undefined') return cleanISO(currentDateISO); }catch(e){}\n    return new Date().toISOString().slice(0,10);\n  }\n  function items(){\n    try{ if(typeof googleTasksLoaded!=='undefined' \u0026\u0026 googleTasksLoaded) return googleTaskCache || []; }catch(e){}\n    try{ return (data \u0026\u0026 data.laterChecks) || []; }catch(e){ return []; }\n  }\n  function dueOf(x){ return cleanISO(x \u0026\u0026 (x.due || x.googleTaskDue || x.date || x.deadline)); }\n  function statusOf(x){\n    var due=dueOf(x), selected=selectedDate();\n    if(!due) return 'nodue';\n    if(due\u003cselected) return 'overdue';\n    if(due===selected) return 'today';\n    return 'future';\n  }\n  function esc(s){return String(s==null?'':s).replaceAll('\u0026','\u0026amp;').replaceAll('\u003c','\u0026lt;').replaceAll('\u003e','\u0026gt;').replaceAll('\"','\u0026quot;')}\n  function summaryParts(c){\n    var parts=['오늘 '+c.today+'건'];\n    if(c.overdue) parts.push('지연 '+c.overdue+'건');\n    if(c.future) parts.push('예정 '+c.future+'건');\n    if(c.nodue) parts.push('마감없음 '+c.nodue+'건');\n    if(c.done) parts.push('완료 '+c.done+'건');\n    if(parts.length===1) parts.push('전체 '+c.total+'건');\n    return parts.join(' · ');\n  }\n  function applyTodoSummary(){\n    var wrap=el('laterWrap');\n    if(!wrap) return;\n    var card=wrap.querySelector('.later-card');\n    if(!card) return;\n    card.classList.add('todo-card-unified');\n    var old=card.querySelector('.todo-summary');\n    if(old) old.remove();\n    var list=card.querySelector('.later-check-list');\n    if(!list) return;\n    var all=items();\n    var c={total:all.length,done:0,today:0,overdue:0,future:0,nodue:0};\n    all.forEach(function(x){\n      if(x \u0026\u0026 x.done){ c.done++; return; }\n      var st=statusOf(x);\n      c[st]=(c[st]||0)+1;\n    });\n    list.insertAdjacentHTML('beforebegin','\u003cdiv class=\"todo-summary\"\u003e\u003cdiv class=\"todo-summary-line\"\u003e\u003cb\u003e오늘 할 일 내용\u003c/b\u003e\u003cspan\u003e'+esc(summaryParts(c))+'\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e');\n  }\n  function wrap(){\n    var fn=null;\n    try{ fn=(typeof renderLater==='function')?renderLater:window.renderLater; }catch(e){}\n    if(typeof fn!=='function' || fn.__cosTodoSummaryWrapped) return false;\n    var old=fn;\n    var wrapped=function(){\n      var res=old.apply(this,arguments);\n      try{ applyTodoSummary(); }catch(e){ console.warn('[TODO-SUMMARY] failed',e); }\n      return res;\n    };\n    wrapped.__cosTodoSummaryWrapped=true;\n    try{ renderLater=wrapped; }catch(e){}\n    window.renderLater=wrapped;\n    return true;\n  }\n  if(wrap()){\n    setTimeout(function(){try{renderLater()}catch(e){try{applyTodoSummary()}catch(_){}}},0);\n    setTimeout(function(){try{applyTodoSummary()}catch(e){}},700);\n  }else{\n    setTimeout(function(){if(wrap()) try{renderLater()}catch(e){}},500);\n  }\n})();\n\u003c/script\u003e\n\n\n\u003cscript id=\"cos-work-overall-hero-v2\"\u003e\n(function(){\n  function el(id){return document.getElementById(id)}\n  function cleanISO(v){\n    var s=String(v||'').trim();\n    var m=s.match(/^(\\d{4}-\\d{2}-\\d{2})/);\n    if(m)return m[1];\n    var d=new Date(s);\n    if(!isNaN(d.getTime()))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n    return '';\n  }\n  function selected(){try{return cleanISO(currentDateISO)||new Date().toISOString().slice(0,10)}catch(e){return new Date().toISOString().slice(0,10)}}\n  function isDone(x){return !!(x\u0026\u0026(x.done||x.completed||x.status==='completed'||x.state==='완료'))}\n  function taskList(){\n    try{if(typeof googleTasksLoaded!=='undefined'\u0026\u0026googleTasksLoaded\u0026\u0026Array.isArray(googleTaskCache))return googleTaskCache}catch(e){}\n    try{return (data\u0026\u0026data.laterChecks)||[]}catch(e){return []}\n  }\n  function dueOf(x){return cleanISO(x\u0026\u0026(x.due||x.googleTaskDue||x.date||x.deadline))}\n  function dateOf(x){return cleanISO(x\u0026\u0026(x.date||x.created||x.due||x.googleTaskDue||x.schedule))}\n  function scopedLogs(sel){\n    try{return (data.logs||[]).filter(function(x){var k=dateOf(x);return !k||k===sel})}catch(e){return []}\n  }\n  function fmtMin(n){n=Number(n)||0; if(n\u003e=60){var h=Math.floor(n/60),m=n%60;return h+'h'+(m?(' '+m+'m'):'')} return n+'m'}\n  function build(){\n    var sel=selected();\n    var logs=scopedLogs(sel), logDone=logs.filter(isDone).length, minutes=logs.reduce(function(s,x){return s+(Number(x.minutes)||0)},0);\n    var tasks=taskList(), open=tasks.filter(function(x){return !isDone(x)});\n    var today=open.filter(function(x){return dueOf(x)===sel}).length;\n    var overdue=open.filter(function(x){var d=dueOf(x);return d\u0026\u0026d\u003csel}).length;\n    var future=open.filter(function(x){var d=dueOf(x);return d\u0026\u0026d\u003esel}).length;\n    var nodue=open.filter(function(x){return !dueOf(x)}).length;\n    var projects=[], projectOpen=0, nextProject='';\n    try{projects=data.projects||[];projects.forEach(function(p){(p.items||[]).forEach(function(it){if(String(it.state||'')!=='완료'){projectOpen++; if(!nextProject)nextProject=(p.name||'프로젝트')+' - '+(it.title||'다음 항목');}})})}catch(e){}\n    var recTotal=0, recUnscheduled=0, recLogMiss=0;\n    try{(data.recurring||[]).forEach(function(r){(r.companies||[]).forEach(function(c){recTotal++; if(!c.scheduled)recUnscheduled++; if(c.meetingDone\u0026\u0026!c.logDone)recLogMiss++;})})}catch(e){}\n    var alba=[], albaOpen=0, albaAmount=0;\n    try{alba=data.sideJobs||data.alba||[];albaOpen=alba.filter(function(x){return !isDone(x)}).length;alba.forEach(function(x){var m=String(x.amount||'').match(/\\d+/);if(m)albaAmount+=Number(m[0])})}catch(e){}\n    var headline;\n    if(overdue) headline='지연 To-Do '+overdue+'건을 먼저 정리해야 합니다.';\n    else if(today) headline='오늘 To-Do '+today+'건과 업무 일지를 함께 닫는 날입니다.';\n    else if(projectOpen) headline='프로젝트 대기 '+projectOpen+'건을 중심으로 업무를 정리하는 날입니다.';\n    else headline='업무 일지, To-Do, 프로젝트를 함께 점검하는 날입니다.';\n    var parts=[];\n    parts.push('업무 일지 '+logs.length+'건 중 '+logDone+'건 완료, 총 '+fmtMin(minutes));\n    parts.push('To-Do 오늘 '+today+'건, 지연 '+overdue+'건, 예정 '+future+'건, 마감 없음 '+nodue+'건');\n    if(recTotal)parts.push('정기 미팅 업체 '+recTotal+'개 중 일정 미정 '+recUnscheduled+'개, 일지 미작성 '+recLogMiss+'개');\n    if(projectOpen)parts.push('프로젝트 대기 '+projectOpen+'건'+(nextProject?' · 다음 '+nextProject:''));\n    if(alba.length)parts.push('수익 일정 '+alba.length+'건'+(albaAmount?' · 총 '+albaAmount+'만원':'')+' 중 미완료 '+albaOpen+'건');\n    return {headline:headline,lead:parts.slice(0,4).join('. ')+'.',stats:{minutes:minutes,done:logDone,remain:Math.max(0,logs.length-logDone),todo:open.length}};\n  }\n  function apply(){\n    var s=build();\n    var total=el('statTotal'),done=el('statDone'),miss=el('statLogMiss'),money=el('statMoney');\n    if(total)total.textContent=fmtMin(s.stats.minutes).replace(' ','');\n    if(done)done.textContent=s.stats.done+'건';\n    if(miss)miss.textContent=s.stats.remain+'건';\n    if(money)money.textContent=s.stats.todo+'건';\n    var label=money\u0026\u0026money.nextElementSibling;if(label)label.textContent='To-Do';\n    if(window.__cosAiBriefActive)return;\n    var title=el('heroTitle'),lead=el('heroLead');\n    if(title)title.textContent=s.headline;\n    if(lead)lead.textContent=s.lead;\n  }\n  try{window.COS_WORK_OVERALL_SUMMARY=build;}catch(e){}\n  function wrap(){\n    var fn=null;try{fn=(typeof renderHero==='function')?renderHero:window.renderHero}catch(e){}\n    if(typeof fn!=='function'||fn.__cosOverallWrapped)return false;\n    var old=fn;\n    var wrapped=function(){var r=old.apply(this,arguments);try{apply()}catch(e){console.warn('[WORK-BRIEF] apply failed',e)}return r};\n    wrapped.__cosOverallWrapped=true;\n    try{renderHero=wrapped}catch(e){}\n    window.renderHero=wrapped;\n    return true;\n  }\n  if(wrap())setTimeout(function(){try{renderHero()}catch(e){apply()}},0);\n  else setTimeout(function(){if(wrap())try{renderHero()}catch(e){apply()}},500);\n})();\n\u003c/script\u003e\n\n\n\n\u003cstyle id=\"cos-work-final-ops-v1\"\u003e\n.project-cat-pill{display:inline-flex;align-items:center;justify-content:center;height:20px;padding:0 7px;border-radius:999px;font-size:9.5px;font-weight:950;line-height:1;margin-right:6px;vertical-align:middle;white-space:nowrap}\n.project-cat-pill.krp,.log-cat.krp{background:var(--blue-soft,#eef3ff)!important;color:#3d7eff!important}\n.project-cat-pill.cde,.log-cat.cde{background:#eef0f5!important;color:#596375!important}\n.project-cat-pill.wsw,.log-cat.wsw{background:rgba(0,184,122,.10)!important;color:#00b87a!important}\n.project-cat-pill.pwr,.log-cat.pwr{background:rgba(255,106,61,.10)!important;color:#ff6a3d!important}\n.project-title-line{display:flex;align-items:center;gap:6px;min-width:0}.project-title-line .plain-input{min-width:0}.project-edit-title-grid{display:grid;grid-template-columns:74px minmax(0,1fr);gap:7px;align-items:center}.project-cat-select{height:28px;border:1px solid var(--line2 eturn ['CDE','KRP','WSW','PWR'].indexOf(c)\u003e-1?c:'KRP'}\nfunction catIdx(c){return {'CDE':0,'KRP':1,'WSW':2,'PWR':3}[cat({cat:c})]||1}\nfunction titleOf(x){var t=String((x\u0026\u0026(x.title||x.name))||'').trim();return t.replace(/^\\s*\\[(KRP|KRY|CDE|WSW|PWR)\\]\\s*/i,'').trim()}\nfunction doneOf(x){return !!(x\u0026\u0026(x.done||x.completed||x.status==='completed'||x.state==='완료'))}\nfunction dueOf(x){return iso(x\u0026\u0026(x.due||x.googleTaskDue||x.date||x.deadline))}\nfunction taskIdOf(x,i){return String((x\u0026\u0026(x.id||x.googleTaskId||x.taskId))||('local_'+i))}\nfunction seedLocalTitles(){return ['부산 펀드 LP 후보 다시 생각해보기','PWR 장기 숙박 고객 후기 문구 모아보기','워크스워크 로고 레퍼런스 저장해두기']}\nfunction looksSeedLater(arr){\n  if(!Array.isArray(arr)||!arr.length) return false;\n  var seeds=seedLocalTitles();\n  return arr.some(function(x){return seeds.indexOf(String(x\u0026\u0026x.title||''))\u003e-1});\n}\nfunction clearLegacyLocalLater(){\n  try{\n    if(typeof WORK_API_URL!=='undefined' \u0026\u0026 WORK_API_URL \u0026\u0026 window.data \u0026\u0026 Array.isArray(data.laterChecks) \u0026\u0026 looksSeedLater(data.laterChecks)){\n      var backupKey='cos_work_legacy_later_backup_'+Date.now();\n      try{localStorage.setItem(backupKey,JSON.stringify(data.laterChecks||[]))}catch(e){}\n      data.laterChecks=[];\n      try{save()}catch(e){}\n      console.log(TODO_DEBUG,'기존 샘플/로컬 To-Do를 숨겼습니다. backup=',backupKey);\n    }\n  }catch(e){console.warn(TODO_DEBUG,'legacy clear failed',e)}\n}\nfunction normalizeTask(t,i){\n  t=t||{};\n  var due=iso(t.due||t.googleTaskDue||t.date||t.deadline);\n  return {\n    id:t.id||t.encodedId||t.taskId||('task_'+i),\n    taskId:t.taskId||'',\n    listId:t.listId||'',\n    title:t.title||t.name||'',\n    cat:cat(t),\n    due:due,\n    googleTaskDue:due,\n    dueLabel:t.dueLabel||'',\n    done:doneOf(t),\n    status:t.status||(doneOf(t)?'completed':'needsAction'),\n    completed:t.completed||'',\n    updated:t.updated||'',\n    created:iso(t.crea uture:[],done:[]};\n  currentTasks().forEach(function(x){\n    var d=dueOf(x);\n    if(doneOf(x)){\n      if(doneBelongsToSelectedDate(x,sel)) out.done.push(x);\n      return;\n    }\n    if(!d) out.nodue.push(x); else if(d===sel) out.today.push(x); else if(d\u003csel) out.overdue.push(x); else out.future.push(x);\n  });\n  Object.keys(out).forEach(function(k){out[k].sort(function(a,b){return catIdx(cat(a))-catIdx(cat(b)) || String(completedDateOf(a)||dueOf(a)||'9999-99-99').localeCompare(String(completedDateOf(b)||dueOf(b)||'9999-99-99')) || titleOf(a).localeCompare(titleOf(b),'ko')})});\n  return out;\n}\nfunction setTodoStatus(msg,state){\n  try{if(typeof setWorkSyncStatus==='function') setWorkSyncStatus(state||'synced',msg)}catch(e){}\n  try{if(typeof setTaskSyncStatus==='function') setTaskSyncStatus(msg,state||'synced')}catch(e){}\n}\nfunction fetchTasksFromCalendarFallback(){\n  // 업무 전용 Apps Script가 막혔을 때, 잘 동작하는 캘린더 배포에서 Tasks를 끌어온다.\n  var CAL_URL='https://script.google.com/macros/s/AKfycbxaQ7NEnl49rH9MvMlrhkyO4jmNJ33qFwWKS-o6l8jeGm_kTTb-0d2P4g0gMCHGU3LA/exec';\n  function calJsonp(url){\n    return new Promise(function(resolve,reject){\n      var cb='work_tasks_fb_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n      var s=document.createElement('script'); var done=false;\n      function cleanup(){try{delete window[cb]}catch(e){window[cb]=undefined} if(s.parentNode)s.parentNode.removeChild(s)}\n      window[cb]=function(d){if(done)return;done=true;cleanup();resolve(d)};\n      s.onerror=function(){if(done)return;done=true;cleanup();reject(new Error('calendar fallback jsonp load 실패'))};\n      s.src=url+(url.indexOf('?')\u003e=0?'\u0026':'?')+'callback='+cb;\n      document.body.appendChild(s);\n      setTimeout(function(){if(done)return;done=true;cleanup();reject(new Error('calendar fallback jsonp timeout'))},14000);\n    });\n  }\n  // 선택일이 속한 주(월~일)를 모두 조회해 지연(과거 마감) 항목까지 포함시킨다.\n  var sel=selectedISO();\n  var base=new Date(sel+'T00:00:00'); if(isNaN(base)) base=new Date();\n  var day=base.getDay(); var mon=new Date(base); mon.setDate(base.getDate()+(day===0?-6:1-day));\n  var queryDates=[]; for(var i=0;i\u003c7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);queryDates.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}\n  return (async function(){\n    var byId2={};\n    for(var i=0;i\u003cqueryDates.length;i++){\n      try{\n        var res=await calJsonp(CAL_URL+'?action=getCalendarWeek\u0026date='+encodeURIComponent(queryDates[i])+'\u0026t='+Date.now());\n        var items=[].concat(Array.isArray(res\u0026\u0026res.checkItems)?res.checkItems:[], Array.isArray(res\u0026\u0026res.tasks)?res.tasks:[]);\n        items.forEach(function(it){\n          if(!it) return;\n          if(it.id==='tasks-api-error' || it.title==='Google Tasks API 연결 필요') return;\n          var key=String(it.id||(it.title+'|'+(it.dueDate||it.due||it.date||'')));\n          var due=it.dueDate||it.due||it.date||'';\n          byId2[key]={\n            id:it.id||key,\n            title:it.title||'',\n            cat:it.cat||it.listName||it.project||'',\n            due:due,\n            googleTaskDue:due,\n            created:it.created||it.updated||due||sel,\n            done:!!(it.completed||it.done||it.status==='completed'),\n            source:'google'\n          };\n        });\n      }catch(eWeek){ /* 한 주 실패는 무시하고 계속 */ }\n    }\n    return Object.keys(byId2).map(function(k){return byId2[k]});\n  })();\n}\nasync function fetchTasksFresh(){\n  if(!(typeof WORK_API_URL!=='undefined' \u0026\u0026 WORK_API_URL) || typeof workApi!=='function'){\n    clearLegacyLocalLater();\n    try{googleTasksLoaded=false}catch(e){}\n    renderLaterFresh();\n    return false;\n  }\n  clearLegacyLocalLater();\n  var payload={date:selectedISO(), selectedDate:selectedISO(), showCompleted:'true', includeAll:'true', includeFuture:'true', includeNoDue:'true', cacheBust:String(Date.now())};\n  var json=null, lastErr=null;\n  try{json=await workApi('listTasks',payload)}catch(e1){lastErr=e1; try{json=await workApi('getTasks',payload)}catch(e2){lastErr=e2}}\n  if(!json){\n    // 업무 전용 Apps Script가 실패하면 캘린더 배포(getCalendarWeek)에서 Tasks를 가져와 대체한다.\n    var fbArr=null, fbErr=null;\n    try{ fbArr=await fetchTasksFromCalendarFallback(); }catch(eFb){ fbErr=eFb; }\n    if(Array.isArray(fbArr) \u0026\u0026 fbArr.length){\n      try{googleTaskCache=fbArr.map(normalizeTask).filter(function(x){return titleOf(x)})}catch(e){window.googleTaskCache=fbArr.map(normalizeTask).filter(function(x){return titleOf(x)})}\n      try{googleTasksLoaded=true}catch(e){window.googleTasksLoaded=true}\n      console.log(TODO_DEBUG,'fallback(calendar) tasks load',fbArr.length,'workErr=',lastErr\u0026\u0026lastErr.message);\n      setTodoStatus('업무 API 연동 실패 → 캘린더 연동으로 To-Do '+fbArr.length+'건 표시 중','synced');\n      renderLaterFresh();\n      try{renderHero()}catch(e){}\n      try{renderWeek()}catch(e){}\n      return true;\n    }\n    console.error(TODO_DEBUG,'work tasks failed:',lastErr,'| calendar fallback failed:',fbErr);\n    try{googleTaskCache=[];googleTasksLoaded=false}catch(e){}\n    var detail=(lastErr\u0026\u0026lastErr.message?String(lastErr.message):'원인 불명');\n    setTodoStatus('Google 연동 실패: '+detail.slice(0,80),'fail');\n    renderLaterFresh();\n    return false;\n  }\n  var arr=Array.isArray(json.tasks)?json.tasks:(Array.isArray(json.items)?json.items:[]);\n  try{googleTaskCache=arr.map(normalizeTask).filter(function(x){return titleOf(x)})}catch(e){window.googleTaskCache=arr.map(normalizeTask).filter(function(x){return titleOf(x)})}\n  try{googleTasksLoaded=true}catch(e){window.googleTasksLoaded=true}\n  console.log(TODO_DEBUG,'Google Tasks fresh load',arr.length,'service=',json.service||json.version||'');\n  setTodoStatus('Google Tasks 최신 데이터 연동 완료 · '+arr.length+'건','synced');\n  renderLaterFresh();\n  try{renderHero()}catch(e){}\n  try{renderWeek()}catch(e){}\n  return true;\n}\nfunction rowHtml(x,completed,all){\n  all=all||currentTasks();\n  var real=all.indexOf(x), id=esc(taskIdOf(x,real)), isGoogle=x\u0026\u0026x.source==='google', c=cat(x), d=dueOf(x), sel=selectedISO();\n  var cls=completed?'done':(!d?'nodue':(d===sel?'today':(d\u003csel?'overdue':'future')));\n  var toggle=isGoogle?\"toggleGoogleLater('\"+id+\"',\"+(!doneOf(x))+\")\":\"data.laterChecks[\"+real+\"].done=!data.laterChecks[\"+real+\"].done;save();renderLater();renderHero()\";\n  var del=isGoogle?\"deleteGoogleLater('\"+id+\"')\":\"data.laterChecks.splice(\"+real+\",1);save();renderLater();renderHero()\";\n  var dateLine=laterEdit\n    ? (isGoogle?'\u003cspan class=\"later-mini-date readonly\"\u003e'+(d?esc(d):'마감 없음')+'\u003c/span\u003e':'\u003cinput class=\"later-mini-date\" type=\"date\" value=\"'+esc(d)+'\" onchange=\"data.laterChecks['+real+'].due=this.value;save();renderLater();renderHero()\"\u003e')\n    : '\u003cspan class=\"later-check-sub\"\u003e'+(d?esc(d):'마감일 없음')+'\u003c/span\u003e';\n  return '\u003cdiv class=\"later-check-row todo-'+cls+(completed?' done':'')+'\"\u003e\u003cbutton class=\"check '+(doneOf(x)?'on':'')+'\" onclick=\"'+toggle+'\"\u003e✓\u003c/button\u003e\u003cdiv class=\"later-check-main\"\u003e\u003cdiv class=\"later-title-line\"\u003e\u003cspan class=\"later-title-text\"\u003e'+esc(titleOf(x))+'\u003c/span\u003e\u003c/div\u003e'+dateLine+'\u003c/div\u003e\u003cdiv class=\"later-actions\"\u003e\u003cspan class=\"task-tag task-'+c.toLowerCase()+'\"\u003e'+c+'\u003c/span\u003e'+(laterEdit?'\u003cbutton class=\"row-del\" onclick=\"'+del+'\"\u003e×\u003c/button\u003e':'')+'\u003c/div\u003e\u003c/div\u003e';\n}\nfunction renderLaterFresh(){\n  var wrap=byId('laterWrap'); if(!wrap) return;\n  clearLegacyLocalLater();\n  var b=bucketTasks(), all=currentTasks(), sel=selectedISO();\n  var openHtml='';\n  if(b.overdue.length) openHtml+='\u003cdiv class=\"todo-group-label overdue\"\u003e\u003cb\u003e지연된 할 일\u003c/b\u003e\u003cspan\u003e'+b.overdue.length+'건\u003c/span\u003e\u003c/div\u003e'+b.overdue.map(function(x){return rowHtml(x,false,all)}).join('');\n  if(b.today.length) openHtml+='\u003cdiv class=\"todo-group-label today\"\u003e\u003cb\u003e오늘 마감\u003c/b\u003e\u003cspan\u003e'+b.today.length+'건\u003c/span\u003e\u003c/div\u003e'+b.today.map(function(x){return rowHtml(x,false,all)}).join('');\n  if(b.nodue.length) openHtml+='\u003cdiv class=\"todo-group-label nodue\"\u003e\u003cb\u003e마감일 없음\u003c/b\u003e\u003cspan\u003e'+b.nodue.length+'건\u003c/span\u003e\u003c/div\u003e'+b.nodue.map(function(x){return rowHtml(x,false,all)}).join('');\n  if(!openHtml){\n    var loading='';\n    try{loading=(typeof WORK_API_URL!=='undefined'\u0026\u0026WORK_API_URL\u0026\u0026!googleTasksLoaded)?'\u003cbr\u003e\u003csmall\u003eGoogle Tasks 최신 데이터를 불러오는 중입니다.\u003c/small\u003e':''}catch(e){}\n    openHtml='\u003cdiv class=\"later-empty\"\u003e오늘 처리할 To-Do가 없습니다.'+loading+'\u003c/div\u003e';\n  }\n  var doneHtml=b.done.length?'\u003cdiv class=\"complete-fold '+(laterCompletedOpen?'open':'')+'\"\u003e\u003cbutton class=\"complete-fold-toggle\" onclick=\"laterCompletedOpen=!laterCompletedOpen;renderLater()\"\u003e\u003cspan\u003e이 날 완료한 To-Do\u003c/span\u003e\u003cb\u003e'+b.done.length+'건\u003c/b\u003e\u003c/button\u003e\u003cdiv class=\"complete-fold-body\"\u003e'+b.done.map(function(x){return rowHtml(x,true,all)}).join('')+'\u003c/div\u003e\u003c/div\u003e':'';\n  var summary='오늘 '+b.today.length+'건 · 마감없음 '+b.nodue.length+'건';\n  if(b.overdue.length) summary+=' · 지연 '+b.overdue.length+'건';\n  if(b.future.length) summary+=' · 예정 '+b.future.length+'건';\n  if(b.done.length) summary+=' · 완료 '+b.done.length+'건';\n  wrap.innerHTML='\u003csection class=\"later-card todo-card-unified '+(laterEdit?'edit-mode':'')+'\"\u003e\u003cdiv class=\"todo-summary\"\u003e\u003cdiv class=\"todo-summary-line\"\u003e\u003cb\u003e오늘 할 일 내용\u003c/b\u003e\u003cspan\u003e'+esc(summary)+'\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"
