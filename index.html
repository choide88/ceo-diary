.cos-primary{margin-top:9px;padding:10px;font-size:12px;border-radius:12px}\n.cos-danger{margin-top:8px;width:100%;border:1px solid rgba(239,68,68,.22);background:rgba(239,68,68,.06);color:#ef4444;border-radius:14px;padding:11px;font-size:12px;font-weight:900;cursor:pointer}\n.cos-note{margin-top:11px;font-size:10px;font-weight:700;color:#9aa4b4;line-height:1.55}\n.cos-backdrop.cos-center .cos-note{margin-top:8px;font-size:9.5px}\n.cos-detail-kicker{margin-top:14px;font-size:10px;font-weight:950;letter-spacing:1.6px;text-transform:uppercase;color:var(--cos-accent)}\n.cos-detail-headline{margin-top:8px;font-size:17px;font-weight:950;letter-spacing:-.4px;line-height:1.4;color:#111827}\n.cos-detail-lead{margin-top:8px;font-size:12.5px;line-height:1.7;font-weight:650;color:#596375}\n.cos-detail-block{margin-top:14px}\n.cos-detail-block>b{display:block;font-size:10px;font-weight:950;letter-spacing:1.2px;text-transform:uppercase;color:#8b97aa;margin-bottom:7px}\n.cos-detail-block ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}\n.cos-detail-block ul li{position:relative;padding-left:13px;font-size:12px;line-height:1.6;font-weight:650;color:#4b5563}\n.cos-detail-block ul li:before{content:\"\";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--cos-accent);opacity:.7}\n.cos-detail-actions div{font-size:12px;line-height:1.7;font-weight:750;color:#4b5563}\n.cos-feedback-note{margin-top:10px;font-size:10.5px;font-weight:750;color:var(--cos-accent);background:var(--cos-soft);border-radius:10px;padding:8px 10px;line-height:1.5}\n.cos-divider{margin:16px 0 4px;border-top:1px dashed rgba(17,24,39,.13)}\n#cosToast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);background:rgba(17,24,39,.92);color:#fff;font-size:11.5px;font-weight:850;border-radius:999px;padding:9px 15px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;max-width:86%;overflow:hidden;text-overflow:ellipsis}\n#cosToast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n\u003c/style>\n\n\u003cscript>window.COS_TAB_KEY=\"work\";\u003c/script>\n\n\u003cscript id=\"cos-addon\">\n/* ============================================================\n   COS 애드온 v3.2: 탭 브리프(해석형) + 주간/월간 리포트\n   Gemini 연동 시: window.COS_AI = async ({tab,kind,type,feedback,facts})\n     => {headline,lead,bullets:[],actions:[]} 등록 시 모든 생성이 AI 호출로 대체.\n   ============================================================ */\n(function(){\n\"use strict\";\nvar KEY=window.COS_TAB_KEY;\nvar CFG={\n  calendar:{label:'캘린더',brief:'Calendar Brief',accent:'#3d7eff',soft:'rgba(61,126,255,.10)',border:'rgba(61,126,255,.22)'},\n  work:{label:'업무',brief:'Work Brief',accent:'#f97316',soft:'rgba(249,115,22,.10)',border:'rgba(249,115,22,.22)'},\n  personal:{label:'개인',brief:'Daily Brief',accent:'#7c3aed',soft:'rgba(124,58,237,.10)',border:'rgba(124,58,237,.22)'}\n}[KEY];\nif(!CFG) return;\nvar REPORT_KEY='cos_reports_'+KEY+'_v1';\nvar FB_KEY='cos_ai_feedback_'+KEY+'_v1';\ndocument.documentElement.style.setProperty('--cos-accent',CFG.accent);\ndocument.documentElement.style.setProperty('--cos-soft',CFG.soft);\ndocument.documentElement.style.setProperty('--cos-border',CFG.border);\n\n/* ---------- 유틸 ---------- */\nfunction esc(s){return String(s==null?'':s).replace(/[&\u003c>\"']/g,function(c){return{'&':'&amp;','\u003c':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]})}\nfunction pad(n){return (n\u003c10?'0':'')+n}\nfunction lsGet(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}\nfunction lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}\nfunction toast(msg){var t=document.getElementById('cosToast');if(!t){t=document.createElement('div');t.id='cosToast';document.body.appendChild(t)}t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show')},1700)}\nfunction mondayOf(d){d=new Date(d);d.setHours(0,0,0,0);var day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return d}\nfunction dkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}\nfunction weekKeys(){var m=mondayOf(new Date()),a=[];for(var i=0;i\u003c7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(dkey(d))}return a}\nfunction monthKeys(){var n=new Date(),y=n.getFullYear(),mo=n.getMonth(),last=new Date(y,mo+1,0).getDate(),a=[];for(var i=1;i\u003c=last;i++)a.push(y+'-'+pad(mo+1)+'-'+pad(i));return a}\nfunction weekMeta(){var m=mondayOf(new Date()),e=new Date(m);e.setDate(m.getDate()+6);var wk=Math.ceil(m.getDate()/7);\n  return {id:KEY+'-w-'+m.getFullYear()+'-'+pad(m.getMonth()+1)+'-'+wk,\n    title:(m.getMonth()+1)+'월 '+wk+'주차 '+CFG.label+' 주간 리포트',\n    period:m.getFullYear()+'.'+pad(m.getMonth()+1)+'.'+pad(m.getDate())+'–'+pad(e.getMonth()+1)+'.'+pad(e.getDate())}}\nfunction monthMeta(){var n=new Date();\n  return {id:KEY+'-m-'+n.getFullYear()+'-'+pad(n.getMonth()+1),\n    title:n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+CFG.label+' 월간 리포트',\n    period:n.getFullYear()+'.'+pad(n.getMonth()+1)}}\nvar DOW=['월','화','수','목','금','토','일'];\nfunction jo(w,bat,no){w=String(w||'');var c=w.charCodeAt(w.length-1);if(isNaN(c)||c\u003c0xAC00||c>0xD7A3)return no;return ((c-0xAC00)%28)?bat:no}\nfunction dayName(k){var d=new Date(k+'T00:00:00');return DOW[(d.getDay()+6)%7]}\nfunction daysSince(s){var d=new Date(String(s)+'T00:00:00');if(isNaN(d))return null;return Math.max(0,Math.round((new Date().setHours(0,0,0,0)-d)/86400000))}\n\n/* ---------- 사실 수집(facts) ---------- */\nfunction getFacts(scope){\n  try{\n    if(KEY==='calendar')return calFacts(scope);\n    if(KEY==='work')return workFacts();\n    if(KEY==='personal')return personalFacts();\n  }catch(e){}\n  return {};\n}\nfunction calFacts(scope){\n  var d=(typeof data!=='undefined'&&data)||{};\n  var keys=scope==='monthly'?monthKeys():weekKeys();\n  var ev=d.events||{},dl=d.deadlines||{};\n  var list=[];keys.forEach(function(k){(ev[k]||[]).forEach(function(e){list.push(Object.assign({_d:k},e))})});\n  var byDay={};list.forEach(function(e){byDay[e._d]=(byDay[e._d]||0)+1});\n  var sortedDays=Object.keys(byDay).sort(function(a,b){return byDay[b]-byDay[a]});\n  var busiestKey=sortedDays[0]||null;\n  var morning=list.filter(function(e){return e.time&&e.time!=='종일'&&e.time\u003c'12:00'}).length;\n  var afternoon=list.filter(function(e){return e.time&&e.time!=='종일'&&e.time>='12:00'}).length;\n  var rev=list.filter(function(e){return e.isRevenue||e.type==='수익'});\n  var revAmt=rev.reduce(function(s,e){return s+(Number(e.amount)||0)},0);\n  var dls=[];keys.forEach(function(k){(dl[k]||[]).forEach(function(x){dls.push(Object.assign({_d:k},x))})});\n  var dlOpen=dls.filter(function(x){return !(x.done||x.completed)});\n  var collide=busiestKey?dlOpen.some(function(x){return x._d===busiestKey}):false;\n  // 일정이 가장 적은 평일\n  var lightKey=null,lightCnt=1e9;\n  keys.slice(0,5).forEach(function(k){var c=byDay[k]||0;if(c\u003clightCnt){lightCnt=c;lightKey=k}});\n  return {scope:scope,total:list.length,meetings:list.filter(function(e){return e.type==='미팅'}).length,\n    busiestKey:busiestKey,busiestCnt:busiestKey?byDay[busiestKey]:0,busiestDay:busiestKey?dayName(busiestKey):'',\n    lightDay:lightKey?dayName(lightKey):'',lightCnt:lightKey?(byDay[lightKey]||0):0,\n    morning:morning,afternoon:afternoon,revCount:rev.length,revAmt:revAmt,\n    dlOpen:dlOpen.length,dlOpenTitles:dlOpen.slice(0,2).map(function(x){return x.title||''}),dlTotal:dls.length,collide:collide};\n}\nfunction workFacts(){\n  var d=(typeof data!=='undefined'&&data)||{};\n  var logs=d.logs||[],later=d.laterChecks||[],projects=d.projects||[],rec=d.recurring||[];\n  var done=logs.filter(function(x){return x.done}).length;\n  var pending=logs.filter(function(x){return !x.done}).sort(function(a,b){return (b.minutes||0)-(a.minutes||0)});\n  var minutes=logs.reduce(function(s,x){return s+(Number(x.minutes)||0)},0);\n  var cats={};logs.forEach(function(x){cats[x.cat||'기타']=(cats[x.cat||'기타']||0)+1});\n  var topCat=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a]})[0]||'';\n  var laterOpen=later.filter(function(x){return !x.done});\n  var oldest=laterOpen.slice().sort(function(a,b){return String(a.created||'').localeCompare(String(b.created||''))})[0]||null;\n  var oldestDays=oldest?daysSince(oldest.created):null;\n  var proj=projects.map(function(p){var open=(p.items||[]).filter(function(it){return it.state!=='완료'});return {name:p.name,open:open.length,next:(open[0]||{}).title||''}})\n    .sort(function(a,b){return b.open-a.open});\n  var items=0,itemsDone=0;projects.forEach(function(p){(p.items||[]).forEach(function(it){items++;if(it.state==='완료')itemsDone++})});\n  var comp=0,compDone=0;rec.forEach(function(r){(r.companies||[]).forEach(function(c){comp++;if(c.meetingDone&&c.logDone)compDone++})});\n  return {logTotal:logs.length,logDone:done,rate:logs.length?Math.round(done/logs.length*100):0,minutes:minutes,\n    topCat:topCat,topCatCnt:cats[topCat]||0,heaviest:pending[0]||null,\n    laterOpen:laterOpen.length,oldestTitle:oldest?oldest.title:'',oldestDays:oldestDays,\n    topProj:proj[0]||null,items:items,itemsDone:itemsDone,recTotal:comp,recDone:compDone};\n}\nfunction personalFacts(){\n  var hs=(typeof habits!=='undefined'&&Array.isArray(habits))?habits:[];\n  var todayIdx=(new Date().getDay()+6)%7;\n  var rates=hs.map(function(h){var c=(h.checks||[]).filter(Boolean).length;\n    var miss=0;for(var i=todayIdx;i>=0;i--){if((h.checks||[])[i])break;miss++}\n    return {name:h.name,rate:c,today:!!(h.checks||[])[todayIdx],missRun:miss}});\n  var sum=rates.reduce(function(s,r){return s+r.rate},0);\n  var avg=hs.length?Math.round(sum/(hs.length*(todayIdx+1))*100):0;\n  var sorted=rates.slice().sort(function(a,b){return b.rate-a.rate});\n  return {count:hs.length,avg:Math.min(100,avg),best:sorted[0]||null,worst:sorted[sorted.length-1]||null,\n    todayDone:rates.filter(function(r){return r.today}).length,todayIdx:todayIdx};\n}\n\n/* ---------- 해석형 생성 ---------- */\nfunction fbMods(fb){fb=fb||'';return {detail:/구체|자세|디테일|수치/.test(fb),brief:/간결|짧게|짧은|핵심만/.test(fb),raw:fb}}\nfunction calNarrative(f){\n  var headline,lead;\n  if(!f.total){\n    headline=(f.scope==='monthly'?'이번 달':'이번 주')+' 캘린더가 비어 있습니다. 일정을 채우기 전에 우선순위부터 정할 타이밍입니다.';\n    lead='기록된 일정이 없을 때가 오히려 설계하기 가장 좋은 구간입니다. 수익 일정과 마감을 먼저 고정한 뒤, 미팅을 그 사이에 배치하는 순서를 권합니다.';\n  }else{\n    if(f.revCount>=2){\n      headline='이번 '+(f.scope==='monthly'?'달':'주')+' 운영의 축은 수익 일정 '+f.revCount+'건입니다. 나머지 일정은 그 앞뒤로 정렬하는 것이 맞습니다.';\n    }else if(f.busiestDay){\n      headline='승부처는 '+f.busiestDay+'요일입니다. 전체 '+f.total+'건 중 '+f.busiestCnt+'건이 이 하루에 몰려 있습니다.';\n    }else{\n      headline='일정 밀도가 고르게 분산되어 있어, 집중 블록을 직접 설계할 수 있는 주간입니다.';\n    }\n    var parts=[];\n    if(f.collide&&f.busiestDay)parts.push('미완료 마감이 일정이 가장 몰린 '+f.busiestDay+'요일에 함께 걸려 있어, '+(f.lightDay?'상대적으로 비어 있는 '+f.lightDay+'요일로 앞당기는':'전날까지 끝내두는')+' 편이 안전합니다');\n    else if(f.dlOpen)parts.push('미완료 마감 '+f.dlOpen+'건'+(f.dlOpenTitles[0]?'(“'+f.dlOpenTitles[0]+'” 등)':'')+'은 '+(f.lightDay?'일정이 가장 적은 '+f.lightDay+'요일에 처리하는 것이 현실적입니다':'완충 시간이 있는 날에 배치가 필요합니다'));\n    if(f.afternoon>f.morning&&f.afternoon>=2)parts.push('일정이 오후에 치우쳐 있으니 오전은 회의가 아니라 준비와 집중 업무로 비워두는 운영이 적합합니다');\n    else if(f.morning>f.afternoon&&f.morning>=2)parts.push('오전 일정이 많아 깊은 작업은 오후 블록으로 옮기는 편이 효율적입니다');\n    if(f.revAmt)parts.push('수익 일정 합계는 '+f.revAmt.toLocaleString('ko-KR')+'만원으로, 응대 전 자료 확인 시간을 미리 확보해두는 것이 좋습니다');\n    if(!parts.length)parts.push('마감과 수익 일정 모두 정리된 상태라, 다음 '+(f.scope==='monthly'?'달':'주')+' 선점 일정을 잡기 좋은 여건입니다');\n    lead=parts.slice(0,3).join('. ')+'.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.busiestDay?f.busiestDay+'요일('+f.busiestCnt+'건)에 밀도가 집중되어 전후 완충 시간이 필요합니다.':'일정 밀도가 분산되어 있어 집중 블록 설계가 자유롭습니다.',\n      f.revCount?'수익 일정 '+f.revCount+'건'+(f.revAmt?'('+f.revAmt.toLocaleString('ko-KR')+'만원)':'')+'이 이번 기간의 우선 축입니다.':'수익 일정이 없어 내부 업무와 준비에 쓰기 좋은 기간입니다.',\n      f.dlOpen?'마감 '+f.dlTotal+'건 중 '+f.dlOpen+'건이 미완료 상태로, 날짜 재배치 판단이 필요합니다.':'마감 항목은 모두 정리된 상태입니다.'\n    ],\n    actions:[\n      f.dlOpen?('미완료 마감 '+(f.dlOpenTitles[0]?'“'+f.dlOpenTitles[0]+'” ':'')+(f.lightDay?f.lightDay+'요일로 이동':'날짜 확정')):'다음 기간 핵심 일정 선점',\n      f.revCount?'수익 일정 전 자료 확인 블록 확보':'오전 집중 블록 고정',\n      f.busiestDay?f.busiestDay+'요일 전날 저녁, 다음 날 동선 점검':'주간 일정 태그 누락 점검'\n    ]};\n}\nfunction workNarrative(f){\n  var headline,lead;\n  if(!f.logTotal){\n    headline='오늘 업무 기록이 비어 있습니다. 가장 무거운 일 하나만 먼저 적는 것으로 시작하세요.';\n    lead='기록이 없으면 판단도 없습니다. 다 적으려 하지 말고, 오늘을 결정하는 업무 1건과 예상 소요 시간만 먼저 등록해두면 흐름이 잡힙니다.';\n  }else if(f.heaviest){\n    headline='지금 가장 무거운 미완료 업무는 “'+f.heaviest.title+'”입니다. 이것이 닫혀야 오늘이 닫힙니다.';\n    var parts=[f.topCat+' 업무 비중이 가장 높지만 완료율은 '+f.rate+'%로, 벌려둔 일이 닫히는 속도보다 빠르게 늘어나는 패턴입니다'];\n    if(f.oldestTitle&&f.oldestDays!=null&&f.oldestDays>=2)parts.push('Later Check의 “'+f.oldestTitle+'”'+jo(f.oldestTitle,'은','는')+' '+f.oldestDays+'일째 보류 중입니다. 날짜를 주거나 버리는 결정이 필요합니다');\n    else if(f.laterOpen)parts.push('Later Check '+f.laterOpen+'건은 마감이 없어 계속 밀리는 구조입니다');\n    if(f.topProj&&f.topProj.open)parts.push('프로젝트 “'+f.topProj.name+'”'+jo(f.topProj.name,'은','는')+' “'+f.topProj.next+'”부터 일정에 박아두면 다시 움직입니다');\n    lead=parts.slice(0,3).join('. ')+'.';\n  }else{\n    headline='기록된 업무가 모두 닫혔습니다. 지금이 보류함을 비울 가장 좋은 타이밍입니다.';\n    lead='완료된 날일수록 새 일을 벌리기보다 Later Check '+f.laterOpen+'건과 프로젝트 대기 항목을 정리하는 편이 다음 날의 부담을 줄입니다.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.logTotal?('완료율 '+f.rate+'%('+f.logDone+'/'+f.logTotal+'건, 총 '+f.minutes+'분) — '+(f.rate>=70?'마무리 흐름이 좋은 편입니다.':'시작 대비 마무리가 밀리고 있습니다.')):'업무 기록이 없어 판단 근거가 부족합니다.',\n      f.oldestTitle?'“'+f.oldestTitle+'”'+jo(f.oldestTitle,'이','가')+' 보류 '+(f.oldestDays!=null?f.oldestDays+'일째':'중')+'로 가장 오래 묵었습니다.':(f.laterOpen?'Later Check '+f.laterOpen+'건이 마감 없이 누적 중입니다.':'보류함이 비어 있습니다.'),\n      f.topProj?'프로젝트 “'+f.topProj.name+'”에 대기 '+f.topProj.open+'건 — 다음 항목은 “'+f.topProj.next+'”입니다.':'프로젝트 대기 항목이 없습니다.'\n    ],\n    actions:[\n      f.heaviest?'“'+f.heaviest.title+'” 오전 첫 블록 배치':'보류함(Later Check) 정리',\n      f.oldestTitle?'“'+f.oldestTitle+'” 날짜 부여 또는 폐기 결정':'마감 없는 항목에 날짜 부여',\n      f.topProj&&f.topProj.next?'“'+f.topProj.next+'” 이번 주 일정 확정':'정기 미팅 '+f.recDone+'/'+f.recTotal+' 잔여 기업 일정 잡기'\n    ]};\n}\nfunction personalNarrative(f){\n  var headline,lead;\n  if(!f.count){\n    headline='루틴 목록이 비어 있습니다. 지키고 싶은 것 하나만 먼저 등록하세요.';\n    lead='루틴은 개수가 아니라 연결이 만듭니다. 이미 매일 하는 행동 직후에 붙일 수 있는 작은 항목 하나부터 시작하는 편이 오래갑니다.';\n  }else if(f.worst&&f.worst.missRun>=3){\n    headline='“'+f.worst.name+'” 루틴이 '+f.worst.missRun+'일째 끊겨 있습니다. 의지보다 배치의 문제일 가능성이 큽니다.';\n    lead='“'+(f.best?f.best.name:'')+'”'+jo(f.best&&f.best.name,'은','는')+' 주 '+(f.best?f.best.rate:0)+'회로 가장 견고한 앵커 루틴입니다. 무너진 루틴은 따로 세우지 말고 이 앵커 직후에 붙여서 트리거로 쓰는 방식을 권합니다. 오늘은 '+f.todayDone+'/'+f.count+'개가 체크된 상태입니다.';\n  }else if(f.avg>=70){\n    headline='루틴이 안정 궤도입니다. “'+(f.best?f.best.name:'')+'”'+jo(f.best&&f.best.name,'이','가')+' 하루의 축 역할을 하고 있습니다.';\n    lead='기록률 '+f.avg+'%는 유지 자체보다 질을 올릴 단계라는 신호입니다. 가장 약한 “'+(f.worst?f.worst.name:'')+'”만 기준을 절반으로 낮춰 연속 기록을 만드는 데 집중하면 전체가 단단해집니다.';\n  }else{\n    headline='이번 주 기록률은 '+f.avg+'%입니다. 전부 잡기보다 한 가지 루틴의 연속성을 먼저 회복할 구간입니다.';\n    lead='“'+(f.best?f.best.name:'')+'”('+(f.best?f.best.rate:0)+'회)는 잘 버티고 있고, “'+(f.worst?f.worst.name:'')+'”('+(f.worst?f.worst.rate:0)+'회)가 전체 평균을 끌어내리고 있습니다. 기록률이 낮은 날은 고강도 판단을 줄이고 정리형 업무 중심으로 하루를 운영하는 편이 컨디션 회복에 유리합니다.';\n  }\n  return {headline:headline,lead:lead,\n    bullets:[\n      f.best?'“'+f.best.name+'”'+jo(f.best.name,'이','가')+' 주 '+f.best.rate+'회로 가장 안정적인 앵커 루틴입니다.':'아직 기준이 될 루틴이 없습니다.',\n      f.worst&&f.best&&f.worst.name!==f.best.name?'“'+f.worst.name+'”'+jo(f.worst.name,'은','는')+' '+(f.worst.missRun>=2?f.worst.missRun+'일째 끊김 — 앵커 루틴 직후로 재배치가 필요합니다.':'주 '+f.worst.rate+'회로 가장 약한 고리입니다.'):'루틴 간 편차가 크지 않습니다.',\n      '오늘 기준 '+f.todayDone+'/'+f.count+'개 체크 · 주간 기록률 '+f.avg+'%입니다.'\n    ],\n    actions:[\n      f.worst?'“'+f.worst.name+'”를 '+(f.best?'“'+f.best.name+'” 직후':'고정 시간')+'에 재배치':'핵심 루틴 1개 등록',\n      '취침·기상 시간 고정으로 기록 누락 방지',\n      '기록률 낮은 날은 업무 강도 사전 하향'\n    ]};\n}\n\nfunction cosActualFactsV324(scope,kind,fb){\n  var base={};\n  try{base=getFacts(scope)}catch(e){base={error:String(e)}}\n  var actual={};\n  function short(s,n){return String(s||'').replace(/\\s+/g,' ').trim().slice(0,n||80)}\n  function safeArr(a){return Array.isArray(a)?a:[]}\n  function compactEvent(e){\n    return {\n      date:e._d||e.date||'',\n      time:short(e.time||'',20),\n      title:short(e.title||e.summary||'',60),\n      type:short(e.type||'',16),\n      amount:Number(e.amount||0)||0,\n      revenue:!!(e.isRevenue||e.type==='수익')\n    };\n  }\n  function compactTask(x){\n    return {\n      date:x._d||x.date||x.created||'',\n      title:short(x.title||'',60),\n      done:!!(x.done||x.completed)\n    };\n  }\n  function compactLog(l){\n    return {\n      date:l.date||l.created||'',\n      title:short(l.title||'',60),\n      start:l.start||'',\n      end:l.end||'',\n      minutes:Number(l.minutes||0)||0,\n      cat:l.cat||'KRP',\n      done:!!l.done\n    };\n  }\n  function compactLater(x){\n    return {\n      created:x.created||'',\n      title:short(x.title||'',60),\n      done:!!x.done\n    };\n  }\n  function compactProject(p){\n    var items=safeArr(p.items).slice(0,5).map(function(it){\n      return {title:short(it.title||'',50),state:short(it.state||'',12)}\n    });\n    return {name:short(p.name||'',40),desc:short(p.desc||'',60),items:items};\n  }\n\n  try{\n    if(KEY==='calendar'){\n      var d=(typeof data!=='undefined'&&data)||{};\n      var keys=scope==='monthly'?monthKeys():weekKeys();\n      var ev=d.events||{}, dl=d.deadlines||{};\n      var events=[], deadlines=[];\n      keys.forEach(function(k){\n        safeArr(ev[k]).forEach(function(e){events.push(compactEvent(Object.assign({_d:k},e)))});\n        safeArr(dl[k]).forEach(function(x){deadlines.push(compactTask(Object.assign({_d:k},x)))});\n      });\n      var selectedKey='';\n      try{selectedKey=dateFor(cur)}catch(e){}\n      actual={\n        selectedDate:selectedKey,\n        scope:scope,\n        weekKeys:keys,\n        events:events.slice(0,18),\n        deadlines:deadlines.slice(0,18),\n        loadedAt:new Date().toISOString()\n      };\n    }\n\n    if(KEY==='work'){\n      var wd=(typeof data!=='undefined'&&data)||{};\n      var selected=(typeof currentDateISO!=='undefined'?currentDateISO:'');\n      var selectedLogs=(typeof workLogsForSelectedDateV322==='function'?workLogsForSelectedDateV322():safeArr(wd.logs)).map(compactLog);\n      actual={\n        selectedDate:selected,\n        scope:scope,\n        selectedLogs:selectedLogs.slice(0,14),\n        allLogs:safeArr(wd.logs).slice(-24).map(compactLog),\n        laterChecks:safeArr(wd.laterChecks).filter(function(x){return !x.done}).slice(0,14).map(compactLater),\n        projects:safeArr(wd.projects).slice(0,8).map(compactProject),\n        monthlyAlba:safeArr(wd.monthlyAlba).slice(0,10).map(function(a){\n          return {title:short(a.title||a.name||'',50),amount:Number(a.amount||0)||0,done:!!a.done}\n        }),\n        loadedAt:new Date().toISOString()\n      };\n    }\n\n    if(KEY==='personal'){\n      var todayIndex=(new Date().getDay()+6)%7;\n      var scoreEl=document.getElementById('scoreTotal');\n      var moodEl=document.querySelector('.mood-chip.on,.mood-chip.active,.selected.mood-chip');\n      actual={\n        selectedDayIndex:todayIndex,\n        scope:scope,\n        score:scoreEl?short(scoreEl.textContent,20):'',\n        habits:(typeof habits!=='undefined'?safeArr(habits):[]).slice(0,12).map(function(h){\n          return {name:short(h.name||'',40),today:!!safeArr(h.checks)[todayIndex],weeklyDone:safeArr(h.checks).filter(Boolean).length}\n        }),\n        inputs:Array.prototype.slice.call(document.querySelectorAll('input,textarea,select')).slice(0,20).map(function(el){\n          return {id:el.id||'',name:el.name||'',value:short(el.value||el.textContent||'',60)}\n        }).filter(function(x){return x.value}),\n        mood:moodEl?short(moodEl.textContent,30):'',\n        loadedAt:new Date().toISOString()\n      };\n    }\n  }catch(e){\n    actual.error=String(e);\n  }\n\n  return {\n    tab:KEY,\n    kind:kind||'insight',\n    scope:scope||'weekly',\n    base:base,\n    actual:actual,\n    ui:{\n      headline:heroT?short(heroT.textContent,80):'',\n      lead:heroL?short(heroL.textContent,160):''\n    },\n    feedback:fb||'',\n    recentFeedback:lsGet(FB_KEY,[]).slice(0,8)\n  };\n}\n\nfunction genLocal(kind,type,fb){\n  var f=getFacts(type),m=fbMods(fb),out;\n  out=KEY==='calendar'?calNarrative(f):KEY==='work'?workNarrative(f):personalNarrative(f);\n  if(m.brief){out.lead=out.lead.split('. ')[0]+'.';out.bullets=out.bullets.slice(0,2)}\n  if(fb)out.feedbackNote='피드백 반영: '+fb;\n  return out;\n}\nfunction aiGenerate(kind,type,fb){\n  if(typeof window.COS_AI==='function'){\n    return Promise.resolve(window.COS_AI({tab:KEY,kind:kind,type:type,feedback:fb||'',facts:(typeof cosActualFactsV324==='function'?cosActualFactsV324(type,kind,fb):getFacts(type))}))\n      .then(function(r){return r&&r.headline?r:genLocal(kind,type,fb)})\n      .catch(function(){return genLocal(kind,type,fb)});\n  }\n  return Promise.resolve(genLocal(kind,type,fb));\n}\n\n/* ---------- 히어로 브리프 통합 (별도 카드 없음, 히어로 제목/내용 직접 사용) ---------- */\nvar heroEl=null,heroT=null,heroL=null,curHeadline='',curLead='';\nfunction setupHeroBrief(){\n  heroEl=document.querySelector(KEY==='calendar'?'.cal-hero':'.hero');\n  if(!heroEl)return;\n  try{if(getComputedStyle(heroEl).position==='static')heroEl.style.position='relative'}catch(e){heroEl.style.position='relative'}\n  var btn=document.createElement('button');\n  btn.type='button';btn.className='cos-hero-ai';btn.textContent='AI';\n  btn.addEventListener('click',function(){openFeedback('insight hortLead(r.lead);\n  return r;\n}\n\nfunction renderInsight(fb){\n  aiGenerate('insight','weekly',fb).then(function(r){\n    r=cosNormalizeBriefV314(r);\n    curHeadline=r.headline;curLead=r.lead;\n    if(heroT)heroT.textContent=curHeadline;\n    if(heroL)heroL.textContent=curLead;\n    if(fb&&heroEl){heroEl.classList.remove('cos-hero-flash');void heroEl.offsetWidth;heroEl.classList.add('cos-hero-flash')}\n  });\n}\nwindow.cosRefreshTabBriefV321=function(feedback){\n  renderInsight(feedback||'');\n};\n\n/* ---------- 헤더 연동 상태줄: 브리핑 양식 ---------- */\nfunction setupSyncLine(){\n  if(KEY==='personal')return; // 개인 탭은 자체 상태줄 보유\n  var topRow=document.querySelector('.top-row');\n  if(!topRow)return;\n  var line=document.createElement('div');\n  line.className='cos-sync-line';\n  topRow.insertAdjacentElement('afterend',line);\n  var label=KEY==='calendar'?'Google Calendar':'Google Sheets';\n  function upd(){\n    var live=document.getElementById('googleLive');\n    var t=document.getElementById('googleSyncTime');\n    var time=t?String(t.textContent||'').trim():'';\n    var txt;\n    if(live&&live.classList.contains('loading'))txt=label+' 실시간 연동 중\\u2026';\n    else if(live&&live.classList.contains('fail'))txt=label+' 연동 실패 \\u00b7 상단 점을 눌러 다시 시도';\n    else if(time&&time!=='--:--'&&time!=='연동 중')txt=label+' 실시간 연동 완료 \\u00b7 '+time;\n    else txt=label+' 연동 대기 중';\n    if(line.textContent!==txt)line.textContent=txt;\n  }\n  upd();setInterval(upd,2000);\n}\n/* ---------- 브리핑 탭 연동용 데이터 미러 ---------- */\nfunction setupDataMirror(){\n  function mirror(){\n    try{\n      if(KEY==='calendar'&&typeof data!=='undefined'&&data)lsSet('cos_calendar_cache_v1',{events:data.events||{},deadlines:data.deadlines||{},at:Date.now()});\n      if(KEY==='work'&&typeof data!=='undefined'&&data)lsSet('cos_work_cache_v1',{logs:data.logs||[],at:Date.now()});\n      if(KEY==='personal'){\n        var sc=parseInt((document.getElementById('scoreTotal')||{}).textContent,10);\n        var f=personalF 뒤 버튼을 누르면 현재 데이터 기준으로 Gemini가 다시 분석합니다.\u003c/div>';\n\n  wrap.insertAdjacentElement('afterend',card);\n\n  function refreshSummary(){\n    var pill=document.getElementById('cosActualTestPill');\n    var sub=document.getElementById('cosActualTestSub');\n    if(pill)pill.textContent='실데이터';\n    if(sub)sub.textContent=cosSummarizeActualFactsV324();\n  }\n\n  document.getElementById('cosActualBriefBtn').addEventListener('click',function(){\n    refreshSummary();\n    if(typeof renderInsight==='function')renderInsight('현재 입력된 실제 데이터만 기준으로 다시 판단해줘.');\n  });\n  document.getElementById('cosActualReportWeekBtn').addEventListener('click',function(){\n    refreshSummary();\n    if(typeof makeReport==='function')makeReport('weekly','현재 입력된 실제 데이터만 기준으로 주간 리포트를 생성해줘.');\n  });\n  document.getElementById('cosActualReportMonthBtn').addEventListener('click',function(){\n    refreshSummary();\n    if(typeof makeReport==='function')makeReport('monthly','현재 입력된 실제 데이터만 기준으로 월간 리포트를 생성해줘.');\n  });\n  document.getElementById('cosActualRefreshBtn').addEventListener('click',function(){\n    refreshSummary();\n    if(typeof renderAll==='function')renderAll();\n    if(typeof window.cosRefreshUnifiedTopV323==='function')window.cosRefreshUnifiedTopV323();\n  });\n\n  refreshSummary();\n  setInterval(refreshSummary,6000);\n}\n\nfunction buildReportSection(){\n  var wrap=document.createElement('div');\n  wrap.id='cosReportWrap';\n  wrap.innerHTML='\u003cdiv class=\"cos-section-header\">\u003cdiv class=\"cos-section-label\">Weekly · Monthly Report\u003c/div>'+\n    '\u003cbutton type=\"button\" class=\"cos-ai-btn\" id=\"cosReportAiBtn\">AI\u003c/button>\u003c/div>'+\n    '\u003csection class=\"cos-report-card\">\u003cdiv class=\"cos-report-gen\">'+\n    '\u003cbutton type=\"button\" id=\"cosGenWeekly\">이번 주 리포트 생성\u003c/button>'+\n    '\u003cbutton type=\"button\" id=\"cosGenMonthly\" class=\"ghost\">이번 달 리포트 생성\u003c/button>\u003c/div>'+\n    '\u003cdiv class=\"cos-report-list\" id=\"cosReportList\">\u003c/div>\u003c/section>';\n  var placed=false;\n  if(KEY==='work'){\n    var legacy=document.querySelector('section.card.archive');\n    if(legacy){\n      var head=legacy.previousElementSibling;\n      if(head&&head.classList.contains('section-header'))head.style.display='none';\n      legacy.insertAdjacentElement('beforebegin',wrap);\n      legacy.style.display='none';placed=true;\n    }\n  }\n  if(KEY==='personal'){\n    var list=document.getElementById('archiveList');\n    if(list){\n      var head2=list.previousElementSibling;\n      if(head2&&head2.classList.contains('section-header'))head2.style.display='none';\n      list.insertAdjacentElement('beforebegin',wrap);\n      list.style.display='none';placed=true;\n    }\n  }\n  if(!placed){\n    var app=document.querySelector('main.app')||document.querySelector('.app');\n    if(app)app.appendChild(wrap);else document.body.appendChild(wrap);\n  }\n  document.getElementById('cosGenWeekly').addEventListener('click',function(){makeReport('weekly','')});\n  document.getElementById('cosGenMonthly').addEventListener('click',function(){makeReport('monthly','')});\n  document.getElementById('cosReportAiBtn').addEventListener('click',function(){openFeedback('reportCriteria')});\n  renderReports();\n}\nfunction makeReport(type,fb){\n  var meta=type==='monthly'?monthMeta():weekMeta();\n  aiGenerate('report',type,fb).then(function(r){\n    var f=getFacts(type),summary;\n    if(KEY==='calendar')summary='일정 '+(f.total||0)+'건 · 수익 '+(f.revCount||0)+'건 · 마감 미완 '+(f.dlOpen||0);\n    else if(KEY==='work')summary='완료율 '+(f.rate||0)+'% · Later '+(f.laterOpen||0)+'건 · '+(f.topCat||'-')+' 중심';\n    else summary='기록률 '+(f.avg||0)+'% · 앵커 '+((f.best&&f.best.name)||'-');\n    var rep={id:meta.id,domain:KEY,type:type,title:meta.title,period:meta.period,summary:summary,\n      headline:r.headline,lead:r.lead,bullets:r.bullets,actions:r.actions,\n      feedbackNote:r.feedbackNote||'',createdAt:new Date().toISOString()};\n    var idx=reports.findIndex(function(x){return x.id===rep.id});\n    if(idx>=0)reports[idx]=rep;else reports.unshift(rep);\n    reports=reports.slice(0,40);\n    lsSet(REPORT_KEY,reports);\n    renderReports();\n    openDetail(rep.id);\n    toast(fb?'피드백을 반영해 리포트를 다시 생성했습니다.':(type==='monthly'?'월간':'주간')+' 리포트를 생성했습니다.');\n  });\n}\nfunction renderReports(){\n  var list=document.getElementById('cosReportList');\n  if(!list)return;\n  if(!reports.length){\n    list.innerHTML='\u003cdiv class=\"cos-report-empty\">아직 저장된 리포트가 없습니다.\u003cbr>위 버튼으로 '+CFG.label+' 데이터 기반 주간/월간 리포트를 생성해보세요.\u003c/div>';\n    return;\n  }\n  list.innerHTML=reports.map(function(r){\n    return '\u003cbutton type=\"button\" class=\"cos-report-row\" data-id=\"'+esc(r.id)+'\">'+\n      '\u003cdiv class=\"cos-report-badge\">'+(r.type==='monthly'?'월':'주')+'\u003c/div>'+\n      '\u003cdiv class=\"cos-report-main\">\u003cb>'+esc(r.title)+'\u003c/b>\u003cspan>'+esc(r.period)+' · '+esc(r.summary)+'\u003c/span>\u003c/div>'+\n      '\u003cdiv class=\"cos-report-arrow\">›\u003c/div>\u003c/button>';\n  }).join('');\n  Array.prototype.forEach.call(list.querySelectorAll('.cos-report-row'),function(btn){\n    btn.addEventListener('click',function(){openDetail(btn.dataset.id)});\n  });\n}\n\n/* ---------- 시트(상세) + 피드백(컴팩트 모달) ---------- */\nfunction buildSheets(){\n  var bd=document.createElement('div');\n  bd.innerHTML=\n  '\u003cdiv class=\"cos-backdrop\" id=\"cosDetailBackdrop\">\u003cdiv class=\"cos-sheet\">'+\n    '\u003cdiv class=\"cos-sheet-head\">\u003cdiv>\u003cb id=\"cosDetailTitle\">\u003c/b>\u003cspan id=\"cosDetailSub\">\u003c/span>\u003c/div>'+\n    '\u003cbutton type=\"button\" class=\"cos-sheet-close\" data-close=\"cosDetailBackdrop\">×\u003c/button>\u003c/div>'+\n    '\u003cdiv class=\"cos-detail-kicker\" id=\"cosDetailKicker\">\u003c/div>'+\n    '\u003cdiv class=\"cos-detail-headline\" id=\"cosDetailHeadline\">\u003c/div>'+\n    '\u003cdiv class=\"cos-detail-lead\" id=\"cosDetailLead\">\u003c/div>'+\n    '\u003cdiv id=\"cosDetailFbNote\">\u003c/div>'+\n    '\u003cdiv class=\"cos-detail-block\">\u003cb>핵심 정리\u003c/b>\u003cul id=\"cosDetailBullets\">\u003c/ul>\u003c/div>'+\n    '\u003cdiv class=\"cos-detail-block\">\u003cb>다음 액션\u003c/b>\u003cdiv class=\"cos-detail-actions\" id=\"cosDetailActions\">\u003c/div>\u003c/div>'+\n    '\u003cdiv class=\"cos-divider\">\u003c/div>'+\n    '\u003cdiv class=\"cos-quick\" id=\"cosDetailQuick\">\u003c/div>'+\n    '\u003ctextarea class=\"cos-textarea\" id=\"cosDetailInput\" placeholder=\"예: 수익 일정 분석을 더 자세히. 다음 액션은 3개 이하로.\">\u003c/textarea>'+\n    '\u003cbutton type=\"button\" class=\"cos-primary\" id=\"cosDetailRegen\">피드백 반영해 다시 생성\u003c/button>'+\n    '\u003cbutton type=\"button\" class=\"cos-danger\" id=\"cosDetailDelete\">리포트 삭제\u003c/button>'+\n    '\u003cdiv class=\"cos-note\">실제 Gemini 연동 시에는 이 피드백을 프롬프트에 넣어 해당 리포트만 다시 생성합니다.\u003c/div>'+\n  '\u003c/div>\u003c/div>'+\n  '\u003cdiv class=\"cos-backdrop cos-center\" id=\"cosFeedbackBackdrop\">\u003cdiv class=\"cos-sheet\">'+\n    '\u003cdiv class=\"cos-sheet-head\">\u003cdiv>\u003cb id=\"cosFbTitle\">AI 피드백\u003c/b>\u003cspan id=\"cosFbSub\">\u003c/span>\u003c/div>'+\n    '\u003cbutton type=\"button\" class=\"cos-sheet-close\" data-close=\"cosFeedbackBackdrop\">×\u003c/button>\u003c/div>'+\n    '\u003cdiv class=\"cos-context\" id=\"cosFbContext\">\u003c/div>'+\n    '\u003cdiv class=\"cos-quick\" id=\"cosFbQuick\">\u003c/div>'+\n    '\u003ctextarea class=\"cos-textarea\" id=\"cosFbInput\" placeholder=\"예: 우선순위 기준을 바꿔줘.\">\u003c/textarea>'+\n    '\u003cbutton type=\"button\" class=\"cos-primary\" id=\"cosFbSave\">저장하고 다시 반영\u003c/button>'+\n    '\u003cdiv class=\"cos-note\">Gemini 연동 시 이 피드백이 분석 프롬프트에 자동 포함됩니다.\u003c/div>'+\n  '\u003c/div>\u003c/div>';\n  while(bd.firstChild)document.body.appendChild(bd.firstChild);\n  Array.prototype.forEach.call(document.querySelectorAll('.cos-sheet-close'),function(b){\n    b.addEventListener('click',function(){document.getElementById(b.dataset.close).classList.remove('open')});\n  });\n  Array.prototype.forEach.call(document.querySelectorAll('.cos-backdrop'),function(b){\n    b.addEventListener('click',function(e){if(e.target===b)b.classList.remove('open')});\n  });\n  var quicks=[['우선순위가 달라요','우선순위가 달라요. 더 중요한 항목을 먼저 분석해줘.'],\n    ['더 구체적으로','수치와 시간대 중심으로 더 구체적으로 분석해줘.'],\n    ['더 간결하게','핵심만 간결하게 정리해줘.'],\n    ['좋아요','이 분석 기준이 적절해. 다음에도 비슷한 기준으로 봐줘.']];\n  ['cosDetailQuick','cosFbQuick'].forEach(function(id){\n    var box=document.getElementById(id);\n    box.innerHTML=quicks.map(function(q){return '\u003cbutton type=\"button\" data-v=\"'+esc(q[1])+'\">'+esc(q[0])+'\u003c/button>'}).join('');\n    Array.prototype.forEach.call(box.querySelectorAll('button'),function(b){\n      b.addEventListener('click',function(){\n        document.getElementById(id==='cosDetailQuick'?'cosDetailInput':'cosFbInput').value=b.dataset.v;\n      });\n    });\n  });\n  document.getElementById('cosDetailRegen').addEventListener('click',function(){\n    var fb=document.getElementById('cosDetailInput').value.trim();\n    if(!fb){toast('피드백 내용을 입력해주세요.');return}\n    if(!currentDetailId)return;\n    var rep=reports.find(function(x){return x.id===currentDetailId});\n    if(!rep)return;\n    saveFeedback('report:'+rep.id,fb,rep.headline);\n    makeReport(rep.type,fb);\n  });\n  document.getElementById('cosDetailDelete').addEventListener('click',function(){\n    if(!currentDetailId)return;\n    reports=reports.filter(function(x){return x.id!==currentDetailId});\n    lsSet(REPORT_KEY,reports);renderReports();\n    document.getElementById('cosDetailBackdrop').classList.remove('open');\n    toast('리포트를 삭제했습니다.');\n  });\n  document.getElementById('cosFbSave').addEventListener('click',function(){\n    var fb=document.getElementById('cosFbInput').value.trim();\n    if(!fb){toast('피드백 내용을 입력해주세요.');return}\n    var ctx=document.getElementById('cosFbContext').textContent;\n    saveFeedback(currentFbTarget,fb,ctx);\n    document.getElementById('cosFeedbackBackdrop').classList.remove('open');\n    if(currentFbTarget==='insight'){renderInsight(fb);toast('피드백을 반영해 브리프를 다시 생성했습니다.')}\n    else toast('리포트 생성 기준에 반영했습니다. 다음 생성부터 적용됩니다.');\n  });\n}\nvar currentDetailId=null,currentFbTarget='insight';\nfunction openDetail(id){\n  var r=reports.find(function(x){return x.id===id});\n  if(!r)return;\n  currentDetailId=id;\n  document.getElementById('cosDetailTitle').textContent=r.title;\n  document.getElementById('cosDetailSub').textContent=r.period+' · '+CFG.label+' · '+(r.type==='monthly'?'월간 리포트':'주간 리포트');\n  document.getElementById('cosDetailKicker').textContent=(CFG.label+' '+(r.type==='monthly'?'MONTHLY':'WEEKLY')+' REPORT');\n  document.getElementById('cosDetailHeadline').textContent=r.headline;\n  document.getElementById('cosDetailLead').textContent=r.lead;\n  document.getElementById('cosDetailFbNote').innerHTML=r.feedbackNote?'\u003cdiv class=\"cos-feedback-note\">'+esc(r.feedbackNote)+'\u003c/div>':'';\n  document.getElementById('cosDetailBullets').innerHTML=(r.bullets||[]).map(function(x){return '\u003cli>'+esc(x)+'\u003c/li>'}).join('');\n  document.getElementById('cosDetailActions').innerHTML=(r.actions||[]).map(function(x,i){return '\u003cdiv>'+(i+1)+'. '+esc(x)+'\u003c/div>'}).join('');\n  document.getElementById('cosDetailInput').value='';\n  document.getElementById('cosDetailBackdrop').classList.add('open');\n}\nfunction openFeedback(target){\n  currentFbTarget=target;\n  var sub,ctx;\n  if(target==='insight'){\n    sub=CFG.brief+' 판단에 대한 피드백입니다.';\n    ctx=curHeadline||'';\n  }else{\n    sub=CFG.label+' 리포트 생성 기준 피드백입니다.';\n    var last=lsGet(FB_KEY,[])[0];\n    ctx='현재 기준: '+CFG.label+' 탭 데이터 해석 요약'+(last?' · 최근 피드백: '+last.feedback:'');\n  }\n  document.getElementById('cosFbSub').textContent=sub;\n  document.getElementById('cosFbContext').textContent=ctx;\n  document.getElementById('cosFbInput').value='';\n  document.getElementById('cosFeedbackBackdrop').classList.add('open');\n}\nfunction saveFeedback(target,fb,original){\n  var arr=lsGet(FB_KEY,[]);\n  arr.unshift({target:target,feedback:fb,original:String(original||'').slice(0,300),createdAt:new Date().toISOString()});\n  lsSet(FB_KEY,arr.slice(0,30));\n}\n\n/* ---------- 초기화 ---------- */\nsetupHeroBrief();\nbuildReportSection();\nbuildActualDataTestPanelV324();\nbuildSheets();\nsetupSyncLine();\nsetupDataMirror();\nrenderInsight('');\nsetTimeout(function(){/*v60: AI 자동호출 제거*/},1200); // Gemini client 로딩 후 재분석\nsetTimeout(function(){/*v60: AI 자동호출 제거*/},4500); // 구글 동기화 후 재분석\nsetTimeout(function(){/*v60: AI 자동호출 제거*/},8500); // 데이터 안정화 후 최종 재분석\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v37-actual-final\">\n:root{--cos-accent:#f97316;--cos-soft:rgba(249,115,22,.12);}\n\n.hero{\n  background:linear-gradient(145deg,#ea580c,#f97316) !important;\n}\n\n\n.cos-sync-line{\n  display:none !important;\n}\n\n\n/* 실제 리포트 헤더 구조: Weekly · Monthly Report 우측 AI */\n.cos-section-header{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:12px !important;\n  margin:26px 4px 12px !important;\n  min-height:30px !important;\n}\n.cos-section-label{\n  line-height:30px !important;\n}\n.cos-ai-btn{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  gap:6px !important;\n  min-width:42px !important;\n  height:30px !important;\n  padding:0 12px !important;\n  border-radius:999px !important;\n  background:#fff !important;\n  border:1px solid rgba(17,24,39,.08) !important;\n  box-shadow:0 2px 9px rgba(15,23,42,.08) !important;\n  color:#f97316 !important;\n  font-size:11px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n  cursor:pointer !important;\n  white-space:nowrap !important;\n}\n.cos-ai-btn::before{\n  content:\"\" !important;\n  width:6px !important;\n  height:6px !important;\n  border-radius:50% !important;\n  background:#f97316 !important;\n  box-shadow:0 0 0 3px rgba(249,115,22,.12) !important;\n  flex:0 0 auto !important;\n}\n\n/* 실제 브리프 히어로 AI 버튼과 제목 사이 여백 */\n.cos-hero-ai{\n  top:20px !important;\n  right:18px !important;\n  height:28px !important;\n  min-width:42px !important;\n  padding:0 12px !important;\n  border-radius:999px !important;\n  background:rgba(255,255,255,.16) !important;\n  border:1px solid rgba(255,255,255,.24) !important;\n  color:#fff !important;\n  font-size:11px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n  box-shadow:none !important;\n}\n.cos-hero-ai::before{\n  width:6px !important;\n  height:6px !important;\n  opacity:.9 !important;\n}\n.cal-hero .kicker,\n.hero .kicker{\n  display:block !important;\n  min-height:30px !important;\n  line-height:30px !important;\n  padding-right:76px !important;\n  margin-bottom:20px !important;\n}\n#calBriefTitle,\n.cal-hero .hero-title,\n.hero .hero-title{\n  margin-top:18px !important;\n  line-height:1.30 !important;\n  letter-spacing:-1px !important;\n}\n#calBriefLead,\n.cal-hero .hero-lead,\n.hero .hero-lead{\n  margin-top:14px !important;\n  line-height:1.72 !important;\n}\n\n/* 리포트/카드 내부 간격 재정리 */\n.cos-report-card{\n  border-radius:22px !important;\n  overflow:hidden !important;\n}\n.cos-report-gen{\n  padding:14px 15px !important;\n  gap:9px !important;\n}\n.cos-report-gen button{\n  min-height:40px !important;\n  line-height:1.25 !important;\n}\n.cos-report-row{\n  padding:14px 15px !important;\n  min-height:66px !important;\n  gap:12px !important;\n}\n.cos-report-title{\n  line-height:1.32 !important;\n}\n.cos-report-sub{\n  margin-top:5px !important;\n  line-height:1.42 !important;\n}\n.brief-row{\n  padding-top:14px !important;\n  padding-bottom:14px !important;\n}\n.brief-sub{\n  margin-top:5px !important;\n  line-height:1.45 !important;\n}\n.report-row,\n.archive-row{\n  padding:14px 15px !important;\n  min-height:64px !important;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v37-final-js\">\n(function(){\n  function bindActualButtons(){\n    document.querySelectorAll('.cos-ai-btn,.cos-hero-ai').forEach(btn=>{\n      if(btn.__v37Bound) return;\n      btn.__v37Bound=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(btn.id==='cosReportAiBtn' && typeof openFeedback==='function') openFeedback('reportCriteria');\n        else if(typeof openFeedback==='function') openFeedback('insight');\n        else if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n      });\n    });\n    \n    document.querySelectorAll('.cos-sync-line').forEach(el=>el.remove());\n    setInterval(()=>document.querySelectorAll('.cos-sync-line').forEach(el=>el.remove()),1200);\n\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindActualButtons);\n  else bindActualButtons();\n  setTimeout(bindActualButtons,500);\n  setTimeout(bindActualButtons,1500);\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v310-brief-header-standard\">\n/* v3.10: v8 기준, 상단 헤더만 브리핑탭 규격으로 통일 */\n.top{\n  position:sticky !important;\n  top:calc(-14px - env(safe-area-inset-top)) !important;\n  z-index:20 !important;\n  margin:calc(-14px - env(safe-area-inset-top)) -16px 16px !important;\n  padding:calc(18px + env(safe-area-inset-top)) 20px 14px !important;\n  background:rgba(245,246,249,.92) !important;\n  backdrop-filter:blur(24px) saturate(180%) !important;\n  -webkit-backdrop-filter:blur(24px) saturate(180%) !important;\n  border-bottom:1px solid rgba(17,24,39,.07) !important;\n}\n.top-row{\n  display:flex !important;\n  align-items:flex-start !important;\n  justify-content:space-between !important;\n  gap:12px !important;\n}\n.top .title{\n  font-size:17px !important;\n  font-weight:900 !important;\n  letter-spacing:-.6px !important;\n  line-height:1.2 !important;\n  color:#111827 !important;\n  margin:0 !important;\n}\n.top .title em{\n  color:#f97316 !important;\n  font-style:normal !important;\n}\n.top .caption{\n  margin-top:6px !important;\n  font-size:11px !important;\n  line-height:1.45 !important;\n  color:#8a95a8 !important;\n  font-weight:650 !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  max-width:265px !important;\n}\n.top-status{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:flex-end !important;\n  gap:8px !important;\n  white-space:nowrap !important;\n  flex:0 0 auto !important;\n  margin-top:0 !important;\n}\n.top .google-live,\n.top button.sync-dot{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  gap:4px !important;\n  height:18px !important;\n  padding:0 !important;\n  border:0 !important;\n  background:transparent !important;\n  box-shadow:none !important;\n  color:#7b8798 !important;\n  font-size:10px !important;\n  font-weight:850 !important;\n  line-height:1 !important;\n  white-space:nowrap !important;\n}\n.top .google-live i,\n.top button.sync-dot i{\n  width:5px !important;\n  height:5px !important;\n  border-radius:50% !important;\n  background:#f97316 !important;\n  flex:0 0 5px !important;\n  box-shadow:none !important;\n}\n.top .google-live span,\n.top button.sync-dot span,\n#googleSyncTime,\n#syncTime{\n  display:inline !important;\n  padding:0 !important;\n  margin:0 !important;\n  border:0 !important;\n  background:transparent !important;\n  box-shadow:none !important;\n  color:#7b8798 !important;\n  font-size:10px !important;\n  font-weight:850 !important;\n  line-height:1 !important;\n}\n.top-date-btn{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  height:28px !important;\n  min-width:auto !important;\n  padding:0 10px !important;\n  border:1px solid rgba(17,24,39,.11) !important;\n  background:#fff !important;\n  border-radius:999px !important;\n  color:#596375 !important;\n  font-size:11px !important;\n  font-weight:900 !important;\n  line-height:1 !important;\n  box-shadow:0 2px 10px rgba(15,23,42,.05) !important;\n  white-space:nowrap !important;\n}\n.sync-status,\n.sync-full-status{\n  margin-top:6px !important;\n  font-size:10.5px !important;\n  line-height:1.25 !important;\n  color:#8a95a8 !important;\n  font-weight:800 !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.sync-status .dot,\n.sync-full-status .dot{\n  background:#f97316 !important;\n}\n/* 개인 탭은 sync-full-status가 top-copy 안에 있어도 브리핑탭의 sync-status와 같은 톤으로 표시 */\n.top-copy .sync-full-status{\n  display:block !important;\n  max-width:265px !important;\n}\n/* v9에서 생긴 큰 제목 규격이 섞이지 않도록 상단 영역만 강제 고정 */\n.top .header-title,\n.top .page-title,\n.top .top-title{\n  font-size:17px !important;\n  line-height:1.2 !important;\n}\n@media(max-width:370px){\n  .top .caption,\n  .top-copy .sync-full-status{\n    font-size:10.3px !important;\n    letter-spacing:-.35px !important;\n    max-width:235px !important;\n  }\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v310-brief-header-clock\">\n(function(){\n  function updateBriefHeaderClock(){\n    const now=new Date();\n    const hh=String(now.getHours()).padStart(2,'0');\n    const mm=String(now.getMinutes()).padStart(2,'0');\n    const days=['일','월','화','수','목','금','토'];\n    const timeText=`${hh}:${mm}`;\n    const dateText=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n\n    const timeIds=['googleSyncTime','syncTime','nowTime'];\n    timeIds.forEach(id=>{\n      const el=document.getElementById(id);\n      if(el && (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n    document.querySelectorAll('.top .google-live span,.top button.sync-dot span').forEach(el=>{\n      if(el && (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n\n    const dateIds=['topDatePickerBtn','dailyDateBtn','todayPill'];\n    dateIds.forEach(id=>{\n      const el=document.getElementById(id);\n      if(el && (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n    document.querySelectorAll('.top .top-date-btn').forEach(el=>{\n      if(el && (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',updateBriefHeaderClock);\n  else updateBriefHeaderClock();\n  setInterval(updateBriefHeaderClock,30000);\n})();\n\u003c/script>\n\n\n\n\n\n\n\n\n\n\n\u003cstyle id=\"cos-v313-ai-brief-fixed-summary\">\n/* v3.13: 더보기/접기 없이 AI가 처음부터 완결형 요약으로 작성 */\n.cos-brief-more{\n  display:none !important;\n}\n.cos-brief-collapsed .cos-brief-body,\n.cos-brief-expanded .cos-brief-body{\n  display:block !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  overflow:visible !important;\n}\n\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.brief-title-main,\n.calendar-brief-title,\n.work-brief-title,\n.daily-brief-title,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.32 !important;\n}\n\n.hero-ai-text,\n#heroAiText,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-lead,\n.brief-lead,\n.calendar-brief-lead,\n.work-brief-lead,\n.daily-brief-lead,\n.cal-hero .hero-lead,\n.hero .hero-lead{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.62 !important;\n}\n\n/* 작은 설명 카드만 2줄 안전 제한 유지 */\n.brief-sub,\n.mini-desc,\n.cos-report-sub,\n.report-main span{\n  display:-webkit-box !important;\n  -webkit-line-clamp:2 !important;\n  -webkit-box-orient:vertical !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  white-space:normal !important;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v313-ai-brief-fixed-summary-js\">\n(function(){\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    tab: \"work\",\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 34,\n    bodyMaxChars: 130,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules: [\n      \"제목은 반드시 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 반드시 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표, 더보기, 접기 없이 화면에 보이는 분량 안에서 끝낸다.\",\n      \"핵심 판단을 먼저 쓰고, 부가 설명은 과감히 제외한다.\",\n      \"숫자 나열을 반복하지 말고 운영 판단과 다음 행동 중심으로 작성한다.\"\n    ]\n  });\n\n  function completeSentence(text, limit){\n    text=(text||\"\").replace(/\\s+/g,\" \").trim();\n    text=text.replace(/…|\\.\\.\\./g,\"\");\n    if(text.length\u003c=limit) return text;\n    const slice=text.slice(0,limit+1);\n    const endings=[\"습니다.\",\"입니다.\",\"하세요.\",\"됩니다.\",\"좋습니다.\",\"필요합니다.\",\"적합합니다.\",\"중요합니다.\",\"가능합니다.\",\"다.\",\"요.\",\".\"];\n    let best=-1;\n    endings.forEach(end=>{\n      const idx=slice.lastIndexOf(end);\n      if(idx>best) best=idx+end.length;\n    });\n    if(best>20) return slice.slice(0,best).trim();\n    const comma=slice.lastIndexOf(\",\");\n    if(comma>20) return slice.slice(0,comma).trim()+\"입니다.\";\n    const space=slice.lastIndexOf(\" \");\n    if(space>20) return slice.slice(0,space).trim()+\"입니다.\";\n    return slice.slice(0,limit).trim()+\"입니다.\";\n  }\n\n  function enforceFixedSummary(){\n    document.querySelectorAll(\".cos-brief-more\").forEach(btn=>btn.remove());\n    document.querySelectorAll(\".cos-brief-collapsed,.cos-brief-expanded,.cos-brief-has-more\").forEach(el=>{\n      el.classList.remove(\"cos-brief-collapsed\",\"cos-brief-expanded\",\"cos-brief-has-more\");\n    });\n\n    const titleSelectors=[\"#heroTitle\",\"#calBriefTitle\",\"#workBriefTitle\",\"#dailyBriefTitle\",\".hero-title\"];\n    const bodySelectors=[\"#heroAiText\",\"#calBriefLead\",\"#workBriefLead\",\"#dailyBriefLead\",\".hero-ai-text\",\".hero-lead\"];\n\n    const titleEl=titleSelectors.map(s=>document.querySelector(s)).find(Boolean);\n    const bodyEl=bodySelectors.map(s=>document.querySelector(s)).find(Boolean);\n\n    if(titleEl){\n      const src=titleEl.dataset.fullText || titleEl.textContent;\n      titleEl.textContent=completeSentence(src,34);\n    }\n    if(bodyEl){\n      const src=bodyEl.dataset.fullText || bodyEl.textContent;\n      bodyEl.textContent=completeSentence(src,130);\n    }\n  }\n\n  if(document.readyState===\"loading\") document.addEventListener(\"DOMContentLoaded\",enforceFixedSummary);\n  else enforceFixedSummary();\n  setTimeout(enforceFixedSummary,500);\n  setTimeout(enforceFixedSummary,1500);\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v314-brief-title-body-fix\">\n/* v3.14: 브리프 제목 2줄 이내, 본문 4줄 이내를 실제 문장 길이로 해결 */\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.32 !important;\n  max-height:none !important;\n}\n\n.hero-lead,\n#heroLead,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-ai-text,\n#heroAiText{\n  display:block !important;\n  min-height:auto !important;\n  margin-top:10px !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.62 !important;\n  max-height:none !important;\n}\n\n/* 개인 탭 본문이 없어서 생기던 빈 줄 방지 */\n#dailyBriefLead:empty,\n#heroLead:empty,\n#calBriefLead:empty{\n  display:none !important;\n}\n\n/* 브리프와 지표 영역 간격 */\n.hero-lead + .condition-panel,\n.hero-lead + .stat-grid,\n#calBriefLead + .status-box{\n  margin-top:14px !important;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v314-brief-title-body-fix-js\">\n(function(){\n  const DEFAULT_TITLE=\"부산 라이콘 제안서가 최우선입니다.\";\n  const DEFAULT_BODY=\"KRP 업무 비중이 높고 완료율은 중간 수준입니다. 새 업무를 늘리기보다 제안서 정리와 Later Check 처리에 집중하세요.\";\n\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 24,\n    bodyMaxChars: 118,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules:[\n      \"제목은 24자 안팎, 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 118자 안팎, 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표로 끝내지 않는다.\",\n      \"내용이 길면 가장 중요한 판단과 다음 행동만 남긴다.\"\n    ]\n  });\n\n  function clean(s){return String(s||'').replace(/…|\\.\\.\\./g,'').replace(/\\s+/g,' ').trim();}\n  function finish(s){s=clean(s);return /[.!?。요다]$/.test(s)?s:s+'입니다.';}\n\n  function fixBrief(){\n    const hero=document.querySelector('.cal-hero,.hero');\n    if(!hero) return;\n\n    let title=document.getElementById('calBriefTitle')||document.getElementById('heroTitle')||hero.querySelector('.hero-title');\n    let body=document.getElementById('calBriefLead')||document.getElementById('heroLead')||document.getElementById('dailyBriefLead')||hero.querySelector('.hero-lead')||document.getElementById('heroAiText');\n\n    if(title){\n      const raw=clean(title.textContent);\n      if(!raw || raw.length>24) title.textContent=DEFAULT_TITLE;\n    }\n\n    if(!body){\n      body=document.createElement('div');\n      body.className='hero-lead';\n      body.id='dailyBriefLead';\n      if(title) title.insertAdjacentElement('afterend',body);\n      else hero.insertBefore(body,hero.firstChild);\n    }\n    const bodyRaw=clean(body.textContent);\n    if(!bodyRaw || bodyRaw.length>118) body.textContent=DEFAULT_BODY;\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',fixBrief);\n  else fixBrief();\n  setTimeout(fixBrief,300);\n  setTimeout(fixBrief,900);\n  setTimeout(fixBrief,1800);\n})();\n\u003c/script>\n\n\n\u003cscript id=\"cos-v315-gemini-client\">\n(function(){\n  const COS_GEMINI_API_URL = \"https://script.google.com/macros/s/AKfycbwxcBEmw_ovexvfAn3mTDyKXcW5X1XACbOF0QA2zRMxwSwIvLKjHJBDmnHkS8eM0ucd/exec\";\n  window.COS_GEMINI_API_URL = window.COS_GEMINI_API_URL || COS_GEMINI_API_URL;\n\n  function isGeminiConfigured(){\n    return window.COS_GEMINI_API_URL && !String(window.COS_GEMINI_API_URL).includes('PASTE_');\n  }\n\n  function geminiJsonp(payload){\n    return new Promise(function(resolve,reject){\n      if(!isGeminiConfigured()) return reject(new Error('Gemini Apps Script URL 미설정'));\n      const cb='cosGeminiCb_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n      const script=document.createElement('script');\n      const sep=window.COS_GEMINI_API_URL.indexOf('?')>=0?'&':'?';\n      window[cb]=function(res){\n        try{delete window[cb];}catch(e){window[cb]=undefined;}\n        script.remove();\n        if(!res || res.ok===false) reject(new Error((res&&res.error)||'Gemini 응답 오류'));\n        else resolve(res.data||res);\n      };\n      script.onerror=function(){\n        try{delete window[cb];}catch(e){window[cb]=undefined;}\n        script.remove();\n        reject(new Error('Gemini Apps Script 호출 실패'));\n      };\n      script.src=window.COS_GEMINI_API_URL+sep+'action=gemini&callback='+encodeURIComponent(cb)+'&payload='+encodeURIComponent(JSON.stringify(payload));\n      document.head.appendChild(script);\n      setTimeout(function(){\n        if(window[cb]){\n          try{delete window[cb];}catch(e){window[cb]=undefined;}\n          script.remove();\n          reject(new Error('Gemini 응답 시간 초과'));\n        }\n      },18000);\n    });\n  }\n\n  window.COS_AI=function(payload){\n    payload=payload||{};\n    return geminiJsonp({\n      tab: payload.tab || \"work\",\n      kind: payload.kind || 'insight',\n      type: pay .laterChecks) ? data.laterChecks : []));\n    const datedLogs = logs.some(function(log){ return logDate(log) === iso; });\n    const datedLater = later.some(function(x){ return x.created === iso && !x.done; });\n    if(datedLogs || datedLater) return true;\n    return oldHasWorkRecord ? oldHasWorkRecord(iso) : false;\n  };\n\n  window.renderHero = renderHero = function(){\n    const arr = logsForSelectedDate();\n    const total = arr.reduce(function(a,l){ return a + Number(l.minutes || 0); }, 0);\n    const done = arr.filter(function(l){ return !!l.done; }).length;\n    const remain = arr.filter(function(l){ return !l.done; }).length;\n    const later = (typeof laterItems === 'function' ? laterItems() : (data.laterChecks || [])).filter(function(x){ return !x.done; }).length;\n    const label = selectedLabel();\n\n    const title = byId('heroTitle');\n    const lead = byId('heroLead');\n    if(title){\n      title.textContent = total\n        ? label + '은 총 ' + fmtMin(total) + ' 업무를 기록했습니다.'\n        : label + ' 기록된 업무 시간이 없습니다.';\n    }\n    if(lead){\n      lead.textContent = total\n        ? '선택한 날짜 기준으로 업무 시간을 정리했습니다. 남은 업무는 완료 여부만 확인하세요.'\n        : '선택한 날짜에 기록된 업무가 없습니다. 해당 날짜의 업무를 추가하면 흐름이 분리됩니다.';\n    }\n    if(byId('statTotal')) byId('statTotal').textContent = fmtMin(total).replace(' ','');\n    if(byId('statDone')) byId('statDone').textContent = done + '건';\n    if(byId('statLogMiss')) byId('statLogMiss').textContent = remain + '건';\n    if(byId('statMoney')) byId('statMoney').textContent = later + '건';\n  };\n\n  window.renderLogs = renderLogs = function(){\n    const arr = logsForSelectedDate();\n    const logCount = byId('logCount');\n    const logList = byId('logList');\n    const logCard = byId('logCard');\n    const logEditBtn = byId('logEditBtn');\n    const headTitle = logCard ? logCard.querySelector('.head-title') : null;\n    const label = selectedLabel();\n\n    if(headTitle) headTitle.textContent = label + ' 업무 일지';\n    if(logCount) logCount.textContent = arr.length + '건';\n    if(!logList) return;\n\n    logList.innerHTML = arr.map(function(l){\n      const real = data.logs.indexOf(l);\n      const cat = ['KRP','WSW','PWR','CDE'].includes(l.cat) ? l.cat : 'KRP';\n\n      if(logEdit){\n        return '\u003cdiv class=\"log-row\" draggable=\"true\" ondragstart=\"dragLog(event,'+real+')\" ondragend=\"event.currentTarget.classList.remove(&quot;dragging&quot;)\" ondragover=\"event.preventDefault()\" ondrop=\"dropLog(event,'+real+')\">'+\n          '\u003cbutton class=\"check '+(l.done?'on':'')+'\" onclick=\"data.logs['+real+'].done=!data.logs['+real+'].done;save();renderAll()\">✓\u003c/button>'+\n          '\u003cdiv class=\"log-main\">'+\n            '\u003cinput class=\"log-title-input\" value=\"'+esc(l.title)+'\" onchange=\"data.logs['+real+'].title=this.value;save()\">'+\n            '\u003cdiv class=\"log-edit-sub\">'+\n              '\u003cinput value=\"'+esc(l.start||'')+'\" placeholder=\"시작\" onchange=\"updateLogTime('+real+',&quot;start&quot;,this.value)\">'+\n              '\u003cinput value=\"'+esc(l.end||'')+'\" placeholder=\"종료\" onchange=\"updateLogTime('+real+',&quot;end&quot;,this.value)\">'+\n              '\u003cinput type=\"number\" value=\"'+(Number(l.minutes)||calcMinutes(l.start,l.end)||0)+'\" placeholder=\"분 자동\" readonly>'+\n              '\u003cselect onchange=\"data.logs['+real+'].cat=this.value;save();renderAll()\">'+\n                '\u003coption '+(cat==='KRP'?'selected':'')+'>KRP\u003c/option>'+\n                '\u003coption '+(cat==='WSW'?'selected':'')+'>WSW\u003c/option>'+\n                '\u003coption '+(cat==='PWR'?'selected':'')+'>PWR\u003c/option>'+\n                '\u003coption '+(cat==='CDE'?'selected':'')+'>CDE\u003c/option>'+\n              '\u003c/select>'+\n            '\u003c/div>'+\n          '\u003c/div>'+\n          '\u003cdiv class=\"drag-handle\">↕\u003c/div>'+\n          '\u003cbutton class=\"row-del\" onclick=\"data.logs.splice('+real+',1);save();renderA >\n      \u003cbutton type=\"button\" class=\"cos-top-date-close\" id=\"cosTopDateClose\">닫기\u003c/button>\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\n\u003cscript id=\"cos-v323-unified-top-controls-js\">\n(function(){\n  const TAB = \"work\";\n  const DAY_NAMES = ['일','월','화','수','목','금','토'];\n  let viewDate = new Date();\n\n  function pad(n){ return String(n).padStart(2,'0'); }\n  function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }\n  function fromISO(iso){ return new Date(String(iso).slice(0,10)+'T00:00:00'); }\n  function labelDate(d){ return (d.getMonth()+1)+'.'+d.getDate()+' '+DAY_NAMES[d.getDay()]; }\n  function qs(s){ return document.querySelector(s); }\n  function qsa(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }\n\n  function getTopDateButton(){\n    return qs('.top .top-date-btn') || qs('#topDatePickerBtn') || qs('#dailyDateBtn');\n  }\n\n  function getSyncButton(){\n    return qs('.top button.google-live') || qs('.top button.sync-dot') || qs('.top #googleLive') || qs('.top #syncStatus');\n  }\n\n  function getStatusLine(){\n    return qs('.top .sync-status') || qs('#syncFullStatus') || qs('.cos-sync-line') || qs('.status-line');\n  }\n\n  function getTimeSpan(){\n    return qs('#googleSyncTime') || qs('#syncTime') || qs('.top .google-live span') || qs('.top button.sync-dot span');\n  }\n\n  function currentSelectedDate(){\n    try{\n      if(TAB==='calendar' && typeof dateFor==='function' && typeof cur!=='undefined') return dateFor(cur);\n      if(TAB==='work' && typeof currentDateISO!=='undefined') return fromISO(currentDateISO);\n      if(TAB==='personal' && typeof dateForDay==='function' && typeof cur!=='undefined') return dateForDay(cur);\n      const stored = localStorage.getItem('brief_selected_date_v323');\n      if(TAB==='brief' && stored) return fromISO(stored);\n    }catch(e){}\n    const btn=getTopDateButton();\n    if(btn){\n      const m=String(btn.textContent||'').match(/(\\d{1,2})\\.(\\d{1,2})/);\n      if(m){\n        const now=new Date();\n        return new Date(now.getFullYear(), Number(m[1])-1, Number(m[2]));\n      }\n    }\n    return new Date();\n  }\n\n  function setTopDateText(d){\n    const btn=getTopDateButton();\n    if(btn) btn.textContent=labelDate(d);\n  }\n\n  function setTopSyncState(state, message){\n    const live=getSyncButton();\n    const time=getTimeSpan();\n    const line=getStatusLine();\n    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});\n    if(live){\n      live.classList.remove('cos-loading','loading','fail','synced','idle');\n      if(state==='loading') live.classList.add('cos-loading','loading');\n      else if(state==='fail') live.classList.add('fail');\n      else live.classList.add('synced');\n    }\n    if(time) time.textContent = state==='loading' ? '연동 중' : now;\n    if(line){\n      line.style.display='block';\n      if(state==='loading') line.textContent = message || 'Google / Gemini 실시간 연동 중...';\n      else if(state==='fail') line.textContent = message || 'Google / Gemini 연동 오류 · 다시 시도하세요.';\n      else line.textContent = message || 'Google / Gemini 실시간 연동 완료 · ' + now;\n    }\n  }\n\n  async function maybeCall(name){\n    try{\n      const fn = window[name];\n      if(typeof fn === 'function') return await Promise.resolve(fn());\n    }catch(e){\n      console.warn(name, e);\n      throw e;\n    }\n    return null;\n  }\n\n  async function refreshTop(){\n    setTopSyncState('loading');\n    try{\n      if(TAB==='brief'){\n        await maybeCall('refreshGeminiBrief');\n      }else if(TAB==='calendar'){\n        await maybeCall('loadGoogleCalendar');\n        await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='work'){\n        if(typeof loadWorkDataFromSheets==='function') await maybeCall('loadWorkDataFromSheets');\n        if(typeof loadGoogleTasks==='function') await maybeCall('loadGoogleTasks');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='personal'){\n        if(typeof saveThenReloadGoogle==='function') await maybeCall('saveThenReloadGoogle');\n        else if(typeof checkGoogleHealth==='function') await maybeCall('checkGoogleHealth');\n        if(typeof loadChecklistFromGoogle==='function') await maybeCall('loadChecklistFromGoogle');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }\n      setTopSyncState('synced');\n    }catch(e){\n      console.warn(e);\n      setTopSyncState('fail');\n    }\n  }\n\n  function openTopDate(){\n    const d=currentSelectedDate();\n    viewDate=new Date(d.getFullYear(), d.getMonth(), 1);\n    renderTopDate();\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.add('open');\n      bd.setAttribute('aria-hidden','false');\n    }\n  }\n\n  function closeTopDate(){\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.remove('open');\n      bd.setAttribute('aria-hidden','true');\n    }\n  }\n\n  function renderTopDate(){\n    const title=qs('#cosTopDateTitle');\n    const grid=qs('#cosTopDateGrid');\n    if(!title || !grid) return;\n    const y=viewDate.getFullYear();\n    const m=viewDate.getMonth();\n    title.textContent=y+'. '+(m+1);\n\n    const first=new Date(y,m,1);\n    const start=new Date(first);\n    start.setDate(first.getDate()-first.getDay());\n\n    const selectedISO=toISO(currentSelectedDate());\n    const todayISO=toISO(new Date());\n    let html='';\n    for(let i=0;i\u003c42;i++){\n      const d=new Date(start);\n      d.setDate(start.getDate()+i);\n      const iso=toISO(d);\n      const cls=['cos-top-date-day'];\n      if(d.getMonth()!==m) cls.push('muted');\n      if(iso===todayISO) cls.push('today');\n      if(iso===selectedISO) cls.push('selected');\n      html+='\u003cbutton type=\"button\" class=\"'+cls.join(' ')+'\" data-cos-date=\"'+iso+'\">'+d.getDate()+'\u003c/button>';\n    }\n    grid.innerHTML=html;\n    qsa('[data-cos-date]').forEach(function(btn){\n      btn.onclick=function(){ applyTopDate(btn.dataset.cosDate); };\n    });\n  }\n\n  function applyTopDate(iso){\n    const d=fromISO(iso);\n    setTopDateText(d);\n\n    try{\n      if(TAB==='calendar' && typeof setWeekByDate==='function'){\n        setWeekByDate(iso);\n      }else if(TAB==='work'){\n        if(typeof setCurrentDate==='function') setCurrentDate(iso);\n        else window.currentDateISO = iso;\n        if(typeof renderAll==='function') renderAll();\n      }else if(TAB==='personal'){\n        if(typeof selectDailyDate==='function') selectDailyDate(d);\n        else if(typeof renderAll==='function') renderAll();\n      }else{\n        localStorage.setItem('brief_selected_date_v323', iso);\n        if(typeof refreshGeminiBrief==='function') refreshGeminiBrief();\n      }\n    }catch(e){\n      console.warn(e);\n    }\n\n    closeTopDate();\n    setTimeout(function(){\n      if(TAB!=='brief') refreshTop();\n    }, 350);\n  }\n\n  function bindTopControls(){\n    const syncBtn=getSyncButton();\n    if(syncBtn && !syncBtn.__cosV323Bound){\n      syncBtn.__cosV323Bound=true;\n      syncBtn.onclick=null;\n      syncBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        refreshTop();\n      }, true);\n    }\n\n    const dateBtn=getTopDateButton();\n    if(dateBtn && !dateBtn.__cosV323Bound){\n      dateBtn.__cosV323Bound=true;\n      dateBtn.onclick=null;\n      dateBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        openTopDate();\n      }, true);\n    }\n\n    const prev=qs('#cosTopDatePrev');\n    const next=qs('#cosTopDateNext');\n    const today=qs('#cosTopDateToday');\n    const close=qs('#cosTopDateClose');\n    const bd=qs('#cosTopDateBackdrop');\n\n    if(prev && !prev.__cosV323Bound){\n      prev.__cosV323Bound=true;\n      prev.onclick=function(){ viewDate.setMonth(viewDate.getMonth()-1); renderTopDate(); };\n    }\n    if(next && !next.__cosV323Bound){\n      next.__cosV323Bound=true;\n      next.onclick=function(){ viewDate.setMonth(viewDate.getMonth()+1); renderTopDate(); };\n    }\n    if(today && !today.__cosV323Bound){\n      today.__cosV323Bound=true;\n      today.onclick=function(){ applyTopDate(toISO(new Date())); };\n    }\n    if(close && !close.__cosV323Bound){\n      close.__cosV323Bound=true;\n      close.onclick=closeTopDate;\n    }\n    if(bd && !bd.__cosV323Bound){\n      bd.__cosV323Bound=true;\n      bd.addEventListener('click', function(e){\n        if(e.target===bd) closeTopDate();\n      });\n    }\n\n    setTopDateText(currentSelectedDate());\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindTopControls);\n  else bindTopControls();\n\n  setTimeout(bindTopControls, 500);\n  setTimeout(bindTopControls, 1600);\n  setTimeout(bindTopControls, 3200);\n\n  window.cosOpenUnifiedTopDateV323=openTopDate;\n  window.cosRefreshUnifiedTopV323=refreshTop;\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v324-gemini-actual-test-style\">\n.cos-actual-test-card{\n  margin-top:12px;\n  padding:13px;\n  border-radius:18px;\n  background:#fff;\n  border:1px solid rgba(17,24,39,.06);\n  box-shadow:0 7px 22px rgba(15,23,42,.05);\n}\n.cos-actual-test-head{\n  display:flex;\n  align-items:flex-start;\n  justify-content:space-between;\n  gap:10px;\n}\n.cos-actual-test-title{\n  font-size:12px;\n  line-height:1.3;\n  font-weight:950;\n  letter-spacing:-.25px;\n  color:#111827;\n}\n.cos-actual-test-sub{\n  margin-top:4px;\n  font-size:10.5px;\n  line-height:1.45;\n  font-weight:750;\n  color:#8a95a8;\n}\n.cos-actual-test-pill{\n  flex:0 0 auto;\n  height:23px;\n  padding:0 8px;\n  border-radius:999px;\n  display:inline-flex;\n  align-items:center;\n  justify-content:center;\n  font-size:9.5px;\n  font-weight:950;\n  color:var(--cos-accent,#3d7eff);\n  background:var(--cos-soft,rgba(61,126,255,.12));\n}\n.cos-actual-test-actions{\n  margin-top:10px;\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:8px;\n}\n.cos-actual-test-actions button{\n  min-height:36px;\n  border:0;\n  border-radius:12px;\n  background:#f7f8fb;\n  color:#596375;\n  font-size:11px;\n  line-height:1.25;\n  font-weight:950;\n}\n.cos-actual-test-actions button.primary{\n  background:var(--cos-accent,#3d7eff);\n  color:#fff;\n}\n.cos-actual-test-foot{\n  margin-top:9px;\n  padding-top:9px;\n  border-top:1px solid rgba(17,24,39,.06);\n  font-size:10px;\n  line-height:1.45;\n  font-weight:750;\n  color:#9aa4b4;\n}\n\u003c/style>\n\n\u003c/body>\n\u003c/html>",
  personal: "\u003c!DOCTYPE html>\n\u003chtml lang=\"ko\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\"/>\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\"/>\n\u003ctitle>최동은 대표님 데일리 리포트\u003c/title>\n\u003cstyle>\n:root{\n  --bg:#f5f6f9;--text:#111827;--muted:#8a95a8;--line:rgba(17,24,39,.07);--line2:rgba(17,24,39,.11);\n  --purple:#7c3aed;--purple2:rgba(124,58,237,.10);--green:#10b981;--red:#ef4444;--blue:#60a5fa;\n  --shadow:0 2px 10px rgba(15,23,42,.05);--font:-apple-system,BlinkMacSystemFont,\"Pretendard\",\"Apple SD Gothic Neo\",system-ui,sans-serif;\n}\n*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#e9ecf3;color:var(--text);font-family:var(--font)}button,input,select,textarea{font-family:var(--font)}button{border:0;background:transparent;cursor:pointer;color:inherit}input,select,textarea{outline:none}\n.app{width:100%;max-width:430px;min-height:100dvh;margin:0 auto;background:var(--bg);padding:calc(14px + env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom));overflow-x:hidden}\n.top{position:sticky;top:0;z-index:5;margin:-14px -16px 16px;padding:calc(18px + env(safe-area-inset-top)) 20px 12px;background:rgba(245,246,249,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}\n.top-row{display:flex;justify-content:space-between;gap:10px;align-items:center}.title{font-size:17px;font-weight:950;letter-spacing:-.55px}.title em{font-style:normal;color:var(--purple)}.date-chip{font-size:11px;font-weight:850;color:#596375;background:#fff;border:1px solid var(--line2);border-radius:999px;padding:6px 11px;white-space:nowrap}.caption{margin-top:6px;font-size:11px;line-height:1.45;color:var(--muted);font-weight:650}\n.bio-week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin:12px 0 14px}.bio-day{background:#fff;border:1px solid var(--line);border-radius:15px;padding:10px 2px;text-align:center;box-shadow:var(--shadow)}.bio-day.on{border-c
