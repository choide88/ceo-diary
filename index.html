'<\/style>',
'<script id="cos-v63-sync-unify-js">',
'(function(){',
'  "use strict";',
'  var DAYS=["일","월","화","수","목","금","토"];',
'  function hhmm(){var d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}',
'',
'  /* 점 버튼 요소: 클래스 기준(.google-live / .sync-dot). id는 탭마다 의미가 달라 쓰지 않음 */',
'  function dotEl(){ return document.querySelector(".top .google-live, .top .sync-dot, #googleLive"); }',
'  /* 상태줄: div 형태만. 점 버튼(button#syncStatus)은 제외 */',
'  function lineEls(){',
'    var out=[];',
'    var ss=document.getElementById("syncStatus");',
'    if(ss && ss.tagName!=="BUTTON" && (ss.classList.contains("sync-status")||ss.tagName==="DIV")) out.push(ss);',
'    var fs=document.getElementById("syncFullStatus");',
'    if(fs) out.push(fs);',
'    Array.prototype.forEach.call(document.querySelectorAll("div.sync-status,div.sync-full-status,div.cos-sync-line"),function(el){',
'      if(out.indexOf(el)<0 && el.tagName!=="BUTTON") out.push(el);',
'    });',
'    return out;',
'  }',
'',
'  function stateOf(){',
'    var d=dotEl();',
'    if(!d) return "synced";',
'    if(d.classList.contains("fail")) return "fail";',
'    if(d.classList.contains("loading")||d.classList.contains("cos-loading")) return "loading";',
'    return "synced";',
'  }',
'',
'  function apply(){',
'    var st=stateOf();',
'    /* 점 옆 시간 표시 유지: 비어있거나 --:-- 이면 현재 시각 채움 */',
'    var d=dotEl();',
'    if(d){',
'      var span=d.querySelector("span")||document.getElementById("googleSyncTime")||document.getElementById("syncTime");',
'      if(span){',
'        var t=String(span.textContent||"").trim();',
'        if(st==="loading"){ /* 로딩 중 표기는 건드리지 않음 */ }',
'        else if(!t || t==="--:--" || /연동|중/.test(t)){ span.textContent=hhmm(); }',
'      }',
'    }',
'    /* 상태줄: 평소 숨김(인라인으로 확실히), 실패일 때만 빨강 문구 노출 */',
'    var lines=lineEls();',
'    Array.prototype.forEach.call(lines,function(el){',
'      if(!el) return;',
'      if(st==="fail"){',
'        el.classList.add("cos-fail");',

'      }else{',
'        el.classList.remove("cos-fail");',
'        el.style.display="none";',
'      }',
'    });',
'  }',
'',
'  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",apply);',
'  else apply();',
'  setInterval(apply,2000);',
'})();',
'<\/script>',
'<style id="cos-v68-personal-clean">',
'/* v6.8: 개인탭 점수 링·막대만 숨김(상단 칩 metric-grid는 유지) */',
'.condition-body{display:none !important;}',
'<\/style>',
'<script id="cos-v68-personal-clean-js">',
'(function(){',
'  "use strict";',
'  if((window.COS_TAB_KEY||"")!=="personal") return;',
'',
'  var CACHE_KEY="cos_personal_lead_v68";',
'',
'  function heroLeadEl(){',
'    return document.getElementById("dailyBriefLead")',
'      || document.getElementById("heroLead")',
'      || document.querySelector(".hero-lead");',
'  }',
'',
'  /* AI 응답(lead+reasons+actions)을 하나의 자연스러운 해석 문단으로 합침 */',
'  function composeLead(r){',
'    if(!r) return "";',
'    var parts=[];',
'    if(r.lead && String(r.lead).trim()) parts.push(String(r.lead).trim());',
'',
'    var reasons=r.reasons||{};',
'    var labels={sleep:"수면",energy:"에너지",meal:"식단",activity:"활동"};',
'    ["sleep","energy","meal","activity"].forEach(function(k){',
'      var v=reasons[k];',
'      if(v && String(v).trim()) parts.push(String(v).trim());',
'    });',
'',
'    if(Array.isArray(r.actions)){',
'      r.actions.forEach(function(a){ if(a && String(a).trim()) parts.push(String(a).trim()); });',
'    }',
'    return parts.join(" ");',
'  }',
'',
'  var curLead="";',
'  function applyLead(text){',
'    if(!text) return;',
'    curLead=text;',
'    var el=heroLeadEl();',
'    if(el && el.textContent!==text) el.textContent=text;',
'    try{ localStorage.setItem(CACHE_KEY, JSON.stringify({lead:text, headline:(document.querySelector(".hero-title,#dailyBriefTitle,#heroTitle")||{}).textContent||"", at:Date.now()})); }catch(e){}',
'  }',
'',
'  /* 다른 스크립트가 lead를 짧은 기본문구로 덮어써도 AI 해석 유지 */',
'  function guardLead(){',
'    var el=heroLeadEl();',
'    if(!el || typeof MutationObserver==="undefined") return;',
'    new MutationObserver(function(){',
'      if(curLead && el.textContent!==curLead) el.textContent=curLead;',
'    }).observe(el,{childList:true,characterData:true,subtree:true});',
'  }',
'',
'  function showCached(){',
'    try{',
'      var c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null");',
'      if(c && c.lead) applyLead(c.lead);',
'    }catch(e){}',
'  }',
'',
'  /* COS_AI 응답을 가로채 히어로 본문에 풍부한 해석 반영 */',
'  function wrap(){',
'    if(typeof window.COS_AI!=="function") return false;',
'    if(window.__cosLeadWrapped) return true;',
'    window.__cosLeadWrapped=true;',
'    var orig=window.COS_AI;',
'    window.COS_AI=function(payload){',
'      return Promise.resolve(orig(payload)).then(function(r){',
'        try{ var t=composeLead(r); if(t) applyLead(t); }catch(e){}',
'        return r;',
'      });',
'    };',
'    return true;',
'  }',
'',
'  /* 결제 완료: 캐시 없으면 진입 시 1회 진짜 AI 해석 호출 */',
'  function freshOnce(){',
'    if(window.__cosLeadFreshDone) return;',
'    if(typeof window.cosRefreshTabBriefV321!=="function") return;',
'    var hasCache=false;',
'    try{ hasCache=!!JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); }catch(e){}',
'    window.__cosLeadFreshDone=true;',
'    if(hasCache) return;',
'    window.__cosForceFresh=true;',
'    try{ window.cosRefreshTabBriefV321(""); }catch(e){}',
'  }',
'',
'  function boot(){',
'    guardLead();',
'    showCached();',
'    wrap();',
'  }',
'  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot);',
'  else boot();',
'  setTimeout(boot,700);',
'  setTimeout(wrap,1600);',
'})();',
'<\/script>'
].join('\n');

function mount(tab){
  var pane=document.getElementById("pane-"+tab);
  if(!pane||pane.dataset.mounted)return;
  pane.dataset.mounted="1";
  var f=document.createElement("iframe");
  f.title=tab;
  f.addEventListener("load",function(){
    var l=pane.querySelector(".pane-loading");
    if(l){l.classList.add("off");setTimeout(function(){l.remove();},300);}
  });
  f.srcdoc=SOURCES[tab]+COS_V325_PATCH;
  pane.appendChild(f);
}

function show(tab){
  if(TAB_KEYS.indexOf(tab)<0)tab="brief";
  mount(tab);
  TAB_KEYS.forEach(function(k){
    document.getElementById("pane-"+k).classList.toggle("on",k===tab);
  });
  document.querySelectorAll(".cos-tab").forEach(function(b){
    var on=b.dataset.tab===tab;
    b.classList.toggle("on",on);
    b.setAttribute("aria-selected",on?"true":"false");
  });
  try{localStorage.setItem(LAST_KEY,tab);}catch(e){}
}

document.querySelectorAll(".cos-tab").forEach(function(b){
  b.addEventListener("click",function(){show(b.dataset.tab);});
});

var start="brief";
try{var s=localStorage.getItem(LAST_KEY);if(s&&TAB_KEYS.indexOf(s)>=0)start=s;}catch(e){}
show(start);

var delay=1500;
TAB_KEYS.forEach(function(k){
  if(k===start)return;
  setTimeout(function(){mount(k);},delay);
  delay+=1500;
});
})();
</script>
