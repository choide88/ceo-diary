work-hero-head,.daily-hero-head{display:flex !important;align-items:center !important;justify-content:space-between !important;gap:14px !important;margin-bottom:18px !important;}\n.hero .kicker,.brief-kicker,.hero-kicker{line-height:24px !important;}\n.hero-title,.brief-title-main,.calendar-brief-title,.work-brief-title,.daily-brief-title{margin-top:14px !important;line-height:1.28 !important;}\n.hero-head + .hero-title,.brief-head + .hero-title,.hero-head + .brief-title-main{margin-top:18px !important;}\n.card,.report-card{border-radius:21px !important;}\n.report-row,.archive-row{padding:14px 15px !important;min-height:64px !important;gap:12px !important;}\n.report-main b,.archive-main b{line-height:1.32 !important;}\n.report-main span,.archive-main span{margin-top:5px !important;line-height:1.42 !important;}\n.brief-row{padding-top:14px !important;padding-bottom:14px !important;min-height:62px !important;}\n.brief-sub{margin-top:5px !important;line-height:1.45 !important;}\n\n:root{--accent:#7c3aed;}\n.report-section-header .ai-judge-btn,.report-section-header .report-ai-btn,.section-header .ai-judge-btn.small{color:#7c3aed !important;}\n\n\u003c/style>\n\n\u003clink rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css\">\n\u003cstyle id=\"cos-shell-patch\">\n:root{--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif !important}\nhtml,body{font-family:var(--font)}\n.bottom-nav{display:none !important}\n.app{padding-bottom:104px !important}\n@media(min-width:520px){\n  .app{margin:0 auto !important;border-radius:0 !important;box-shadow:none !important;min-height:100dvh !important}\n}\n\u003c/style>\n\n\u003cstyle id=\"cos-personal-fix\">\n/* COS v3.3: 연동 표시 브리핑 양식(칩 제거) */\n.google-live{background:transparent !important;border:0 !important;padding:0 !important;box-shadow:none !important;border-radius:0 !important;\n  color:#7b8798 !important;font-size:10px !important;font-weight:850 !important;gap:4px !important}\n.google-live i,.google-live .sync-dot{width:5px !important;height:5px !important;box-shadow:none !important}\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"app\">\n  \u003cdiv class=\"top daily-style-top\">\n    \u003cdiv class=\"top-row\">\n      \u003cdiv class=\"top-copy\">\n        \u003cdiv class=\"title\">최동은 대표님, \u003cem>데일리 리포트\u003c/em>\u003c/div>\n        \u003cdiv class=\"caption\">하루를 기록해야, 내일을 바꿀 수 있습니다.\u003c/div>\n        \u003cdiv class=\"sync-full-status\" id=\"syncFullStatus\">Google Sheets 실시간 연동 대기 중\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"top-status\">\n        \u003cbutton class=\"google-live\" id=\"syncStatus\" type=\"button\" title=\"누르면 Google Sheets에 데일리 기록, 점수, 체크리스트, 목표를 저장하고 다시 불러옵니다.\">\n          \u003ci class=\"sync-dot disconnected\" id=\"syncDot\">\u003c/i>\n          \u003cspan id=\"syncTime\">--:--\u003c/span>\n        \u003c/button>\n        \u003cbutton class=\"top-date-btn\" id=\"dailyDateBtn\" type=\"button\">오늘\u003c/button>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cinput type=\"date\" id=\"dailyHiddenDatePicker\" class=\"hidden-date-picker\" />\n\n  \u003cdiv class=\"bio-week\" id=\"bioWeek\">\u003c/div>\n\n  \u003csection class=\"hero\">\n    \u003cdiv class=\"kicker\">DAILY BRIEF\u003c/div>\n    \u003cdiv class=\"hero-title\">회복 중심으로 운영하는 날입니다.\u003c/div>\n    \u003cdiv class=\"hero-lead\" id=\"dailyBriefLead\">수면과 활동 기록이 부족해 회복 신호가 보입니다. 오늘은 정리형 업무와 가벼운 활동을 우선하세요.\u003c/div>\n    \u003cdiv class=\"condition-panel\">\n      \u003cdiv class=\"condition-body\">\n        \u003cdiv>\n          \u003cdiv class=\"score-ring score-normal\" id=\"scoreRing\">\u003cb id=\"scoreTotal\">72\u003c/b>\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"bar-list\">\n          \u003cdiv class=\"bar-row\">\u003cspan>수면\u003c/span>\u003cdiv class=\"bar-track\">\u003cdiv class=\"bar-fill\" id=\"barSleep\" style=\"width:65%\">\u003c/div>\u003c/div>\u003cspan id=\"scoreSleep\">65\u003c/span>\u003c/div>\n          \u003cdiv class=\"bar-row\">\u003cspan>에너지\u003c/span>\u003cdiv class=\"bar-track\">\u003cdiv class=\"bar-fill\" id=\"barEnergy\" style=\"width:70%\">\u003c/div>\u003c/div>\u003cspan id=\"scoreEnergy\">70\u003c/span>\u003c/div>\n          \u003cdiv class=\"bar-row\">\u003cspan>식단\u003c/span>\u003cdiv class=\"bar-track\">\u003cdiv class=\"bar-fill\" id=\"barMeal\" style=\"width:74%\">\u003c/div>\u003c/div>\u003cspan id=\"scoreMeal\">74\u003c/span>\u003c/div>\n          \u003cdiv class=\"bar-row\">\u003cspan>업무\u003c/span>\u003cdiv class=\"bar-track\">\u003cdiv class=\"bar-fill\" id=\"barWork\" style=\"width:78%\">\u003c/div>\u003c/div>\u003cspan id=\"scoreWork\">78\u003c/span>\u003c/div>\n          \u003cdiv class=\"bar-row\">\u003cspan>활동\u003c/span>\u003cdiv class=\"bar-track\">\u003cdiv class=\"bar-fill\" id=\"barRecovery\" style=\"width:48%\">\u003c/div>\u003c/div>\u003cspan id=\"scoreRecovery\">48\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"metric-grid\">\n        \u003cdiv class=\"metric\">\u003cb id=\"metricSleep\">6.5h\u003c/b>\u003cspan>수면\u003c/span>\u003c/div>\n        \u003cdiv class=\"metric\">\u003cb id=\"metricEnergy\">보통\u003c/b>\u003cspan>에너지\u003c/span>\u003c/div>\n        \u003cdiv class=\"metric\">\u003cb id=\"metricMeal\">좋음\u003c/b>\u003cspan>식단영향\u003c/span>\u003c/div>\n        \u003cdiv class=\"metric\">\u003cb id=\"metricWork\">높음\u003c/b>\u003cspan>업무강도\u003c/span>\u003c/div>\n        \u003cdiv class=\"metric\">\u003cb id=\"metricRecovery\">부족\u003c/b>\u003cspan>활동\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cdiv class=\"section-header\">\u003cdiv class=\"section-label\">오늘 체크리스트\u003c/div>\u003cbutton class=\"edit-btn\" id=\"habitEditBtn\" aria-hidden=\"true\">\u003c/button>\u003c/div>\n  \u003csection class=\"card\" id=\"habitCard\">\n    \u003cdiv class=\"habit-head\">\u003cdiv class=\"habit-title\">오늘 체크리스트\u003c/div>\u003c/div>\n    \u003cdiv id=\"habitList\">\u003c/div>\n    \u003cdiv class=\"add-inline\">\u003cdiv class=\"add-grid-habit\">\u003cinput class=\"input\" id=\"newHabit\" placeholder=\"새 항목\">\u003cselect class=\"select\" id=\"newHabitType\">\u003coption value=\"memo\">메모\u003c/option>\u003coption value=\"sleep\">수면\u003c/option>\u003coption value=\"meal\">식단\u003c/option>\u003coption value=\"weight\">체중\u003c/option>\u003coption value=\"recovery\">회복\u003c/option>\u003coption value=\"drink\">음주\u003c/option>\u003coption value=\"mood\">기분\u003c/option>\u003coption value=\"diary\">일기\u003c/option>\u003c/select>\u003cbutton class=\"btn-dark\" id=\"addHabit\">추가\u003c/button>\u003c/div>\u003c/div>\n  \u003c/section>\n\u003cdiv class=\"section-header\">\u003cdiv class=\"section-label\">Archive\u003c/div>\u003cbutton class=\"section-action\">전체 보기\u003c/button>\u003c/div>\n  \u003csection id=\"archiveList\">\n    \u003cdiv class=\"archive-card\">\u003cdiv class=\"archive-top\">\u003cdiv class=\"archive-title\">6월 1주 개인 리포트\u003c/div>\u003cdiv class=\"archive-badge\">저장됨\u003c/div>\u003c/div>\u003cdiv class=\"archive-body\">수면 부족과 저녁 일정이 회복 점수에 영향을 줌. 다음 주는 취침 시간 고정이 핵심.\u003c/div>\u003c/div>\n    \u003cdiv class=\"archive-card\">\u003cdiv class=\"archive-top\">\u003cdiv class=\"archive-title\">5월 월간 리포트\u003c/div>\u003cdiv class=\"archive-badge\">월간\u003c/div>\u003c/div>\u003cdiv class=\"archive-body\">체중은 안정적. 식단 기록률은 높음. 운동과 영어 루틴은 주 2회 기준으로 재설계 필요.\u003c/div>\u003c/div>\n  \u003c/section>\n\u003c/div>\n\u003cnav class=\"bottom-nav\">\u003cbutton class=\"nav\">\u003cspan class=\"ico\">⌂\u003c/span>브리핑\u003c/button>\u003cbutton class=\"nav\">\u003cspan class=\"ico\">◷\u003c/span>캘린더\u003c/button>\u003cbutton class=\"nav\">\u003cspan class=\"ico\">▦\u003c/span>업무\u003c/button>\u003cbutton class=\"nav on\">\u003cspan class=\"ico\">✦\u003c/span>데일리\u003c/button>\u003c/nav>\n\n\u003cscript>\n(function(){\nconst $ = (s)=>document.querySelector(s);\nconst esc = (s)=>String(s??'').replace(/[&\u003c>\"]/g,(m)=>({'&':'&amp;','\u003c':'&lt;','>':'&gt;','\"':'&quot;'}[m]));\nconst storage = {\n  get(key, fallback){\n    try{\n      const raw = localStorage.getItem(key);\n      if(!raw) return fallback;\n      const val = JSON.parse(raw);\n      return Array.isArray(fallback) && !Array.isArray(val) ? fallback : val;\n    }catch(e){ return fallback; }\n  },\n  set(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }\n};\nlet openRow=null, habitEdit=false, goalEdit=false;\nconst dayNames=['월','화','수','목','금','토','일'];\nconst today=new Date();\ntoday.setHours(0,0,0,0);\nfunction mondayOf(date){\n  const d=new Date(date);\n  d.setHours(0,0,0,0);\n  const day=d.getDay();\n  const diff=day===0?-6:1-day;\n  d.setDate(d.getDate()+diff);\n  return d;\n}\nlet weekStart=mondayOf(today);\nlet cur=Math.min(6,Math.max(0,Math.round((today-weekStart)/86400000)));\nlet calendarViewDate=new Date(today);\nconst API_URL='https://script.google.com/a/macros/krypton36.co/s/AKfycbxopcudjbSbXUWeEvuSs-_75zYvHSqywzVsIEycLtBvUUh1Cty4FIjJWe5RBPysAXSzDw/exec';\nfunction dateForDay(day){\n  const d=new Date(weekStart);\n  d.setDate(weekStart.getDate()+day);\n  return d;\n}\nfunction dateKeyForDay(day){\n  const d=dateForDay(day);\n  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n}\nfunction dateKeyForCur(){\n  return dateKeyForDay(cur);\n}\nfunction calcSleepHours(bed,wake){\n  if(!bed || !wake) return '';\n  const [bh,bm]=bed.split(':').map(Number);\n  const [wh,wm]=wake.split(':').map(Number);\n  if(Number.isNaN(bh)||Number.isNaN(wh)) return '';\n  let start=bh*60+bm, end=wh*60+wm;\n  if(end\u003c=start) end+=24*60;\n  const hours=(end-start)/60;\n  return String(Math.round(hours*10)/10);\n}\nfunction timeOptions(selected){\n  let html='\u003coption value=\"\">선택\u003c/option>';\n  for(let h=0;h\u003c24;h++){\n    for(let m=0;m\u003c60;m+=10){\n      const v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');\n      html+=`\u003coption value=\"${v}\" ${selected===v?'selected':''}>${v}\u003c/option>`;\n    }\n  }\n  return html;\n}\n\nfunction buildDailyChecklist(){\n  return {\n    date:dateKeyForCur(),\n    items:habits.map((h,i)=>({\n      item_id:h.type+'_'+(i+1),\n      item_name:h.name,\n      type:h.type,\n      is_checked:!!h.checks[cur],\n      display_order:i+1\n    }))\n  };\n}\n\nasync function loadChecklistFromGoogle(){\n  try{\n    const res=await jsonp(API_URL+'?action=getDailyChecklist&date='+encodeURIComponent(dateKeyForCur()));\n    if(res && res.ok && Array.isArray(res.data) && res.data.length){\n      res.data.forEach(row=>{\n        const idx=habits.findIndex((h,i)=>(h.type+'_'+(i+1))===row.item_id || h.name===row.item_name);\n        if(idx>=0) habits[idx].checks[cur]=row.is_checked===true || String(row.is_checked).toUpperCase()==='TRUE';\n      });\n      save();\n      renderHabits();\n    }\n  }catch(e){}\n}\n\nfunction jsonp(url){\n  return new Promise((resolve,reject)=>{\n    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);\n    window[cb]=(data)=>{delete window[cb];s.remove();resolve(data)};\n    const s=document.createElement('script');\n    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;\n    s.onerror=()=>{delete window[cb];s.remove();reject(new Error('Google 연결 실패'))};\n    document.body.appendChild(s);\n  });\n}\nfunction jsonpSave(action,data){\n  return jsonp(API_URL+'?action='+encodeURIComponent(action)+'&payload='+encodeURIComponent(JSON.stringify(data)));\n}\n\nfunction postToGoogle(payload){\n  // Apps Script는 CORS 이슈가 있을 수 있어 hidden form 방식으로 저장 요청만 보냄\n  const iframeName='googleSaveFrame';\n  let iframe=document.querySelector('iframe[name=\"'+iframeName+'\"]');\n  if(!iframe){\n    iframe=document.createElement('iframe');\n    iframe.name=iframeName;\n    iframe.style.display='none';\n    document.body.appendChild(iframe);\n  }\n  const form=document.createElement('form');\n  form.method='POST';\n  form.action=API_URL;\n  form.target=iframeName;\n  form.style.display='none';\n  const input=document.createElement('input');\n  input.name='payload';\n  input.value=JSON.stringify(payload);\n  form.appendChild(input);\n  document.body.appendChild(form);\n  form.submit();\n  setTimeout(()=>form.remove(),500);\n}\nfunction getDetailByTypeForDay(type,day){\n  const i=habits.findIndex(h=>h.type===type);\n  return i>=0?(details[i+'_'+day]||{}):{};\n}\nfunction buildDailyLog(){\n  const day=cur;\n  const sleep=getDetailByTypeForDay('sleep',day);\n  const meal=getDetailByTypeForDay('meal',day);\n  const mood=getDetailByTypeForDay('mood',day);\n  const drink=getDetailByTypeForDay('drink',day);\n  const weight=getDetailByTypeForDay('weight',day);\n  const recovery=getDetailByTypeForDay('recovery',day);\n  const diary=getDetailByTypeForDay('diary',day);\n  return {\n    date:dateKeyForCur(),\n    sleep_bed_time:sleep.bed||'',\n    sleep_wake_time:sleep.wake||'',\n    sleep_hours:sleep.hours||'',\n    sleep_quality:sleep.quality||'',\n    energy:mood.energy||'',\n    mood:mood.moodState||'',\n    meal_status:meal.mood||'',\n    breakfast:meal.breakfast||'',\n    lunch:meal.lunch||'',\n    dinner:meal.dinner||'',\n    snack:meal.snack||'',\n    late_snack:meal.lateSnack?'Y':'N',\n    caffeine:meal.caffeine||'',\n    caffeine_memo:meal.caffeineMemo||'',\n    alcohol:drink.drink||'',\n    alcohol_context:drink.drinkContext||'',\n    alcohol_memo:drink.drinkMemo||'',\n    weight:weight.weight||'',\n    weight_memo:weight.memo||'',\n    activity_types:Array.isArray(recovery.types)?recovery.types.join(','):'',\n    activity_memo:recovery.memo||'',\n    diary:diary.diary||'',\n    emotion_diary:mood.emotionDiary||''\n  };\n}\nfunction collectScoreData(){\n  return {\n    date:dateKeyForCur(),\n    total_score:document.getElementById('scoreTotal')?.textContent||'',\n    sleep_score:document.getElementById('scoreSleep')?.textContent||'',\n    energy_score:document.getElementById('scoreEnergy')?.textContent||'',\n    meal_score:document.getElementById('scoreMeal')?.textContent||'',\n    work_score:document.getElementById('scoreWork')?.textContent||'',\n    activity_score:document.getElementById('scoreRecovery')?.textContent||'',\n    meal_impact:document.getElementById('metricMeal')?.textContent||'',\n    work_intensity:document.getElementById('metricWork')?.textContent||'',\n    activity_status:document.getElementById('metricRecovery')?.textContent||''\n  };\n}\nfunction buildDailyGoals(){\n  return goals.map((g,gi)=>({\n    goal_id:g.goal_id||('goal_'+(gi+1)),\n    name:g.name||'개인 목표',\n    memo:g.memo||'',\n    items:Array.isArray(g.items)?g.items:[]\n  }));\n}\nfunction syncGoalsToGoogle(){return jsonpSave('saveDailyGoals',buildDailyGoals())}\nasync function loadGoalsFromGoogle(){\n  try{\n    const res=await jsonp(API_URL+'?action=getDailyGoals');\n    if(res && res.ok && Array.isArray(res.data) && res.data.length){\n      goals=res.data;\n      normalize();\n      storage.set('p_daily_goals_logic_final_v2',goals);\n      renderGoals();\n      updateSyncStatus('connected');\n      return true;\n    }\n    updateSyncStatus('connected');\n    return false;\n  }catch(e){\n    updateSyncStatus('disconnected');\n    return false;\n  }\n}\n\n\nasync function saveThenReloadGoogle(){\n  updateSyncStatus('syncing');\n  const saved=await syncToGoogle();\n  if(saved){\n    await new Promise(r=>setTimeout(r,300));\n    await loadGoalsFromGoogle();\n  }\n}\n\nasync function syncToGoogle(){\n  updateSyncStatus('syncing');\n\n  const results = { goals:null, checklist:null, log:null, score:null };\n\n  try{ results.goals = await jsonpSave('saveDailyGoals', buildDailyGoals()); }\n  catch(e){ results.goals = {ok:false, error:String(e)}; }\n\n  try{ results.checklist = await jsonpSave('saveDailyChecklist', buildDailyChecklist()); }\n  catch(e){ results.checklist = {ok:false, error:String(e)}; }\n\n  try{ results.log = await jsonpSave('saveDailyLog', buildDailyLog()); }\n  catch(e){ results.log = {ok:false, error:String(e)}; }\n\n  try{ results.score = await jsonpSave('saveDailyScore', collectScoreData()); }\n  catch(e){ results.score = {ok:false, error:String(e)}; }\n\n  window.__lastSyncResult = results; console.log('sync result', results);\n\n  if(results.goals?.ok && results.checklist?.ok && results.log?.ok && results.score?.ok){\n    updateSyncStatus('connected');\n    return true;\n  }\n\n  const failed = [];\n  if(!results.goals?.ok) failed.push('목표');\n  if(!results.checklist?.ok) failed.push('체크');\n  if(!results.log?.ok) failed.push('기록');\n  if(!results.score?.ok) failed.push('점수');\n\n  const dot=document.getElementById('syncDot');\n  const label=document.getElementById('syncLabel');\n  const time=document.getElementById('syncTime');\n  if(dot && label && time){\n    dot.className='sync-dot error';\n    label.textContent='Google 오류 ' + failed.join('/');\n    time.textContent=timeHHMM();\n  }\n  return false;\n}\nasync function checkGoogleHealth(){\n  updateSyncStatus('syncing');\n  try{\n    await jsonp(API_URL+'?action=health');\n    updateSyncStatus('connected');\n  }catch(e){\n    const el=document.getElementById('syncStatus');\n    updateSyncStatus('disconnected');\n  }\n}\n\nfunction timeHHMM(){\n  const d=new Date();\n  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');\n}\nfunction showSaved(message='저장됐습니다'){\n  const el=document.getElementById('saveFeedback');\n  if(!el) return;\n  el.textContent=message;\n  el.classList.add('on');\n  clearTimeout(window.__saveToastTimer);\n  window.__saveToastTimer=setTimeout(()=>el.classList.remove('on'),1200);\n}\nfunction markRowSaved(i){\n  const row=document.querySelector('[data-detail=\"'+i+'\"]')?.closest('.row-wrap');\n  if(!row) return;\n  row.classList.add('just-saved');\n  clearTimeout(window.__rowSavedTimer);\n  window.__rowSavedTimer=setTimeout(()=>row.classList.remove('just-saved'),900);\n}\n\nfunction updateSyncStatus(state='connected'){\n  const dot=document.getElementById('syncDot');\n  const time=document.getElementById('syncTime');\n  const full=document.getElementById('syncFullStatus');\n  if(!dot || !time) return;\n\n  const cls = state==='syncing' ? 'syncing' : state==='error' ? 'error' : state==='disconnected' ? 'disconnected' : 'connected';\n  dot.className='sync-dot '+cls;\n  time.textContent=timeHHMM();\n\n  if(full){\n    full.className='sync-full-status '+cls;\n    if(state==='syncing') full.textContent='Google Sheets 실시간 연동 중';\n    else if(state==='error') full.textContent='Google Sheets 실시간 연동 오류 · '+timeHHMM();\n    else if(state==='disconnected') full.textContent='Google Sheets 실시간 연동 대기 중';\n    else full.textContent='Google Sheets 실시간 연동 완료 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});\n  }\n}\n\nconst defaultHabits=[\n  {name:'수면 기록',sub:'',checks:[0,0,0,0,0,0,0],type:'sleep'},\n  {name:'식단 기록',sub:'',checks:[0,0,0,0,0,0,0],type:'meal'},\n  {name:'몸무게 기록',sub:'',checks:[0,0,0,0,0,0,0],type:'weight'},\n  {name:'활동',sub:'',checks:[0,0,0,0,0,0,0],type:'recovery'},\n  {name:'음주',sub:'',checks:[0,0,0,0,0,0,0],type:'drink'},\n  {name:'기분',sub:'',checks:[0,0,0,0,0,0,0],type:'mood'},\n  {name:'일기',sub:'',checks:[0,0,0,0,0,0,0],type:'diary'}\n];\nconst defaultGoals=[\n  {name:'건강 루틴 회복',memo:'수면, 식단, 활동 리듬을 안정화',items:[['주 3회 활동',0,'이번 주'],['수면 7시간 이상 4일',1,'진행 중'],['음주 1회 이하',0,'이번 주']]},\n  {name:'자기계발 루틴',memo:'영어, 독서, 글쓰기 중 하나를 작게 이어가기',items:[['영어 2회',0,'이번 주'],['짧은 일기 3회',0,'진행 중']]}\n];\nlet habits=defaultHabits.map(h=>({...h,checks:[...h.checks]}));\nlet details=storage.get('p_daily_details_logic_final_v2', {});\nlet goals=storage.get('p_daily_goals_logic_final_v2', defaultGoals);\nconst habitTypeLabels={memo:'메모',sleep:'수면',meal:'식단',weight:'체중',recovery:'활동',drink:'음주',mood:'기분',diary:'일기'};\nfunction normalize(){\n  habits=(Array.isArray(habits)?habits:defaultHabits).map(h=>({name:h.name||'새 항목',sub:h.sub||'',checks:Array.isArray(h.checks)&&h.checks.length===7?h.checks:[0,0,0,0,0,0,0],type:h.type||'memo'}));\n  goals=(Array.isArray(goals)?goals:defaultGoals).map(g=>({name:g.name||'개인 목표',memo:g.memo||'',items:Array.isArray(g.items)?g.items:[['새 세부 항목',0,'']]}));\n}\nfunction save(){normalize();storage.set('p_daily_details_logic_final_v2',details);storage.set('p_daily_goals_logic_final_v2',goals);try{scheduleGoogleAutoSave();}catch(e){}}\nlet __googleAutoSaveTimer=null,__googleAutoSaving=false;\nfunction scheduleGoogleAutoSave(){\n  if(typeof syncToGoogle!=='function'||typeof API_URL==='undefined')return;\n  clearTimeout(__googleAutoSaveTimer);\n  __googleAutoSaveTimer=setTimeout(function(){\n    if(__googleAutoSaving){scheduleGoogleAutoSave();return;}\n    __googleAutoSaving=true;\n    Promise.resolve(syncToGoogle()).then(function(){__googleAutoSaving=false;}).catch(function(){__googleAutoSaving=false;});\n  },800);\n}\nfunction getD(i){return details[i+'_'+cur]||{}} function setD(i,obj){details[i+'_'+cur]={...getD(i),...obj};save();updateMorningScore();renderDays()}\nfunction isNonEmptyValue(v){\n  if(Array.isArray(v)) return v.length>0;\n  if(v===undefined||v===null) return false;\n  if(typeof v==='boolean') return v===true;\n  if(typeof v==='number') return true;\n  const s=String(v).trim();\n  if(s==='') return false;\n  if(['-','미입력','선택','없음','해당없음','null','undefined'].indexOf(s)>=0) return false;\n  return true;\n}\nfunction hasRecordForDay(day){\n  const detailTypes=['sleep','meal','weight','recovery','drink','mood','diary'];\n  const hasDetail=detailTypes.some(type=>{\n    const d=detailByType(type,day);\n    return d && Object.values(d).some(isNonEmptyValue);\n  });\n  const hasCheck=habits.some(h=>!!h.checks[day]);\n  return hasDetail || hasCheck;\n}\n/* v3.27: 점수는 Gemini가 아닌 로컬 로직으로 계산하며, 기록한 항목만 반영한다 */\nfunction hasDetailValue(o){return !!o && Object.values(o).some(isNonEmptyValue)}\nfunction scorePartsForDay(day){\n  const prev=(day+6)%7;\n  /* 설계 의도는 '전날 기준'이지만, 실제 입력은 오늘 체크리스트에서 이뤄지므로\n     전날 기록이 없으면 당일 기록을 사용한다 (아침에 어젯밤 수면을 오늘 행에 기록하는 흐름 지원) */\n  /* v64fix: fallback 없음. 수면/기분/활동=오늘 칸(day), 식단/음주=어제 칸(prev) */\n  const sleep=detailByType('sleep',day);\n  const mood=detailByType('mood',day);\n  const meal=detailByType('meal',prev);\n  const drink=detailByType('drink',prev);\n  const recovery=detailByType('recovery',day);\n\n  const recSleep=hasDetailValue(sleep);\n  const recEnergy=hasDetailValue(mood);\n  const recMeal=hasDetailValue(meal)||hasDetailValue(drink);\n  const recRecovery=hasDetailValue(recovery);\n\n  const h=parseHours(sleep.hours);\n  let sleepScore=h==null?65:(h>=7.2?90:h>=6.5?82:h>=6?72:h>=5?55:35);\n  if(sleep.quality==='개운함') sleepScore+=5;\n  if(sleep.quality==='뒤척임') sleepScore-=7;\n  if(sleep.quality==='부족함') sleepScore-=12;\n  sleepScore=clamp(sleepScore);\n\n  let energyScore=(mood.energy==='충분'||mood.energy==='높음')?86:mood.energy==='피곤'?55:mood.energy==='방전'?35:mood.energy==='낮음'?52:70;\n  if(['예민','불안','무기력'].includes(mood.moodState)) energyScore-=8;\n  if(mood.moodState==='좋음'||mood.moodState==='안정') energyScore+=4;\n  energyScore=clamp(energyScore);\n\n  const mealBase={안정:86,불규칙:56,과식:48,부족:58,자극적:52,좋음:86,보통:74,나쁨:52};\n  let mealScore=mealBase[meal.mood]??74;\n  if(meal.lateSnack) mealScore-=10;\n  if(meal.caffeine==='오후') mealScore-=4;\n  if(meal.caffeine==='저녁') mealScore-=8;\n  if(drink.drink==='마심') mealScore-=14;\n  mealScore=clamp(mealScore);\n\n  const recCount=Array.isArray(recovery.types)?recovery.types.length:0;\n  const recoveryScore=clamp(recCount>=2?86:recCount===1?70:48);\n\n  /* 업무 강도(15%)는 입력 UI가 아직 없어 점수에서 항상 제외 */\n  const parts=[];\n  if(recSleep) parts.push([sleepScore,0.30]);\n  if(recEnergy) parts.push([energyScore,0.25]);\n  if(recMeal) parts.push([mealScore,0.20]);\n  if(recRecovery) parts.push([recoveryScore,0.10]);\n  const wsum=parts.reduce((s,p)=>s+p[1],0);\n  const total=wsum>0?clamp(parts.reduce((s,p)=>s+p[0]*p[1],0)/wsum):null;\n\n  return {total,\n    sleep:{rec:recSleep,score:sleepScore,h},\n    energy:{rec:recEnergy,score:energyScore,energy:mood.energy},\n    meal:{rec:recMeal,score:mealScore,meal,drink},\n    recovery:{rec:recRecovery,score:recoveryScore,count:recCount}};\n}\nfunction scoreForDay(day){\n  const p=scorePartsForDay(day);\n  return p.total;\n}\nfunction weekStatusForDay(day){\n  if(!hasRecordForDay(day)){\n    const d=dateForDay(day);\n    return d>today ? {label:'예정',cls:'plan'} : {label:'미기록',cls:'empty'};\n  }\n  const score=scoreForDay(day);\n  if(score==null) return {label:'기록',cls:'normal'};\n  if(score>=80) return {label:'좋음',cls:'good'};\n  if(score>=65) return {label:'보통',cls:'normal'};\n  if(score>=50) return {label:'낮음',cls:'low'};\n  return {label:'주의',cls:'warn'};\n}\nfunction renderDays(){\n  $('#bioWeek').innerHTML=dayNames.map((name,i)=>{\n    const st=weekStatusForDay(i);\n    const d=dateForDay(i);\n    return `\u003cbutton class=\"bio-day ${st.cls} ${i===cur?'on':''}\" data-day=\"${i}\">\n      \u003cspan class=\"dow\">${name}\u003c/span>\n      \u003cspan class=\"dnum\">${d.getDate()}\u003c/span>\n      \u003cspan class=\"st\">\u003ci class=\"state-dot\">\u003c/i>\u003c/span>\n    \u003c/button>`;\n  }).join('');\n  document.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{cur=+b.dataset.day;openRow=null;renderAll()});\n  const d=dateForDay(cur);\n  const td=$('#todayDate');\n  if(td) td.textContent=(d.getMonth()+1)+'.'+d.getDate()+' '+dayNames[cur];\n  const db=$('#dailyDateBtn');\n  if(db) db.textContent=(d.getMonth()+1)+'.'+d.getDate()+' '+dayNames[cur];\n  const picker=$('#dailyHiddenDatePicker');\n  if(picker){\n    picker.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n  }\n}\nfunction detailHtml(h,i){\n  const d=getD(i);\n  if(h.type==='sleep')return `\u003cdiv class=\"grid3\">\u003cdiv class=\"time-field\">\u003clabel>취침\u \"detail-label\">메모\u003c/div>\u003ctextarea class=\"textarea\" placeholder=\"메모\" data-f=\"memo\">${esc(d.memo||'')}\u003c/textarea>\u003cbutton class=\"save\" data-save=\"${i}\">저장\u003c/button>`;\n}\nfunction renderHabits(){\n  normalize();\n  $('#habitCard').classList.toggle('edit-mode',habitEdit);\n  const heb=$('#habitEditBtn'); if(heb) heb.textContent='';\n  const heb2=$('#habitEditBtn'); if(heb2) heb2.classList.remove('active');\n  $('#habitList').innerHTML=habits.map((h,i)=>{\n    const c=h.checks.filter(Boolean).length,on=h.checks[cur];\n    if(false && habitEdit){\n      return `\u003cdiv class=\"row-wrap\">\u003cdiv class=\"habit-row\">\u003cbutton class=\"edit-delete\" data-del-h=\"${i}\">×\u003c/button>\u003cdiv class=\"edit-stack\">\u003cinput class=\"edit-name-input\" data-hname=\"${i}\" value=\"${esc(h.name)}\">\u003cinput class=\"edit-sub-input\" data-hsub=\"${i}\" value=\"${esc(h.sub)}\" placeholder=\"설명 (선택)\">\u003c/div>\u003cselect class=\"edit-type-select\" data-htype=\"${i}\">${Object.entries(habitTypeLabels).map(([k,v])=>`\u003coption value=\"${k}\" ${h.type===k?'selected':''}>${v}\u003c/option>`).join('')}\u003c/select>\u003c/div>\u003c/div>`;\n    }\n    return `\u003cdiv class=\"row-wrap ${openRow===i?'open':''}\">\u003cdiv class=\"habit-row\">\u003cbutton class=\"check ${on?'on':''}\" data-check=\"${i}\">${on?'✓':''}\u003c/button>\u003cbutton style=\"text-align:left;min-width:0\" data-open=\"${i}\">\u003cdiv class=\"row-title\">${esc(h.name)}\u003c/div>${h.sub?`\u003cdiv class=\"row-sub\">${esc(h.sub)}\u003c/div>`:''}\u003c/button>\u003cdiv class=\"week-state\">\u003cb>${c}일\u003c/b>\u003cdiv class=\"dotline\">${h.checks.map((x,di)=>`\u003cbutton class=\"${x?'on':''}\" data-dot=\"${i}|${di}\">\u003c/button>`).join('')}\u003c/div>\u003c/div>\u003cbutton class=\"toggle\" data-open=\"${i}\" aria-label=\"열기\">\u003c/button>\u003c/div>\u003cdiv class=\"detail\" data-detail=\"${i}\">${detailHtml(h,i)}\u003c/div>\u003c/div>`;\n  }).join('');\n  bindHabits();\n}\nfunction bindHabits(){\n  if(habitEdit){\n    document.querySelectorAll('[data-del-h]').forEach(b=>b.onclick=()=>{habits.splice(+b.dataset.delH,1);save();renderHabits()});\n    document.querySelectorAll('[data-hname]').forEach(el=>el.onchange=()=>{habits[+el.dataset.hname].name=el.value.trim()||'새 항목';save()});\n    document.querySelectorAll('[data-hsub]').forEach(el=>el.onchange=()=>{habits[+el.dataset.hsub].sub=el.value.trim();save()});\n    document.querySelectorAll('[data-htype]').forEach(el=>el.onchange=()=>{habits[+el.dataset.htype].type=el.value;save()});\n    return;\n  }\n  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{openRow=openRow===+b.dataset.open?null:+b.dataset.open;renderHabits()});\n  document.querySelectorAll('[data-check]').forEach(b=>b.onclick=e=>{e.stopPropagation();habits[+b.dataset.check].checks[cur]=!habits[+b.dataset.check].checks[cur];save();renderHabits();renderDays();updateMorningScore();showSaved('체크리스트 저장됨')});\n  document.querySelectorAll('[data-dot]').forEach(b=>b.onclick=e=>{e.stopPropagation();const [i,d]=b.dataset.dot.split('|').map(Number);habits[i].checks[d]=!habits[i].checks[d];save();renderHabits();renderDays();updateMorningScore();showSaved('체크리스트 저장됨')});\n  document.querySelectorAll('.detail [data-f]').forEach(el=>{\n    const handler=()=>{\n      const wrap=el.closest('[data-detail]');\n      const i=+wrap.dataset.detail;\n      const patch={[el.dataset.f]:el.value};\n      if(habits[i] && habits[i].type==='sleep' && (el.dataset.f==='bed'||el.dataset.f==='wake')){\n        const d={...getD(i),...patch};\n        const hours=calcSleepHours(d.bed,d.wake);\n        if(hours){\n          patch.hours=hours;\n          const hourInput=wrap.querySelector('[data-f=\"hours\"]');\n          if(hourInput) hourInput.value=hours;\n        }\n      }\n      setD(i,patch);\n    };\n    el.onchange=handler;\n    el.oninput=handler;\n  });\n  document.querySelectorAll('[data-recovery]').forEach(b=>b.onclick=e=>{e.preventDefault();const [i,v]=b.dataset.recovery.split('|');const d=getD(+i),arr=d.types||[];d.types=arr.includes(v)?arr.filter(x=>x!==v):arr.concat(v);details[i+'_'+cur]=d;habits[+i].checks[cur]=d.types.length>0;save();renderHabits();updateMorningScore();renderDays()});\n  document.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>{\n    const i=+b.dataset.save;\n    const wrap=document.querySelector('[data-detail=\"'+i+'\"]');\n    const patch={};\n    if(wrap){\n      wrap.querySelectorAll('[data-f]').forEach(el=>patch[el.dataset.f]=el.value);\n      if(habits[i] && habits[i].type==='sleep'){\n        const hours=calcSleepHours(patch.bed,patch.wake);\n        if(hours){\n          patch.hours=hours;\n          const hourInput=wrap.querySelector('[data-f=\"hours\"]');\n          if(hourInput) hourInput.value=hours;\n        }\n      }\n      details[i+'_'+cur]={...getD(i),...patch};\n    }\n    habits[i].checks[cur]=true;\n    save();\n    updateMorningScore();\n    renderDays();\n\n    b.textContent='저장됨';\n    b.classList.add('saved');\n    markRowSaved(i);\n    showSaved((habits[i]?.name||'기록')+' 저장됨');\n\n    const row=wrap?.closest('.row-wrap');\n    const check=row?.querySelector('.check');\n    if(check){\n      check.classList.add('on');\n      check.textContent='✓';\n    }\n\n    clearTimeout(b.__savedTimer);\n    b.__savedTimer=setTimeout(()=>{b.textContent='저장';b.classList.remove('saved')},1100);\n  });\n}\nfunction renderGoals(){\n  if(!$('#goalCard')) return;\n  normalize();\n  $('#goalCard').classList.toggle('edit-mode',goalEdit);\n  $('#goalEditBtn').textContent=goalEdit?'완료':'편집';\n  $('#goalEditBtn').classList.toggle('active',goalEdit);\n  $('#goalList').innerHTML=goals.map((g,gi)=>{\n    const done=g.items.filter(x=>x[1]).length,total=g.items.length,p=total?Math.round(done/total*100):0;\n    const complete=total>0 && done===total;\n    return `\u003cdiv class=\"goal-item ${complete&&!goalEdit?'complete':''}\">\u003cdiv class=\"goal-top\">\u003cdiv style=\"flex:1;min-width:0\">${goalEdit?`\u003cinput class=\"edit-name-input\" data-gname=\"${gi}\" value=\"${esc(g.name)}\">\u003cinput class=\"edit-sub-input\" data-gmemo=\"${gi}\" value=\"${esc(g.memo)}\" placeholder=\"설명\">`:`\u003cbutton class=\"goal-name ${complete?'goal-name-complete':''}\" ${complete?'data-reopen-goal=\"'+gi+'\"':''}>${esc(g.name)}\u003c/button>\u003cdiv class=\"goal-sub\">${esc(g.memo)}\u003c/div>`}\u003c/div>\u003cdiv class=\"goal-actions\">\u003cspan class=\"pill\" style=\"background:${complete?'rgba(16,185,129,.12)':'var(--purple2)'};color:${complete?'var(--green)':'var(--purple)'}\">${complete?'완료':`${done}/${total}`}\u003c/span>\u003cbutton class=\"goal-del\" data-del-g=\"${gi}\">×\u003c/button>\u003c/div>\u003c/div>\u003cdiv class=\"progress\">\u003cspan style=\"width:${p}%\">\u003c/span>\u003c/div>${complete&&!goalEdit?``:`\u003cdiv class=\"goal-checks\">${g.items.map((it,ii)=>goalEdit?`\u003cdiv class=\"goal-item-edit\">\u003cbutton class=\"small-check ${it[1]?'on':''}\" data-gcheck=\"${gi}|${ii}\">\u003c/button>\u003cinput data-gitem=\"${gi}|${ii}\" value=\"${esc(it[0])}\">\u003cinput data-gdue=\"${gi}|${ii}\" value=\"${esc(it[2]||'')}\">\u003cbutton class=\"mini-del\" data-del-item=\"${gi}|${ii}\">×\u003c/button>\u003c/div>`:`\u003cdiv class=\"goal-check\">\u003cbutton class=\"small-check ${it[1]?'on':''}\" data-gcheck=\"${gi}|${ii}\">\u003c/button>\u003cspan>${esc(it[0])}\u003c/span>\u003cem>${esc(it[2]||'')}\u003c/em>\u003c/div>`).join('')}\u003c/div>`}${goalEdit?`\u003cbutton class=\"goal-add-item-btn\" data-add-item=\"${gi}\">세부 항목 추가\u003c/button>`:''}\u003c/div>`;\n  }).join('');\n  bindGoals();\n}\nfunction bindGoals(){\n  document.querySelectorAll('[data-gcheck]').forEach(b=>b.onclick=()=>{const [gi,ii]=b.dataset.gcheck.split('|').map(Number);goals[gi].items[ii][1]=goals[gi].items[ii][1]?0:1;save();renderGoals()});\n  document.querySelectorAll('[data-del-g]').forEach(b=>b.onclick=()=>{goals.splice(+b.dataset.delG,1);save();renderGoals()});\n  document.querySelectorAll('[data-reopen-goal]').forEach(b=>b.onclick=()=>{goalEdit=true;renderGoals()});\n  \n  document.querySelectorAll('[data-gname]').forEach(el=>{el.oninput=()=>{goals[+el.dataset.gname].name=el.value.trim()||'개인 목표'};el.onchange=()=>save();el.onblur=()=>save()});\n  document.querySelectorAll('[data-gmemo]').forEach(el=>{el.oninput=()=>{goals[+el.dataset.gmemo].memo=el.value.trim()};el.onchange=()=>save();el.onblur=()=>save()});\n  document.querySelectorAll('[data-gitem]').forEach(el=>{el.oninput=()=>{const [gi,ii]=el.dataset.gitem.split('|').map(Number);goals[gi].items[ii][0]=el.value.trim()||'세부 항목'};el.onchange=()=>save();el.onblur=()=>save()});\n  document.querySelectorAll('[data-gdue]').forEach(el=>{el.oninput=()=>{const [gi,ii]=el.dataset.gdue.split('|').map(Number);goals[gi].items[ii][2]=el.value.trim()};el.onchange=()=>save();el.onblur=()=>save()});\n  document.querySelectorAll('[data-del-item]').forEach(b=>b.onclick=()=>{const [gi,ii]=b.dataset.delItem.split('|').map(Number);goals[gi].items.splice(ii,1);save();renderGoals()});\n  document.querySelectorAll('[data-add-item]').forEach(b=>b.onclick=()=>{goals[+b.dataset.addItem].items.push(['새 세부 항목',0,'']);save();renderGoals()});\n}\n\n\nfunction clamp(n,min=0,max=100){return Math.max(min,Math.min(max,Math.round(n)))}\nfunction habitIndex(type){return habits.findIndex(h=>h.type===type)}\nfunction detailByType(type,day){const i=habitIndex(type);return i>=0?(details[i+'_'+day]||{}):{}}\nfunction parseHours(v){\n  const s=String(v||'').trim();\n  if(!s) return null;\n  const m=s.match(/(\\d+(?:\\.\\d+)?)/);\n  return m?Number(m[1]):null;\n}\nfunction scoreClass(score){\n  if(score>=85) return 'score-good';\n  if(score>=70) return 'score-normal';\n  if(score>=55) return 'score-low';\n  return 'score-warn';\n}\nfunction mealImpactLabel(meal,drink){\n  if(drink.drink==='마심') return '음주';\n  if(meal.lateSnack) return '야식';\n  if(meal.caffeine==='저녁') return '저녁 카페인';\n  if(meal.mood==='과식') return '과식';\n  if(meal.mood==='불규칙') return '불규칙';\n  if(meal.mood==='자극적') return '자극적';\n  if(meal.mood==='부족') return '부족';\n  if(meal.mood==='나쁨') return '불편';\n  return '안정';\n}\nfunction workLabel(score){\n  if(score>=85) return '낮음';\n  if(score>=70) return '보통';\n  if(score>=55) return '높음';\n  return '과부하';\n}\nfunction recoveryLabel(count){\n  if(count>=2) return '충분';\n  if(count===1) return '보통';\n  return '부족';\n}\nfunction updateMorningScore(){\n  // v3.27: 기록한 항목만 반영, 미기록 항목은 '-' 표시 (가중치는 기록 항목끼리 재정규화)\n  // 수면/식단/음주/활동은 전날 기록을 사용하므로, '오늘 기록 없음' 가드 대신 점수 산출 가능 여부로 판단\n  const P=scorePartsForDay(cur);\n  const prev=(cur+6)%7;\n  const meal=detailByType('meal',prev);\n  const drink=detailByType('drink',prev);\n\n  const setText=(id,v)=>{const el=document.getElementById(id); if(el) el.textContent=String(v)}\n  const setBar=(id,v)=>{const el=document.getElementById(id); if(el) el.style.width=clamp(v)+'%'}\n  const ring=document.getElementById('scoreRing');\n\n  if(P.total==null){\n    if(ring){\n      ring.className='score-ring score-empty';\n      ring.style.setProperty('--score-fill','0%');\n    }\n    setText('scoreTotal','-');\n  }else{\n    if(ring){\n      ring.className='score-ring '+scoreClass(P.total);\n      ring.style.setProperty('--score-fill', P.total+'%');\n    }\n    setText('scoreTotal',P.total);\n  }\n\n  setText('scoreSleep',P.sleep.rec?P.sleep.score:'-'); setBar('barSleep',P.sleep.rec?P.sleep.score:0);\n  setText('scoreEnergy',P.energy.rec?P.energy.score:'-'); setBar('barEnergy',P.energy.rec?P.energy.score:0);\n  setText('scoreMeal',P.meal.rec?P.meal.score:'-'); setBar('barMeal',P.meal.rec?P.meal.score:0);\n  setText('scoreWork','-'); setBar('barWork',0);\n  setText('scoreRecovery',P.recovery.rec?P.recovery.score:'-'); setBar('barRecovery',P.recovery.rec?P.recovery.score:0);\n\n  setText('metricSleep', P.sleep.rec?(P.sleep.h==null?'기록됨':(P.sleep.h+'h')):'미기록');\n  setText('metricEnergy', P.energy.rec?(P.energy.energy||'보통'):'미기록');\n  setText('metricMeal', P.meal.rec?mealImpactLabel(meal,drink):'미기록');\n  setText('metricWork','미기록');\n  setText('metricRecovery', P.recovery.rec?recoveryLabel(P.recovery.count):'미기록');\n}\n\nfunction sameDate(a,b){\n  return a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();\n}\nfunction selectDailyDate(date){\n  const picked=new Date(date);\n  picked.setHours(0,0,0,0);\n  weekStart=mondayOf(picked);\n  cur=Math.min(6,Math.max(0,Math.round((picked-weekStart)/86400000)));\n  calendarViewDate=new Date(picked);\n  openRow=null;\n  closeDailyCalendar();\n  renderAll();\n}\nfunction openDailyCalendar(){\n  const bd=document.getElementById('dailyCalBackdrop');\n  if(!bd) return;\n  calendarViewDate=dateForDay(cur);\n  bd.classList.add('on');\n  bd.setAttribute('aria-hidden','false');\n  renderDailyCalendar();\n}\nfunction closeDailyCalendar(){\n  const bd=document.getElementById('dailyCalBackdrop');\n  if(!bd) return;\n  bd.classList.remove('on');\n  bd.setAttribute('aria-hidden','true');\n}\nfunction renderDailyCalendar(){\n  const title=document.getElementById('dailyCalTitle');\n  const grid=document.getElementById('dailyCalGrid');\n  if(!title || !grid) return;\n\n  const y=calendarViewDate.getFullYear();\n  const m=calendarViewDate.getMonth();\n  const first=new Date(y,m,1);\n  const start=new Date(first);\n  start.setDate(first.getDate()-first.getDay());\n\n  title.textContent=`${y}. ${m+1}`;\n\n  const selected=dateForDay(cur);\n  const cells=[];\n  for(let i=0;i\u003c42;i++){\n    const d=new Date(start);\n    d.setDate(start.getDate()+i);\n    const muted=d.getMonth()!==m;\n    const isSelected=sameDate(d,selected);\n    const isToday=sameDate(d,today);\n    cells.push(`\u003cbutton type=\"button\" class=\"daily-cal-day ${muted?'muted':''} ${isSelected?'selected':''} ${isToday?'today':''}\" data-date=\"${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}\">${d.getDate()}\u003c/button>`);\n  }\n  grid.innerHTML=cells.join('');\n  grid.querySelectorAll('[data-date]').forEach(btn=>{\n    btn.onclick=()=>{\n      selectDailyDate(new Date(btn.dataset.date+'T00:00:00'));\n    };\n  });\n}\nfunction bindDailyCalendar(){\n  const dateBtn=document.getElementById('dailyDateBtn');\n  const prev=document.getElementById('dailyCalPrev');\n  const next=document.getElementById('dailyCalNext');\n  const close=document.getElementById('dailyCalClose');\n  const todayBtn=document.getElementById('dailyCalToday');\n  const bd=document.getElementById('dailyCalBackdrop');\n\n  if(dateBtn) dateBtn.onclick=openDailyCalendar;\n  if(prev) prev.onclick=()=>{calendarViewDate.setMonth(calendarViewDate.getMonth()-1);renderDailyCalendar();};\n  if(next) next.onclick=()=>{calendarViewDate.setMonth(calendarViewDate.getMonth()+1);renderDailyCalendar();};\n  if(close) close.onclick=closeDailyCalendar;\n  if(todayBtn) todayBtn.onclick=()=>selectDailyDate(today);\n  if(bd) bd.onclick=(e)=>{if(e.target===bd) closeDailyCalendar();};\n}\n\nfunction renderAll(){renderDays();renderHabits();renderGoals();updateMorningScore()}\nfunction init(){\n  normalize();\n  const heb3=$('#habitEditBtn'); if(heb3) heb3.onclick=()=>{};\n  const goalEditBtn=$('#goalEditBtn'); if(goalEditBtn) goalEditBtn.onclick=()=>{goalEdit=!goalEdit;renderGoals()};\n  $('#addHabit').onclick=()=>{const v=$('#newHabit').value.trim();const t=$('#newHabitType').value;if(v){habits.push({name:v,sub:'',checks:[0,0,0,0,0,0,0],type:t});$('#newHabit').value='';save();renderHabits()}};\n  const addGoalBtn=$('#addGoal'); if(addGoalBtn) addGoalBtn.onclick=()=>{const v=$('#newGoal').value.trim();if(v){goals.push({name:v,memo:$('#newGoalMemo').value.trim(),items:[['새 세부 항목',0,'진행']]});$('#newGoal').value='';$('#newGoalMemo').value='';save();renderGoals()}};\n  const syncBtn=document.getElementById('syncStatus');\n  if(syncBtn) syncBtn.onclick=()=>saveThenReloadGoogle();\n  bindDailyCalendar();\n  renderAll();\n  updateSyncStatus('disconnected');\n  checkGoogleHealth().then(async()=>{await loadGoalsFromGoogle(); await loadChecklistFromGoogle();});\n}\ntry{init()}catch(e){document.body.innerHTML='\u003cdiv style=\"padding:24px;font-family:system-ui\">앱을 불러오지 못했습니다.\u003cbr>\u003csmall>'+String(e.message)+'\u003c/small>\u003c/div>'}\n})();\n\n(function(){\n  function bindV36Ai(){\n    document.querySelectorAll('.ai-judge-btn,.report-ai-btn,.hero-ai-btn').forEach(btn=>{\n      if(btn.__v36AiBind) return;\n      btn.__v36AiBind=true;\n      btn.addEventListener('click',function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n        else if(typeof toast==='function') toast('AI 피드백은 통합 후 연결 예정입니다.');\n      });\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindV36Ai);\n  else bindV36Ai();\n})();\n\n\u003c/script>\n\n\u003cdiv class=\"daily-cal-backdrop\" id=\"dailyCalBackdrop\" aria-hidden=\"true\">\n  \u003cdiv class=\"daily-cal-modal\" role=\"dialog\" aria-modal=\"true\" aria-label=\"날짜 선택\">\n    \u003cdiv class=\"daily-cal-head\">\n      \u003cbutton type=\"button\" id=\"dailyCalPrev\" aria-label=\"이전 달\">‹\u003c/button>\n      \u003cb id=\"dailyCalTitle\">2026. 6\u003c/b>\n      \u003cbutton type=\"button\" id=\"dailyCalNext\" aria-label=\"다음 달\">›\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"daily-cal-week\">\n      \u003cspan>일\u003c/span>\u003cspan>월\u003c/span>\u003cspan>화\u003c/span>\u003cspan>수\u003c/span>\u003cspan>목\u003c/span>\u003cspan>금\u003c/span>\u003cspan>토\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"daily-cal-grid\" id=\"dailyCalGrid\">\u003c/div>\n    \u003cdiv class=\"daily-cal-actions\">\n      \u003cbutton type=\"button\" id=\"dailyCalToday\">오늘\u003c/button>\n      \u003cbutton type=\"button\" id=\"dailyCalClose\">닫기\u003c/button>\n
