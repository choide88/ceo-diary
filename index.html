ction(v){setYM(v)};\n  window.cosShiftMeetingMonth=function(n){setYM(shiftYM(workYM(),n))};\n  function normalizeAmount(a,u){\n    a=String(a||'').trim();u=String(u||'').trim();\n    if(!a) return '금액';\n    a=a.replace(/\\s+/g,'');\n    a=a.replace(/만원/g,'만');\n    if(u \u0026\u0026 u!=='총' \u0026\u0026 !/[\\/]\\s*[^\\/]+$/.test(a)) a=a+'/'+u;\n    return a;\n  }\n  function oneYM(item){\n    if(!item) return workYM();\n    var ym=String(item.ym||item.month||'').slice(0,7);\n    if(validYM(ym)) return ym;\n    if(item.date \u0026\u0026 /^\\d{4}-\\d{2}/.test(String(item.date))) return String(item.date).slice(0,7);\n    ym=workYM(); item.ym=ym; return ym;\n  }\n  function ensureOneTimeMonths(){\n    if(!Array.isArray(data.oneTimeMeetings)) data.oneTimeMeetings=[];\n    data.oneTimeMeetings.forEach(function(x){\n      if(!x.ym) x.ym=(x.date \u0026\u0026 /^\\d{4}-\\d{2}/.test(String(x.date)))?String(x.date).slice(0,7):workYM();\n    });\n  }\n  function mtAuto(c){if(c.meetingDone)return '미팅 '+(c.date?String(c.date).slice(5).replace('-','/'): '')+' 완료, '+(c.logDone?'일지 완료':'일지 미작성');if(c.scheduled\u0026\u0026c.date)return '미팅 일정 '+String(c.date).slice(5).replace('-','/');return '일정 미정'}\n  function isDone(x){return !!(x\u0026\u0026(x.done||x.completed||x.checked))}\n  function oneMeetingRow(c,i){\n    var readonly=recEdit?'':'readonly';\n    return '\u003cdiv class=\"company-row\"\u003e\u003cdiv\u003e\u003cinput class=\"inline-company\" value=\"'+h(c.name||'')+'\" '+readonly+' onchange=\"data.oneTimeMeetings['+i+'].name=this.value;save();renderAll()\"\u003e\u003cdiv class=\"company-auto\"\u003e'+h(mtAuto(c))+'\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"company-actions\"\u003e\u003cbutton class=\"mini-check '+(c.contacted?'done':'')+'\" onclick=\"data.oneTimeMeetings['+i+'].contacted=!data.oneTimeMeetings['+i+'].contacted;save();renderAll()\"\u003e연락\u003c/button\u003e\u003cbutton class=\"mini-check '+(c.scheduled?'done':'warn')+'\" onclick=\"handleOneTimeSchedule('+i+')\"\u003e일정\u003c/button\u003e\u003cbutton class=\"mini-check '+(c.meetingDone?'done':'')+'\" onclick=\"data.oneTimeMeetings['+i+'].meetingDone=!data.oneTimeMeetings['+i+'].meetingDone;if(!data.oneTimeMeetings['+i+'].meetingDone)data.oneTimeMeetings['+i+'].logDone=false;save();renderAll()\"\u003e미팅\u003c/button\u003e\u003cbutton class=\"mini-check '+(c.logDone?'done':(c.meetingDone?'warn':''))+'\" onclick=\"data.oneTimeMeetings['+i+'].logDone=!data.oneTimeMeetings['+i+'].logDone;if(data.oneTimeMeetings['+i+'].logDone)data.oneTimeMeetings['+i+'].meetingDone=true;save();renderAll()\"\u003e일지\u003c/button\u003e\u003c/div\u003e'+(recEdit?'\u003cbutton class=\"company-del\" onclick=\"data.oneTimeMeetings.splice('+i+',1);save();renderAll()\"\u003e×\u003c/button\u003e':'')+'\u003c/div\u003e';\n  }\n  function oneTimeMonthlyHTML(){\n    ensureOneTimeMonths();\n    var ym=workYM();\n    var pairs=data.oneTimeMeetings.map(function(c,i){return {c:c,i:i,ym:oneYM(c)}}).filter(function(o){return o.ym===ym});\n    pairs.sort(function(a,b){\n      if(!a.c.scheduled\u0026\u0026b.c.scheduled)return -1;if(a.c.scheduled\u0026\u0026!b.c.scheduled)return 1;\n      return String(a.c.date||'9999-99-99').localeCompare(String(b.c.date||'9999-99-99'));\n    });\n    var items=pairs.map(function(o){return o.c});\n    var open=!!window.__cosOneTimeMeetingOpen || recEdit;\n    var unscheduled=items.filter(function(c){return !c.scheduled}).length;\n    var logMiss=items.filter(function(c){return c.meetingDone\u0026\u0026!c.logDone}).length;\n    var done=items.filter(function(c){return c.meetingDone}).length;\n    var toolbar='\u003cdiv class=\"rec-month-toolbar\"\u003e\u003cbutton type=\"button\" onclick=\"cosShiftMeetingMonth(-1);event.stopPropagation()\"\u003e‹\u003c/button\u003e\u003cinput type=\"month\" value=\"'+h(ym)+'\" onchange=\"cosSetMeetingMonth(this.value)\"\u003e\u003cbutton type=\"button\" onclick=\"cosShiftMeetingMonth(1);event.stopPropagation()\"\u003e›\u003c/button\u003e\u003cdiv class=\"rec-month-help\"\u003e1회성 미팅도 선택한 월 기준으로 모아보고, 연락 · 일정 · 미팅 · 일지 상태를 관리합니다.\u003c/div\u003e\u003c/div\u003e';\n    var body='';\n    if(open){\n      body+=toolbar;\n      body+='\u003cdiv class=\"one-meeting-month-summary\"\u003e'+h(ymLabel(ym))+' · '+items.length+'건 · 미정 '+unscheduled+' · 미팅 '+done+' · 일지 '+logMiss+'\u003c/div\u003e';\n      body+=pairs.length?pairs.map(function(o){return oneMeetingRow(o.c,o.i)}).join(''):'\u003cdiv class=\"one-meeting-empty\"\u003e선택한 월에 등록된 1회성 미팅이 없습니다.\u003c/div\u003e';\n      if(recEdit){\n        body+='\u003cdiv class=\"rec-edit-panel\"\u003e\u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newOneMeetingName\" placeholder=\"1회성 미팅명\"\u003e\u003cinput class=\"input\" id=\"newOneMeetingDate\" type=\"date\" placeholder=\"일정일\"\u003e\u003c/div\u003e\u003cbutton class=\"btn\" style=\"width:100%;margin-top:8px\" onclick=\"cosAddOneTimeMeeting()\"\u003e선택 월에 1회성 미팅 추가\u003c/button\u003e\u003cdiv class=\"one-meeting-add-help\"\u003e날짜를 비워두면 선택한 월의 일정 미정 미팅으로 추가됩니다.\u003c/div\u003e\u003c/div\u003e';\n      }\n    }\n    return '\u003csection class=\"fold-card one-meeting-card '+(open?'open':'')+' '+(recEdit?'editing edit-mode':'')+'\"\u003e\u003cdiv class=\"fold-head\" onclick=\"window.__cosOneTimeMeetingOpen=!window.__cosOneTimeMeetingOpen;renderAll()\"\u003e\u003cdiv\u003e\u003cdiv class=\"fold-title\"\u003eOne-time Meeting\u003c/div\u003e\u003cdiv class=\"fold-meta\"\u003e'+h(ymLabel(ym))+' · '+items.length+'건 · 일정 미정 '+unscheduled+'건 · 일지 미작성 '+logMiss+'건\u003c/div\u003e\u003c/div\u003e\u003cbutton class=\"fold-toggle\"\u003e'+(open?'접기':'펼치기 ›')+'\u003c/button\u003e\u003c/div\u003e\u003cdiv class=\"fold-body\"\u003e'+body+'\u003c/div\u003e\u003c/section\u003e';\n  }\n  function patchRecurringPills(){\n    try{\n      document.querySelectorAll('#recurringWrap .rec-card').forEach(function(card){\n        if(card.closest('.one-meeting-card')) return;\n        var btn=card.querySelector('.rec-program-toggle'); if(!btn) return;\n        var onclick=String(btn.getAttribute('onclick')||''); var m=onclick.match(/cosToggleRecProgram\\((\\d+)\\)/); if(!m) return;\n        var ri=Number(m[1]); var r=(data.recurring||[])[ri]; if(!r) return;\n        var pills=card.querySelector('.rec-compact-pills'); if(!pills) return;\n        var status=pills.querySelector('.rec-status-pill');\n        var statusHTML=status?status.outerHTML:'';\n        var btnText=(card.classList.contains('program-open')?'접기':'기업 ›');\n        pills.innerHTML='\u003cspan class=\"rec-amount-pill\"\u003e'+h(normalizeAmount(r.amount,r.amountUnit))+'\u003c/span\u003e'+statusHTML+'\u003cbutton class=\"rec-program-toggle\" type=\"button\" onclick=\"event.stopPropagation();cosToggleRecProgram('+ri+')\"\u003e'+btnText+'\u003c/button\u003e';\n      });\n    }catch(e){}\n  }\n  var oldAdd=window.cosAddOneTimeMeeting;\n  window.cosAddOneTimeMeeting=function(){\n    var name=String((byId('newOneMeetingName')||{}).value||'').trim();\n    if(!name){if(typeof oldAdd==='function')return oldAdd.apply(this,arguments);return;}\n    var date=String((byId('newOneMeetingDate')||{}).value||'').slice(0,10);\n    var ym=date\u0026\u0026/^\\d{4}-\\d{2}/.test(date)?date.slice(0,7):workYM();\n    if(!Array.isArray(data.oneTimeMeetings))data.oneTimeMeetings=[];\n    data.oneTimeMeetings.push({name:name,ym:ym,date:date||null,scheduled:!!date,contacted:false,meetingDone:false,logDone:false,done:false});\n    window.__cosRecMonthYM=ym;\n    try{save()}catch(e){};try{renderAll()}catch(e){};\n  };\n  window.handleOneTimeSchedule=function(i){\n    if(!Array.isArray(data.oneTimeMeetings))data.oneTimeMeetings=[];\n    var c=data.oneTimeMeetings[i]; if(!c) return;\n    c.ym=oneYM(c);\n    modalTarget={type:'oneTime',i:i,oneTimeMonthly:true,ym:c.ym};\n    var base=c.date?new Date(c.date+'T00:00:00'):new Date((c.ym||workYM())+'-01T00:00:00');\n    if(isNaN(base.getTime()))base=new Date();\n    modalMonth=new Date(base.getFullYear(),base.getMonth(),1);\n    openModal();\n  };\n  (function patchDatePicker(){\n    var oldPick=window.pickDate||(typeof pickDate==='function'?pickDate:null);\n    if(typeof oldPick==='function'\u0026\u0026!oldPick.__cosOneTimeMonthlyWrapped){\n      var wrapped=function(iso){\n        var isOne=modalTarget\u0026\u0026modalTarget.type==='oneTime'\u0026\u0026modalTarget.oneTimeMonthly;\n        if(isOne){\n          var c=(data.oneTimeMeetings||[])[modalTarget.i];\n          if(c){c.date=iso;c.scheduled=true;c.ym=String(iso).slice(0,7);window.__cosRecMonthYM=c.ym;}\n        }\n        return oldPick.apply(this,arguments);\n      };\n      wrapped.__cosOneTimeMonthlyWrapped=true;\n      window.pickDate=wrapped;try{pickDate=wrapped}catch(e){}\n    }\n    var del=byId('deleteDate');\n    if(del\u0026\u0026!del.__cosOneTimeMonthlyWrapped){\n      var oldDel=del.onclick;\n      del.onclick=function(ev){\n        if(modalTarget\u0026\u0026modalTarget.type==='oneTime'\u0026\u0026modalTarget.oneTimeMonthly){\n          var c=(data.oneTimeMeetings||[])[modalTarget.i];\n          if(c){c.date=null;c.scheduled=false;c.meetingDone=false;c.logDone=false;c.ym=modalTarget.ym||c.ym||workYM();window.__cosRecMonthYM=c.ym;}\n          try{save()}catch(e){};closeModal();renderAll();return;\n        }\n        if(typeof oldDel==='function')return oldDel.call(this,ev);\n      };\n      del.__cosOneTimeMonthlyWrapped=true;\n    }\n  })();\n  function patchRender(){\n    var fn=window.renderRecurring||(typeof renderRecurring==='function'?renderRecurring:null);\n    if(typeof fn!=='function'||fn.__cosMeetingMonthlyAmountOneTimeWrapped)return;\n    var old=fn;\n    var wrapped=function(){\n      var r=old.apply(this,arguments);\n      try{\n        patchRecurringPills();\n        var wrap=byId('recurringWrap');\n        if(wrap){\n          wrap.querySelectorAll('.one-meeting-card').forEach(function(x){x.parentNode\u0026\u0026x.parentNode.removeChild(x)});\n          wrap.insertAdjacentHTML('beforeend',oneTimeMonthlyHTML());\n        }\n      }catch(e){}\n      return r;\n    };\n    wrapped.__cosMeetingMonthlyAmountOneTimeWrapped=true;\n    wrapped.__cosOneTimeWrapped=true;\n    window.renderRecurring=wrapped;try{renderRecurring=wrapped}catch(e){}\n  }\n  patchRender();\n  setTimeout(function(){patchRender();try{renderAll()}catch(e){}},80);\n  setTimeout(function(){patchRender();try{renderAll()}catch(e){}},500);\n  setTimeout(function(){patchRender();try{renderAll()}catch(e){}},1500);\n})();\n\u003c/script\u003e\n\n\n\u003cscript id=\"cos-work-fix-meeting-date-project-month-v1\"\u003e\n(function(){\n  'use strict';\n  if(window.__cosWorkFixMeetingDateProjectMonthV1) return;\n  window.__cosWorkFixMeetingDateProjectMonthV1=true;\n\n  function byId(id){return document.getElementById(id)}\n  function h(s){return String(s==null?'':s).replace(/[\u0026\u003c\u003e\"']/g,function(m){return {'\u0026':'\u0026amp;','\u003c':'\u0026lt;','\u003e':'\u0026gt;','\"':'\u0026quot;',\"'\":'\u0026#39;'}[m]})}\n  function dateKey(d){\n    if(!(d instanceof Date) || isNaN(d.getTime())) return '';\n    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');\n  }\n  function iso(v){\n    var s=String(v||'').trim();\n    var m=s.match(/^(\\d{4}-\\d{2}-\\d{2})/);\n    if(m) return m[1];\n    if(/\\dT\\d/.test(s) || /Z$/.test(s)){\n      var d=new Date(s);\n      if(!isNaN(d.getTime())){\n        try{return d.toLocaleDateString('sv-SE',{timeZone:'Asia/Seoul'})}catch(e){return dateKey(d)}\n      }\n    }\n    return '';\n  }\n  function todayISO(){\n    try{return new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Seoul'})}catch(e){return dateKey(new Date())}\n  }\n  function selectedISO(){\n    try{return iso(currentDateISO)||todayISO()}catch(e){return todayISO()}\n  }\n  function ymOf(v){return String(iso(v)||selectedISO()).slice(0,7)}\n  function looseISO(v){\n    var s=String(v||'').trim();\n    var d=iso(s);\n    if(d) return d;\n    var y=selectedISO().slice(0,4);\n    var m=s.match(/^(\\d{1,2})\\s*[\\/.]\\s*(\\d{1,2})(?:\\s|$)/);\n    if(m) return y+'-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');\n    m=s.match(/(\\d{1,2})\\s*월\\s*(\\d{1,2})\\s*일?/);\n    if(m) return y+'-'+String(m[1]).padStart(2,'0')+'-'+String(m[2]).padStart(2,'0');\n    return '';\n  }\n  function mdLocal(v){\n    var s=looseISO(v);\n    if(!s) return '일정';\n    var p=s.split('-');\n    return Number(p[1])+'/'+Number(p[2]);\n  }\n  function projectItems(p){return Array.isArray(p\u0026\u0026p.items)?p.items:[]}\n  function projectCompleted(p){\n    var items=projectItems(p);\n    return items.length\u003e0 \u0026\u0026 items.every(function(x){return String(x.state||'')==='완료'})\n  }\n  function projectEndDate(p){\n    if(!p) return '';\n    // 완료한 프로젝트의 월 기준은 '앱에서 완료 체크한 날'보다 실제 종료 일정이 우선입니다.\n    // 그래서 세부 항목의 마지막 날짜, 명시 종료일, 프로젝트 일정, 완료 처리일 순서로 판단합니다.\n    var itemDates=projectItems(p).map(function(it){return looseISO(it\u0026\u0026it.date)}).filter(Boolean).sort();\n    if(itemDates.length) return itemDates[itemDates.length-1];\n    var planned=looseISO(p.endDate||p.endAt||p.schedule||p.date||'');\n    if(planned) return planned;\n    return looseISO(p.completedDate||p.completedOn||p.doneDate||p.doneAt||p.completedAt||'');\n  }\n  function projectEndedInSelectedMonth(p){\n    var end=projectEndDate(p);\n    return !!end \u0026\u0026 end.slice(0,7)===selectedISO().slice(0,7);\n  }\n  function normalizeCat(c){\n    c=String(c||'KRP').trim().toUpperCase();\n    return ['KRP','CDE','WSW','PWR'].indexOf(c)\u003e-1?c:'KRP';\n  }\n  function projectFromName(name){\n    var s=String(name||'').toUpperCase();\n    if(s.indexOf('PWR')\u003e-1 || s.indexOf('파라다이스')\u003e-1) return 'PWR';\n    if(s.indexOf('WSW')\u003e-1 || s.indexOf('워크스워크')\u003e-1) return 'WSW';\n    if(s.indexOf('CDE')\u003e-1 || s.indexOf('개인')\u003e-1) return 'CDE';\n    return 'KRP';\n  }\n  function projectCat(p){\n    var c=normalizeC it('-');return String(p[0]).slice(2)+'년 '+Number(p[1])+'월'}\n  function ymToNum(ym){var p=String(ym||'').split('-');return Number(p[0]||0)*12+Number(p[1]||0)}\n  function shiftYM(ym,n){ym=normalizeYM(ym)||getYM();var p=ym.split('-'),d=new Date(Number(p[0]),Number(p[1])-1+(Number(n)||0),1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}\n  function defaultState(){return {contacted:false,scheduled:false,date:null,meetingDone:false,logDone:false}}\n  function hasLegacy(c){return !!(c\u0026\u0026(c.contacted||c.scheduled||c.date||c.meetingDone||c.logDone))}\n  function legacyState(c){return {contacted:!!c.contacted,scheduled:!!c.scheduled,date:c.date||null,meetingDone:!!c.meetingDone,logDone:!!c.logDone}}\n  function migrateLegacy(){try{(data.recurring||[]).forEach(function(r){(r.companies||[]).forEach(function(c){if(!c.monthly\u0026\u0026hasLegacy(c)){c.monthly={};var ym=(c.date\u0026\u0026/^\\d{4}-\\d{2}/.test(String(c.date)))?String(c.date).slice(0,7):ymOf(selectedISO());c.monthly[ym]=legacyState(c)}})})}catch(e){}}\n  function viewState(c,ym){var s=c\u0026\u0026c.monthly\u0026\u0026c.monthly[ym];return Object.assign(defaultState(),s||{})}\n  function editState(c,ym){if(!c.monthly)c.monthly={};if(!c.monthly[ym])c.monthly[ym]=defaultState();return c.monthly[ym]}\n  function syncLegacy(c,s){try{c.contacted=!!s.contacted;c.scheduled=!!s.scheduled;c.date=s.date||null;c.meetingDone=!!s.meetingDone;c.logDone=!!s.logDone}catch(e){}}\n  function dateShort(iso){var s=String(iso||'');return /^\\d{4}-\\d{2}-\\d{2}/.test(s)?Number(s.slice(5,7))+'/'+Number(s.slice(8,10)):''}\n  function stateAuto(st){if(st.meetingDone)return '미팅 '+(st.date?dateShort(st.date)+' ':'')+'완료 · '+(st.logDone?'일지 완료':'일지 미작성');if(st.scheduled\u0026\u0026st.date)return '일정 '+dateShort(st.date);return '일정 미정'}\n\n  window.cosSetRecMonth=function(v){var ym=normalizeYM(v);if(!ym)return;window.__cosRecMonthYM=ym;try{renderAll()}catch(e){try{renderRecurring()}catch(_){}}};\n  window.cosShif alizeYM(r.endMonth||r.endDate||r.end||r.until||'');if(endYM\u0026\u0026!r.endMonth)r.endMonth=endYM;\n    var diff=endYM?ymToNum(endYM)-ymToNum(getYM()):999;\n    var allDone=states.length\u003e0\u0026\u0026states.every(function(s){return !!s.meetingDone\u0026\u0026!!s.logDone});\n    var manual=String(r.status||'').match(/완료|completed/i)||r.archived===true;\n    var forceActive=r.forceActive===true;\n    var completed=!forceActive\u0026\u0026(!!manual||(endYM\u0026\u0026diff\u003c0\u0026\u0026allDone));\n    var overdue=!!(endYM\u0026\u0026diff\u003c0\u0026\u0026!completed);\n    var label='진행',cls='active';\n    if(completed){label='완료';cls='done'}else if(overdue){label='미완료';cls='overdue'}else if(endYM){label=ymStatusShort(endYM);cls=(diff\u003e=0\u0026\u0026diff\u003c=1)?'soon':'planned'}\n    return {endYM:endYM,label:label,cls:cls,completed:completed,overdue:overdue,allDone:allDone};\n  }\n  function companyRow(ri,c,ci,ym){\n    var st=viewState(c,ym), name=html(c.name||''), readonly=recEdit?'':'readonly';\n    return '\u003cdiv class=\"company-row\"\u003e\u003cdiv\u003e\u003cinput class=\"inline-company\" value=\"'+name+'\" '+readonly+' onchange=\"data.recurring['+ri+'].companies['+ci+'].name=this.value;save()\"\u003e\u003cdiv class=\"company-auto\"\u003e'+html(stateAuto(st))+'\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"company-actions\"\u003e\u003cbutton class=\"mini-check '+(st.contacted?'done':'')+'\" onclick=\"cosRecToggle('+ri+','+ci+',\\'contacted\\')\"\u003e연락\u003c/button\u003e\u003cbutton class=\"mini-check '+(st.scheduled?'done':'warn')+'\" onclick=\"handleRecurringMonthSchedule('+ri+','+ci+')\"\u003e일정\u003c/button\u003e\u003cbutton class=\"mini-check '+(st.meetingDone?'done':'')+'\" onclick=\"cosRecToggle('+ri+','+ci+',\\'meetingDone\\')\"\u003e미팅\u003c/button\u003e\u003cbutton class=\"mini-check '+(st.logDone?'done':(st.meetingDone?'warn':''))+'\" onclick=\"cosRecToggle('+ri+','+ci+',\\'logDone\\')\"\u003e일지\u003c/button\u003e\u003c/div\u003e'+(recEdit?'\u003cbutton class=\"company-del\" onclick=\"cosRecDeleteCompany('+ri+','+ci+')\"\u003e×\u003c/button\u003e':'')+'\u003c/div\u003e';\n  }\n  function programCard(r,ri,isCompletedGroup){\n    var ym=getYM(), comps=Array.isArray(r.companies)?r.companies:[], states=comps.map(function(c){return viewState(c,ym)});\n    var total=comps.length,fixed=states.filter(function(s){return s.scheduled}).length,done=states.filter(function(s){return s.meetingDone}).length,miss=states.filter(function(s){return s.meetingDone\u0026\u0026!s.logDone}).length;\n    var st=recStatus(r,states), expanded=recEdit||!!(window.__cosRecProgramOpen\u0026\u0026window.__cosRecProgramOpen[ri])||!!isCompletedGroup;\n    var titleInput='\u003cinput class=\"plain-input\" value=\"'+html(r.name||'')+'\" '+(recEdit?'':'readonly')+' onclick=\"event.stopPropagation()\" onchange=\"data.recurring['+ri+'].name=this.value;save()\"\u003e';\n    var metaEdit='\u003cdiv class=\"rec-meta-inputs\"\u003e\u003cinput class=\"input\" value=\"'+html(r.amount||'')+'\" onclick=\"event.stopPropagation()\" onchange=\"data.recurring['+ri+'].amount=this.value;save();renderAll()\"\u003e\u003cselect class=\"select\" onclick=\"event.stopPropagation()\" onchange=\"data.recurring['+ri+'].amountUnit=this.value;save();renderAll()\"\u003e\u003coption '+((r.amountUnit||'총')==='총'?'selected':'')+'\u003e총\u003c/option\u003e\u003coption '+((r.amountUnit||'총')==='건'?'selected':'')+'\u003e건\u003c/option\u003e\u003coption '+((r.amountUnit||'총')==='월'?'selected':'')+'\u003e월\u003c/option\u003e\u003coption '+((r.amountUnit||'총')==='회'?'selected':'')+'\u003e회\u003c/option\u003e\u003c/select\u003e\u003cinput class=\"input\" value=\"'+html(r.cycle||'')+'\" onclick=\"event.stopPropagation()\" onchange=\"data.recurring['+ri+'].cycle=this.value;save();renderAll()\"\u003e\u003cinput class=\"input rec-end-input\" type=\"text\" inputmode=\"numeric\" placeholder=\"26.06\" value=\"'+html(ymInput(st.endYM))+'\" onclick=\"event.stopPropagation()\" onchange=\"data.recurring['+ri+'].endMonth=cosNormalizeRecurringYM(this.value);data.recurring['+ri+'].archived=false;data.recurring['+ri+'].status=\\'진행중\\';data.recurring['+ri+'].forceActive=false;save();renderAll()\"\u003e\u003c/div\u003e';\n    var compactMeta=ymLabelShort(ym)+' · '+total+'업체 · 미정 '+(total-fixed)+' · 일지 '+miss;\n    var header='\u003csection class=\"rec-card '+(recEdit?'edit-mode ':'')+(expanded?'program-open ':'program-closed ')+(st.completed?'completed-rec':'')+'\"\u003e\u003cdiv class=\"rec-head\" onclick=\"cosToggleRecProgram('+ri+')\"\u003e\u003cdiv class=\"rec-top\"\u003e\u003cdiv\u003e'+titleInput+metaEdit+'\u003cdiv class=\"rec-compact-meta\"\u003e'+html(compactMeta)+'\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"meta-pills one-line rec-compact-pills\"\u003e\u003cspan class=\"rec-status-pill '+st.cls+'\"\u003e'+html(st.label)+'\u003c/span\u003e\u003cbutton class=\"rec-program-toggle\" type=\"button\" onclick=\"event.stopPropagation();cosToggleRecProgram('+ri+')\"\u003e'+(expanded?'접기':'기업 ›')+'\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"rec-stats\"\u003e\u003cdiv class=\"rec-stat\"\u003e\u003cb\u003e'+total+'\u003c/b\u003e\u003cspan\u003e업체\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"rec-stat\"\u003e\u003cb\u003e'+fixed+'\u003c/b\u003e\u003cspan\u003e일정\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"rec-stat\"\u003e\u003cb\u003e'+done+'\u003c/b\u003e\u003cspan\u003e미팅\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"rec-stat\"\u003e\u003cb\u003e'+miss+'\u003c/b\u003e\u003cspan\u003e일지\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e';\n    var body='';\n    if(expanded){\n      var sorted=comps.map(function(c,ci){return {c:c,ci:ci,st:viewState(c,ym)}}).sort(function(a,b){if(!a.st.scheduled\u0026\u0026b.st.scheduled)return -1;if(a.st.scheduled\u0026\u0026!b.st.scheduled)return 1;return String(a.st.date||'9999-99-99').localeCompare(String(b.st.date||'9999-99-99'))});\n      body+=sorted.map(function(o){return companyRow(ri,o.c,o.ci,ym)}).join('');\n      body+='\u003cdiv class=\"rec-edit-panel\"\u003e\u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newComp-'+ri+'\" placeholder=\"업체명\"\u003e\u003cbutton class=\"btn\" onclick=\"addCompany('+ri+')\"\u003e업체 추가\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e';\n      if(recEdit){body+='\u003cdiv class=\"rec-done-actions\"\u003e\u003cbutton class=\"primary\" onclick=\"cosSetRecurringProgramStatus('+ri+',\\'done\\')\"\u003e완료 처리\u003c/button\u003e\u003cbutton onclick=\"cosSetRecurringProgramStatus('+ri+',\\'active\\')\"\u003e진행중 복귀\u003c/button\u003e\u003c/div\u003e'}\n    }else{\n      body+='\u003cbutton class=\"rec-company-summary\" type=\"button\" onclick=\"cosToggleRecProgram('+ri+')\"\u003e기업 '+total+' · 미정 '+(total-fixed)+' · 일지 '+miss+'\u003c/button\u003e';\n    }\n    return header+body+'\u003c/section\u003e';\n  }\n  window.cosNormalizeRecurringYM=function(v){return normalizeYM(v)};\n  window.renderRecurring=function(){\n    try{migrateLegacy()}catch(e){}\n    var ym=getYM(), programs=(data.recurring||[]);\n    var active=programs.filter(function(r){return !recStatus(r,(r.companies||[]).map(function(c){return viewState(c,ym)})).completed});\n    var completed=programs.filter(function(r){return recStatus(r,(r.companies||[]).map(function(c){return viewState(c,ym)})).completed});\n    var companies=[];active.forEach(function(r){companies=companies.concat(r.companies||[])});\n    var states=companies.map(function(c){return viewState(c,ym)});\n    var unscheduled=states.filter(function(s){return !s.scheduled}).length, logMiss=states.filter(function(s){return s.meetingDone\u0026\u0026!s.logDone}).length;\n    var overdue=active.filter(function(r){return recStatus(r,(r.companies||[]).map(function(c){return viewState(c,ym)})).overdue}).length;\n    window.__cosRecProgramOpen=window.__cosRecProgramOpen||{};window.__cosRecurringCompletedOpen=!!window.__cosRecurringCompletedOpen;\n    window.cosToggleRecProgram=function(ri){if(recEdit)return;window.__cosRecProgramOpen[ri]=!window.__cosRecProgramOpen[ri];renderRecurring()};\n    window.cosToggleCompletedRecurring=function(){window.__cosRecurringCompletedOpen=!window.__cosRecurringCompletedOpen;renderRecurring()};\n    var toolbar='\u003cdiv class=\"rec-month-toolbar\"\u003e\u003cbutton type=\"button\" onclick=\"cosShiftRecMonth(-1);event.stopPropagation()\"\u003e‹\u003c/button\u003e\u003cinput type=\"text\" inputmode=\"numeric\" value=\"'+html(ymInput(ym))+'\" onchange=\"cosSetRecMonth(this.value)\" placeholder=\"26.06\"\u003e\u003cbutton type=\"button\" onclick=\"cosShiftRecMonth(1);event.stopPropagation()\"\u003e›\u003c/button\u003e\u003cdiv class=\"rec-month-help\"\u003e'+html(ymLabelShort(ym))+' 기준 · 기업 목록은 유지하고 연락, 일정, 미팅, 일지만 월별로 관리합니다.\u003c/div\u003e\u003c/div\u003e';\n    var body=(recOpen||recEdit?toolbar:'')+active.map(function(r){return programCard(r,programs.indexOf(r),false)}).join('');\n    if(recEdit){body+='\u003cdiv class=\"inline-add-panel\"\u003e\u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newRecNameCompact\" placeholder=\"새 리커링명\"\u003e\u003cinput class=\"input\" id=\"newRecAmountCompact\" placeholder=\"100만원\"\u003e\u003c/div\u003e\u003cdiv class=\"edit-grid\" style=\"margin-top:7px\"\u003e\u003cinput class=\"input\" id=\"newRecCycleCompact\" placeholder=\"월 1회\"\u003e\u003cselect class=\"select\" id=\"newRecAmountUnitCompact\"\u003e\u003coption\u003e총\u003c/option\u003e\u003coption\u003e건\u003c/option\u003e\u003coption\u003e월\u003c/option\u003e\u003coption\u003e회\u003c/option\u003e\u003c/select\u003e\u003c/div\u003e\u003cdiv class=\"edit-grid\" style=\"margin-top:7px\"\u003e\u003cinput class=\"input\" id=\"newRecEndMonthCompact\" type=\"text\" inputmode=\"numeric\" placeholder=\"26.06\"\u003e\u003cbutton class=\"btn\" onclick=\"addRecurringCompact()\"\u003e리커링 추가\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e'}\n    if(!active.length\u0026\ rn v!=null}catch(e){return false}});return v}\nfunction storageSet(k,v){storageTargets().forEach(function(st){try{st.setItem(k,v)}catch(e){}})}\nfunction parseJsonSafe(raw,fb){try{return raw?JSON.parse(raw):fb}catch(e){return fb}}\nfunction readDeletedKeys(){var arr=parseJsonSafe(storageGet(EXPLORE_TOMBSTONE_KEY),[]);var map={};if(Array.isArray(arr))arr.forEach(function(k){if(k)map[String(k)]=true});return map}\nfunction markExploreDeleted(item){try{var arr=parseJsonSafe(storageGet(EXPLORE_TOMBSTONE_KEY),[]);if(!Array.isArray(arr))arr=[];[item\u0026\u0026item.id,exploreIdentityKey(item)].forEach(function(k){if(k\u0026\u0026arr.indexOf(String(k))\u003c0)arr.push(String(k))});storageSet(EXPLORE_TOMBSTONE_KEY,JSON.stringify(arr.slice(-500)))}catch(e){}}\nfunction isExploreDeleted(item){var d=readDeletedKeys();return !!(d[String(item\u0026\u0026item.id)]||d[exploreIdentityKey(item)])}\nfunction isExploreLikeItem(x){if(!x||typeof x!=='object'||Array.isArray(x))return false;var hasTitle=!!(x.title||x.item_name||x.name);var hasMeta=!!(x.status||x.kind||x.category||x.item_id||x.plannedDate||x.planned_date||x.completedDate||x.completed_date||x.doneDate||x.done_date||x.memo||x.reflection||x.rating||x.completed);return hasTitle\u0026\u0026hasMeta}\nfunction collectExploreArrays(v,out,depth){if(depth\u003e4||!v)return;if(Array.isArray(v)){var hits=v.filter(isExploreLikeItem);if(hits.length)out.push(hits);v.slice(0,20).forEach(function(x){if(x\u0026\u0026typeof x==='object')collectExploreArrays(x,out,depth+1)});return}if(typeof v==='object'){if(Array.isArray(v.exploreItems))out.push(v.exploreItems);if(Array.isArray(v.toExplore))out.push(v.toExplore);if(Array.isArray(v.exploredItems))out.push(v.exploredItems);if(Array.isArray(v.explored))out.push(v.explored);Object.keys(v).slice(0,40).forEach(function(k){if(/explore|explored|todo|item/i.test(k))collectExploreArrays(v[k],out,depth+1)})}}\nfunction recoverExploreFromStorage(){var found=[];storageTargets().forEach(function(st){try{f pControls();\nvar prAi=document.getElementById('personalReportAiBtn');if(prAi){prAi.onclick=function(){\n  var fb=window.prompt('리포트에 반영할 피드백을 입력하세요. (예: 수면 분석을 더 자세히)\\n비워두면 기본 기준으로 생성합니다.','');\n  if(fb===null)return;\n  fb=String(fb).trim();\n  makePersonalReport('weekly',fb);\n  if(typeof toast==='function')toast(fb?'피드백을 반영해 주간 리포트를 다시 생성했습니다.':'주간 리포트를 생성했습니다.');\n}};\n\nsetInterval(renderTop,30000);renderAll();loadSelectedFromGoogle();\n})();\n\u003c/script\u003e\n\n\u003cscript id=\"personal-brief-gemini-v1\"\u003e\n(function(){\n  \"use strict\";\n  var GEMINI_URL=\"https://script.google.com/macros/s/AKfycbwxcBEmw_ovexvfAn3mTDyKXcW5X1XACbOF0QA2zRMxwSwIvLKjHJBDmnHkS8eM0ucd/exec\";\n  function topWin(){ try{ if(window.top) return window.top; }catch(e){} try{ if(window.parent) return window.parent; }catch(e){} return window; }\n  function store(){ var w=topWin(); try{ if(!w.__COS_BRIEF_STORE__) w.__COS_BRIEF_STORE__={}; return w.__COS_BRIEF_STORE__; }catch(e){ return null; } }\n  function lsSet(k,v){\n    var st=store(); try{ if(st) st[k]=v; }catch(e){}\n    var raw; try{ raw=JSON.stringify(v); }catch(e){ raw=null; }\n    if(raw!=null){\n      var w=topWin();\n      try{ if(w\u0026\u0026w.localStorage) w.localStorage.setItem(k,raw); }catch(e){}\n      try{ localStorage.setItem(k,raw); }catch(e){}\n    }\n  }\n  // 개인 상태 요약 — 다른 탭/브리핑이 읽을 수 있도록 노출 + 캐시 미러\n  function personalSummary(){\n    var done=0, total=6;\n    try{ done=records.filter(function(x){return isDone(x.id)}).length; }catch(e){}\n    var journalDone=false;\n    try{ var j=dayData().journal||{}; journalDone=!!(j.line||j.event||j.mood||j.tomorrow); }catch(e){}\n    var exploreCount=0;\n    try{ exploreCount=exploreItems.filter(function(x){return x.status!=='done'}).length; }catch(e){}\n    return {todayDone:done, count:total, avg:Math.round(done/total*100),\n            journal:journalDone, explore:exploreCount,\n            date:(typeof selectedKey!=='undefined'?selectedKey:'')};\n  }\n  try{ window.COS_PERSONAL_GET_STATE=function(){ var s=personalSummary(); return {selectedDate:s.date, todayDone:s.todayDone, count:s.count, avg:s.avg, score:s.todayDone}; }; }catch(e){}\n\n  function mirror(){\n    try{ var s=personalSummary(); lsSet('cos_personal_cache_v1',{score:s.todayDone, avg:s.avg, todayDone:s.todayDone, count:s.count, journal:s.journal, explore:s.explore, at:Date.now()}); }catch(e){}\n    /* 개인 리포트를 브리핑 탭이 읽을 수 있도록 공유 저장소(cos_reports_personal_v1)로도 미러.\n       개인 탭 saveLocal은 자기 iframe localStorage(STORE_KEY)에 저장되므로, 여기서 꺼내 top으로 올린다. */\n    try{\n      var raw=null;\n      try{ raw=localStorage.getItem('personal_ui_integrated_v1'); }catch(e){}\n      if(raw){\n        var obj=JSON.parse(raw);\n        var reps=(obj\u0026\u0026Array.isArray(obj.reports))?obj.reports:[];\n        lsSet('cos_reports_personal_v1', reps.map(function(r){ return {\n          id:r.id||('personal-'+(r.type||'weekly')), domain:'personal', type:r.type||'weekly',\n          title:r.title||((r.type==='monthly'?'개인 월간':'개인 주간')+' 리포트'),\n          period:r.period||'', summary:r.summary||'',\n          headline:r.headline||'', lead:r.lead||'', bullets:r.bullets||[], actions:r.actions||[],\n          createdAt:r.createdAt||new Date().toISOString()\n        }; }));\n      }\n    }catch(e){}\n  }\n\n  // Gemini 브리프 (개인 탭 전용 호출)\n  function geminiBrief(){\n    if(!GEMINI_URL || GEMINI_URL.indexOf('PASTE_')\u003e=0) return;\n    var s=personalSummary();\n    var payload={action:'gemini', tab:'personal', kind:'insight', type:'daily', feedback:'',\n      facts:{scope:'daily', personal:s, date:s.date,\n        note:'개인(데일리) 탭 브리프. 오늘 기록 상태(수면/식단/활동/감정/체중/저널)를 바탕으로 한 문장 제목과 2문장 본문. 추측 금지, 위 데이터만 근거. 응원형 톤.'},\n      rules:{titleMaxChars:24, bodyMaxChars:118, requireCompleteSentence:true}};\n    var ctrl=(typeof AbortController!=='undefined')?new AbortController():null;\n    var tm=setTimeout(function(){try{if(ctrl)ctrl.abort();}catch(e){}},18000);\n    try{\n      fetch(GEMINI_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),redirect:'follow',signal:ctrl?ctrl.signal:undefined})\n        .then(function(r){return r.text();})\n        .then(function(t){ clearTimeout(tm); var res; try{res=JSON.parse(t);}catch(e){return;} var d=(res\u0026\u0026res.data)||res; if(d\u0026\u0026d.headline){ var ht=document.getElementById('heroTitle'); if(ht)ht.textContent=d.headline; } if(d\u0026\u0026d.lead){ var hl=document.getElementById('heroLead'); if(hl)hl.textContent=d.lead; } })\n        .catch(function(){ clearTimeout(tm); });\n    }catch(e){ clearTimeout(tm); }\n  }\n\n  // AI 버튼 핸들러 연결\n  function bindAi(){\n    var btn=document.querySelector('.hero .ai-btn, .hero-head .ai-btn');\n    if(btn \u0026\u0026 !btn.__aiBound){ btn.__aiBound=true; btn.addEventListener('click',function(e){ e.preventDefault(); geminiBrief(); }); }\n  }\n  function boot(){ mirror(); bindAi(); geminiBrief(); }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);\n  else boot();\n  setInterval(mirror,8000);\n  setTimeout(geminiBrief,2500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-report-unify-v1\"\u003e\n/* v14 리포트 섹션 규격 통일: 캘린더·업무·개인·브리핑 동일 카드/행/아이콘 */\n.report-row,.cos-report-row,.archive-row .report-top,.report-card .report-top{\n  align-items:center !important;\n}\n/* 개인 탭 report-row를 cos-report-row 규격으로 */\n.report-row{\n  grid-template-columns:36px minmax(0,1fr) auto !important;\n  gap:11px !important;\n  min-height:64px !important;\n  padding:14px 15px !important;\n}\n.report-icon{\n  width:36px !important;height:36px !important;border-radius:12px !important;\n  font-size:11px !important;font-weight:950 !important;\n}\n/* 화살표 색/크기 통일 */\n.chev,.cos-report-arrow{\n  font-size:16px !important;font-weight:900 !important;color:#c4cad5 !important;\n}\n/* AI 버튼 규격 통일 (개인 section-ai ↔ cos-ai-btn) */\n.section-ai,.cos-ai-btn{\n  height:28px !important;min-width:42px !important;padding:0 12px !i h:5px;height:5px;border-radius:50%;background:currentColor;opacity:.85}\n\u003c/style\u003e\n\n\n\u003cstyle id=\"cos-final-unify-aibtn-sync-v1\"\u003e\n/* v18 최종 통일: 리포트 AI 버튼 + 구글 연동 상태줄을 전 탭 동일 형식으로 */\n/* AI 버튼: 점 + 탭 포인트색, 동일 규격 */\n.cos-ai-btn,#cosReportAiBtn,#personalReportAiBtn,.section-ai{\n  display:inline-flex !important;align-items:center !important;justify-content:center !important;\n  gap:5px !important;height:28px !important;min-width:42px !important;padding:0 12px !important;\n  border-radius:999px !important;background:rgba(124,58,237,.12) !important;border:1px solid rgba(124,58,237,.20) !important;\n  color:#7c3aed !important;box-shadow:none !important;font-size:11px !important;font-weight:950 !important;\n  line-height:1 !important;letter-spacing:-.1px !important;white-space:nowrap !important;flex:0 0 auto !important;cursor:pointer !important;\n}\n.cos-ai-btn::before,#cosReportAiBtn::before,#personalReportAiBtn::before,.section-ai::before{\n  content:\"\" !important;width:5px !important;height:5px !important;border-radius:50% !important;\n  background:currentColor !important;opacity:.9 !important;flex:0 0 auto !important;display:inline-block !important;\n}\n.cos-ai-btn:active,#cosReportAiBtn:active,#personalReportAiBtn:active,.section-ai:active{\n  transform:translateY(1px) !important;filter:brightness(.98) !important;\n}\n/* 구글 연동 상태줄: 전 탭 동일 — 회색 톤, 같은 형식 */\n.sync-status,#syncStatus,.sync-full-status,.sync-mini,.cos-sync-line{\n  margin-top:6px !important;font-size:10.5px !important;line-height:1.3 !important;\n  color:#8a95a8 !important;font-weight:800 !important;letter-spacing:-.1px !important;\n  white-space:nowrap !important;overflow:hidden !important;text-overflow:ellipsis !important;\n}\n.sync-status.fail,#syncStatus.fail,.sync-full-status.fail,.sync-mini.fail,.cos-sync-line.fail{\n  color:#8a95a8 !important;\n}\n\u003c/style\u003e\n\u003c/body\u003e\n\u003c/html\u003e"};
var TAB_KEYS=["brief","calendar","work","personal"];
var LAST_KEY="cos_shell_last_tab_v1";
var COS_V325_PATCH="";
function mount(tab){
  var pane=document.getElementById("pane-"+tab);
  if(!pane||pane.dataset.mounted)return;
  pane.dataset.mounted="1";
  var f=document.createElement("iframe");
  f.title=tab;
  f.addEventListener("load",function(){
    var l=pane.querySelector(".pane-loading");
    if(l){l.classList.add("off");setTimeout(function(){l.remove();},300);}
  });
  f.srcdoc=SOURCES[tab]+COS_V325_PATCH;
  pane.appendChild(f);
}

function show(tab){
  if(TAB_KEYS.indexOf(tab)<0)tab="brief";
  mount(tab);
  TAB_KEYS.forEach(function(k){
    document.getElementById("pane-"+k).classList.toggle("on",k===tab);
  });
  document.querySelectorAll(".cos-tab").forEach(function(b){
    var on=b.dataset.tab===tab;
    b.classList.toggle("on",on);
    b.setAttribute("aria-selected",on?"true":"false");
  });
  try{localStorage.setItem(LAST_KEY,tab);}catch(e){}
}

document.querySelectorAll(".cos-tab").forEach(function(b){
  b.addEventListener("click",function(){show(b.dataset.tab);});
});

var start="brief";
try{var s=localStorage.getItem(LAST_KEY);if(s&&TAB_KEYS.indexOf(s)>=0)start=s;}catch(e){}
show(start);

var delay=1500;
TAB_KEYS.forEach(function(k){
  if(k===start)return;
  setTimeout(function(){mount(k);},delay);
  delay+=1500;
});
})();
</script>
