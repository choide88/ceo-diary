.getElementById('cosDetailBackdrop').classList.remove('open');\n    toast('리포트를 삭제했습니다.');\n  });\n  document.getElementById('cosFbSave').addEventListener('click',function(){\n    var fb=document.getElementById('cosFbInput').value.trim();\n    if(!fb){toast('피드백 내용을 입력해주세요.');return}\n    var ctx=document.getElementById('cosFbContext').textContent;\n    saveFeedback(currentFbTarget,fb,ctx);\n    document.getElementById('cosFeedbackBackdrop').classList.remove('open');\n    if(currentFbTarget==='insight'){renderInsight(fb);toast('피드백을 반영해 브리프를 다시 생성했습니다.')}\n    else if(currentFbTarget==='reportCriteria'){\n      if(typeof makeReport==='function'){ makeReport('weekly',fb); }\n      toast('피드백을 반영해 주간 리포트를 다시 생성했습니다.');\n    }\n    else toast('리포트 생성 기준에 반영했습니다. 다음 생성부터 적용됩니다.');\n  });\n  var __rf=document.getElementById('cosFbRefresh');\n  if(__rf) __rf.addEventListener('click',function(){\n    document.getElementById('cosFeedbackBackdrop').classList.remove('open');\n    window.__cosForceFresh=true;\n    if(currentFbTarget==='insight'){ if(typeof renderInsight==='function') renderInsight(''); }\n    else { if(typeof cosRefreshTabBriefV321==='function') cosRefreshTabBriefV321(''); }\n    toast('AI가 다시 분석 중입니다.');\n  });\n}\nvar currentDetailId=null,currentFbTarget='insight';\nfunction openDetail(id){\n  var r=reports.find(function(x){return x.id===id});\n  if(!r)return;\n  currentDetailId=id;\n  document.getElementById('cosDetailTitle').textContent=r.title;\n  document.getElementById('cosDetailSub').textContent=r.period+' · '+CFG.label+' · '+(r.type==='monthly'?'월간 리포트':'주간 리포트');\n  document.getElementById('cosDetailKicker').textContent=(CFG.label+' '+(r.type==='monthly'?'MONTHLY':'WEEKLY')+' REPORT');\n  document.getElementById('cosDetailHeadline').textContent=r.headline;\n  document.getElementById('cosDetailLead').textContent=r.lead;\n  document.getElementById('cosDetailFbNote').innerHTML=r.feedbackNote?'\u003cdiv class=\"cos-feedback-note\"\u003e'+esc(r.feedbackNote)+'\u003c/div\u003e':'';\n  document.getElementById('cosDetailBullets').innerHTML=(r.bullets||[]).map(function(x){return '\u003cli\u003e'+esc(x)+'\u003c/li\u003e'}).join('');\n  document.getElementById('cosDetailActions').innerHTML=(r.actions||[]).map(function(x,i){return '\u003cdiv\u003e'+(i+1)+'. '+esc(x)+'\u003c/div\u003e'}).join('');\n  document.getElementById('cosDetailInput').value='';\n  document.getElementById('cosDetailBackdrop').classList.add('open');\n}\nfunction openFeedback(target){\n  currentFbTarget=target;\n  var sub,ctx;\n  if(target==='insight'){\n    sub=CFG.brief+' 판단에 대한 피드백입니다.';\n    ctx=curHeadline||'';\n  }else{\n    sub=CFG.label+' 리포트 생성 기준 피드백입니다.';\n    var last=lsGet(FB_KEY,[])[0];\n    ctx='현재 기준: '+CFG.label+' 탭 데이터 해석 요약'+(last?' · 최근 피드백: '+last.feedback:'');\n  }\n  document.getElementById('cosFbSub').textContent=sub;\n  document.getElementById('cosFbContext').textContent=ctx;\n  document.getElementById('cosFbInput').value='';\n  document.getElementById('cosFeedbackBackdrop').classList.add('open');\n}\nfunction saveFeedback(target,fb,original){\n  var arr=lsGet(FB_KEY,[]);\n  arr.unshift({target:target,feedback:fb,original:String(original||'').slice(0,300),createdAt:new Date().toISOString()});\n  lsSet(FB_KEY,arr.slice(0,30));\n}\n\n/* ---------- 초기화 ---------- */\nfunction wrapRenderAllForBriefCache(){\n  try{\n    var fn=(typeof renderAll==='function')?renderAll:window.renderAll;\n    if(typeof fn==='function' \u0026\u0026 !fn.__cosBriefCacheWrappedV329){\n      var old=fn;\n      var wrapped=function(){\n        var res=old.apply(this,arguments);\n        setTimeout(replayCachedBrief,0);\n        return res;\n      };\n      wrapped.__cosBriefCacheWrappedV329=true;\n      try{ renderAll=wrapped; }catch(e){}\n      window.renderAll=wrapped;\n    }\n  }catch(e){}\n}\nsetupHeroBrief();\nvar __hasInitialBrief=replayCachedBrief();\nwrapRenderAllForBriefCache();\nbuildReportSection();\nbuildActualDataTestPanelV324();\nbuildSheets();\nsetupSyncLine();\nsetupDataMirror();\nif(!__hasInitialBrief) renderInsight('');\nsetTimeout(function(){replayCachedBrief();},1200);\nsetTimeout(function(){replayCachedBrief();},4500);\nsetTimeout(function(){replayCachedBrief();},8500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v37-actual-final\"\u003e\n:root{--cos-accent:#3d7eff;--cos-soft:rgba(61,126,255,.12);}\n\n.cal-hero{\n  background:linear-gradient(145deg,#1d4ed8,#3d7eff) !important;\n  border-color:rgba(61,126,255,.28) !important;\n  box-shadow:0 8px 32px rgba(61,126,255,.20) !important;\n}\n\n\n\n/* 실제 리포트 헤더 구조: Weekly · Monthly Report 우측 AI */\n.cos-section-header{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:12px !important;\n  margin:26px 4px 12px !important;\n  min-height:30px !important;\n}\n.cos-section-label{\n  line-height:30px !important;\n}\n.cos-ai-btn{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  gap:6px !important;\n  min-width:42px !important;\n  height:30px !important;\n  padding:0 12px !important;\n  border-radius:999px !important;\n  background:#fff !important;\n  border:1px solid rgba(17,24,39,.08) !important;\n  box-shadow:0 2px 9px rgba(15,23,42,.08) !important;\n  color:#3d7eff !important;\n  font-size:11px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n  cursor:pointer !important;\n  white-space:nowrap !important;\n}\n.cos-ai-btn::before{\n  content:\"\" !important;\n  width:6px !important;\n  height:6px !important;\n  border-radius:50% !important;\n  background:#3d7eff !important;\n  box-shadow:0 0 0 3px rgba(61,126,255,.12) !important;\n  flex:0 0 auto !important;\n}\n\n/* 실제 브리프 히어로 AI 버튼과 제목 사이 여백 */\n.cos-hero-ai{\n  top:20px !important;\n  right:18px !important;\n  height:28px !important;\n  min-width:42px !important;\n  padding:0 12px !important;\n  border-radius:999px !important;\n  background:rgba(255,255  \u0026\u0026 typeof openFeedback==='function') openFeedback('reportCriteria');\n        else if(typeof openFeedback==='function') openFeedback('insight');\n        else if(typeof openInlineFeedback==='function') openInlineFeedback(btn.dataset.target||'report');\n      });\n    });\n    \n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindActualButtons);\n  else bindActualButtons();\n  setTimeout(bindActualButtons,500);\n  setTimeout(bindActualButtons,1500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v310-brief-header-standard\"\u003e\n/* v3.10: v8 기준, 상단 헤더만 브리핑탭 규격으로 통일 */\n.top{\n  position:sticky !important;\n  top:calc(-14px - env(safe-area-inset-top)) !important;\n  z-index:20 !important;\n  margin:calc(-14px - env(safe-area-inset-top)) -16px 16px !important;\n  padding:calc(18px + env(safe-area-inset-top)) 20px 14px !important;\n  background:rgba(245,246,249,.92) !important;\n  backdrop-filter:blur(24px) saturate(180%) !important;\n  -webkit-backdrop-filter:blur(24px) saturate(180%) !important;\n  border-bottom:1px solid rgba(17,24,39,.07) !important;\n}\n.top-row{\n  display:flex !important;\n  align-items:flex-start !important;\n  justify-content:space-between !important;\n  gap:12px !important;\n}\n.top .title{\n  font-size:17px !important;\n  font-weight:900 !important;\n  letter-spacing:-.6px !important;\n  line-height:1.2 !important;\n  color:#111827 !important;\n  margin:0 !important;\n}\n.top .title em{\n  color:#3d7eff !important;\n  font-style:normal !important;\n}\n.top .caption{\n  margin-top:6px !important;\n  font-size:11px !important;\n  line-height:1.45 !important;\n  color:#8a95a8 !important;\n  font-weight:650 !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  max-width:265px !important;\n}\n.top-status{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:flex-end !important;\n  gap:8px !importan tant;\n}\n.sync-status .dot,\n.sync-full-status .dot{\n  background:#3d7eff !important;\n}\n/* 개인 탭은 sync-full-status가 top-copy 안에 있어도 브리핑탭의 sync-status와 같은 톤으로 표시 */\n.top-copy .sync-full-status{\n  display:block !important;\n  max-width:265px !important;\n}\n/* v9에서 생긴 큰 제목 규격이 섞이지 않도록 상단 영역만 강제 고정 */\n.top .header-title,\n.top .page-title,\n.top .top-title{\n  font-size:17px !important;\n  line-height:1.2 !important;\n}\n@media(max-width:370px){\n  .top .caption,\n  .top-copy .sync-full-status{\n    font-size:10.3px !important;\n    letter-spacing:-.35px !important;\n    max-width:235px !important;\n  }\n}\n\u003c/style\u003e\n\n\n\u003cscript id=\"cos-v310-brief-header-clock\"\u003e\n(function(){\n  function updateBriefHeaderClock(){\n    const now=new Date();\n    const hh=String(now.getHours()).padStart(2,'0');\n    const mm=String(now.getMinutes()).padStart(2,'0');\n    const days=['일','월','화','수','목','금','토'];\n    const timeText=`${hh}:${mm}`;\n    const dateText=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n\n    const timeIds=['googleSyncTime','syncTime','nowTime'];\n    timeIds.forEach(id=\u003e{\n      const el=document.getElementById(id);\n      if(el \u0026\u0026 (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n    document.querySelectorAll('.top .google-live span,.top button.sync-dot span').forEach(el=\u003e{\n      if(el \u0026\u0026 (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n\n    const dateIds=['topDatePickerBtn','dailyDateBtn','todayPill'];\n    dateIds.forEach(id=\u003e{\n      const el=document.getElementById(id);\n      if(el \u0026\u0026 (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n    document.querySelectorAll('.top .top-date-btn').forEach(el=\u003e{\n      if(el \u0026\u0026 (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',updateBriefHeaderClock);\n  else updateBriefHeaderClock();\n  setInterval(updateBriefHeaderClock,30000);\n})();\n\u003c/script\u003e\n\n\n\n\n\n\n\n\n\n\n\u003cstyle id=\"cos-v313-ai-brief-fixed-summary\"\u003e\n/* v3.13: 더보기/접기 없이 AI가 처음부터 완결형 요약으로 작성 */\n.cos-brief-more{\n  display:none !important;\n}\n.cos-brief-collapsed .cos-brief-body,\n.cos-brief-expanded .cos-brief-body{\n  display:block !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  overflow:visible !important;\n}\n\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.brief-title-main,\n.calendar-brief-title,\n.work-brief-title,\n.daily-brief-title,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.32 !important;\n}\n\n.hero-ai-text,\n#heroAiText,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-lead,\n.brief-lead,\n.calendar-brief-lead,\n.work-brief-lead,\n.daily-brief-lead,\n.cal-hero .hero-lead,\n.hero .hero-lead{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.62 !important;\n}\n\n/* 작은 설명 카드만 2줄 안전 제한 유지 */\n.brief-sub,\n.mini-desc,\n.cos-report-sub,\n.report-main span{\n  display:-webkit-box !important;\n  -webkit-line-clamp:2 !important;\n  -webkit-box-orient:vertical !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  white-space:normal !important;\n}\n\u003c/style\u003e\n\n\n\u003cscript id=\"cos-v313-ai-brief-fixed-summary-js\"\u003e\n(function(){\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    tab: \"calendar\",\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 34,\n    bodyMaxChars: 130,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules: [\n      \"제목은 반드시 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 반드시 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표, 더보기, 접기 없이 화면에 보이는 분량 안에서 끝낸다.\",\n      \"핵심 판단을 먼저 쓰고, 부가 설명은 과감히 제외한다.\",\n      \"숫자 나열을 반복하지 말고 운영 판단과 다음 행동 중심으로 작성한다.\"\n    ]\n  });\n\n  function completeSentence(text, limit){\n    text=(text||\"\").replace(/\\s+/g,\" \").trim();\n    text=text.replace(/…|\\.\\.\\./g,\"\");\n    if(text.length\u003c=limit) return text;\n    const slice=text.slice(0,limit+1);\n    const endings=[\"습니다.\",\"입니다.\",\"하세요.\",\"됩니다.\",\"좋습니다.\",\"필요합니다.\",\"적합합니다.\",\"중요합니다.\",\"가능합니다.\",\"다.\",\"요.\",\".\"];\n    let best=-1;\n    endings.forEach(end=\u003e{\n      const idx=slice.lastIndexOf(end);\n      if(idx\u003ebest) best=idx+end.length;\n    });\n    if(best\u003e20) return slice.slice(0,best).trim();\n    const comma=slice.lastIndexOf(\",\");\n    if(comma\u003e20) return slice.slice(0,comma).trim()+\"입니다.\";\n    const space=slice.lastIndexOf(\" \");\n    if(space\u003e20) return slice.slice(0,space).trim()+\"입니다.\";\n    return slice.slice(0,limit).trim()+\"입니다.\";\n  }\n\n  function enforceFixedSummary(){\n    document.querySelectorAll(\".cos-brief-more\").forEach(btn=\u003ebtn.remove());\n    document.querySelectorAll(\".cos-brief-collapsed,.cos-brief-expanded,.cos-brief-has-more\").forEach(el=\u003e{\n      el.classList.remove(\"cos-brief-collapsed\",\"cos-brief-expanded\",\"cos-brief-has-more\");\n    });\n\n    const titleSelectors=[\"#heroTitle\",\"#calBriefTitle\",\"#workBriefTitle\",\"#dailyBriefTitle\",\".hero-title\"];\n    const bodySelectors=[\"#heroAiText\",\"#calBriefLead\",\"#workBriefLead\",\"#dailyBriefLead\",\".hero-ai-text\",\".hero-lead\"];\n\n    const titleEl=titleSelectors.map(s=\u003edocument.querySelector(s)).find(Boolean);\n    const bodyEl=bodySelectors.map(s=\u003edocument.querySelector(s)).find(Boolean);\n\n    if(titleEl){\n      const src=titleEl.dataset.fullText || titleEl.textContent;\n      titleEl.textContent=completeSentence(src,34);\n    }\n    if(bodyEl){\n      const src=bodyEl.dataset.fullText || bodyEl.textContent;\n      bodyEl.textContent=completeSentence(src,130);\n    }\n  }\n\n  if(document.readyState===\"loading\") document.addEventListener(\"DOMContentLoaded\",enforceFixedSummary);\n  else enforceFixedSummary();\n  setTimeout(enforceFixedSummary,500);\n  setTimeout(enforceFixedSummary,1500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v314-brief-title-body-fix\"\u003e\n/* v3.14: 브리프 제목 2줄 이내, 본문 4줄 이내를 실제 문장 길이로 해결 */\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.32 !important;\n  max-height:none !important;\n}\n\n.hero-lead,\n#heroLead,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-ai-text,\n#heroAiText{\n  display:block !important;\n  min-height:auto !important;\n  margin-top:10px !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.62 !important;\n  max-height:none !important;\n}\n\n/* 개인 탭 본문이 없어서 생기던 빈 줄 방지 */\n#dailyBriefLead:empty,\n#heroLead:empty,\n#calBriefLead:empty{\n  display:none !important;\n}\n\n/* 브리프와 지표 영역 간격 */\n.hero-lead + .condition-panel,\n.hero-lead + .stat-grid,\n#calBriefLead + .status-box{\n  margin-top:14px !important;\n}\n\u003c/style\u003e\n\n\n\u003cscript id=\"cos-v314-brief-title-body-fix-js\"\u003e\n(function(){\n  const DEFAULT_TITLE=\"수익 일정 관리가 핵심입니다.\";\n  const DEFAULT_BODY=\"오후 일정 전 준비 시간이 필요합니다. 오전에는 미팅 전 확인 업무와 마감 항목을 먼저 정리하세요.\";\n\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 24,\n    bodyMaxChars: 118,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules:[\n      \"제목은 24자 안팎, 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 118자 안팎, 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표로 끝내지 않는다.\",\n      \"내용이 길면 가장 중요한 판단과 다음 행동만 남긴다.\"\n    ]\n  });\n\n  function clean(s){return String(s||'').replace(/…|\\.\\.\\./g,'').replace(/\\s+/g,' ').trim();}\n  function finish(s){s=clean(s);return /[.!?。요다]$/.test(s)?s:s+'입니다.';}\n\n  function fixBrief(){\n    if(window.__cosAiBriefActive)return;\n    const hero=document.querySelector('.cal-hero,.hero');\n    if(!hero) return;\n\n    let title=document.getElementById('calBriefTitle')||document.getElementById('heroTitle')||hero.querySelector('.hero-title');\n    let body=document.getElementById('calBriefLead')||document.getElementById('heroLead')||document.getElementById('dailyBriefLead')||hero.querySelector('.hero-lead')||document.getElementById('heroAiText');\n\n    if(title){\n      const raw=clean(title.textContent);\n      if(!raw || raw.length\u003e24) title.textContent=DEFAULT_TITLE;\n    }\n\n    if(!body){\n      body=document.createElement('div');\n      body.className='hero-lead';\n      body.id='dailyBriefLead';\n      if(title) title.insertAdjacentElement('afterend',body);\n      else hero.insertBefore(body,hero.firstChild);\n    }\n    const bodyRaw=clean(body.textContent);\n    if(!bodyRaw || bodyRaw.length\u003e118) body.textContent=DEFAULT_BODY;\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',fixBrief);\n  else fixBrief();\n  setTimeout(fixBrief,300);\n  setTimeout(fixBrief,900);\n  setTimeout(fixBrief,1800);\n})();\n\u003c/script\u003e\n\n\n\u003cscript id=\"cos-v315-gemini-client\"\u003e\n(function(){\n  const COS_GEMINI_API_URL = \"https://script.google.com/macros/s/AKfycbwxcBEmw_ovexvfAn3mTDyKXcW5X1XACbOF0QA2zRMxwSwIvLKjHJBDmnHkS8eM0ucd/exec\";\n  window.COS_GEMINI_API_URL = window.COS_GEMINI_API_URL || COS_GEMINI_API_URL;\n\n  function isGeminiConfigured(){\n    return window.COS_GEMINI_API_URL \u0026\u0026 !String(window.COS_GEMINI_API_URL).includes('PASTE_');\n  }\n\n  function geminiJsonp(payload){\n    return new Promise(function(resolve,reject){\n      if(!isGeminiConfigured()) return reject(new Error('Gemini Apps Script URL 미설정'));\n      var ctrl=(typeof AbortController!=='undefined')?new AbortController():null;\n      var timer=setTimeout(function(){ try{if(ctrl)ctrl.abort();}catch(e){} reject(new Error('Gemini 응답 시간 초과')); },18000);\n      var body=JSON.stringify(Object.assign({action:'gemini'},payload));\n      fetch(window.COS_GEMINI_API_URL,{\n        method:'POST',\n        headers:{'Content-Type':'text/plain;charset=utf-8'},\n        body:body,\n        redirect:'follow',\n        signal:ctrl?ctrl.signal:undefined\n      }).then(function(r){ return r.text(); }).then(function(txt){\n        clearTimeout(timer);\n        var res;\n        try{ res=JSON.parse(txt); }catch(e){ reject(new Error('Gemini 응답 파싱 실패')); return; }\n        if(!res || res.ok===false) reject(new Error((res\u0026\u0026res.error)||'Gemini 응답 오류'));\n        else resolve(res.data||res);\n      }).catch(function(err){\n        clearTimeout(timer);\n        reject(new Error('Gemini Apps Script 호출 실패: '+(err\u0026\u0026err.message?err.message:err)));\n      });\n    });\n  }\n\n  window.COS_AI=function(payload){\n    payload=payload||{};\n    return geminiJsonp({\n      tab: payload.tab || \"calendar\",\n      kind: payload.kind || 'insight',\n      type: payload.type || 'weekly',\n      feedback: payload.feedback || '',\n      facts: payload.facts || {},\n      rules: window.COS_GEMINI_BRIEF_RULES || {}\n    }).then(function(data){\n      if(!data || !data.headline) throw new Error('Gemini 결과 형식 오류');\n      return data;\n    });\n  };\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v315-gemini-status-style\"\u003e\n.gemini-ready-dot{\n  display:inline-flex;\n  align-items:center;\n  gap:4px;\n}\n.gemini-ready-dot::before{\n  content:\"\";\n  width:5px;\n  height:5px;\n  border-radius:50%;\n  background:#8b5cf6;\n}\n\u003c/style\u003e\n\u003cscript id=\"cos-v315-gemini-status-js\"\u003e\n(function(){\n  function markGeminiStatus(){\n    const configured=window.COS_GEMINI_API_URL \u0026\u0026 !String(window.COS_GEMINI_API_URL).includes('PASTE_');\n    const el=document.querySelector('.sync-status,.sync-full-status,.status-line');\n    if(el \u0026\u0026 configured \u0026\u0026 !/Gemini/.test(el.textContent)){\n      el.textContent=el.textContent+' · Gemini 연결';\n    }\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',markGeminiStatus);\n  else markGeminiStatus();\n  setTimeout(markGeminiStatus,800);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v317-ai-button-unified\"\u003e\n/* v3.17: 브리핑탭 AI 버튼을 다른 탭 AI 버튼과 동일 규격으로 통일 */\n.cos-hero-ai,\n.cos-ai-btn,\n.ai-btn,\n.feedback-ai-btn,\nbutton[data-ai],\nbutton[data-feedback],\nbutton[onclick*=\"AI\"],\nbutton[onclick*=\"ai\"]{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  height:28px !important;\n  min-width:38px !important;\n  padding:0 11px !important;\n  border-radius:999px !important;\n  border:1px solid rgba(17,24,39,.08) !important;\n  background:#fff !important;\n  color:#687386 !important;\n  font-size:10.5px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n  letter-spacing:-.15px !important;\n  box-shadow:0 5px 14px rgba(15,23,42,.08) !important;\n  white-space:nowrap !important;\n  flex:0 0 auto !important;\n}\n\n/* 브리핑 히어로 우측 AI 버튼도 같은 높이, 같은 패딩 */\n.hero .cos-hero-ai,\n.hero-card .cos-hero-ai,\n.brief-hero .cos-hero-ai{\n  height:28px !important;\n  min-width:38px !important;\n  padding:0 11px !important;\n  margin:0 !important;\n}\n\n/* 섹션 헤더 안 AI 버튼 위치 통일 */\n.cos-section-header .cos-hero-ai,\n.cos-section-header .cos-ai-btn,\n.section-header .cos-hero-ai,\n.section-header .cos-ai-btn{\n  align-self:center !important;\n  margin-left:auto !important;\n}\n\n/* 텍스트만 보이는 AI 버튼 방지 */\n.cos-hero-ai::before,\n.cos-ai-btn::before{\n  display:none !important;\n}\n\n/* active/hover 톤도 통일 */\n.cos-hero-ai:active,\n.cos-ai-btn:active,\n.ai-btn:active{\n  transform:translateY(1px) !important;\n  box-shadow:0 2px 8px rgba(15,23,42,.08) !important;\n}\n\u003c/style\u003e\n\n\n\u003cstyle id=\"cos-v319-translucent-ai-button\"\u003e\n/* v3.19: 캘린더, 업무, 개인 AI 버튼을 브리핑탭처럼 반투명 톤으로 통일 */\n.cos-ai-btn,\n#cosReportAiBtn,\n.cos-section-header .cos-ai-btn,\n.section-header .cos-ai-btn{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  gap:5px !important;\n  height:28px !important;\n  min-width:38px !important;\n  padding:0 11px !important;\n  border-radius:999px !important;\n  background:rgba(61,126,255,.12) !important;\n  border:1px solid rgba(61,126,255,.18) !important;\n  color:#3d7eff !important;\n  box-shadow:none !important;\n  font-size:10.5px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n  letter-spacing:-.15px !important;\n  white-space:nowrap !important;\n  flex:0 0 auto !important;\n}\n.cos-ai-btn::before,\n#cosReportAiBtn::before{\n  content:\"\" !important;\n  width:5px !important;\n  height:5px !important;\n  border-radius:50% !important;\n  background:currentColor !important;\n  opacity:.85 !important;\n  flex:0 0 auto !important;\n}\n.cos-ai-btn:active,\n#cosReportAiBtn:active{\n  transform:translateY(1px) !important;\n  filter:brightness(.98) !important;\n}\n\u003c/style\u003e\n\n\n\u003cscript id=\"cos-v321-gemini-tab-bridge\"\u003e\n(function(){\n  window.COS_GEMINI_TAB_READY = Object.assign(window.COS_GEMINI_TAB_READY || {}, {\n    \"calendar\": true\n  });\n\n  function retryTabBrief(){\n    if(typeof window.cosRefreshTabBriefV321 === 'function'){\n      try{ window.cosRefreshTabBriefV321(''); }catch(e){ console.warn(e); }\n    }\n  }\n\n  // 탭 진입 후 Gemini URL과 Google 데이터가 모두 준비될 시간을 한 번 더 확보\n  setTimeout(function(){/*v60: 자동 brief 재시도 제거*/}, 1800);\n  setTimeout(function(){/*v60: 자동 brief 재시도 제거*/}, 5200);\n  setTimeout(function(){/*v60: 자동 brief 재시도 제거*/}, 9200);\n\n  function markGeminiConnected(){\n    var configured = window.COS_GEMINI_API_URL \u0026\u0026 !String(window.COS_GEMINI_API_URL).includes('PASTE_');\n    if(!configured) return;\n    var line = document.querySelector('.sync-status,.sync-full-status,.cos-sync-line,.status-line');\n    if(line \u0026\u0026 !/Gemini/.test(line.textContent)){\n      line.textContent = line.textContent + ' · Gemini';\n    }\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',markGeminiConnected);\n  else markGeminiConnected();\n  setTimeout(markGeminiConnected,1500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v323-unified-top-controls\"\u003e\n:root{--cos-top-accent:#3d7eff;--cos-top-accent-soft:rgba(61,126,255,.14);}\n\n/* v3.23: 상단 새로고침, 날짜 모달 4개 탭 공통 */\n.top .google-live,\n.top button.sync-dot,\n.top #syncStatus.google-live,\n.top #googleLive{\n  cursor:pointer !important;\n  user-select:none !important;\n  transition:transform .12s ease, opacity .12s ease, background .12s ease !important;\n}\n.top .google-live:active,\n.top button.sync-dot:active,\n.top #syncStatus.google-live:active,\n.top #googleLive:active{\n  transform:scale(.96) !important;\n}\n.top .google-live.cos-loading i,\n.top button.sync-dot.cos-loading i,\n.top #syncStatus.cos-loading i,\n.top #googleLive.cos-loading i{\n  animation:cosTopPulse .85s ease-in-out infinite alternate !important;\n}\n@keyframes cosTopPulse{\n  from{opacity:.45; transform:scale(.85);}\n  to{opacity:1; transform:scale(1.2);}\n}\n\n.cos-top-date-backdrop{\n  position:fixed !important;\n  inset:0 !important;\n  z-index:120 !important;\n  display:none !important;\n  align-items:center !important;\n  justify-content:center !important;\n  padding:24px !important;\n  background:rgba(15,23,42,.28) !important;\n  backdrop-filter:blur(12px) !important;\n  -webkit-backdrop-filter:blur(12px) !important;\n}\n.cos-top-date-backdrop.open{\n  display:flex !important;\n}\n.cos-top-date-modal{\n  width:100% !important;\n  max-width:320px !important;\n  background:#fff !important;\n  border-radius:24px !important;\n  padding:15px !important;\n  box-shadow:0 22px 60px rgba(15,23,42,.24) !important;\n}\n.cos-top-date-head{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:10px !important;\n  margin-bottom:10px !important;\n}\n.cos-top-date-title{\n  font-size:15px !important;\n  font-weight:950 !important;\n  color:#111827 !important;\n  letter-spacing:-.45px !important;\n}\n.cos-top-date-arrow{\n  width:30px !important;\n  height:30px !important;\n  border-radius:50% !important;\n  border:0 !important;\n  background:#f3f5f9 !important;\n  color:#596375 !important;\n  font-size:19px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n}\n.cos-top-date-week{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:4px !important;\n  margin-bottom:5px !important;\n}\n.cos-top-date-week span{\n  text-align:center !important;\n  color:#9aa4b4 !important;\n  font-size:10px !important;\n  font-weight:900 !important;\n}\n.cos-top-date-grid{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:5px !important;\n}\n.cos-top-date-day{\n  height:34px !important;\n  border:0 !important;\n  border-radius:12px !important;\n  background:#f7f8fb !important;\n  color:#445064 !important;\n  font-size:12px !important;\n  font-weight:900 !important;\n  line-height:1 !important;\n}\n.cos-top-date-day.muted{\n  color:#c0c6d0 !important;\n  background:#fafbfc !important;\n}\n.cos-top-date-day.today{\n  color:var(--cos-top-accent) !important;\n  background:var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-day.selected{\n  color:#fff !important;\n  background:var(--cos-top-accent) !important;\n  box-shadow:0 8px 18px var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-foot{\n  display:flex !important;\n  gap:8px !important;\n  margin-top:12px !important;\n}\n.cos-top-date-foot button{\n  flex:1 !important;\n  height:36px !important;\n  border-radius:12px !important;\n  border:0 !important;\n  font-size:12px !important;\n  font-weight:950 !important;\n}\n.cos-top-date-today{\n  background:var(--cos-top-accent-soft) !important;\n  color:var(--cos-top-accent) !important;\n}\n.cos-top-date-close{\n  background:#f2f4f8 !important;\n  color:#687386 !important;\n}\n\u003c/style\u003e\n\n\n\u003cdiv class=\"cos-top-date-backdrop\" id=\"cosTopDateBackdrop\" aria-hidden=\"true\"\u003e\n  \u003cdiv class=\"cos-top-date-modal\" role=\"dialog\" aria-modal=\"true\"\u003e\n    \u003cdiv class=\"cos-top-date-head\"\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDatePrev\"\u003e‹\u003c/button\u003e\n      \u003cdiv class=\"cos-top-date-title\" id=\"cosTopDateTitle\"\u003e2026. 6\u003c/div\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDateNext\"\u003e›\u003c/button\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-week\"\u003e\n      \u003cspan\u003e일\u003c/span\u003e\u003cspan\u003e월\u003c/span\u003e\u003cspan\u003e화\u003c/span\u003e\u003cspan\u003e수\u003c/span\u003e\u003cspan\u003e목\u003c/span\u003e\u003cspan\u003e금\u003c/span\u003e\u003cspan\u003e토\u003c/span\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-grid\" id=\"cosTopDateGrid\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"cos-top-date-foot\"\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-today\" id=\"cosTopDateToday\"\u003e오늘\u003c/button\u003e\n      \u003cbutton type=\"button\" class=\"cos-top-date-close\" id=\"cosTopDateClose\"\u003e닫기\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\n\u003cscript id=\"cos-v323-unified-top-controls-js\"\u003e\n(function(){\n  const TAB = \"calendar\";\n  const DAY_NAMES = ['일','월','화','수','목','금','토'];\n  let viewDate = new Date();\n\n  function pad(n){ return String(n).padStart(2,'0'); }\n  function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }\n  function fromISO(iso){ return new Date(String(iso).slice(0,10)+'T00:00:00'); }\n  function labelDate(d){ return (d.getMonth()+1)+'.'+d.getDate()+' '+DAY_NAMES[d.getDay()]; }\n  function qs(s){ return document.querySelector(s); }\n  function qsa(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }\n\n  function getTopDateButton(){\n    return qs('.top .top-date-btn') || qs('#topDatePickerBtn') || qs('#dailyDateBtn');\n  }\n\n  function getSyncButton(){\n    return qs('.top button.google-live') || qs('.top button.sync-dot') || qs('.top #googleLive') || qs('.top #syncStatus');\n  }\n\n  function getStatusLine(){\n    return qs('.top .sync-status') || qs('#syncFullStatus') || qs('.cos-sync-line') || qs('.status-line');\n  }\n\n  function getTimeSpan(){\n    return qs('#googleSyncTime') || qs('#syncTime') || qs('.top .google-live span') || qs('.top button.sync-dot span');\n  }\n\n  function currentSelectedDate(){\n    try{\n      if(typeof window.COS_SELECTED_DATE_KEY==='function'){\n        const iso=window.COS_SELECTED_DATE_KEY();\n        if(iso) return fromISO(iso);\n      }\n      if(TAB==='calendar' \u0026\u0026 typeof dateFor==='function' \u0026\u0026 typeof cur!=='undefined') return dateFor(cur);\n      if(TAB==='work' \u0026\u0026 typeof currentDateISO!=='undefined') return fromISO(currentDateISO);\n      if(TAB==='personal' \u0026\u0026 typeof dateForDay==='function' \u0026\u0026 typeof cur!=='undefined') return dateForDay(cur);\n      const stored = localStorage.getItem('brief_selected_date_v323');\n      if(TAB==='brief' \u0026\u0026 stored) return fromISO(stored);\n    }catch(e){}\n    const btn=getTopDateButton();\n    if(btn){\n      const m=String(btn.textContent||'').match(/(\\d{1,2})\\.(\\d{1,2})/);\n      if(m){\n        const now=new Date();\n        return new Date(now.getFullYear(), Number(m[1])-1, Number(m[2]));\n      }\n    }\n    return new Date();\n  }\n\n  function setTopDateText(d){\n    const btn=getTopDateButton();\n    if(btn) btn.textContent=labelDate(d);\n  }\n\n  function setTopSyncState(state, message){\n    const live=getSyncButton();\n    const time=getTimeSpan();\n    const line=getStatusLine();\n    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});\n    if(live){\n      live.classList.remove('cos-loading','loading','fail','synced','idle');\n      if(state==='loading') live.classList.add('cos-loading','loading');\n      else if(state==='fail') live.classList.add('fail');\n      else live.classList.add('synced');\n    }\n    if(time) time.textContent = state==='loading' ? '연동 중' : now;\n    if(line){\n      line.style.display='block';\n      if(state==='loading') line.textContent = message || 'Google / Gemini 실시간 연동 중...';\n      else if(state==='fail') line.textContent = message || 'Google / Gemini 연동 오류 · 다시 시도하세요.';\n      else line.textContent = message || 'Google / Gemini 실시간 연동 완료 · ' + now;\n    }\n  }\n\n  async function maybeCall(name){\n    try{\n      const fn = window[name];\n      if(typeof fn === 'function') return await Promise.resolve(fn());\n    }catch(e){\n      console.warn(name, e);\n      throw e;\n    }\n    return null;\n  }\n\n  async function refreshTop(){\n    setTopSyncState('loading');\n    try{\n      if(TAB==='brief'){\n        await maybeCall('refreshGeminiBrief');\n      }else if(TAB==='calendar'){\n        await maybeCall('loadGoogleCalendar');\n        await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='work'){\n        if(typeof loadWorkDataFromSheets==='function') await maybeCall('loadWorkDataFromSheets');\n        if(typeof loadGoogleTasks==='function') await maybeCall('loadGoogleTasks');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='personal'){\n        if(typeof saveThenReloadGoogle==='function') await maybeCall('saveThenReloadGoogle');\n        else if(typeof checkGoogleHealth==='function') await maybeCall('checkGoogleHealth');\n        if(typeof loadChecklistFromGoogle==='function') await maybeCall('loadChecklistFromGoogle');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }\n      setTopSyncState('synced');\n    }catch(e){\n      console.warn(e);\n      setTopSyncState('fail');\n    }\n  }\n\n  function openTopDate(){\n    const d=currentSelectedDate();\n    viewDate=new Date(d.getFullYear(), d.getMonth(), 1);\n    renderTopDate();\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.add('open');\n      bd.setAttribute('aria-hidden','false');\n    }\n  }\n\n  function closeTopDate(){\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.remove('open');\n      bd.setAttribute('aria-hidden','true');\n    }\n  }\n\n  function renderTopDate(){\n    const title=qs('#cosTopDateTitle');\n    const grid=qs('#cosTopDateGrid');\n    if(!title || !grid) return;\n    const y=viewDate.getFullYear();\n    const m=viewDate.getMonth();\n    title.textContent=y+'. '+(m+1);\n\n    const first=new Date(y,m,1);\n    const start=new Date(first);\n    start.setDate(first.getDate()-first.getDay());\n\n    const selectedISO=toISO(currentSelectedDate());\n    const todayISO=toISO(new Date());\n    let html='';\n    for(let i=0;i\u003c42;i++){\n      const d=new Date(start);\n      d.setDate(start.getDate()+i);\n      const iso=toISO(d);\n      const cls=['cos-top-date-day'];\n      if(d.getMonth()!==m) cls.push('muted');\n      if(iso===todayISO) cls.push('today');\n      if(iso===selectedISO) cls.push('selected');\n      html+='\u003cbutton type=\"button\" class=\"'+cls.join(' ')+'\" data-cos-date=\"'+iso+'\"\u003e'+d.getDate()+'\u003c/button\u003e';\n    }\n    grid.innerHTML=html;\n    qsa('[data-cos-date]').forEach(function(btn){\n      btn.onclick=function(){ applyTopDate(btn.dataset.cosDate); };\n    });\n  }\n\n  function applyTopDate(iso){\n    const d=fromISO(iso);\n    setTopDateText(d);\n\n    try{\n      if(typeof window.COS_SELECT_DATE==='function' \u0026\u0026 TAB!=='brief'){\n        window.COS_SELECT_DATE(iso);\n      }else if(TAB==='calendar' \u0026\u0026 typeof setWeekByDate==='function'){\n        setWeekByDate(iso);\n      }else if(TAB==='work'){\n        if(typeof setCurrentDate==='function') setCurrentDate(iso);\n        else window.currentDateISO = iso;\n        if(typeof renderAll==='function') renderAll();\n        else if(typeof window.renderAll==='function') window.renderAll();\n      }else if(TAB==='personal'){\n        if(typeof selectDailyDate==='function') selectDailyDate(d);\n        else if(typeof window.selectDailyDate==='function') window.selectDailyDate(d);\n        else if(typeof renderAll==='function') renderAll();\n        else if(typeof window.renderAll==='function') window.renderAll();\n      }else{\n        localStorage.setItem('brief_selected_date_v323', iso);\n        if(typeof refreshGeminiBrief==='function') refreshGeminiBrief();\n      }\n    }catch(e){\n      console.warn(e);\n    }\n\n    closeTopDate();\n    setTimeout(function(){\n      if(TAB!=='brief') refreshTop();\n    }, 350);\n  }\n\n  function bindTopControls(){\n    const syncBtn=getSyncButton();\n    if(syncBtn \u0026\u0026 !syncBtn.__cosV323Bound){\n      syncBtn.__cosV323Bound=true;\n      syncBtn.onclick=null;\n      syncBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        refreshTop();\n      }, true);\n    }\n\n    const dateBtn=getTopDateButton();\n    if(dateBtn \u0026\u0026 !dateBtn.__cosV323Bound){\n      dateBtn.__cosV323Bound=true;\n      dateBtn.onclick=null;\n      dateBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        openTopDate();\n      }, true);\n    }\n\n    const prev=qs('#cosTopDatePrev');\n    const next=qs('#cosTopDateNext');\n    const today=qs('#cosTopDateToday');\n    const close=qs('#cosTopDateClose');\n    const bd=qs('#cosTopDateBackdrop');\n\n    if(prev \u0026\u0026 !prev.__cosV323Bound){\n      prev.__cosV323Bound=true;\n      prev.onclick=function(){ viewDate.setMonth(viewDate.getMonth()-1); renderTopDate(); };\n    }\n    if(next \u0026\u0026 !next.__cosV323Bound){\n      next.__cosV323Bound=true;\n      next.onclick=function(){ viewDate.setMonth(viewDate.getMonth()+1); renderTopDate(); };\n    }\n    if(today \u0026\u0026 !today.__cosV323Bound){\n      today.__cosV323Bound=true;\n      today.onclick=function(){ applyTopDate(toISO(new Date())); };\n    }\n    if(close \u0026\u0026 !close.__cosV323Bound){\n      close.__cosV323Bound=true;\n      close.onclick=closeTopDate;\n    }\n    if(bd \u0026\u0026 !bd.__cosV323Bound){\n      bd.__cosV323Bound=true;\n      bd.addEventListener('click', function(e){\n        if(e.target===bd) closeTopDate();\n      });\n    }\n\n    setTopDateText(currentSelectedDate());\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindTopControls);\n  else bindTopControls();\n\n  setTimeout(bindTopControls, 500);\n  setTimeout(bindTopControls, 1600);\n  setTimeout(bindTopControls, 3200);\n\n  window.cosOpenUnifiedTopDateV323=openTopDate;\n  window.cosRefreshUnifiedTopV323=refreshTop;\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-v324-gemini-actual-test-style\"\u003e\n.cos-actual-test-card{\n  margin-top:12px;\n  padding:13px;\n  border-radius:18px;\n  background:#fff;\n  border:1px solid rgba(17,24,39,.06);\n  box-shadow:0 7px 22px rgba(15,23,42,.05);\n}\n.cos-actual-test-head{\n  display:flex;\n  align-items:flex-start;\n  justify-content:space-between;\n  gap:10px;\n}\n.cos-actual-test-title{\n  font-size:12px;\n  line-height:1.3;\n  font-weight:950;\n  letter-spacing:-.25px;\n  color:#111827;\n}\n.cos-actual-test-sub{\n  margin-top:4px;\n  font-size:10.5px;\n  line-height:1.45;\n  font-weight:750;\n  color:#8a95a8;\n}\n.cos-actual-test-pill{\n  flex:0 0 auto;\n  height:23px;\n  padding:0 8px;\n  border-radius:999px;\n  display:inline-flex;\n  align-items:center;\n  justify-content:center;\n  font-size:9.5px;\n  font-weight:950;\n  color:var(--cos-accent,#3d7eff);\n  background:var(--cos-soft,rgba(61,126,255,.12));\n}\n.cos-actual-test-actions{\n  margin-top:10px;\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:8px;\n}\n.cos-actual-test-actions button{\n  min-height:36px;\n  border:0;\n  border-radius:12px;\n  background:#f7f8fb;\n  color:#596375;\n  font-size:11px;\n  line-height:1.25;\n  font-weight:950;\n}\n.cos-actual-test-actions button.primary{\n  background:var(--cos-accent,#3d7eff);\n  color:#fff;\n}\n.cos-actual-test-foot{\n  margin-top:9px;\n  padding-top:9px;\n  border-top:1px solid rgba(17,24,39,.06);\n  font-size:10px;\n  line-height:1.45;\n  font-weight:750;\n  color:#9aa4b4;\n}\n\u003c/style\u003e\n\n\n\n\u003cstyle id=\"cos-calendar-krp-memo-v1\"\u003e\n/* KRP는 기본 업무로 보되 캘린더 화면에는 표시하지 않고, CDE/WSW/PWR만 프로젝트 태그로 표시 */\n.project-pill.krp-hidden{display:none!important}\n.project-pill.cde{background:#eef0f5!important;color:#596375!important;border-color:rgba(17,24,39,.08)!important}\n.project-pill.wsw{background:rgba(0,184,122,.10)!important;color:#00b87a!important;border-color:rgba(0,184,122,.18)!important}\n.project-pill.pwr{background:rgba(255,106,61,.10)!important;color:#ff6a3d!important;border-color:rgba(255,106,61,.18)!important}\n\u003c/style\u003e\n\u003cscript id=\"cos-calendar-krp-memo-v1\"\u003e\n(function(){\n  if(window.__cosCalendarKrpMemoV1) return;\n  window.__cosCalendarKrpMemoV1=true;\n\n  function cleanProject(p){\n    p=String(p||'').trim().toUpperCase();\n    if(p==='KRW') p='KRP';\n    return ['CDE','KRP','WSW','PWR'].indexOf(p)\u003e=0 ? p : '';\n  }\n  function rawOf(e){return String((e\u0026\u0026(e.rawTitle||e.title||e.cleanTitle))||'')}\n  function projectFromRaw(raw){\n    var m=String(raw||'').match(/\\[\\s*(CDE|KRP|KRW|WSW|PWR)\\s*\\]/i);\n    return m?cleanProject(m[1]):'';\n  }\n  function typeFromRaw(raw){\n    var m=String(raw||'').match(/\\[\\s*(미팅|업무|출장|마감|수익|알바|개인|메모)\\s*\\]/);\n    return m?m[1]:'';\n  }\n  function isMeetingRaw(raw){return /\\[\\s*미팅\\s*\\]/.test(String(raw||''));}\n  function isMemoRaw(raw){return /\\[\\s*메모\\s*\\]/.test(String(raw||''));}\n  function isPersonalRaw(raw){return /\\[\\s*개인\\s*\\]/.test(String(raw||''));}\n\n  window.isMemoEvent=function(e){\n    if(!e) return false;\n    var raw=rawOf(e), t=String(e.type||'');\n    return !!e.isMemo || t==='메모' || isMemoRaw(raw);\n  };\n  window.isPersonalEvent=function(e){\n    if(!e) return false;\n    if(window.isMemoEvent(e)) return false;\n    var raw=rawOf(e), t=String(e.type||''), src=String(e.sourceLabel||e.source||'');\n    return !!e.isPersonal || t==='개인' || isPersonalRaw(raw) || /개인일정|아라/.test(src);\n  };\n\n  var oldNormalize=window.normalizeCalendarResponse;\n  if(typeof oldNormalize==='function'){\n    window.normalizeCalendarResponse=function(res){\n      var out=oldNormalize.call(this,res||{});\n      try{\n        Object.keys(out.events||{}).forEach(function(k){\n          (out.events[k]||[]).forEach(function(e){\n            var raw=rawOf(e);\n            var rawType=typeFromRaw(raw);\n            var p=cleanProject(e.project)||projectFromRaw(raw);\n            if(!p \u0026\u0026 (String(e.type||'')==='미팅' || e.isMeeting || isMeetingRaw(raw))) p='KRP';\n            if(!p \u0026\u0026 !window.isPersonalEvent(e) \u0026\u0026 !window.isMemoEvent(e)) p='KRP';\n            e.project=p;\n            if(rawType==='알바') { e.type='수익'; e.isRevenue=true; }\n            if(rawType==='메모') { e.type='메모'; e.isMemo=true; }\n            if(rawType==='개인') { e.type='개인'; e.isPersonal=true; }\n          });\n        });\n      }catch(err){console.warn('[CAL-KRP] normalize patch failed',err)}\n      return out;\n    };\n  }\n\n  window.projectPill=function(project){\n    var p=cleanProject(project);\n    if(!p || p==='KRP') return '';\n    if(['CDE','WSW','PWR'].indexOf(p)\u003c0) return '';\n    return '\u003cspan class=\"project-pill '+p.toLowerCase()+'\"\u003e'+(typeof esc==='function'?esc(p):p)+'\u003c/span\u003e';\n  };\n\n  function rerender(){try{if(typeof renderAll==='function') renderAll();}catch(e){}}\n  setTimeout(rerender,0);\n  setTimeout(rerender,900);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-calendar-memo-tag-clean-v1\"\u003e\n/* 메모 일정은 프로젝트 태그를 붙이지 않고 메모 태그만 표시 */\n.event-row.memo-only .project-pill{display:none!important}\n.event-row.memo-only .pill-row .pill:not(.pill-pink){display:none!important}\n\u003c/style\u003e\n\u003cscript id=\"cos-calendar-memo-tag-clean-v1\"\u003e\n(function(){\n  if(window.__cosCalendarMemoTagCleanV1) return;\n  window.__cosCalendarMemoTagCleanV1=true;\n\n  function rawOf(e){return String((e\u0026\u0026(e.rawTitle||e.title||e.cleanTitle))||'')}\n  function isMemo(e){\n    try{ if(typeof isMemoEvent==='function' \u0026\u0026 isMemoEvent(e)) return true; }catch(_e){}\n    var raw=rawOf(e), t=String((e\u0026\u0026e.type)||'');\n    return !!(e\u0026\u0026e.isMemo) || t==='메모' || /\\[\\s*메모\\s*\\]/.test(raw);\n  }\n  function esc2(s){return (typeof esc==='function'?esc(s):String(s||'').replace(/[\u0026\u003c\u003e\"']/g,function(m){return {'\u0026':'\u0026amp;','\u003c':'\u0026lt;','\u003e':'\u0026gt;','\"':'\u0026quot;',\"'\":'\u0026#39;'}[m]}));}\n\n  var oldNormalize=window.normalizeCalendarResponse;\n  if(typeof oldNormalize==='function'){\n    window.normalizeCalendarResponse=function(res){\n      var out=oldNormalize.call(this,res||{});\n      try{\n        Object.keys(out.events||{}).forEach(function(k){\n          (out.events[k]||[]).forEach(function(e){\n            if(isMemo(e)){\n              e.type='메모';\n              e.isMemo=true;\n              e.isPersonal=false;\n              e.project='';\n            }\n          });\n        });\n      }catch(err){console.warn('[CAL-MEMO] normalize patch failed',err)}\n      return out;\n    };\n  }\n\n  try{\n    eventPills=function(e){\n      if(isMemo(e)) return '\u003cspan class=\"pill pill-pink\"\u003e메모\u003c/span\u003e';\n      var pills=[];\n      if(e.isTrip \u0026\u0026 e.type!=='출장') pills.push('출장');\n      if(e.isRevenue \u0026\u0026 e.type!=='수익') pills.push('수익');\n      if(e.isDeadline \u0026\u0026 e.type!=='마감') pills.push('마감');\n      if(e.isMeeting \u0026\u0026 e.type!=='미팅') pills.push('미팅');\n      pills.push(e.type || '업무');\n      return Array.from(new Set(pills)).map(function(t){return '\u003cspan class=\"pill '+((PILLC\u0026\u0026PILLC[t])||'pill-grey')+'\"\u003e'+esc2(t)+'\u003c/span\u003e';}).join('');\n    };\n  }catch(_e){}\n\n  try{\n    renderEvents=function(){\n      var isAllDay=function(e){var t=String((e\u0026\u0026e.time)||'').trim();return !t||t==='종일';};\n      var ev=events().slice().sort(function(a,b){\n        var aa=isAllDay(a)?0:1, ab=isAllDay(b)?0:1;\n        if(aa!==ab) return aa-ab;\n        if(aa===0){var am=isMemo(a)?0:1, bm=isMemo(b)?0:1;if(am!==bm)return am-bm;return 0;}\n        return String(a.time).localeCompare(String(b.time));\n      });\n      var list=document.getElementById('eventList');\n      if(!list) return;\n      list.innerHTML=ev.length?ev.map(function(e,i){\n        var amount=moneyText(e);\n        var amountText=amount ? '\u003cspan class=\"event-amount-inline '+(amount==='금액미정'?'unknown':'')+'\"\u003e'+esc2(amount)+'\u003c/span\u003e' : '';\n        var typePills=eventPills(e);\n        var projectHtml = isMemo(e) ? '' : projectPill(e.project);\n        var rowCls = isMemo(e) ? ' memo-only' : '';\n        return '\u003cdiv class=\"event-row'+rowCls+'\"\u003e\u003cdiv class=\"event-time\"\u003e'+timeRangeHtml(e)+'\u003c/div\u003e\u003cdiv class=\"event-card\" style=\"--accent:'+((C\u0026\u0026C[e.type])||C.개인)+'\"\u003e\u003cdiv class=\"event-top\"\u003e\u003cdiv class=\"event-name\"\u003e'+esc2(cleanTitle(e.title))+'\u003c/div\u003e\u003cdiv class=\"pill-row\"\u003e'+amountText+projectHtml+typePills+'\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e';\n      }).join(''):'\u003cdiv class=\"empty\"\u003e선택한 날짜에 일정이 없습니다.\u003c/div\u003e';\n    };\n  }catch(err){console.warn('[CAL-MEMO] renderEvents patch failed',err)}\n\n  setTimeout(function(){try{if(typeof renderAll==='function')renderAll();}catch(_e){}},0);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-hide-actual-test-v9\"\u003e\n.cos-actual-test-card{display:none!important}\n\u003c/style\u003e\n\u003cscript id=\"cos-remove-actual-test-v9\"\u003e\n(function(){\n  function removeActualTest(){\n    try{document.querySelectorAll('.cos-actual-test-card').forEach(function(el){el.remove();});}catch(e){}\n  }\n  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',removeActualTest);else removeActualTest();\n  setTimeout(removeActualTest,500);setTimeout(removeActualTest,1500);setTimeout(removeActualTest,3500);\n})();\n\u003c/script\u003e\n\n\n\u003cstyle id=\"cos-report-unify-v1\"\u003e\n/* v14 리포트 섹션 규격 통일: 캘린더·업무·개인·브리핑 동일 카드/행/아이콘 */\n.report-row,.cos-report-row,.archive-row .report-top,.report-card .report-top{\n  align-items:center !important;\n}\n/* 개인 탭 report-row를 cos-report-row 규격으로 */\n.report-row{\n  grid-template-columns:36px minmax(0,1fr) auto !important;\n  gap:11px !important;\n  min-height:64px !important;\n  padding:14px 15px !important;\n}\n.report-icon{ u003e\u003cbutton class=\"section-action\" id=\"recEditBtn\"\u003e편집\u003c/button\u003e\u003c/div\u003e\n  \u003cdiv class=\"add-rec-panel\" id=\"addRecPanel\"\u003e\u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newRecName\" placeholder=\"정기 미팅명\"\u003e\u003cinput class=\"input\" id=\"newRecAmount\" placeholder=\"금액\"\u003e\u003c/div\u003e\u003cdiv class=\"edit-grid-2\"\u003e\u003cselect class=\"select\" id=\"newRecAmountUnit\"\u003e\u003coption\u003e총\u003c/option\u003e\u003coption\u003e건\u003c/option\u003e\u003coption\u003e월\u003c/option\u003e\u003coption\u003e회\u003c/option\u003e\u003c/select\u003e\u003cinput class=\"input\" id=\"newRecCycle\" placeholder=\"월 1회\"\u003e\u003c/div\u003e\u003cbutton class=\"btn\" style=\"width:100%;margin-top:8px\" id=\"addRecBtn\"\u003e추가\u003c/button\u003e\u003c/div\u003e\n  \u003cdiv id=\"recurringWrap\"\u003e\u003c/div\u003e\n\n  \u003cdiv class=\"section-header\"\u003e\u003cdiv class=\"section-label\"\u003eProject\u003c/div\u003e\u003cbutton class=\"section-action\" id=\"projectEditBtn\"\u003e편집\u003c/button\u003e\u003c/div\u003e\n  \u003cdiv class=\"add-project-panel\" id=\"addProjectPanel\"\u003e\u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newProjectName\" placeholder=\"프로젝트명\"\u003e\u003cinput class=\"input\" id=\"newProjectSchedule\" placeholder=\"일정 1/5\"\u003e\u003c/div\u003e\u003cbutton class=\"btn\" style=\"width:100%;margin-top:8px\" id=\"addProjectBtn\"\u003e프로젝트 추가\u003c/button\u003e\u003c/div\u003e\n  \u003cdiv id=\"projectWrap\"\u003e\u003c/div\u003e\n  \u003cdiv id=\"projectArchiveWrap\"\u003e\u003c/div\u003e\n\n\u003cdiv class=\"section-header\"\u003e\u003cdiv class=\"section-label\"\u003eMonthly Alba\u003c/div\u003e\u003cbutton class=\"section-action\" id=\"albaEditBtn\"\u003e편집\u003c/button\u003e\u003c/div\u003e\n  \u003cdiv id=\"albaWrap\"\u003e\u003c/div\u003e\n\u003c/main\u003e\n\u003cdiv class=\"bottom-nav\"\u003e\u003cdiv class=\"nav\"\u003e\u003cdiv class=\"ico\"\u003e▣\u003c/div\u003e\u003cspan\u003e브리핑\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"nav\"\u003e\u003cdiv class=\"ico\"\u003e◷\u003c/div\u003e\u003cspan\u003e캘린더\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"nav on\"\u003e\u003cdiv class=\"ico\"\u003e✓\u003c/div\u003e\u003cspan\u003e업무\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"nav\"\u003e\u003cdiv class=\"ico\"\u003e○\u003c/div\u003e\u003cspan\u003e개인\u003c/span\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cdiv class=\"date-modal-backdrop\" id=\"dateModal\"\u003e\u003cdiv class=\"date-modal\"\u003e\u003cdiv class=\"date-modal-head\"\u003e\u003cbutton class=\"date-arrow\" id=\"prevMonth\"\u003e‹\u003c/button\u003e\u003cdiv class=\"date-modal-title\" id=\"modalTitle\"\u003e\u003c/div\u003e\u003cbutton class=\"date-arrow\" id=\"nextMonth\"\u003e›\u003c/button\u003e\u003c/div\u003e\u003cdiv class=\"date-week-head\"\u003e\u003cspan\u003e일\u003c/span\u003e\u003cspan\u003e월\u003c/span\u003e\u003cspan\u003e화\u003c/span\u003e\u003cspan\u003e수\u003c/span\u003e\u003cspan\u003e목\u003c/span\u003e\u003cspan\u003e금\u003c/span\u003e\u003cspan\u003e토\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"date-grid\" id=\"dateGrid\"\u003e\u003c/div\u003e\u003cdiv class=\"date-modal-foot\"\u003e\u003cbutton class=\"danger\" id=\"deleteDate\"\u003e일정 삭제\u003c/button\u003e\u003cbutton id=\"closeModal\"\u003e닫기\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e\n\u003cscript\u003e\n\nfunction setSyncDebug(msg){ window.__workSyncDebug = msg; }\n\nfunction workHHMM(){\n  const d=new Date();\n  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');\n}\nfunction setWorkSyncStatus(state='idle', detail=''){\n  const live=document.getElementById('googleLive');\n  const tm=document.getElementById('googleSyncTime');\n  const st=document.getElementById('syncStatus');\n  const t=workHHMM();\n\n  if(live){\n    live.classList.remove('loading','fail','synced','idle');\n    live.classList.add(state==='loading'?'loading':state==='fail'?'fail':state==='synced'?'synced':'idle');\n  }\n\n  if(tm) tm.textContent=t;\n\n  if(st){\n    st.className='sync-status '+(state||'idle');\n    if(state==='loading'){\n      st.textContent='Google 연동 중...';\n      st.style.display='block';\n    }else if(state==='fail'){\n      st.textContent='Google 연동 확인 필요 · 다시 시도';\n      st.style.display='block';\n    }else{\n      st.textContent='';\n      st.style.display='none';\n    }\n  }\n}\n\n/* v46: Google Tasks realtime sync endpoint\n   아래 URL을 Apps Script 웹앱 배포 URL로 바꾸면 실제 Google Tasks와 연동됩니다. */\nconst WORK_API_URL = 'https://script.google.com/macros/s/AKfycbwCG0r7CuVgtPwjUG18T8l2RHmAoCnTyFj79FOZVO1rZ2usaW_PJbXjcewvsLFUrnAn/exec';\n\nconst $=id=\u003edocument.getElementById(id);function esc(s){return String(s??'').replaceAll('\u0026','\u0026amp;').replaceAll('\"','\u0026quot;').replaceAll('\u003c','\u0026lt;').replaceAll('\u003e','\u0026gt;')}let currentDateISO='2026-06-08';let selectedDay=8;let filter='전체';let logEdit=false,recEdit=false,projectEdit=false,laterEdit=false,albaEdit=false,projectArchiveOpen=false,laterCompletedOpen=false,projectCompletedOpen={},projectGroupCompletedOpen=false,albaCompletedOpen=false;let recOpen=false,projectOpen=false,albaOpen=false,completedAlbaOpen=false;let modalTarget=null,modalMonth=new Date(2026,5,1),dateView=new Date(2026,5,1);\nconst KEY='work_v38_project_archive_fixed_data';let data=JSON.parse(localStorage.getItem(KEY)||'null')||{logs:[{title:'부산 라이콘 펀드 제안서 고도화',start:'10:00',end:'11:20',minutes:80,cat:'KRP',done:false},{title:'멘토링, 해양수산 회사 3개사',start:'13:00',end:'14:30',minutes:90,cat:'KRP',done:true},{title:'PWR OTA 최소 숙박 반영 확인',start:'15:00',end:'15:35',minutes:35,cat:'PWR',done:true},{title:'WSW MVP 기능 3개로 축소',start:'16:00',end:'16:45',minutes:45,cat:'WSW',done:false}],recurring:[{name:'크립톤 해양수산 멘토링',cycle:'월 1회',amount:'100만원',amountUnit:'총',companies:[{name:'A기업',contacted:true,scheduled:true,date:'2026-06-03',meetingDone:true,logDone:true},{name:'B기업',contacted:true,scheduled:false,date:null,meetingDone:true,logDone:false},{name:'C기업',contacted:false,scheduled:false,date:null,meetingDone:false,logDone:false},{name:'D기업',contacted:true,scheduled:true,date:'2026-06-12',meetingDone:false,logDone:false}]}],laterChecks:[{title:'부산 펀드 LP 후보 다시 생각해보기',cat:'KRP',created:'2026-06-08',done:false},{title:'PWR 장기 숙박 고객 후기 문구 모아보기',cat:'PWR',created:'2026-06-08',done:false},{title:'워크스워크 로고 레퍼런스 저장해두기',cat:'WSW',created:'2026-06-07',done:true}],projects:[{name:'펀드 제안서 만들기',schedule:'2026-01-05',items:[{title:'초안',date:'2026-01-01',state:'완료'},{title:'디자인',date:'2026-01-03',state:'진행'},{title:'최종 제출',date:'2026-01-05',state:'대기'}]},{name:'PWR 홈페이지 예약 구조 정리',schedule:null,items:[{title:'문구 정리',date:'2026-06-09',state:'진행'},{title:'버튼 점검',date:'2026-06-11',state:'대기'}]}]};\nif(!data.sideJobs)data.sideJobs=[\n {date:'2026-06-03',institution:'광운대',type:'발표',amount:'10만원'},\n {date:'2026-06-09',institution:'미스크',type:'멘토링',amount:'40만원'},\n {date:'2026-06-12',institution:'한국청년기업가정신재단',type:'서류',amount:'150만원'}\n];\nlet workSheetsLoaded=false;\nlet workSheetsSyncTimer=null;\nlet workSheetsSyncing=false;\n\n// Monthly Alba: 사용자가 직접 추가한 수익 일정 삭제 tombstone.\n// Google Sheets 저장이 늦거나 실패해도 새로고침 때 다시 살아나지 않게 로컬 삭제 기록을 우선 적용합니다.\nconst MANUAL_ALBA_HIDE_KEY='cos_work_hidden_manual_alba_v1';\nfunction cosManualAlbaKey(j){\n  j=j||{};\n  const date=String(j.date||'').slice(0,10);\n  const institution=String(j.institution||j.org||j.title||'').trim();\n  const type=String(j.type||'').trim();\n  const amount=String(j.amount||'').trim();\n  return [date,institution,type,amount].join('|');\n}\nfunction cosManualAlbaHiddenMap(){\n  try{return JSON.parse(localStorage.getItem(MANUAL_ALBA_HIDE_KEY)||'{}')||{}}catch(e){return {}}\n}\nfunction cosSetManualAlbaHiddenMap(map){\n  try{localStorage.setItem(MANUAL_ALBA_HIDE_KEY,JSON.stringify(map||{}))}catch(e){}\n  try{scheduleWorkSheetsSync()}catch(e){}\n}\nfunction cosIsManualAlbaHidden(j){\n  const key=cosManualAlbaKey(j);\n  if(!key.replace(/\\|/g,''))return false;\n  return !!cosManualAlbaHiddenMap()[key];\n}\nfunction cosFilterManualAlbas(arr){\n  return (Array.isArray(arr)?arr:[]).filter(function(j){return !cosIsManualAlbaHidden(j)});\n}\nfunction cosRememberManualAlbaDeleted(j){\n  const key=cosManualAlbaKey(j);\n  if(!key.replace(/\\|/g,''))return;\n  const map=cosManualAlbaHiddenMap();\n  map[key]={at:Date.now(),item:{date:j.date||'',institution:j.institution||j.org||'',type:j.type||'',amount:j.amount||''}};\n  cosSetManualAlbaHiddenMap(map);\n}\nfunction cosDeleteManualAlba(i){\n  if(!data.sideJobs||!data.sideJobs[i])return;\n  cosRememberManualAlbaDeleted(data.sideJobs[i]);\n  data.sideJobs.splice(i,1);\n  data.sideJobs=cosFilterManualAlbas(data.sideJobs);\n  save();\n  try{syncWorkDataToSheets()}catch(e){}\n  renderAlba();\n}\nwindow.cosDeleteManualAlba=cosDeleteManualAlba;\nwindow.cosFilterManualAlbas=cosFilterManualAlbas;\n\nconst COS_WORK_APP_STATE_KEYS=[\n  'cos_work_hidden_manual_alba_v1',\n  'cos_work_hidden_calendar_logs_v1',\n  'cos_work_calendar_log_state_v1',\n  'cos_work_calendar_log_override_v1',\n  'cos_work_hidden_calendar_alba_v1',\n  'cos_work_calendar_alba_state_v1',\n  'cos_work_todo_overrides_v1'\n];\nfunction cosReadJsonStorage(key, fallback){\n  try{\n    const raw=localStorage.getItem(key);\n    if(!raw) return fallback;\n    return JSON.parse(raw);\n  }catch(e){return fallback}\n}\nfunction cosWriteJsonStorage(key, value){\n  try{\n    if(value===undefined || value===null) return;\n    localStorage.setItem(key, JSON.stringify(value));\n  }catch(e){}\n}\nfunction cosCollectWorkAppState(){\n  const storage={};\n  COS_WORK_APP_STATE_KEYS.forEach(function(key){\n    const value=cosReadJsonStorage(key, null);\n    if(value!==null \u0026\u0026 value!==undefined) storage[key]=value;\n  });\n  return {\n    version:1,\n    updatedAt:new Date().toISOString(),\n    storage:storage,\n    ui:{\n      projectArchiveOpen:!!projectArchiveOpen,\n      laterCompletedOpen:!!laterCompletedOpen,\n      projectCompletedOpen:projectCompletedOpen||{},\n      projectGroupCompletedOpen:!!projectGroupCompletedOpen,\n      albaCompletedOpen:!!albaCompletedOpen\n    }\n  };\n}\nfunction cosApplyWorkAppState(appState){\n  if(!appState) return;\n  const storage=appState.storage||appState.localStorage||{};\n  Object.keys(storage||{}).forEach(function(key){\n    if(COS_WORK_APP_STATE_KEYS.indexOf(key)\u003e=0) cosWriteJsonStorage(key, storage[key]);\n  });\n  const ui=appState.ui||{};\n  if(typeof ui.projectArchiveOpen==='boolean') projectArchiveOpen=ui.projectArchiveOpen;\n  if(typeof ui.laterCompletedOpen==='boolean') laterCompletedOpen=ui.laterCompletedOpen;\n  if(ui.projectCompletedOpen \u0026\u0026 typeof ui.projectCompletedOpen==='object') projectCompletedOpen=ui.projectCompletedOpen;\n  if(typeof ui.projectGroupCompletedOpen==='boolean') projectGroupCompletedOpen=ui.projectGroupCompletedOpen;\n  if(typeof ui.albaCompletedOpen==='boolean') albaCompletedOpen=ui.albaCompletedOpen;\n}\n\nfunction workDataPayload(){\n  return {\n    logs:data.logs||[],\n    recurring:data.recurring||[],\n    projects:data.projects||[],\n    sideJobs:cosFilterManualAlbas(data.sideJobs||[]),\n    laterChecks:data.laterChecks||[],\n    oneTimeMeetings:data.oneTimeMeetings||[],\n    appState:cosCollectWorkAppState()\n  };\n}\n\nfunction mergeWorkDataFromSheets(remote){\n  if(!remote) return;\n  if(Array.isArray(remote.logs)) data.logs=remote.logs;\n  if(Array.isArray(remote.recurring)) data.recurring=remote.recurring;\n  if(Array.isArray(remote.projects)) data.projects=remote.projects;\n  if(Array.isArray(remote.sideJobs)) data.sideJobs=cosFilterManualAlbas(remote.sideJobs);\n  if(Array.isArray(remote.laterChecks)) data.laterChecks=remote.laterChecks;\n  if(Array.isArray(remote.oneTimeMeetings)) data.oneTimeMeetings=remote.oneTimeMeetings;\n  if(remote.appState) cosApplyWorkAppState(remote.appState);\n}\n\nfunction save(){\n  localStorage.setItem(KEY,JSON.stringify(data));\n  scheduleWorkSheetsSync();\n}\n\nfunction saveLocalOnly(){\n  localStorage.setItem(KEY,JSON.stringify(data));\n}\n\nfunction scheduleWorkSheetsSync(){\n  if(!WORK_API_URL || !workSheetsLoaded) return;\n  clearTimeout(workSheetsSyncTimer);\n  workSheetsSyncTimer=setTimeout(syncWorkDataToSheets,650);\n}\nwindow.cosSyncWorkAppState=function(){try{scheduleWorkSheetsSync()}catch(e){}};\n\nasync function loadWorkDataFromSheets(){\n  if(!WORK_API_URL) return false;\n  try{\n    setWorkSyncStatus('loading');\n    const json=await workApi('getWorkData',{});\n    if(json.data){\n      mergeWorkDataFromSheets(json.data);\n      saveLocalOnly();\n    }\n    workSheetsLoaded=true;\n    setWorkSyncStatus('synced');\n    renderAll();\n    return true;\n  }catch(e){\n    console.error(e);\n    setWorkSyncStatus('fail','Sheets 불러오기 실패');\n    workSheetsLoaded=false;\n    return false;\n  }\n}\n\n\nasync function postWorkApiNoCors(action, payload={}){\n  if(!WORK_API_URL) throw new Error('WORK_API_URL is empty');\n\n  await fetch(WORK_API_URL, {\n    method:'POST',\n    mode:'no-cors',\n    headers:{'Content-Type':'text/plain;charset=utf-8'},\n    body:JSON.stringify({action, ...payload})\n  });\n\n  return {ok:true};\n}\n\nasync function syncWorkDataToSheets(){\n  if(!WORK_API_URL || workSheetsSyncing) return false;\n  try{\n    workSheetsSyncing=true;\n    setWorkSyncStatus('loading');\n\n    // 전체 업무 데이터는 길어질 수 있으므로 JSONP GET이 아니라 POST no-cors로 저장합니다.\n    // 응답은 읽지 않지만 Apps Script doPost가 실제 저장을 수행합니다.\n    await postWorkApiNoCors('saveWorkData', {\n      data: JSON.stringify(workDataPayload())\n    });\n\n    setWorkSyncStatus('synced');\n    workSheetsSyncing=false;\n    return true;\n  }catch(e){\n    console.error(e);\n    setWorkSyncStatus('fail','Sheets 저장 실패');\n    workSheetsSyncing=false;\n    return false;\n  }\n}function fmtMin(m){m=Number(m)||0;let h=Math.floor(m/60),r=m%60;return h?`${h}h ${r?`${r}m`:'' t\" style=\"${open||isCompletedProject?'':'display:none'}\"\u003e${openHtml}${doneHtml}\u003c/div\u003e\n      ${projectEdit?`\u003cdiv class=\"project-edit-panel\"\u003e\n        \u003cdiv class=\"edit-grid\"\u003e\u003cinput class=\"input\" id=\"newProjectItemTitle${pi}\" placeholder=\"세부 항목\"\u003e\u003cinput class=\"input\" id=\"newProjectItemDate${pi}\" placeholder=\"날짜 6/10\"\u003e\u003c/div\u003e\n        \u003cbutton class=\"btn orange\" style=\"width:100%;margin-top:8px\" onclick=\"addProjectItem(${pi})\"\u003e세부 항목 추가\u003c/button\u003e\n      \u003c/div\u003e`:''}\n    \u003c/section\u003e`;\n  };\n\n  const activeHtml=activeProjects.length\n    ? activeProjects.map(p=\u003erenderProjectCard(p,false)).join('')\n    : `\u003csection class=\"card\"\u003e\u003cdiv class=\"project-empty\"\u003e진행 중인 프로젝트가 없습니다.\u003c/div\u003e\u003c/section\u003e`;\n\n  const doneHtml=doneProjects.length\n    ? `\u003cdiv class=\"complete-fold project-completed-group ${projectGroupCompletedOpen?'open':''}\"\u003e\n        \u003cbutton class=\"complete-fold-toggle\" onclick=\"projectGroupCompletedOpen=!projectGroupCompletedOpen;renderProjects()\"\u003e\n          \u003cspan\u003e완료한 프로젝트\u003c/span\u003e\u003cb\u003e${doneProjects.length}건\u003c/b\u003e\n        \u003c/button\u003e\n        \u003cdiv class=\"complete-fold-body project-completed-body\"\u003e\n          ${doneProjects.map(p=\u003erenderProjectCard(p,true)).join('')}\n        \u003c/div\u003e\n      \u003c/div\u003e`\n    : '';\n\n  wrap.innerHTML=activeHtml+doneHtml;\n\n  if(archive){\n    archive.innerHTML='';\n  }\n}\n\nfunction restoreProject(pi){\n if(!data.projects[pi])return;\n data.projects[pi].archived=false;\n let items=data.projects[pi].items||[];\n for(let idx=items.length-1;idx\u003e=0;idx--){\n  if(items[idx].state==='완료'){items[idx].state='진행';break;}\n }\n projectArchiveOpen=false;\n save();\n renderAll();\n}\n\nfunction taskProjectPill(project){\n  const p=['KRP','WSW','PWR','CDE'].includes(project)?project:'KRP';\n  return `\u003cspan class=\"task-tag task-${p.toLowerCase()}\"\u003e${p}\u003c/span\u003e`;\n}\nfunction setTaskSyncStatus(msg,state='synced'){\n  const s=$('taskSyncStatus'), live=$('googleTaskLive');\n  if(s)s.textContent=msg;\n  if(live){\n    live.classList.remove('synced');\n    if(state==='synced')live.classList.add('synced');\n    const em=live.querySelector?live.querySelector('em'):null;\n    if(em)em.textContent=state==='synced'?'동기화':'대기';\n  }\n}\nfunction syncLaterCheckToGoogleTask(item){\n  item.googleTaskSync='synced';\n  item.googleTaskDue=null;\n  item.googleTaskId=item.googleTaskId||('gtask_'+Date.now());\n  setTaskSyncStatus('Google Tasks에 기한 없는 작업으로 저장됨');\n  return true;\n}\nfunction setGoogleTasksSynced(){const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false});const live=$('googleLive'),time=$('googleSyncTime'),status=$('syncStatus');if(time)time.textContent=now;if(live){live.classList.remove('loading','fail');}if(status){status.style.display='block';status.textContent=`CDE/KRP/WSW/PWR Tasks 연동 완료 · ${now}`;}}\n\n/* v46: Google Tasks API helpers */\nlet googleTaskCache = [];\nlet googleTasksLoaded = false;\n\nasync function workApi(action, payload={}){\n  if(!WORK_API_URL){\n    setSyncDebug('오류: WORK_API_URL 비어 있음');\n    throw new Error('WORK_API_URL is empty');\n  }\n\n  return new Promise((resolve,reject)=\u003e{\n    const cb='workTasksJsonp_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n    const params=new URLSearchParams();\n    params.set('action',action);\n    params.set('callback',cb);\n    Object.keys(payload||{}).forEach(k=\u003e{\n      if(payload[k]!==undefined \u0026\u0026 payload[k]!==null) params.set(k,String(payload[k]));\n    });\n\n    const finalUrl=WORK_API_URL+(WORK_API_URL.includes('?')?'\u0026':'?')+params.toString();\n    setSyncDebug('호출 중: '+action+' · '+finalUrl.slice(0,85)+'...');\n\n    const script=document.createElement('script');\n    const timer
