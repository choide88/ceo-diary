.pane-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;

.cos-tab svg{width:21px;height:21px}
.cos-tab.on[data-tab="brief"]{color:var(--c-brief);background:var(--c-brief-soft)}
.cos-tab.on[data-tab="calendar"]{color:var(--c-calendar);background:var(--c-calendar-soft)}
.cos-tab.on[data-tab="work"]{color:var(--c-work);background:var(--c-work-soft)}
.cos-tab.on[data-tab="personal"]{color:var(--c-personal);background:var(--c-personal-soft)}
@media(min-width:520px){
  body{padding:16px 0}
  .shell{top:16px;bottom:16px;height:auto;border-radius:34px;box-shadow:0 18px 60px rgba(0,0,0,.12)}
  .cos-nav{border-radius:0 0 34px 34px}
}

olor:var(--muted) !important;\n  font-size:11px !important;\n  font-weight:750 !important;\n  line-height:1.45 !important;\n}\n.report-compact-card .report-row{\n  padding:14px 15px !important;\n  min-height:64px !important;\n}\n.report-shortcuts{\n  display:grid !important;\n  grid-template-columns:1fr 1fr 1fr !important;\n  gap:7px !important;\n  padding:12px 14px 14px !important;\n  background:#fbfcfe !important;\n  border-top:1px solid var(--line) !important;\n}\n.report-shortcuts button{\n  height:32px !important;\n  border-radius:12px !important;\n  background:#fff !important;\n  border:1px solid rgba(17,24,39,.08) !important;\n  color:#687386 !important;\n  font-size:10.5px !important;\n  font-weight:900 !important;\n  white-space:nowrap !important;\n}\n.report-section-header .report-ai-btn,\n.report-section-header .ai-judge-btn{\n  display:none !important;\n}\n\n\u003c/style>\n\n\u003clink rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css\">\n\u003cstyle id=\"cos-shell-patch\">\n:root{--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',system-ui,sans-serif !important}\nhtml,body{font-family:var(--font)}\n.bottom-nav{display:none !important}\n.app{padding-bottom:104px !important}\n@media(min-width:520px){\n  .app{margin:0 auto !important;border-radius:0 !important;box-shadow:none !important;min-height:100dvh !important}\n}\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cmain class=\"app\">\n  \u003cdiv class=\"top\">\n    \u003cdiv class=\"top-row\">\n      \u003cdiv>\n        \u003cdiv class=\"title\">최동은 대표님, \u003cem>대표 브리핑\u003c/em>\u003c/div>\n        \u003cdiv class=\"caption\">오늘의 일정, 업무, 컨디션을 한 장으로 정리합니다.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"top-status\">\n        \u003cbutton class=\"google-live\" type=\"button\">\u003ci>\u003c/i>\u003cspan>02:36\u003c/span>\u003c/button>\n        \u003cbutton class=\"top-date-btn\" type=\"button\">6.10 수\u003c/button>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"sync-status\">Google Calendar / Sheets / Tasks 실시간 연동 완료 · 오전 02:36\u003c/div>\n  \u003c/div>\n\n  \u003csection class=\"hero\">\n    \u003cdiv class=\"hero-head\">\u003cdiv class=\"kicker\">Chief Brief\u003c/div>\u003cbutton class=\"ai-judge-btn hero-top-judge\" data-target=\"hero\">AI\u003c/button>\u003c/div>\n    \u003cdiv class=\"hero-title\" id=\"heroTitle\">KRP 정리와 오후 일정이 핵심입니다.\u003c/div>\n    \u003cdiv class=\"hero-ai\">\n      \u003cdiv class=\"hero-ai-text\" id=\"heroAiText\">오전에는 KRP 문서 정리를 먼저 처리하고, 오후 일정 전 자료 확인 시간을 확보하세요. Later Check는 오래 남은 항목만 정리하면 됩니다.\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"hero-pills\">\n      \u003cdiv class=\"hero-pill\">\u003cb>5\u003c/b>\u003cspan>일정\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-pill\">\u003cb>4\u003c/b>\u003cspan>업무\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-pill\">\u003cb>2/5\u003c/b>\u003cspan>마감\u003c/span>\u003c/div>\n      \u003cdiv class=\"hero-pill\">\u003cb>66\u003c/b>\u003cspan>컨디션\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cdiv class=\"section-header\">\n    \u003cdiv class=\"section-label\">Gemini Priority\u003c/div>\n    \u003cbutton class=\"ai-judge-btn small\" data-target=\"priority\">AI\u003c/button>\n  \u003c/div>\n  \u003csection class=\"card\" id=\"priorityCard\">\n    \u003cdiv class=\"brief-row\" data-ai-row=\"priority-1\">\n      \u003cdiv class=\"brief-icon green\">1\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\" id=\"priority1Title\">KRP 펀드 제안서 문장 정리\u003c/div>\n        \u003cdiv class=\"brief-sub\">오전 집중 시간에 먼저 처리할 핵심 업무\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag blue\">KRP\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"brief-row\" data-ai-row=\"priority-2\">\n      \u003cdiv class=\"brief-icon purple\">2\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">오후 수익 일정 2건 응대 준비\u003c/div>\n        \u003cdiv class=\"brief-sub\">금액이 확정된 일정이라 누락 없이 확인 필요\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag purple\">수익\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"brief-row\" data-ai-row=\"priority-3\">\n      \u003cdiv class=\"brief-icon orange\">3\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">마감 없는 Later Check 정리\u003c/div>\n        \u003cdiv class=\"brief-sub\">마감 없는 항목은 오늘 완료 또는 날짜 재지정 필요\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag orange\">체크\u003c/span>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cdiv class=\"section-header\">\n    \u003cdiv class=\"section-label\">Today Interpretation\u003c/div>\n    \u003cbutton class=\"ai-judge-btn small\" data-target=\"snapshot\">AI\u003c/button>\n  \u003c/div>\n  \u003csection class=\"card detail-snapshot-card\" id=\"snapshotDetailCard\">\n    \u003cdiv class=\"brief-row\">\n      \u003cdiv class=\"brief-icon green\">C\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">캘린더는 오후 응대 중심으로 배치됨\u003c/div>\n        \u003cdiv class=\"brief-sub\" id=\"snapshotCalendarDesc\">일정 수 자체보다 오후 수익 일정 전 준비 시간이 중요합니다.\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag green\">일정\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"brief-row\">\n      \u003cdiv class=\"brief-icon orange\">W\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">업무는 KRP 문서 정리를 먼저 보는 것이 적합\u003c/div>\n        \u003cdiv class=\"brief-sub\" id=\"snapshotWorkDesc\">완료율보다 오늘 밀리면 안 되는 핵심 업무가 있는지가 중요합니다.\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag orange\">업무\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"brief-row\">\n      \u003cdiv class=\"brief-icon blue\">T\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">Tasks는 마감 없는 항목 정리가 필요\u003c/div>\n        \u003cdiv class=\"brief-sub\" id=\"snapshotTasksDesc\">2/5 숫자보다 오래 남아 있는 항목에 날짜를 부여하는 것이 중요합니다.\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag blue\">체크\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"brief-row\">\n      \u003cdiv class=\"brief-icon purple\">D\u003c/div>\n      \u003cdiv class=\"brief-main\">\n        \u003cdiv class=\"brief-title\">컨디션은 회복형 운영이 적합\u003c/div>\n        \u003cdiv class=\"brief-sub\" id=\"snapshotDailyDesc\">66점은 무리한 확장보다 정리형 업무에 적합한 상태로 봅니다.\u003c/div>\n      \u003c/div>\n      \u003cspan class=\"tag purple\">컨디션\u003c/span>\n    \u003c/div>\n  \u003c/section>\n\u003cdiv class=\"section-header\">\n    \u003cdiv class=\"section-label\">Weekly Flow\u003c/div>\n    \u003cbutton class=\"ai-judge-btn small\" data-target=\"weekly\">AI\u003c/button>\n  \u003c/div>\n  \u003csection class=\"card week-card\">\n    \u003cdiv class=\"week-title\">6월 2주차 주간 흐름\u003c/div>\n    \u003cdiv class=\"week-sub\">월~일 기준으로 주요 이벤트와 리스크만 간단히 확인합니다.\u003c/div>\n    \u003cdiv class=\"week-list\">\n      \u003cdiv class=\"week-item\">\u003cdiv class=\"week-day\">월\u003c/div>\u003cdiv class=\"week-copy\">미팅 2 · 수익 2 · 마감 1/3 · 개인 1\u003c/div>\u003c/div>\n      \u003cdiv class=\"week-item\">\u003cdiv class=\"week-day\">화\u003c/div>\u003cdiv class=\"week-copy\">업무 정리 중심 · Later Check 2건\u003c/div>\u003c/div>\n      \u003cdiv class=\"week-item\">\u003cdiv class=\"week-day\">수\u003c/div>\u003cdiv class=\"week-copy\">수익 응대 2건 · 컨디션 회복 필요\u003c/div>\u003c/div>\n      \u003cdiv class=\"week-item\">\u003cdiv class=\"week-day\">목\u003c/div>\u003cdiv class=\"week-copy\">특이사항 없음\u003c/div>\u003c/div>\n      \u003cdiv class=\"week-item\">\u003cdiv class=\"week-day\">금\u003c/div>\u003cdiv class=\"week-copy\">출장 1 · 수익 2 · 마감 1/2\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cdiv class=\"section-header report-section-header\">\n    \u003cdiv class=\"section-label\">Report Archive\u003c/div>\n    \u003cbutton class=\"section-action report-all-btn\" onclick=\"openReportArchive('all')\">전체 보기\u003c/button>\n  \u003c/div>\n  \u003csection class=\"report-card report-hub-card report-compact-card\">\n    \u003cdiv class=\"report-hub-intro compact\">\n      \u003cb>리포트 허브\u003c/b>\n      \u003cspan>최근 종합 리포트만 먼저 보고, 전체 목록은 아카이브에서 확인합니다.\u003c/span>\n    \u003c/div>\n\n    \u003cdiv class=\"report-list\">\n      \u003cbutton class=\"report-row\" type=\"button\" onclick=\"openReportDetail('summary-w-2026-06-2')\">\n        \u003cdiv class=\"report-main\">\n          \u003cb>6월 2주차 종합 주간 리포트\u003c/b>\n          \u003cspan>일정, 업무, 컨디션, 수익 흐름 종합\u003c/span>\n        \u003c/div>\n        \u003cem class=\"summary\">주간\u003c/em>\n      \u003c/button>\n      \u003cbutton class=\"report-row\" type=\"button\" onclick=\"openReportDetail('summary-m-2026-06')\">\n        \u003cdiv class=\"report-main\">\n          \u003cb>2026년 6월 종합 월간 리포트\u003c/b>\n          \u003cspan>업무, 수익, 컨디션, 프로젝트 흐름 종합\u003c/span>\n        \u003c/div>\n        \u003cem class=\"summary\">월간\u003c/em>\n      \u003c/button>\n    \u003c/div>\n\n    \u003cdiv class=\"report-shortcuts\">\n      \u003cbutton type=\"button\" onclick=\"openReportArchive('calendar')\">캘린더 리포트\u003c/button>\n      \u003cbutton type=\"button\" onclick=\"openReportArchive('work')\">업무 리포트\u003c/button>\n      \u003cbutton type=\"button\" onclick=\"openReportArchive('daily')\">데일리 리포트\u003c/button>\n    \u003c/div>\n  \u003c/section>\n\n\u003c/main>\n\n\n\u003cdiv class=\"inline-feedback-backdrop\" id=\"inlineFeedbackBackdrop\">\n  \u003cdiv class=\"inline-feedback-modal\">\n    \u003cdiv class=\"inline-feedback-head\">\n      \u003cdiv>\n        \u003cb id=\"feedbackModalTitle\">AI 피드백\u003c/b>\n        \u003cspan id=\"feedbackModalSub\">선택한 AI에 대해 바로 피드백합니다.\u003c/span>\n      \u003c/div>\n      \u003cbutton type=\"button\" onclick=\"closeInlineFeedback()\">×\u003c/button>\n    \u003c/div>\n\n    \u003cdiv class=\"feedback-context\" id=\"feedbackContext\">\n      현재 판단 문장이 여기에 표시됩니다.\n    \u003c/div>\n\n    \u003cdiv class=\"quick-feedbacks\">\n      \u003cbutton type=\"button\" onclick=\"applyQuickFeedback('priority')\">우선순위가 달라요\u003c/button>\n      \u003cbutton type=\"button\" onclick=\"applyQuickFeedback('specific')\">더 구체적으로\u003c/button>\n      \u003cbutton type=\"button\" onclick=\"applyQuickFeedback('tone')\">말투 수정\u003c/button>\n      \u003cbutton type=\"button\" onclick=\"applyQuickFeedback('good')\">좋아요\u003c/button>\n    \u003c/div>\n\n    \u003ctextarea class=\"feedback-input compact\" id=\"inlineFeedbackInput\" placeholder=\"예: 오늘은 PWR보다 KRP 펀드 제안서가 더 우선이야. 컨디션이 낮으니 새 기획보다 정리형 업무를 추천해줘.\">\u003c/textarea>\n\n    \u003cbutton class=\"feedback-save\" onclick=\"saveInlineFeedback()\">저장하고 이 부분 다시 반영\u003c/button>\n\n    \u003cdiv class=\"inline-feedback-note\">\n      실제 Gemini 연동 시에는 이 피드백을 바로 프롬프트에 넣어 해당 영역만 다시 생성합니다.\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\n\n\u003cdiv class=\"report-archive-backdrop\" id=\"reportArchiveBackdrop\">\n  \u003cdiv class=\"report-archive-screen\">\n    \u003cdiv class=\"archive-top\">\n      \u003cbutton class=\"archive-close\" type=\"button\" onclick=\"closeReportArchive()\">‹\u003c/button>\n      \u003cdiv>\n        \u003cb>리포트 아카이브\u003c/b>\n        \u003cspan>종합, 캘린더, 업무, 데일리 리포트를 모아봅니다.\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"archive-search\">\n      \u003cinput id=\"archiveSearch\" type=\"text\" placeholder=\"리포트 검색, 예: 6월, 수익, PWR, 컨디션\" oninput=\"renderArchiveList()\" />\n    \u003c/div>\n\n    \u003cdiv class=\"archive-filter-label\">CATEGORY\u003c/div>\n    \u003cdiv class=\"archive-domain-tabs\">\n      \u003cbutton class=\"archive-domain-tab on\" data-domain-tab=\"all\">전체\u003c/button>\n      \u003cbutton class=\"archive-domain-tab\" data-domain-tab=\"summary\">종합\u003c/button>\n      \u003cbutton class=\"archive-domain-tab\" data-domain-tab=\"calendar\">캘린더\u003c/button>\n      \u003cbutton class=\"archive-domain-tab\" data-domain-tab=\"work\">업무\u003c/button>\n      \u003cbutton class=\"archive-domain-tab\" data-domain-tab=\"daily\">데일리\u003c/button>\n    \u003c/div>\n\n    \u003cdiv class=\"archive-filter-label\">PERIOD\u003c/div>\n    \u003cdiv class=\"archive-tabs\">\n      \u003cbutton class=\"archive-tab on\" data-archive-tab=\"all\">전체\u003c/button>\n      \u003cbutton class=\"archive-tab\" data-archive-tab=\"weekly\">주간\u003c/button>\n      \u003cbutton class=\"archive-tab\" data-archive-tab=\"monthly\">월간\u003c/button>\n    \u003c/div>\n\n    \u003cdiv class=\"archive-summary\" id=\"archiveSummary\">\n      \u003cdiv>\n        \u003cb>12\u003c/b>\n        \u003cspan>전체\u003c/span>\n      \u003c/div>\n      \u003cdiv>\n        \u003cb>8\u003c/b>\n        \u003cspan>주간\u003c/span>\n      \u003c/div>\n      \u003cdiv>\n        \u003cb>4\u003c/b>\n        \u003cspan>월간\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"archive-list\" id=\"archiveList\">\u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\u003cdiv class=\"report-detail-backdrop\" id=\"reportDetailBackdrop\">\n  \u003cdiv class=\"report-detail-screen\">\n    \u003cdiv class=\"detail-top\">\n      \u003cbutton class=\"archive-close\" type=\"button\" onclick=\"closeReportDetail()\">‹\u003c/button>\n      \u003cdiv>\n        \u003cb id=\"detailTitle\">리포트 상세\u003c/b>\n        \u003cspan id=\"detailSub\">요약 리포트\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"detail-body\">\n      \u003csection class=\"detail-hero\" id=\"detailHero\">\n        \u003cdiv class=\"detail-kicker\" id=\"detailType\">WEEKLY REPORT\u003c/div>\n        \u003ch2 id=\"detailHeadline\">이번 주는 수익 일정과 KRP 문서 정리가 핵심이었습니다.\u003c/h2>\n        \u003cp id=\"detailLead\">\n          주간 주요 일정, 업무 기록, 컨디션 흐름을 바탕으로 다음 주 운영 방향을 정리합니다.\n        \u003c/p>\n      \u003c/section>\n\n      \u003csection class=\"detail-card\">\n        \u003cdiv class=\"detail-card-title\">핵심 요약\u003c/div>\n        \u003cul id=\"detailBullets\">\n          \u003cli>KRP 업무 비중이 높았고, 문서 정리 시간이 가장 많이 사용되었습니다.\u003c/li>\n          \u003cli>수익 일정은 4건으로 안정적이었으나 사전 준비 시간이 부족했습니다.\u003c/li>\n          \u003cli>컨디션은 중간 수준으로, 수면과 활동 루틴 회복이 필요합니다.\u003c/li>\n        \u003c/ul>\n      \u003c/section>\n\n      \u003csection class=\"detail-card\">\n        \u003cdiv class=\"detail-card-title\">다음 액션\u003c/div>\n        \u003cdiv class=\"detail-actions-list\" id=\"detailActions\">\n          \u003cdiv>1. KRP 제안서 최종 문장 정리\u003c/div>\n          \u003cdiv>2. Later Check 중 마감 없는 항목에 날짜 부여\u003c/div>\n          \u003cdiv>3. 다음 주 수익 일정 사전 자료 준비\u003c/div>\n        \u003c/div>\n      \u003c/section>\n\n      \u003cbutton class=\"detail-export\" onclick=\"toast('PDF/문서 저장은 통합 후 연결 예정입니다.')\">리포트 저장하기\u003c/button>\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\u003cdiv class=\"toast\" id=\"toast\">저장되었습니다.\u003c/div>\n\n\u003cdiv class=\"bottom-nav\">\n  \u003cdiv class=\"nav on\">\u003cdiv class=\"ico\">▣\u003c/div>\u003cspan>브리핑\u003c/span>\u003c/div>\n  \u003cdiv class=\"nav\">\u003cdiv class=\"ico\">◷\u003c/div>\u003cspan>캘린더\u003c/span>\u003c/div>\n  \u003cdiv class=\"nav\">\u003cdiv class=\"ico\">✓\u003c/div>\u003cspan>업무\u003c/span>\u003c/div>\n  \u003cdiv class=\"nav\">\u003cdiv class=\"ico\">○\u003c/div>\u003cspan>개인\u003c/span>\u003c/div>\n\u003c/div>\n\n\u003cscript>\nconst INLINE_FEEDBACK_KEY='brief_inline_ai_feedback_v12';\n\nfunction toast(msg){\n  const el=document.getElementById('toast');\n  if(!el) return;\n  el.textContent=msg;\n  el.classList.add('show');\n  setTimeout(()=>el.classList.remove('show'),1600);\n}\n\nlet currentFeedbackTarget='hero';\n\nconst feedbackTargetMap={\n  hero:{\n    title:'히어로 브리핑 피드백',\n    sub:'상단 핵심 판단과 운영 제안에 대한 피드백입니다.',\n    getText:()=>document.getElementById('heroTitle')?.textContent.trim()+' / '+document.getElementById('heroAiText')?.textContent.trim(),\n    apply:(feedback)=>{\n      const title=document.getElementById('heroTitle');\n      const text=document.getElementById('heroAiText');\n      if(!title||!text) return;\n      if(feedback.includes('KRP') || feedback.includes('펀드')){\n        title.textContent='오늘은 KRP 펀드 제안서 정리가 최우선입니다.';\n        text.textContent='피드백을 반영해 KRP 업무를 우선 배치했습니다. 오전에는 펀드 제안서 문장과 제출 흐름을 정리하고, 오후 일정 전에는 오래된 체크 항목만 짧게 정리하는 방향이 적합합니다.';\n      }else if(feedback.includes('구체')){\n        text.textContent='오전 10시부터 11시 30분까지 KRP 문서 정리를 먼저 처리하고, 점심 전에는 Later Check 2건만 완료하세요. 오후에는 수익 일정 응대 전 20분 정도 자료 확인 시간을 확보하는 편이 좋습니다.';\n      }else{\n        text.textContent='피드백을 반영해 오늘 브리핑을 더 보수적으로 조정했습니다. 새 업무를 늘리기보다 기존 KRP 업무와 수익 일정 준비를 중심으로 하루를 운영하는 편이 좋습니다.';\n      }\n      flashAI([title,text]);\n    }\n  },\n  priority:{\n    title:'우선순위 피드백',\n    sub:'Gemini가 뽑은 오늘 반드시 볼 것에 대한 피드백입니다.',\n    getText:()=>Array.from(document.querySelectorAll('#priorityCard .brief-title')).map((x,i)=>`${i+1}. ${x.textContent.trim()}`).join(' / '),\n    apply:(feedback)=>{\n      const p1=document.getElementById('priority1Title');\n      if(!p1) return;\n      if(feedback.includes('PWR')){\n        p1.textContent='PWR 예약 구조와 OTA 연동 확인';\n      }else{\n        p1.textContent='KRP 펀드 제안서 문장 정리';\n      }\n      flashAI([p1]);\n    }\n  },\n  snapshot:{\n    title:'Today Interpretation 피드백',\n    sub:'오늘 운영 해석 전체에 대한 피드백입니다.',\n    getText:()=>Array.from(document.querySelectorAll('#snapshotDetailCard .brief-sub')).map(x=>x.textContent.trim()).join(' / '),\n    apply:(feedback)=>{\n      const cal=document.getElementById('snapshotCalendarDesc');\n      const work=document.getElementById('snapshotWorkDesc');\n      const tasks=document.getElementById('snapshotTasksDesc');\n      const daily=document.getElementById('snapshotDailyDesc');\n      if(feedback.includes('컨디션')||feedback.includes('회복')){\n        if(daily) daily.textContent='컨디션을 더 중요하게 반영해, 오늘은 고강도 판단보다 정리형 업무를 우선 추천합니다.';\n      }else if(work){\n        work.textContent='피드백을 반영해 오늘 상세 판단은 KRP 우선, 오후 응대 준비, 회복형 업무 배치 중심으로 조정했습니다.';\n      }\n      flashAI([cal,work,tasks,daily].filter(Boolean));\n    }\n  },\n  report:{\n    title:'리포트 피드백',\n    sub:'주간/월간 리포트 생성 기준에 대한 피드백입니다.',\n    getText:()=> '종합, 캘린더, 업무, 데일리 리포트 전체 아카이브 구성',\n    apply:(feedback)=>{\n      toast('리포트 생성 기준 피드백을 저장했습니다.');\n      const card=document.querySelector('.report-hub-card');\n      if(card){card.classList.add('ai-updated');setTimeout(()=>card.classList.remove('ai-updated'),800);}\n    }\n  },\n  weekly:{\n    title:'주간 흐름 피드백',\n    sub:'이번 주 흐름과 리스크 해석에 대한 피드백입니다.',\n    getText:()=> '6월 2주차 주간 흐름 요약',\n    apply:()=>{}\n  },\n  section:{\n    title:'섹션 요약 피드백',\n    sub:'섹션 요약에 대한 피드백입니다.',\n    getText:()=> '섹션 요약 문장 전체',\n    apply:()=>{}\n  }\n};\n\nfunction flashAI(elements){\n  elements.forEach(el=>{\n    el.classList.add('ai-updated');\n    setTimeout(()=>el.classList.remove('ai-updated'),800);\n  });\n}\n\nfunction openInlineFeedback(target){\n  currentFeedbackTarget=target||'hero';\n  const cfg=feedbackTargetMap[currentFeedbackTarget]||feedbackTargetMap.hero;\n  const title=document.getElementById('feedbackModalTitle');\n  const sub=document.getElementById('feedbackModalSub');\n  const context=document.getElementById('feedbackContext');\n  const input=document.getElementById('inlineFeedbackInput');\n  if(title) title.textContent=cfg.title;\n  if(sub) sub.textContent=cfg.sub;\n  if(context) context.textContent=cfg.getText();\n  if(input) input.value='';\n  document.getElementById('inlineFeedbackBackdrop')?.classList.add('open');\n}\n\nfunction closeInlineFeedback(){\n  document.getElementById('inlineFeedbackBackdrop')?.classList.remove('open');\n}\n\nfunction applyQuickFeedback(type){\n  const input=document.getElementById('inlineFeedbackInput');\n  if(!input) return;\n  const examples={\n    priority:'우선순위가 달라요. 오늘은 KRP 업무를 더 중요하게 봐줘.',\n    specific:'너무 일반적이야. 시간대와 실제 행동 중심으로 더 구체적으로 써줘.',\n    tone:'말투를 더 대표 비서처럼 단호하고 간결하게 바꿔줘.',\n    good:'이 판단은 적절해. 다음에도 비슷한 기준으로 봐줘.'\n  };\n  input.value=examples[type]||'';\n}\n\nfunction saveInlineFeedback(){\n  const input=document.getElementById('inlineFeedbackInput');\n  const feedback=(input?.value||'').trim();\n  if(!feedback){\n    toast('피드백 내용을 입력해주세요.');\n    return;\n  }\n  const arr=JSON.parse(localStorage.getItem(INLINE_FEEDBACK_KEY)||'[]');\n  const cfg=feedbackTargetMap[currentFeedbackTarget]||feedbackTargetMap.hero;\n  arr.unshift({\n    target:currentFeedbackTarget,\n    targetTitle:cfg.title,\n    feedback,\n    original:cfg.getText(),\n    createdAt:new Date().toISOString()\n  });\n  localStorage.setItem(INLINE_FEEDBACK_KEY,JSON.stringify(arr.slice(0,30)));\n  cfg.apply(feedback);\n  closeInlineFeedback();\n  toast('해당 AI에 피드백을 반영했습니다.');\n}\n\nconst domainLabelMap={summary:'종합',calendar:'캘린더',work:'업무',daily:'데일리'};\nconst domainShortMap={summary:'종',calendar:'캘',work:'업',daily:'데'};\n\nconst reportArchiveData=[\n  {\n    id:'summary-w-2026-06-2', domain:'summary', type:'weekly',\n    title:'6월 2주차 종합 주간 리포트', period:'2026.06.08–06.14',\n    summary:'일정, 업무, 컨디션, 수익 흐름을 종합한 대표 리포트',\n    headline:'이번 주는 KRP 문서 정리와 수익 일정 관리가 핵심이었습니다.',\n    lead:'수익 일정은 안정적으로 진행되었지만, Later Check와 마감 없는 업무가 누적되어 다음 주 초 정리가 필요합니다.',\n    bullets:['KRP 업무 비중이 높았고 문서 정리 시간이 가장 많이 사용되었습니다.','수익 일정은 4건으로 안정적이었으나 사전 준비 시간이 부족했습니다.','컨디션은 중간 수준으로 수면과 활동 루틴 회복이 필요합니다.'],\n    actions:['KRP 제안서 최종 문장 정리','Later Check 중 마감 없는 항목에 날짜 부여','다음 주 수익 일정 사전 자료 준비']\n  },\n  {\n    id:'calendar-w-2026-06-2', domain:'calendar', type:'weekly',\n    title:'6월 2주차 캘린더 주간 리포트', period:'2026.06.08–06.14',\n    summary:'미팅 6건, 수익 일정 4건, 출장 1건',\n    headline:'이번 주 캘린더는 오후 일정과 수익 응대가 많았습니다.',\n    lead:'오전 집중 시간이 상대적으로 중요했고, 오후 일정 전 사전 준비 시간을 확보하는 것이 핵심이었습니다.',\n    bullets:['미팅은 주중에 분산되었고 금요일 일정 밀도가 높았습니다.','수익 일정은 총 4건으로 확인되었습니다.','출장 일정 전후로 업무 완충 시간이 필요합니다.'],\n    actions:['수익 일정 전 자료 확인 시간 확보','금요일 출장 전 업무 마감 정리','캘린더 태그 누락 점검']\n  },\n  {\n    id:'work-w-2026-06-2', domain:'work', type:'weekly',\n    title:'6월 2주차 업무 주간 리포트', period:'2026.06.08–06.14',\n    summary:'KRP 6건, PWR 3건, WSW 2건, Later Check 5건',\n    headline:'이번 주 업무는 KRP 중심으로 진행되었고 PWR 확인 업무가 뒤따랐습니다.',\n    lead:'완료율보다 핵심 업무가 적시에 처리되었는지가 중요하며, Later Check의 마감 없는 항목 정리가 필요합니다.',\n    bullets:['KRP 문서와 심사 관련 업무가 핵심이었습니다.','PWR은 운영 확인과 예약 구조 점검이 중심이었습니다.','Later Check는 마감 없는 항목이 누적되었습니다.'],\n    actions:['KRP 업무를 오전 우선순위로 배치','마감 없는 Tasks에 날짜 부여','PWR 확인 업무를 주 2회 점검 루틴으로 정리']\n  },\n  {\n    id:'daily-w-2026-06-2', domain:'daily', type:'weekly',\n    title:'6월 2주차 데일리 주간 리포트', period:'2026.06.08–06.14',\n    summary:'컨디션 평균 68점, 수면 부족 3일, 활동 낮음',\n    headline:'이번 주 컨디션은 중간 수준이지만 회복 루틴이 부족했습니다.',\n    lead:'수면과 활동 기록이 낮은 날에는 고강도 판단보다 정리형 업무를 배치하는 편이 적합합니다.',\n    bullets:['컨디션 평균은 68점으로 보통 수준입니다.','수면 부족일이 3일 이상 발생했습니다.','활동량이 낮아 회복 루틴 보강이 필요합니다.'],\n    actions:['수면 기록 누락 없이 입력','주 2회 이상 가벼운 활동 추가','컨디션 낮은 날 업무 강도 조정']\n  },\n  {\n    id:'summary-m-2026-06', domain:'summary', type:'monthly',\n    title:'2026년 6월 종합 월간 리포트', period:'2026.06',\n    summary:'업무, 수익, 컨디션, 프로젝트 흐름 종합 예정',\n    headline:'6월은 대표 브리핑 앱 구조화와 수익 일정 관리가 함께 진행된 달입니다.',\n    lead:'월간 리포트는 월말에 캘린더, 업무, 개인 데이터를 종합해 생성됩니다.',\n    bullets:['월간 업무 시간과 프로젝트 진행률을 종합합니다.','수익 일정과 실제 완료 금액을 정리합니다.','컨디션 평균과 회복 패턴을 분석합니다.'],\n    actions:['월말 데이터 확정','Gemini 월간 분석 생성','다음 달 우선순위 설정']\n  },\n  {\n    id:'calendar-m-2026-06', domain:'calendar', type:'monthly',\n    title:'2026년 6월 캘린더 월간 리포트', period:'2026.06',\n    summary:'미팅, 출장, 수익 일정의 월간 밀도 분석',\n    headline:'6월 캘린더는 수익 일정과 외부 응대가 주요 흐름입니다.',\n    lead:'월말에는 일정 밀도와 수익 일정의 실제 완료 여부를 함께 분석합니다.',\n    bullets:['수익 일정의 분포를 확인합니다.','출장과 미팅이 몰린 주를 확인합니다.','개인 일정과 업무 일정의 균형을 봅니다.'],\n    actions:['월간 일정 태그 정리','수익 일정 완료 여부 확인','다음 달 고밀도 주간 사전 파악']\n  },\n  {\n    id:'work-m-2026-06', domain:'work', type:'monthly',\n    title:'2026년 6월 업무 월간 리포트', period:'2026.06',\n    summary:'KRP, WSW, PWR 프로젝트별 업무 흐름 분석',\n    headline:'6월 업무는 KRP를 중심으로 PWR 운영 세팅이 병행되었습니다.',\n    lead:'월말에는 프로젝트별 업무 비중과 장기 체크리스트 진행률을 중심으로 봅니다.',\n    bullets:['KRP 업무가 전체 업무의 중심입니다.','PWR은 운영과 예약 구조 점검이 반복됩니다.','WSW는 MVP 기능 정의가 핵심입니다.'],\n    actions:['프로젝트별 완료율 ortDetail(){\n  document.getElementById('reportDetailBackdrop')?.classList.remove('open');\n}\n\nfunction renderArchiveSummary(rows){\n  const box=document.getElementById('archiveSummary');\n  if(!box) return;\n  box.innerHTML=`\n    \u003cdiv>\u003cb>${rows.length}\u003c/b>\u003cspan>전체\u003c/span>\u003c/div>\n    \u003cdiv>\u003cb>${rows.filter(x=>x.type==='weekly').length}\u003c/b>\u003cspan>주간\u003c/span>\u003c/div>\n    \u003cdiv>\u003cb>${rows.filter(x=>x.type==='monthly').length}\u003c/b>\u003cspan>월간\u003c/span>\u003c/div>\n  `;\n}\n\nfunction renderArchiveList(){\n  const q=(document.getElementById('archiveSearch')?.value||'').trim().toLowerCase();\n  const list=document.getElementById('archiveList');\n  let rows=reportArchiveData.filter(r=>{\n    const domainOk=archiveDomain==='all'||r.domain===archiveDomain;\n    const periodOk=archiveTab==='all'||r.type===archiveTab;\n    const qOk=!q || [r.title,r.period,r.summary,r.headline,domainLabelMap[r.domain]].join(' ').toLowerCase().includes(q);\n    return domainOk&&periodOk&&qOk;\n  });\n  renderArchiveSummary(rows);\n  if(!list) return;\n  if(!rows.length){\n    list.innerHTML='\u003cdiv class=\"report-row\">\u003cdiv class=\"report-main\">\u003cb>검색 결과 없음\u003c/b>\u003cspan>다른 키워드나 필터로 다시 검색해보세요.\u003c/span>\u003c/div>\u003c/div>';\n    return;\n  }\n  list.innerHTML=rows.map(r=>`\n    \u003cbutton class=\"archive-row\" type=\"button\" onclick=\"openReportDetail('${r.id}')\">\n      \u003cdiv class=\"archive-icon ${r.domain}\">${domainShortMap[r.domain]}\u003c/div>\n      \u003cdiv class=\"archive-main\">\n        \u003cb>${r.title}\u003c/b>\n        \u003cspan>${r.summary}\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"archive-meta\">\n        \u003cem>${r.period}\u003c/em>\n        \u003cstrong class=\"${r.domain}\">${domainLabelMap[r.domain]}\u003c/strong>\n      \u003c/div>\n    \u003c/button>\n  `).join('');\n}\n\n\nfunction updateHeaderClock(){\n  const now=new Date();\n  const hh=String(now.getHours()).padStart(2,'0');\n  const mm=String(now.getMinutes()).padStart(2,'0');\n  const days=['일','월','화','수','목','금','토'];\n  const t=document.getElementById('nowTime');\n  const d=document.getElementById('todayPill');\n  if(t) t.textContent=`${hh}:${mm}`;\n  if(d) d.textContent=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n}\nupdateHeaderClock();\nsetInterval(updateHeaderClock,30000);\n\nfunction bindButtons(){\n  document.querySelectorAll('.ai-judge-btn').forEach(btn=>{\n    if(btn.__bound) return;\n    btn.__bound=true;\n    btn.addEventListener('click',(e)=>{\n      e.preventDefault();\n      e.stopPropagation();\n      openInlineFeedback(btn.dataset.target||'hero');\n    });\n  });\n\n  document.querySelectorAll('.archive-tab').forEach(btn=>{\n    if(btn.__bound) return;\n    btn.__bound=true;\n    btn.addEventListener('click',()=>{\n      document.querySelectorAll('.archive-tab').forEach(b=>b.classList.remove('on'));\n      btn.classList.add('on');\n      archiveTab=btn.dataset.archiveTab;\n      renderArchiveList();\n    });\n  });\n\n  document.querySelectorAll('.archive-domain-tab').forEach(btn=>{\n    if(btn.__bound) return;\n    btn.__bound=true;\n    btn.addEventListener('click',()=>{\n      document.querySelectorAll('.archive-domain-tab').forEach(b=>b.classList.remove('on'));\n      btn.classList.add('on');\n      archiveDomain=btn.dataset.domainTab;\n      renderArchiveList();\n    });\n  });\n\n\n  document.querySelectorAll('.report-tab').forEach(btn=>{\n    if(btn.__reportTabsBound) return;\n    btn.__reportTabsBound=true;\n    btn.addEventListener('click',()=>{\n      document.querySelectorAll('.report-tab').forEach(b=>b.classList.remove('on'));\n      btn.classList.add('on');\n      const type=btn.dataset.reportTab;\n      const weekly=document.getElementById('weeklyReports');\n      const monthly=document.getElementById('monthlyReports');\n      if(weekly) weekly.classList.toggle('hidden',type!=='weekly');\n      if(monthly) monthly.classList.toggle('hidden',type!=='monthly');\n    });\n  });\n\n  const search=document.getElementById('archiveSearch');\n  if(search&&!search.__bound){\n    search.__bound=true;\n    search.addEventListener('input',renderArchiveList);\n  }\n\n  document.getElementById('inlineFeedbackBackdrop')?.addEventListener('click',(e)=>{\n    if(e.target.id==='inlineFeedbackBackdrop') closeInlineFeedback();\n  });\n}\n\nif(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindButtons);\nelse bindButtons();\n\u003c/script>\n\n\u003cscript id=\"cos-brief-addon\">\n/* COS v3.3 브리핑 연동: 탭 리포트 → 통합 아카이브, 탭 데이터 → 히어로 숫자 */\n(function(){\n\"use strict\";\nfunction lsGet(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb}catch(e){return fb}}\nfunction pad(n){return(n\u003c10?'0':'')+n}\nfunction todayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}\nvar MAP={calendar:'calendar',work:'work',personal:'daily'};\nfunction mergeCosReports(){\n  if(typeof reportArchiveData==='undefined')return;\n  var changed=false;\n  ['calendar','work','personal'].forEach(function(k){\n    lsGet('cos_reports_'+k+'_v1',[]).forEach(function(r){\n      var item={id:r.id,domain:MAP[k],type:r.type,title:r.title,period:r.period,summary:r.summary,\n        headline:r.headline,lead:r.lead,bullets:r.bullets||[],actions:r.actions||[]};\n      var i=reportArchiveData.findIndex(function(x){return x.id===item.id});\n      if(i>=0)reportArchiveData[i]=item;else reportArchiveData.unshift(item);\n      changed=true;\n    });\n  });\n  if(changed&&typeof renderArchiveList==='function'){try{renderArchiveList()}catch(e){}}\n}\nfunction updateHeroPills(){\n  var pills=document.querySelectorAll('.hero-pill b');\n  if(pills.length\u003c4)return;\n  var k=todayKey(),touched=false;\n  var cal=lsGet('cos_calendar_cache_v1',null)||lsGet('calendar_tab_google_live_v50',null);\n  if(cal){\n    var evs=(cal.events&&cal.events[k])||[];\n    pills[0].textContent=String(evs.length);\n    var dls=(cal.deadlines&&cal.deadlines[k])||[];\n    var dn=dls.filter(function(x){return x.done||x.completed}).length;\n    pills[2].textContent=dls.length?dn+'/'+dls.length:'0';\n    touched=true;\n  }\n  var wk=lsGet('cos_work_cache_v1',null)||lsGet('work_v38_project_archive_fixed_data',null);\n  if(wk&&Array.isArray(wk.logs)){pills[1].textContent=String(wk.logs.length);touched=true}\n  var pc=lsGet('cos_personal_cache_v1',null);\n  if(pc&&pc.score!=null){pills[3].textContent=String(pc.score);touched=true}\n  if(touched){\n    var t=new Date(),hh=pad(t.getHours())+':'+pad(t.getMinutes());\n    var line=document.querySelector('.sync-status');\n    if(line)line.textContent='Google Calendar / Sheets / Tasks \\u00b7 탭 데이터 연동 \\u00b7 '+hh;\n    var gl=document.querySelector('.google-live span');\n    if(gl)gl.textContent=hh;\n  }\n}\nmergeCosReports();updateHeroPills();\nsetTimeout(function(){mergeCosReports();updateHeroPills()},3000);\nwindow.addEventListener('storage',function(e){\n  if(!e.key)return;\n  if(e.key.indexOf('cos_reports_')===0)mergeCosReports();\n  if(e.key==='cos_calendar_cache_v1'||e.key==='cos_work_cache_v1'||e.key==='cos_personal_cache_v1'||e.key==='calendar_tab_google_live_v50'||e.key==='work_v38_project_archive_fixed_data')updateHeroPills();\n});\nif(typeof window.openReportArchive==='function'){\n  var _open=window.openReportArchive;\n  window.openReportArchive=function(d){mergeCosReports();return _open(d)};\n}\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v310-brief-header-standard\">\n/* v3.10: v8 기준, 상단 헤더만 브리핑탭 규격으로 통일 */\n.top{\n  position:sticky !important;\n  top:calc(-14px - env(safe-area-inset-top)) !important;\n  z-index:20 !important;\n  margin:calc(-14px - env(safe-area-inset-top)) -16px 16px !important;\n  padding:calc(18px + env(safe-area-inset-top)) 20px 14px !important;\n  background:rgba(245,246,249,.92) !important;\n  backdrop-filter:blur(24px) saturate(180%) !important;\n  -webkit-backdrop-filter:blur(24px) saturate(180%) !important;\n  border-bottom:1px solid rgba(17,24,39,.07) !important;\n}\n.top-row{\n  display:flex !important;\n  align-items:flex-start !important;\n  justify-content:space-between !important;\n  gap:12px !important;\n}\n.top .title{\n  font-size:17px !important;\n  font-weight:900 !important;\n  letter-spacing:-.6px !important;\n  line-height:1.2 !important;\n  color:#111827 !important;\n  margin:0 !important;\n}\n.top .title em{\n  color:#10b981 !important;\n  font-style:normal !important;\n}\n.top .caption{\n  margin-top:6px !important;\n  font-size:11px !important;\n  line-height:1.45 !important;\n  color:#8a95a8 !important;\n  font-weight:650 !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  max-width:265px !important;\n}\n.top-status{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:flex-end !important;\n  gap:8px !important;\n  white-space:nowrap !important;\n  flex:0 0 auto !important;\n  margin-top:0 !important;\n}\n.top .google-live,\n.top button.sync-dot{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  gap:4px !important;\n  height:18px !important;\n  padding:0 !important;\n  border:0 !important;\n  background:transparent !important;\n  box-shadow:none !important;\n  color:#7b8798 !important;\n  font-size:10px !important;\n  font-weight:850 !important;\n  line-height:1 !important;\n  white-space:nowrap !important;\n}\n.top .google-live i,\n.top button.sync-dot i{\n  width:5px !important;\n  height:5px !important;\n  border-radius:50% !important;\n  background:#10b981 !important;\n  flex:0 0 5px !important;\n  box-shadow:none !important;\n}\n.top .google-live span,\n.top button.sync-dot span,\n#googleSyncTime,\n#syncTime{\n  display:inline !important;\n  padding:0 !important;\n  margin:0 !important;\n  border:0 !important;\n  background:transparent !important;\n  box-shadow:none !important;\n  color:#7b8798 !important;\n  font-size:10px !important;\n  font-weight:850 !important;\n  line-height:1 !important;\n}\n.top-date-btn{\n  display:inline-flex !important;\n  align-items:center !important;\n  justify-content:center !important;\n  height:28px !important;\n  min-width:auto !important;\n  padding:0 10px !important;\n  border:1px solid rgba(17,24,39,.11) !important;\n  background:#fff !important;\n  border-radius:999px !important;\n  color:#596375 !important;\n  font-size:11px !important;\n  font-weight:900 !important;\n  line-height:1 !important;\n  box-shadow:0 2px 10px rgba(15,23,42,.05) !important;\n  white-space:nowrap !important;\n}\n.sync-status,\n.sync-full-status{\n  margin-top:6px !important;\n  font-size:10.5px !important;\n  line-height:1.25 !important;\n  color:#8a95a8 !important;\n  font-weight:800 !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.sync-status .dot,\n.sync-full-status .dot{\n  background:#10b981 !important;\n}\n/* 개인 탭은 sync-full-status가 top-copy 안에 있어도 브리핑탭의 sync-status와 같은 톤으로 표시 */\n.top-copy .sync-full-status{\n  display:block !important;\n  max-width:265px !important;\n}\n/* v9에서 생긴 큰 제목 규격이 섞이지 않도록 상단 영역만 강제 고정 */\n.top .header-title,\n.top .page-title,\n.top .top-title{\n  font-size:17px !important;\n  line-height:1.2 !important;\n}\n@media(max-width:370px){\n  .top .caption,\n  .top-copy .sync-full-status{\n    font-size:10.3px !important;\n    letter-spacing:-.35px !important;\n    max-width:235px !important;\n  }\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v310-brief-header-clock\">\n(function(){\n  function updateBriefHeaderClock(){\n    const now=new Date();\n    const hh=String(now.getHours()).padStart(2,'0');\n    const mm=String(now.getMinutes()).padStart(2,'0');\n    const days=['일','월','화','수','목','금','토'];\n    const timeText=`${hh}:${mm}`;\n    const dateText=`${now.getMonth()+1}.${now.getDate()} ${days[now.getDay()]}`;\n\n    const timeIds=['googleSyncTime','syncTime','nowTime'];\n    timeIds.forEach(id=>{\n      const el=document.getElementById(id);\n      if(el && (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n    document.querySelectorAll('.top .google-live span,.top button.sync-dot span').forEach(el=>{\n      if(el && (/^--:--$/.test(el.textContent.trim()) || /^\\d{1,2}:\\d{2}$/.test(el.textContent.trim()))) el.textContent=timeText;\n    });\n\n    const dateIds=['topDatePickerBtn','dailyDateBtn','todayPill'];\n    dateIds.forEach(id=>{\n      const el=document.getElementById(id);\n      if(el && (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n    document.querySelectorAll('.top .top-date-btn').forEach(el=>{\n      if(el && (el.textContent.trim()==='오늘' || /^\\d{1,2}\\.\\d{1,2}/.test(el.textContent.trim()))) el.textContent=dateText;\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',updateBriefHeaderClock);\n  else updateBriefHeaderClock();\n  setInterval(updateBriefHeaderClock,30000);\n})();\n\u003c/script>\n\n\n\n\n\n\n\n\n\n\n\u003cstyle id=\"cos-v313-ai-brief-fixed-summary\">\n/* v3.13: 더보기/접기 없이 AI가 처음부터 완결형 요약으로 작성 */\n.cos-brief-more{\n  display:none !important;\n}\n.cos-brief-collapsed .cos-brief-body,\n.cos-brief-expanded .cos-brief-body{\n  display:block !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  overflow:visible !important;\n}\n\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.brief-title-main,\n.calendar-brief-title,\n.work-brief-title,\n.daily-brief-title,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.32 !important;\n}\n\n.hero-ai-text,\n#heroAiText,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-lead,\n.brief-lead,\n.calendar-brief-lead,\n.work-brief-lead,\n.daily-brief-lead,\n.cal-hero .hero-lead,\n.hero .hero-lead{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  -webkit-line-clamp:unset !important;\n  max-height:none !important;\n  line-height:1.62 !important;\n}\n\n/* 작은 설명 카드만 2줄 안전 제한 유지 */\n.brief-sub,\n.mini-desc,\n.cos-report-sub,\n.report-main span{\n  display:-webkit-box !important;\n  -webkit-line-clamp:2 !important;\n  -webkit-box-orient:vertical !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n  white-space:normal !important;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v313-ai-brief-fixed-summary-js\">\n(function(){\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    tab: \"brief\",\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 34,\n    bodyMaxChars: 130,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules: [\n      \"제목은 반드시 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 반드시 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표, 더보기, 접기 없이 화면에 보이는 분량 안에서 끝낸다.\",\n      \"핵심 판단을 먼저 쓰고, 부가 설명은 과감히 제외한다.\",\n      \"숫자 나열을 반복하지 말고 운영 판단과 다음 행동 중심으로 작성한다.\"\n    ]\n  });\n\n  function completeSentence(text, limit){\n    text=(text||\"\").replace(/\\s+/g,\" \").trim();\n    text=text.replace(/…|\\.\\.\\./g,\"\");\n    if(text.length\u003c=limit) return text;\n    const slice=text.slice(0,limit+1);\n    const endings=[\"습니다.\",\"입니다.\",\"하세요.\",\"됩니다.\",\"좋습니다.\",\"필요합니다.\",\"적합합니다.\",\"중요합니다.\",\"가능합니다.\",\"다.\",\"요.\",\".\"];\n    let best=-1;\n    endings.forEach(end=>{\n      const idx=slice.lastIndexOf(end);\n      if(idx>best) best=idx+end.length;\n    });\n    if(best>20) return slice.slice(0,best).trim();\n    const comma=slice.lastIndexOf(\",\");\n    if(comma>20) return slice.slice(0,comma).trim()+\"입니다.\";\n    const space=slice.lastIndexOf(\" \");\n    if(space>20) return slice.slice(0,space).trim()+\"입니다.\";\n    return slice.slice(0,limit).trim()+\"입니다.\";\n  }\n\n  function enforceFixedSummary(){\n    document.querySelectorAll(\".cos-brief-more\").forEach(btn=>btn.remove());\n    document.querySelectorAll(\".cos-brief-collapsed,.cos-brief-expanded,.cos-brief-has-more\").forEach(el=>{\n      el.classList.remove(\"cos-brief-collapsed\",\"cos-brief-expanded\",\"cos-brief-has-more\");\n    });\n\n    const titleSelectors=[\"#heroTitle\",\"#calBriefTitle\",\"#workBriefTitle\",\"#dailyBriefTitle\",\".hero-title\"];\n    const bodySelectors=[\"#heroAiText\",\"#calBriefLead\",\"#workBriefLead\",\"#dailyBriefLead\",\".hero-ai-text\",\".hero-lead\"];\n\n    const titleEl=titleSelectors.map(s=>document.querySelector(s)).find(Boolean);\n    const bodyEl=bodySelectors.map(s=>document.querySelector(s)).find(Boolean);\n\n    if(titleEl){\n      const src=titleEl.dataset.fullText || titleEl.textContent;\n      titleEl.textContent=completeSentence(src,34);\n    }\n    if(bodyEl){\n      const src=bodyEl.dataset.fullText || bodyEl.textContent;\n      bodyEl.textContent=completeSentence(src,130);\n    }\n  }\n\n  if(document.readyState===\"loading\") document.addEventListener(\"DOMContentLoaded\",enforceFixedSummary);\n  else enforceFixedSummary();\n  setTimeout(enforceFixedSummary,500);\n  setTimeout(enforceFixedSummary,1500);\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v314-brief-title-body-fix\">\n/* v3.14: 브리프 제목 2줄 이내, 본문 4줄 이내를 실제 문장 길이로 해결 */\n.hero-title,\n#heroTitle,\n#calBriefTitle,\n#workBriefTitle,\n#dailyBriefTitle,\n.cal-hero .hero-title,\n.hero .hero-title{\n  display:block !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.32 !important;\n  max-height:none !important;\n}\n\n.hero-lead,\n#heroLead,\n#calBriefLead,\n#workBriefLead,\n#dailyBriefLead,\n.hero-ai-text,\n#heroAiText{\n  display:block !important;\n  min-height:auto !important;\n  margin-top:10px !important;\n  white-space:normal !important;\n  overflow:visible !important;\n  text-overflow:clip !important;\n  line-height:1.62 !important;\n  max-height:none !important;\n}\n\n/* 개인 탭 본문이 없어서 생기던 빈 줄 방지 */\n#dailyBriefLead:empty,\n#heroLead:empty,\n#calBriefLead:empty{\n  display:none !important;\n}\n\n/* 브리프와 지표 영역 간격 */\n.hero-lead + .condition-panel,\n.hero-lead + .stat-grid,\n#calBriefLead + .status-box{\n  margin-top:14px !important;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v314-brief-title-body-fix-js\">\n(function(){\n  const DEFAULT_TITLE=\"KRP 정리와 오후 일정이 핵심입니다.\";\n  const DEFAULT_BODY=\"오전에는 KRP 문서 정리를 먼저 처리하고, 오후 일정 전 자료 확인 시간을 확보하세요. Later Check는 오래 남은 항목만 정리하면 됩니다.\";\n\n  window.COS_GEMINI_BRIEF_RULES = Object.assign(window.COS_GEMINI_BRIEF_RULES || {}, {\n    titleMaxLines: 2,\n    bodyMaxLines: 4,\n    titleMaxChars: 24,\n    bodyMaxChars: 118,\n    requireCompleteSentence: true,\n    allowExpandCollapse: false,\n    rules:[\n      \"제목은 24자 안팎, 2줄 이내의 완결 문장으로 작성한다.\",\n      \"본문은 118자 안팎, 4줄 이내의 완결 문장으로 작성한다.\",\n      \"말줄임표로 끝내지 않는다.\",\n      \"내용이 길면 가장 중요한 판단과 다음 행동만 남긴다.\"\n    ]\n  });\n\n  function clean(s){return String(s||'').replace(/…|\\.\\.\\./g,'').replace(/\\s+/g,' ').trim();}\n  function finish(s){s=clean(s);return /[.!?。요다]$/.test(s)?s:s+'입니다.';}\n\n  function fixBrief(){\n    const hero=document.querySelector('.cal-hero,.hero');\n    if(!hero) return;\n\n    let title=document.getElementById('calBriefTitle')||document.getElementById('heroTitle')||hero.querySelector('.hero-title');\n    let body=document.getElementById('calBriefLead')||document.getElementById('heroLead')||document.getElementById('dailyBriefLead')||hero.querySelector('.hero-lead')||document.getElementById('heroAiText');\n\n    if(title){\n      const raw=clean(title.textContent);\n      if(!raw || raw.length>24) title.textContent=DEFAULT_TITLE;\n    }\n\n    if(!body){\n      body=document.createElement('div');\n      body.className='hero-lead';\n      body.id='dailyBriefLead';\n      if(title) title.insertAdjacentElement('afterend',body);\n      else hero.insertBefore(body,hero.firstChild);\n    }\n    const bodyRaw=clean(body.textContent);\n    if(!bodyRaw || bodyRaw.length>118) body.textContent=DEFAULT_BODY;\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',fixBrief);\n  else fixBrief();\n  setTimeout(fixBrief,300);\n  setTimeout(fixBrief,900);\n  setTimeout(fixBrief,1800);\n})();\n\u003c/script>\n\n\n\u003cscript id=\"cos-v315-gemini-client\">\n(function(){\n  const COS_GEMINI_API_URL = \"https://script.google.com/macros/s/AKfycbwxcBEmw_ovexvfAn3mTDyKXcW5X1XACbOF0QA2zRMxwSwIvLKjHJBDmnHkS8eM0ucd/exec\";\n  window.COS_GEMINI_API_URL = window.COS_GEMINI_API_URL || COS_GEMINI_API_URL;\n\n  function isGeminiConfigured(){\n    return window.COS_GEMINI_API_URL && !String(window.COS_GEMINI_API_URL).includes('PASTE_');\n  }\n\n  function geminiJsonp(payload){\n    return new Promise(function(resolve,reject){\n      if(!isGeminiConfigured()) return reject(new Error('Gemini Apps Script URL 미설정'));\n      const cb='cosGeminiCb_'+Date.now()+'_'+Math.floor(Math.random()*100000);\n      const script=document.createElement('script');\n      const sep=window.COS_GEMINI_API_URL.indexOf('?')>=0?'&':'?';\n      window[cb]=function(res){\n        try{delete window[cb];}catch(e){window[cb]=undefined;}\n        script.remove();\n        if(!res || res.ok===false) reject(new Error((res&&res.error)||'Gemini 응답 오류'));\n        else resolve(res.data||res);\n      };\n      script.onerror=function(){\n        try{delete window[cb];}catch(e){window[cb]=undefined;}\n        script.remove();\n        reject(new Error('Gemini Apps Script 호출 실패'));\n      };\n      script.src=window.COS_GEMINI_API_URL+sep+'action=gemini&callback='+encodeURIComponent(cb)+'&payload='+encodeURIComponent(JSON.stringify(payload));\n      document.head.appendChild(script);\n      setTimeout(function(){\n        if(window[cb]){\n          try{delete window[cb];}catch(e){window[cb]=undefined;}\n          script.remove();\n          reject(new Error('Gemini 응답 시간 초과'));\n        }\n      },18000);\n    });\n  }\n\n  function briefText(sel){\n    const el=document.querySelector(sel);\n    return el ? el.textContent.trim() : '';\n  }\n\n  function collectBriefFacts(){\n    return {\n      hero:{\n        title: briefText('#heroTitle'),\n        lead: briefText('#heroAiText')\n      },\n      metrics: Array.from(document.querySelectorAll('.hero-pill')).map(function(p){\n        return {\n          label:(p.querySelector('span')||{textContent:''}).textContent.trim(),\n          value:(p.querySelector('b')||{textContent:''}).textContent.trim()\n        };\n      }),\n      priorities: Array.from(document.querySelectorAll('#priorityCard .brief-row')).map(function(row){\n        return {\n          title:(row.querySelector('.brief-title')||{textContent:''}).textContent.trim(),\n          desc:(row.querySelector('.brief-sub')||{textContent:''}).textContent.trim(),\n          tag:(row.querySelector('.tag')||{textContent:''}).textContent.trim()\n        };\n      }),\n      interpretation: {\n        calendar: briefText('#snapshotCalendarDesc'),\n        work: briefText('#snapshotWorkDesc'),\n        tasks: briefText('#snapshotTasksDesc'),\n        daily: briefText('#snapshotDailyDesc')\n      },\n      weekly: Array.from(document.querySelectorAll('.week-item')).map(function(row){\n        return {\n          day:(row.querySelector('.week-day')||{textContent:''}).textContent.trim(),\n          text:(row.querySelector('.week-copy')||{textContent:''}).textContent.trim()\n        };\n      }),\n      feedbackHistory: JSON.parse(localStorage.getItem('brief_inline_ai_feedback_v12')||'[]').slice(0,8)\n    };\n  }\n\n  function setText(sel,text){\n    const el=document.querySelector(sel);\n    if(el && text) el.textContent=String(text).replace(/…|\\.\\.\\./g,'').trim();\n  }\n\n  function applyPriority(items){\n    if(!Array.isArray(items)) return;\n    const rows=document.querySelectorAll('#priorityCard .brief-row');\n    items.slice(0,3).forEach(function(item,idx){\n      const row=rows[idx];\n      if(!row) return;\n      const title=row.querySelector('.brief-title');\n      const desc=row.querySelector('.brief-sub');\n      const tag=row.querySelector('.tag');\n      if(title && item.title) title.textContent=item.title;\n      if(desc && item.desc) desc.textContent=item.desc;\n      if(tag && item.tag) tag.textContent=item.tag;\n    });\n  }\n\n  function applyInterpretation(items){\n    if(!items) return;\n    if(Array.isArray(items)){\n      items.forEach(function(item){\n        const key=String(item.key||item.label||'').toLowerCase();\n        if(key.includes('calendar')||key.includes('캘린더')||key.includes('일정')) setText('#snapshotCalendarDesc',item.desc||item.text);\n        if(key.includes('work')||key.includes('업무')) setText('#snapshotWorkDesc',item.desc||item.text);\n        if(key.includes('task')||key.includes('마감')||key.includes('체크')) setText('#snapshotTasksDesc',item.desc||item.text);\n        if(key.includes('daily')||key.includes('데일리')||key.includes('컨디션')) setText('#snapshotDailyDesc',item.desc||item.text);\n      });\n    }else{\n      setText('#snapshotCalendarDesc',items.calendar);\n      setText('#snapshotWorkDesc',items.work);\n      setText('#snapshotTasksDesc',items.tasks);\n      setText('#snapshotDailyDesc',items.daily);\n    }\n  }\n\n  function applyWeekly(data){\n    if(!data) return;\n    if(data.title) setText('.week-title',data.title);\n    if(data.sub) setText('.week-sub',data.sub);\n    if(Array.isArray(data.rows)){\n      const rows=document.querySelectorAll('.week-item');\n      data.rows.slice(0,5).forEach(function(item,idx){\n        const row=rows[idx];\n        if(!row) return;\n        const day=row.querySelector('.week-day');\n        const text=row.querySelector('.week-copy');\n        if(day && item.day) day.textContent=item.day;\n        if(text && item.text) text.textContent=item.text;\n      });\n    }\n  }\n\n  function applyGeminiBrief(data,target){\n    if(!data) return;\n    if(data.headline) setText('#heroTitle',data.headline);\n    if(data.lead) setText('#heroAiText',data.lead);\n    if(data.priority) applyPriority(data.priority);\n    if(data.interpretation) applyInterpretation(data.interpretation);\n    if(data.weekly) applyWeekly(data.weekly);\n    flashAI([document.getElementById('heroTitle'),document.getElementById('heroAiText')].filter(Boolean));\n  }\n\n  function runGeminiBrief(target,feedback){\n    if(!isGeminiConfigured()) return Promise.reject(new Error('Gemini Apps Script URL 미설정'));\n    toast('Gemini 생성 중입니다.');\n    return geminiJsonp({\n      tab:'brief',\n      kind:target||'hero',\n      target:target||'hero',\n      feedback:feedback||'',\n      facts:collectBriefFacts(),\n      rules:window.COS_GEMINI_BRIEF_RULES || {}\n    }).then(function(data){\n      applyGeminiBrief(data,target);\n      toast('Gemini 브리프 반영 완료');\n      return data;\n    });\n  }\n\n  ['hero','priority','snapshot','weekly'].forEach(function(target){\n    if(!window.feedbackTargetMap || !feedbackTargetMap[target]) return;\n    const localApply=feedbackTargetMap[target].apply;\n    feedbackTargetMap[target].apply=function(feedback){\n      if(!isGeminiConfigured()) return localApply(feedback);\n      return runGeminiBrief(target,feedback).catch(function(err){\n        console.warn(err);\n        toast('Gemini 연결 실패, 임시 문구를 반영합니다.');\n        return localApply(feedback);\n      });\n    };\n  });\n\n  window.refreshGeminiBrief=function(){\n    return runGeminiBrief('hero','');\n  };\n\n  if(isGeminiConfigured()){\n    setTimeout(function(){runGeminiBrief('hero','').catch(function(e){console.warn(e);});},700);\n  }\n})();\n\u003c/scr tter-spacing:-.25px !important;\n  color:var(--text) !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.report-compact-card .report-main span{\n  display:block !important;\n  margin-top:5px !important;\n  text-align:left !important;\n  font-size:10.5px !important;\n  font-weight:750 !important;\n  line-height:1.42 !important;\n  color:var(--muted) !important;\n  white-space:nowrap !important;\n  overflow:hidden !important;\n  text-overflow:ellipsis !important;\n}\n.report-compact-card .report-row em{\n  justify-self:end !important;\n  align-self:center !important;\n  min-width:38px !important;\n  height:22px !important;\n  padding:0 8px !important;\n  border-radius:999px !important;\n  font-size:10px !important;\n  font-style:normal !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n}\n\u003c/style>\n\n\n\u003cstyle id=\"cos-v320-brief-box-border-removed\">\n/* v3.20: 브리핑탭 브리프 본문 박스 테두리 제거, 다른 탭 브리프와 톤 통일 */\n.hero-ai,\n.brief-hero .hero-ai,\n.hero .hero-ai{\n  border:0 !important;\n  outline:0 !important;\n  box-shadow:none !important;\n  background:transparent !important;\n  padding:0 !important;\n  margin-top:18px !important;\n  border-radius:0 !important;\n}\n\n.hero-ai::before,\n.hero-ai::after,\n.brief-hero .hero-ai::before,\n.brief-hero .hero-ai::after{\n  display:none !important;\n  content:none !important;\n}\n\n.hero-ai-text,\n#heroAiText{\n  border:0 !important;\n  outline:0 !important;\n  box-shadow:none !important;\n  background:transparent !important;\n  padding:0 !important;\n  margin:0 !important;\n  border-radius:0 !important;\n  color:rgba(255,255,255,.94) !important;\n}\n\n/* 혹시 내부 텍스트 컨테이너에 별도 카드 스타일이 들어간 경우까지 제거 */\n.hero-ai > div,\n.hero-ai > p,\n.hero-ai .brief-lead,\n.hero-ai .hero-lead{\n  border:0 !important;\n  outline:0 !important;\n  box-shadow:none !important;\n  background:transparent !important;\n  padding-left:0 !important;\n  padding-right:0 !important;\n}\n\u003c/style>\n\n\n\u003cstyle id=\"cos-v323-unified-top-controls\">\n:root{--cos-top-accent:#10b981;--cos-top-accent-soft:rgba(16,185,129,.14);}\n\n/* v3.23: 상단 새로고침, 날짜 모달 4개 탭 공통 */\n.top .google-live,\n.top button.sync-dot,\n.top #syncStatus.google-live,\n.top #googleLive{\n  cursor:pointer !important;\n  user-select:none !important;\n  transition:transform .12s ease, opacity .12s ease, background .12s ease !important;\n}\n.top .google-live:active,\n.top button.sync-dot:active,\n.top #syncStatus.google-live:active,\n.top #googleLive:active{\n  transform:scale(.96) !important;\n}\n.top .google-live.cos-loading i,\n.top button.sync-dot.cos-loading i,\n.top #syncStatus.cos-loading i,\n.top #googleLive.cos-loading i{\n  animation:cosTopPulse .85s ease-in-out infinite alternate !important;\n}\n@keyframes cosTopPulse{\n  from{opacity:.45; transform:scale(.85);}\n  to{opacity:1; transform:scale(1.2);}\n}\n\n.cos-top-date-backdrop{\n  position:fixed !important;\n  inset:0 !important;\n  z-index:120 !important;\n  display:none !important;\n  align-items:center !important;\n  justify-content:center !important;\n  padding:24px !important;\n  background:rgba(15,23,42,.28) !important;\n  backdrop-filter:blur(12px) !important;\n  -webkit-backdrop-filter:blur(12px) !important;\n}\n.cos-top-date-backdrop.open{\n  display:flex !important;\n}\n.cos-top-date-modal{\n  width:100% !important;\n  max-width:320px !important;\n  background:#fff !important;\n  border-radius:24px !important;\n  padding:15px !important;\n  box-shadow:0 22px 60px rgba(15,23,42,.24) !important;\n}\n.cos-top-date-head{\n  display:flex !important;\n  align-items:center !important;\n  justify-content:space-between !important;\n  gap:10px !important;\n  margin-bottom:10px !important;\n}\n.cos-top-date-title{\n  font-size:15px !important;\n  font-weight:950 !important;\n  color:#111827 !important;\n  letter-spacing:-.45px !important;\n}\n.cos-top-date-arrow{\n  width:30px !important;\n  height:30px !important;\n  border-radius:50% !important;\n  border:0 !important;\n  background:#f3f5f9 !important;\n  color:#596375 !important;\n  font-size:19px !important;\n  font-weight:950 !important;\n  line-height:1 !important;\n}\n.cos-top-date-week{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:4px !important;\n  margin-bottom:5px !important;\n}\n.cos-top-date-week span{\n  text-align:center !important;\n  color:#9aa4b4 !important;\n  font-size:10px !important;\n  font-weight:900 !important;\n}\n.cos-top-date-grid{\n  display:grid !important;\n  grid-template-columns:repeat(7,1fr) !important;\n  gap:5px !important;\n}\n.cos-top-date-day{\n  height:34px !important;\n  border:0 !important;\n  border-radius:12px !important;\n  background:#f7f8fb !important;\n  color:#445064 !important;\n  font-size:12px !important;\n  font-weight:900 !important;\n  line-height:1 !important;\n}\n.cos-top-date-day.muted{\n  color:#c0c6d0 !important;\n  background:#fafbfc !important;\n}\n.cos-top-date-day.today{\n  color:var(--cos-top-accent) !important;\n  background:var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-day.selected{\n  color:#fff !important;\n  background:var(--cos-top-accent) !important;\n  box-shadow:0 8px 18px var(--cos-top-accent-soft) !important;\n}\n.cos-top-date-foot{\n  display:flex !important;\n  gap:8px !important;\n  margin-top:12px !important;\n}\n.cos-top-date-foot button{\n  flex:1 !important;\n  height:36px !important;\n  border-radius:12px !important;\n  border:0 !important;\n  font-size:12px !important;\n  font-weight:950 !important;\n}\n.cos-top-date-today{\n  background:var(--cos-top-accent-soft) !important;\n  color:var(--cos-top-accent) !important;\n}\n.cos-top-date-close{\n  background:#f2f4f8 !important;\n  color:#687386 !important;\n}\n\u003c/style>\n\n\n\u003cdiv class=\"cos-top-date-backdrop\" id=\"cosTopDateBackdrop\" aria-hidden=\"true\">\n  \u003cdiv class=\"cos-top-date-modal\" role=\"dialog\" aria-modal=\"true\">\n    \u003cdiv class=\"cos-top-date-head\">\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDatePrev\">‹\u003c/button>\n      \u003cdiv class=\"cos-top-date-title\" id=\"cosTopDateTitle\">2026. 6\u003c/div>\n      \u003cbutton type=\"button\" class=\"cos-top-date-arrow\" id=\"cosTopDateNext\">›\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"cos-top-date-week\">\n      \u003cspan>일\u003c/span>\u003cspan>월\u003c/span>\u003cspan>화\u003c/span>\u003cspan>수\u003c/span>\u003cspan>목\u003c/span>\u003cspan>금\u003c/span>\u003cspan>토\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"cos-top-date-grid\" id=\"cosTopDateGrid\">\u003c/div>\n    \u003cdiv class=\"cos-top-date-foot\">\n      \u003cbutton type=\"button\" class=\"cos-top-date-today\" id=\"cosTopDateToday\">오늘\u003c/button>\n      \u003cbutton type=\"button\" class=\"cos-top-date-close\" id=\"cosTopDateClose\">닫기\u003c/button>\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\n\u003cscript id=\"cos-v323-unified-top-controls-js\">\n(function(){\n  const TAB = \"brief\";\n  const DAY_NAMES = ['일','월','화','수','목','금','토'];\n  let viewDate = new Date();\n\n  function pad(n){ return String(n).padStart(2,'0'); }\n  function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }\n  function fromISO(iso){ return new Date(String(iso).slice(0,10)+'T00:00:00'); }\n  function labelDate(d){ return (d.getMonth()+1)+'.'+d.getDate()+' '+DAY_NAMES[d.getDay()]; }\n  function qs(s){ return document.querySelector(s); }\n  function qsa(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }\n\n  function getTopDateButton(){\n    return qs('.top .top-date-btn') || qs('#topDatePickerBtn') || qs('#dailyDateBtn');\n  }\n\n  function getSyncButton(){\n    return qs('.top button.google-live') || qs('.top button.sync-dot') || qs('.top #googleLive') || qs('.top #syncStatus');\n  }\n\n  function getStatusLine(){\n    return qs('.top .sync-status') || qs('#syncFullStatus') || qs('.cos-sync-line') || qs('.status-line');\n  }\n\n  function getTimeSpan(){\n    return qs('#googleSyncTime') || qs('#syncTime') || qs('.top .google-live span') || qs('.top button.sync-dot span');\n  }\n\n  function currentSelectedDate(){\n    try{\n      if(TAB==='calendar' && typeof dateFor==='function' && typeof cur!=='undefined') return dateFor(cur);\n      if(TAB==='work' && typeof currentDateISO!=='undefined') return fromISO(currentDateISO);\n      if(TAB==='personal' && typeof dateForDay==='function' && typeof cur!=='undefined') return dateForDay(cur);\n      const stored = localStorage.getItem('brief_selected_date_v323');\n      if(TAB==='brief' && stored) return fromISO(stored);\n    }catch(e){}\n    const btn=getTopDateButton();\n    if(btn){\n      const m=String(btn.textContent||'').match(/(\\d{1,2})\\.(\\d{1,2})/);\n      if(m){\n        const now=new Date();\n        return new Date(now.getFullYear(), Number(m[1])-1, Number(m[2]));\n      }\n    }\n    return new Date();\n  }\n\n  function setTopDateText(d){\n    const btn=getTopDateButton();\n    if(btn) btn.textContent=labelDate(d);\n  }\n\n  function setTopSyncState(state, message){\n    const live=getSyncButton();\n    const time=getTimeSpan();\n    const line=getStatusLine();\n    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});\n    if(live){\n      live.classList.remove('cos-loading','loading','fail','synced','idle');\n      if(state==='loading') live.classList.add('cos-loading','loading');\n      else if(state==='fail') live.classList.add('fail');\n      else live.classList.add('synced');\n    }\n    if(time) time.textContent = state==='loading' ? '연동 중' : now;\n    if(line){\n      line.style.display='block';\n      if(state==='loading') line.textContent = message || 'Google / Gemini 실시간 연동 중...';\n      else if(state==='fail') line.textContent = message || 'Google / Gemini 연동 오류 · 다시 시도하세요.';\n      else line.textContent = message || 'Google / Gemini 실시간 연동 완료 · ' + now;\n    }\n  }\n\n  async function maybeCall(name){\n    try{\n      const fn = window[name];\n      if(typeof fn === 'function') return await Promise.resolve(fn());\n    }catch(e){\n      console.warn(name, e);\n      throw e;\n    }\n    return null;\n  }\n\n  async function refreshTop(){\n    setTopSyncState('loading');\n    try{\n      if(TAB==='brief'){\n        await maybeCall('refreshGeminiBrief');\n      }else if(TAB==='calendar'){\n        await maybeCall('loadGoogleCalendar');\n        await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='work'){\n        if(typeof loadWorkDataFromSheets==='function') await maybeCall('loadWorkDataFromSheets');\n        if(typeof loadGoogleTasks==='function') await maybeCall('loadGoogleTasks');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }else if(TAB==='personal'){\n        if(typeof saveThenReloadGoogle==='function') await maybeCall('saveThenReloadGoogle');\n        else if(typeof checkGoogleHealth==='function') await maybeCall('checkGoogleHealth');\n        if(typeof loadChecklistFromGoogle==='function') await maybeCall('loadChecklistFromGoogle');\n        if(typeof cosRefreshTabBriefV321==='function') await maybeCall('cosRefreshTabBriefV321');\n      }\n      setTopSyncState('synced');\n    }catch(e){\n      console.warn(e);\n      setTopSyncState('fail');\n    }\n  }\n\n  function openTopDate(){\n    const d=currentSelectedDate();\n    viewDate=new Date(d.getFullYear(), d.getMonth(), 1);\n    renderTopDate();\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.add('open');\n      bd.setAttribute('aria-hidden','false');\n    }\n  }\n\n  function closeTopDate(){\n    const bd=qs('#cosTopDateBackdrop');\n    if(bd){\n      bd.classList.remove('open');\n      bd.setAttribute('aria-hidden','true');\n    }\n  }\n\n  function renderTopDate(){\n    const title=qs('#cosTopDateTitle');\n    const grid=qs('#cosTopDateGrid');\n    if(!title || !grid) return;\n    const y=viewDate.getFullYear();\n    const m=viewDate.getMonth();\n    title.textContent=y+'. '+(m+1);\n\n    const first=new Date(y,m,1);\n    const start=new Date(first);\n    start.setDate(first.getDate()-first.getDay());\n\n    const selectedISO=toISO(currentSelectedDate());\n    const todayISO=toISO(new Date());\n    let html='';\n    for(let i=0;i\u003c42;i++){\n      const d=new Date(start);\n      d.setDate(start.getDate()+i);\n      const iso=toISO(d);\n      const cls=['cos-top-date-day'];\n      if(d.getMonth()!==m) cls.push('muted');\n      if(iso===todayISO) cls.push('today');\n      if(iso===selectedISO) cls.push('selected');\n      html+='\u003cbutton type=\"button\" class=\"'+cls.join(' ')+'\" data-cos-date=\"'+iso+'\">'+d.getDate()+'\u003c/button>';\n    }\n    grid.innerHTML=html;\n    qsa('[data-cos-date]').forEach(function(btn){\n      btn.onclick=function(){ applyTopDate(btn.dataset.cosDate); };\n    });\n  }\n\n  function applyTopDate(iso){\n    const d=fromISO(iso);\n    setTopDateText(d);\n\n    try{\n      if(TAB==='calendar' && typeof setWeekByDate==='function'){\n        setWeekByDate(iso);\n      }else if(TAB==='work'){\n        if(typeof setCurrentDate==='function') setCurrentDate(iso);\n        else window.currentDateISO = iso;\n        if(typeof renderAll==='function') renderAll();\n      }else if(TAB==='personal'){\n        if(typeof selectDailyDate==='function') selectDailyDate(d);\n        else if(typeof renderAll==='function') renderAll();\n      }else{\n        localStorage.setItem('brief_selected_date_v323', iso);\n        if(typeof refreshGeminiBrief==='function') refreshGeminiBrief();\n      }\n    }catch(e){\n      console.warn(e);\n    }\n\n    closeTopDate();\n    setTimeout(function(){\n      if(TAB!=='brief') refreshTop();\n    }, 350);\n  }\n\n  function bindTopControls(){\n    const syncBtn=getSyncButton();\n    if(syncBtn && !syncBtn.__cosV323Bound){\n      syncBtn.__cosV323Bound=true;\n      syncBtn.onclick=null;\n      syncBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        refreshTop();\n      }, true);\n    }\n\n    const dateBtn=getTopDateButton();\n    if(dateBtn && !dateBtn.__cosV323Bound){\n      dateBtn.__cosV323Bound=true;\n      dateBtn.onclick=null;\n      dateBtn.addEventListener('click', function(e){\n        e.preventDefault();\n        e.stopPropagation();\n        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n        openTopDate();\n      }, true);\n    }\n\n    const prev=qs('#cosTopDatePrev');\n    const next=qs('#cosTopDateNext');\n    const today=qs('#cosTopDateToday');\n    const close=qs('#cosTopDateClose');\n    const bd=qs('#cosTopDateBackdrop');\n\n    if(prev && !prev.__cosV323Bound){\n      prev.__cosV323Bound=true;\n      prev.onclick=function(){ viewDate.setMonth(viewDate.getMonth()-1); renderTopDate(); };\n    }\n    if(next && !next.__cosV323Bound){\n      next.__cosV323Bound=true;\n      next.onclick=function(){ viewDate.setMonth(viewDate.getMonth()+1); renderTopDate(); };\n    }\n    if(today && !today.__cosV323Bound){\n      today.__cosV323Bound=true;\n      today.onclick=function(){ applyTopDate(toISO(new Date())); };\n    }\n    if(close && !close.__cosV323Bound){\n      close.__cosV323Bound=true;\n      close.onclick=closeTopDate;\n    }\n    if(bd && !bd.__cosV323Bound){\n      bd.__cosV323Bound=true;\n      bd.addEventListener('click', function(e){\n        if(e.target===bd) closeTopDate();\n      });\n    }\n\n    setTopDateText(currentSelectedDate());\n  }\n\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindTopControls);\n  else bindTopControls();\n\n  setTimeout(bindTopControls, 500);\n  setTimeout(bindTopControls, 1600);\n  setTimeout(bindTopControls, 3200);\n\n  window.cosOpenUnifiedTopDateV323=openTopDate;\n  window.cosRefreshUnifiedTopV323=refreshTop;\n})();\n\u003c/script>\n\n\n\u003cstyle id=\"cos-v324-brief-gemini-test-style\">\n#briefGeminiTestBtn{\n  margin-top:10px;\n  width:100%;\n  height:38px;\n  border:1px solid rgba(255,255,255,.18);\n  border-radius:14px;\n  background:rgba(255,255,255,.12);\n  color:#fff;\n  font-size:11.5px;\n  font-weight:950;\n}\n\u003c/style>\n\n\n\u003cscript id=\"cos-v324-brief-gemini-test-js\">\n(function(){\n  function addBriefGeminiTest(){\n    if(document.getElementById('briefGeminiTestBtn'))return;\n    const hero=document.querySelector('.hero-card,.brief-hero,.hero');\n    if(!hero)return;\n    const btn=document.createElement('button');\n    btn.type='button';\n    btn.id='briefGeminiTestBtn';\n    btn.textContent='실제 데이터로 브리핑 재생성';\n    btn.addEventListener('click',function(){\n      if(typeof refreshGeminiBrief==='function')refreshGeminiBrief();\n    });\n    hero.appendChild(btn);\n  }\n  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',addBriefGeminiTest);\n  else addBriefGeminiTest();\n  setTimeout(addBriefGeminiTest,800);\n})();\n\u003c/script>\n\n\u003c/body>\n\u003c/html>",
  calendar: "\u003c!DOCTYPE html>\n\u003chtml lang=\"ko\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\"/>\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\"/>\n\u003ctitle>캘린더 탭 v55 마감체크 최종 정렬\u003c/title>\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">\n\u003cstyle>\n:root {\n  --bg:#f5f6f9; --bg2:#eef0f5; --bg3:#e8eaf0; --surface:#ffffff; --surface2:#f2f4f8;\n  --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.11);\n  --text-0:#111827; --text-1:#4b5568; --text-2:#8492a6; --text-3:#b0bac8;\n  --blue:#3d7eff; --blue-dim:rgba(61,126,255,.09);\n  --green:#00b87a; --green-dim:rgba(0,184,122,.1);\n  --orange:#ff6a3d; --orange-dim:rgba(255,106,61,.1);\n  --purple:#8b5cf6; --purple-dim:rgba(139,92,246,.1);\n  --red:#ff4d5a; --red-dim:rgba(255,77,90,.1);\n  --yellow:#f4b740; --yellow-dim:rgba(244,183,64,.14);\n  --text-xs:10px; --text-sm:11px; --text-base:13px; --text-md:15px; --text-lg:17px; --text-xl:20px; --text-2xl:24px;\n  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:22px; --r-2xl:28px; --r-pill:999px;\n  --shadow-sm:0 2px 10px rgba(0,0,0,.08); --shadow-md:0 8px 28px rgba(0,0,0,.1);\n  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',system-ui,sans-serif;\n}\n*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nhtml,body{margin:0;width:100%;min-height:100%;background:var(--bg);font-family:var(--font);color:var(--text-0);-webkit-font-smoothing:antialiased}\nbody{overflow:hidden}\nbutton,input,select,textarea{font-family:var(--font)}\nbutton{cursor:pointer;border:none;background:none}\ninput,select,textarea{border:none;background:none;outline:none;color:var(--text-0)}\ninput::placeholder,textarea::placeholder{color:var(--text-2)}\n.app{width:100%;max-width:430px;height:100dvh;margin:0 auto;background:var(--bg);position:relative;overflow-y:auto;padding:calc(14px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));scrollbar-width:none}\n.app::-webkit-scrollbar{display:none}\n.top{position:sticky;top:calc(-14px - env(safe-area-inset-top));z-index:20;margin:calc(-14px - env(safe-area-inset-top)) -16px 16px;padding:calc(18px + env(safe-area-inset-top)) 20px 14px;background:rgba(245,246,249,.92);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border)}\n.top-row{display:flex;align-items:center;justify-content:space-between;gap:12px}\n.title{font-size:17px;font-weight:900;letter-spacing:-.6px;color:var(--text-0);line-height:1.2}\n.title em{font-style:normal;color:var(--green)}\n.date-chip{font-size:var(--text-xs);font-weight:700;color:var(--text-1);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-pill);padding:6px 12px;white-space:nowrap;letter-spacing:.3px}\n.sync-btn{font-size:var(--text-xs);font-weight:800;color:var(--green);background:var(--green-dim);border:1px solid rgba(0,184,122,.18);border-radius:var(--r-pill);padding:6px 10px;white-space:nowrap}\n.google-live{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-pill);padding:6px 10px;white-space:nowrap;box-shadow:var(--shadow-sm)}\n.google-live i{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-dim);display:block}\n.google-live b{font-size:10px;color:var(--text-1);font-weight:850;line-height:1}\n.google-live em{font-style:normal;font-size:10px;color:var(--green);font-weight:850;line-height:1}\n.google-live.loading i{background:var(--orange);box-shadow:0 0 0 3px var(--orange-dim)}\n.google-live.fail i{background:var(--red);box-shadow:0 0 0 3px var(--red-dim)}\n.google-live.fail em{color:var(--red)}\n.sync-status{margin-top:5px;font-size:10px;font-weight:700;color:var(--text-2)}\n.caption{margin-top:6px;font-
